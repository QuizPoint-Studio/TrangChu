                { id: 39, q: "Trạng thái lão hóa tế bào và trẻ hóa tế bào được điều chỉnh hiệu quả nhất bằng tỷ lệ nào? (Mẹo: ABA -> già hóa, lão hóa; Cytokinin -> trẻ hóa)", a: "ABA / Gibberellin", b: "ABA / Auxin", c: "ABA / Etylen", d: "ABA / Cytokinin", ans: "d" },
                { id: 40, q: "Nơi tổng hợp gibberellin chủ yếu trong cơ thể thực vật là ở đâu?", a: "Rễ, lá và hạt non", b: "Chồi và đọt non", c: "Mầm hoa", d: "Tất cả đều sai", ans: "a" },
                { id: 41, q: "Trong cơ thể thực vật, Axit Abscisic (ABA) được tích lũy nhiều nhất ở bộ phận nào? (Mẹo: ABA tích lũy mạnh khi cây bị stress hoặc ngủ nghỉ)", a: "Lá, chồi non", b: "Rễ, thân", c: "Cơ quan đang ngủ nghỉ", d: "Tất cả các ý trên đều đúng", ans: "d" },
                { id: 42, q: "Trái cây hình thành và sinh trưởng được sau khi thụ tinh chủ yếu là do nguồn Auxin từ đâu?", a: "Auxin trong phôi hạt", b: "Auxin trong cây được vận chuyển đến bầu nhụy", c: "Auxin từ vòi nhụy", d: "Auxin từ bầu nhụy", ans: "a" },
                { id: 43, q: "Khi tiến hành cắt bỏ chồi ngọn, chồi bên lập tức sinh trưởng mạnh là do sự thay đổi nào? (Mẹo: Cắt ngọn làm mất ưu thế ngọn)", a: "Tăng IAA", b: "Tăng GA", c: "Giảm IAA", d: "Giảm chất ức chế", ans: "c" },
                { id: 44, q: "Để ứng dụng tạo quả không hạt bằng Auxin, nhà vườn cần tiến hành xử lý vào thời điểm nào?", a: "Thụ phấn thụ tinh xong", b: "Hoa chưa nở", c: "Hoa nở chưa thụ tinh", d: "Hoa nở", ans: "c" },
                { id: 45, q: "Chất điều hòa sinh trưởng nào có tác dụng kích thích ra hoa ngày dài trong điều kiện ngày ngắn? (Mẹo: GA giúp cây ra hoa trong điều kiện không thuận lợi)", a: "Cytokinin", b: "Ethylen", c: "Auxin", d: "Gibberelline", ans: "d" },
                { id: 46, q: "Nguyên tắc cốt lõi nào cần tuân thủ khi sử dụng chất điều hòa sinh trưởng cho cây trồng?", a: "Không thay thế dinh dưỡng khoáng", b: "Xác định đúng nồng độ khi sử dụng", c: "Xác định giai đoạn sinh trưởng phát triển của cây", d: "Tất cả các nguyên tắc trên đều đúng", ans: "d" },
                { id: 47, q: "Loại hormone thực vật nào thường được nông dân Việt Nam sử dụng phổ biến nhất để kích thích ra rễ nhanh cho cành chiết và cành giâm?", a: "Gibberellin (GA)", b: "Auxin (như ANA, AIB)", c: "Abscisic Acid (ABA)", d: "Ethylene", ans: "b" },
                { id: 48, q: "Để kích thích xoài hoặc chuối chín nhanh và đồng đều sau khi thu hoạch, người ta thường sử dụng chất nào? (Mẹo: Ethylene là hormone làm chín quả)", a: "Cytokinin", b: "Auxin", c: "Ethylene", d: "Acid Jasmonic", ans: "c" },
                { id: 49, q: "Trong sản xuất lúa giống, để phá bỏ trạng thái ngủ nghỉ (miên trạng) giúp hạt nảy mầm nhanh và đều, người ta thường tác động hormone nào? (Mẹo: GA giúp phá ngủ hạt)", a: "Gibberellin (GA)", b: "Auxin", c: "Abscisic Acid (ABA)", d: "Cytokinin", ans: "a" },
                { id: 50, q: "Tại sao khi trồng cây cảnh hoặc cây ăn quả, việc “bấm ngọn” lại giúp cây ra nhiều cành bên hơn?", a: "Vì làm giảm hàm lượng Cytokinin ở chồi bên.", b: "Vì loại bỏ nguồn tổng hợp Auxin chính, làm giảm ưu thế ngọn.", c: "Vì kích thích Ethylene gây rụng lá già.", d: "Vì tăng cường sự tích lũy ABA tại thân chính.", ans: "b" },
                { id: 51, q: "Để kích thích cho cây dứa (thơm) ra hoa trái vụ đồng loạt tại các vùng chuyên canh ở Việt Nam, biện pháp nào thường được áp dụng? (Mẹo: Ethylene kích thích dứa ra hoa đồng loạt)", a: "Phun Auxin nồng độ cao", b: "Xử lý Ethrel (chất giải phóng Ethylene) hoặc đất đèn", c: "Bón nhiều phân đạm", d: "Phun Cytokinin để làm trẻ hóa cây.", ans: "b" },
                { id: 52, q: "Khi gặp điều kiện khô hạn kéo dài, tại sao lá cây thường có hiện tượng đóng khí khổng để bảo vệ cây khỏi mất nước? (Mẹo: ABA đóng khí khổng chống mất nước)", a: "Do hàm lượng GA tăng cao đột ngột", b: "Do sự tích lũy Acid Abscisic (ABA) trong lá", c: "Do Auxin kích thích bơm proton hoạt động mạnh", d: "Do sự giảm sút của Ethylene.", ans: "b" },
                { id: 53, q: "Trong kỹ thuật nuôi cấy mô tế bào thực vật (in-vitro), để tạo ra một cây hoàn chỉnh từ mô sẹo (callus), quy trình phối hợp hormone thường là:", a: "Chỉ dùng Auxin nồng độ cao", b: "Dùng nồng độ Auxin cao để ra rễ, sau đó bổ sung Cytokinin để ra chồi", c: "Dùng nồng độ Cytokinin cao ngay từ đầu để tạo rễ", d: "Không cần bổ sung hormone, chỉ cần vitamin.", ans: "b" },
                { id: 54, q: "Tại Việt Nam, để làm cho các loại rau như bắp cải, su hào có thể ra hoa trong điều kiện khí hậu không đủ độ lạnh cần thiết, nông dân thường sử dụng hormone nào? (Mẹo: GA thay thế xử lý lạnh giúp cây ra hoa)", a: "Ethylene", b: "Gibberellin (GA)", c: "Auxin", d: "Cytokinin", ans: "b" },
                { id: 55, q: "Trong nghề trồng nho tại Ninh Thuận, việc xử lý GA3 vào thời điểm nào sau đây sẽ giúp tăng năng suất và tạo quả không hạt hiệu quả nhất? (Mẹo: GA3 tăng đậu quả + tạo quả không hạt)", a: "Khi cây đang ngủ nghỉ mùa đông", b: "Phun lên hoa trước khi thụ phấn và giai đoạn quả non", c: "Khi quả đã chín hoàn toàn", d: "Phun vào bộ rễ của cây.", ans: "b" },
                { id: 56, q: "Để ngăn ngừa sự rụng sớm của quả non nhằm tăng năng suất, người sản xuất cần điều chỉnh sự cân bằng hormone theo hướng nào? (Mẹo: Auxin ức chế tầng rời -> giảm rụng quả)", a: "Tăng hàm lượng ABA và Ethylene trong cuống quả", b: "Duy trì hàm lượng Auxin cao ở vùng cuống quả để ức chế tầng rời", c: "Phun nồng độ GA cực cao để làm khô cuống quả", d: "Cắt tỉa hết lá non xung quanh quả.", ans: "b" },
                { id: 57, q: "Quang chu kỳ (photoperiod) là yếu tố môi trường nào có ảnh hưởng đáng kể đến sự sinh trưởng và phát triển của thực vật?", a: "Nhiệt độ trung bình ngày đêm", b: "Lượng mưa hàng năm", c: "Thời gian chiếu sáng hàng ngày", d: "Thành phần chất dinh dưỡng trong đất", ans: "c" }
            ],
            3: [
                { id: 58, q: "Quá trình sinh học nào sau đây ở cơ thể thực vật chịu ảnh hưởng rõ rệt nhất bởi yếu tố quang chu kỳ?", a: "Quá trình thoát hơi nước", b: "Quá trình hấp thụ nước ở rễ", c: "Quá trình ra hoa", d: "Quá trình quang hợp", ans: "c" },
                { id: 59, q: "Một loài cây chỉ ra hoa khi thời gian chiếu sáng trong ngày ngắn hơn ngưỡng thời gian tới hạn nhất định. Loài cây này được phân loại là:", a: "Cây ngày dài (CND) đêm ngắn liên tục", b: "Cây bất định (CBĐ)", c: "Cây ngày ngắn (CNN) đêm dài liên tục", d: "Tất cả các loại cây trên", ans: "c" },

                { id: 61, q: "Nếu một loài cây có nguồn gốc từ vùng ôn đới và thường ra hoa vào mùa hè khi ngày dài, nó rất có thể thuộc nhóm cây nào sau đây?", a: "Cây ngày ngắn", b: "Cây bất định", c: "Cây ngày dài", d: "Cây trung tính", ans: "c" },
                { id: 62, q: "Hiện tượng quang gián đoạn đề cập đến việc làm gián đoạn giai đoạn nào trong chu kỳ quang của cây và nó có ảnh hưởng đáng kể đến cây ngày ngắn?", a: "Giai đoạn chiếu sáng ban ngày bằng một khoảng tối ngắn", b: "Giai đoạn tối ban đêm bằng một khoảng chiếu sáng ngắn", c: "Cả giai đoạn sáng và tối bằng các khoảng thời gian ngược lại", d: "Tổng thời gian chiếu sáng trong ngày.", ans: "b" },
                { id: 63, q: "Tại sao việc bắn pháo sáng vào giữa đêm có thể ngăn chặn sự ra hoa ở cây mía (một cây ngày ngắn)?", a: "Ánh sáng từ pháo sáng làm tăng tổng thời gian chiếu sáng trong ngày, vượt quá ngưỡng tới hạn của cây ngày ngắn.", b: "Ánh sáng từ pháo sáng gây ra sự tăng nhiệt độ đột ngột, ức chế quá trình hình thành mầm hoa.", c: "Ánh sáng từ pháo sáng làm gián đoạn giai đoạn tối liên tục cần thiết cho cây ngày ngắn để kích thích ra hoa.", d: "Âm thanh lớn từ pháo sáng gây stress cho cây, ngăn chặn quá trình sinh sản ra hoa.", ans: "c" },
                { id: 64, q: "Đối với cây ngày dài, việc chiếu một khoảng sáng ngắn vào giữa đêm tối sẽ có tác động như thế nào đến quá trình ra hoa?", a: "Ức chế hoàn toàn quá trình ra hoa.", b: "Thúc đẩy quá trình ra hoa.", c: "Không có ảnh hưởng đáng kể đến quá trình ra hoa.", d: "Làm trì hoãn thời điểm ra hoa.", ans: "b" },
                { id: 65, q: "Cơ quan chính nào của cây đóng vai trò là thụ thể cảm nhận tín hiệu quang chu kỳ, từ đó điều khiển các quá trình sinh trưởng và phát triển như sự ra hoa?", a: "Rễ", b: "Thân", c: "Lá", d: "Hoa", ans: "c" },
                { id: 66, q: "Điều gì cho thấy rằng tín hiệu quang chu kỳ được cảm nhận cục bộ ở một số bộ phận nhất định của cây?", a: "Cây chỉ ra hoa khi toàn bộ cây được chiếu sáng với điều kiện quang chu kỳ phù hợp.", b: "Chỉ cần một vài lá hoặc một cành nhận được tín hiệu quang chu kỳ thích hợp cũng đủ để kích hoạt quá trình ra hoa của toàn bộ cây.", c: "Sự ra hoa luôn bắt đầu từ ngọn sinh trưởng của thân chính.", d: "Rễ cũng có khả năng cảm nhận và phản ứng with quang chu kỳ.", ans: "b" },
                { id: 67, q: "Theo học thuyết hormone ra hoa, điều kiện tiên quyết nào cần thiết để một cây có thể ra hoa?", a: "Chỉ cần đạt đến giai đoạn trưởng thành nhất định.", b: "Chỉ cần có đủ chất dinh dưỡng khoáng.", c: "Phải trải qua đầy đủ hai điều kiện quang chu kỳ cảm ứng phù hợp với loại cây đó.", d: "Có sự hiện diện đồng thời của cả hormone GA và Antesin.", ans: "d" },
                { id: 68, q: "Ở cây ngày ngắn (CNN), điều kiện quang chu kỳ nào cần thiết để cảm ứng tạo ra hormone Antesin, một trong hai hormone liên quan đến quá trình ra hoa theo học thuyết hormone ra hoa?", a: "Điều kiện ngày dài (ND)", b: "Điều kiện ngày ngắn (NN)", c: "Điều kiện chiếu sáng liên tục", d: "Điều kiện tối liên tục", ans: "b" },
                { id: 69, q: "Việc phun bổ sung hormone GA có thể gây ra hiện tượng gì ở cây ngày dài (CND) trồng trong điều kiện ngày ngắn?", a: "Ngăn chặn hoàn toàn quá trình ra hoa.", b: "Thúc đẩy quá trình ra hoa.", c: "Chỉ có tác dụng đối với cây ngày ngắn.", d: "Chỉ có tác dụng đối với cây ngày dài.", ans: "b" },
                { id: 70, q: "Trong quá trình hình thành trái và hột ở thực vật hột kín, bộ phận nào sau đây là nguồn gốc của phôi nhũ (nội nhũ) có bộ nhiễm sắc thể 3n?", a: "Vách bầu noãn biến đổi dưới tác động của Auxin.", b: "Tế bào noãn cầu (n) thụ tinh với tinh trùng (n).", c: "Nhân phụ (2n) dung hợp với tinh trùng (n).", d: "Vỏ noãn phát triển sau khi thụ tinh.", ans: "c" },
                { id: 71, q: "Kết quả của quá trình thụ tinh đôi ở thực vật hột kín sẽ tạo ra các sản phẩm nào?", a: "Hợp tử (2n) và phôi tâm (2n).", b: "Hợp tử (2n) và phôi nhũ (nội nhũ 3n).", c: "Phôi (2n) và vỏ hột.", d: "Noãn cầu và nhân phụ.", ans: "b" },
                { id: 72, q: "Đường cong tăng trưởng của các loại trái như nho, xoài, dứa có đặc điểm gì khác biệt so với táo hay lê?", a: "Tăng trưởng nhanh nhất vào giai đoạn trái sắp chín.", b: "Tăng trưởng theo hình chữ S đơn.", c: "Tăng trưởng theo hình 2 chữ S (Double Sigmoid).", d: "Tăng trưởng liên tục không có giai đoạn nghỉ.", ans: "c" },
                { id: 73, q: "Loại trái cây nào sau đây có đường cong tăng trưởng theo thời gian hình 2 chữ S?", a: "Táo, lê, cam.", b: "Cà chua, dưa chuột.", c: "Nho, xoài, chùm ruột, dứa/dừa.", d: "Chuối, lê, mít.", ans: "c" },
                { id: 74, q: "Hormone nào đóng vai trò chủ đạo trong việc kích thích sự kéo dài tế bào trái và đạt đỉnh cao trước khi trái trưởng thành?", a: "Gibberellin (GA).", b: "Abscisic acid (ABA).", c: "Ethylene.", d: "Cytokinin.", ans: "a" },
                { id: 75, q: "Hiện tượng “trái trinh sinh” (trái không hột) có thể được hình thành do tác động ngoại cảnh tiêu biểu nào sau đây?", a: "Nhiệt độ môi trường xuống thấp (lạnh).", b: "Độ ẩm không khí thấp kéo dài.", c: "Sử dụng phân bón lá quá liều.", d: "Cường độ ánh sáng quá cao.", ans: "a" },
                { id: 76, q: "Trong sản xuất nông nghiệp, tại sao người ta thường dùng khí CO2 để bảo quản trái cây tươi lâu hơn?", a: "Vì CO2 kích thích sự phân chia tế bào vỏ trái.", b: "Vì CO2 có tác dụng đối nghịch với Ethylene.", c: "Vì CO2 cung cấp dinh dưỡng cho trái sau thu hoạch.", d: "Vì CO2 giúp trái chín đồng loạt hơn.", ans: "b" },
                { id: 77, q: "Tại sao hột giống thường được khuyến cáo lưu trữ ở độ ẩm khoảng 13% thay vì mức 10% như trạng thái tiềm sinh tự nhiên?", a: "Để duy trì sức sống của phôi hột cho việc làm giống.", b: "Để đảm bảo hột không bị biến dưỡng sinh hóa.", c: "Để ngăn chặn sự phát sinh nhiệt trong khối hột.", d: "Để hột có thể nảy mầm ngay khi gặp ánh sáng.", ans: "a" },
                { id: 78, q: "Để giữ hột làm giống, độ ẩm của hột thông thường cần được duy trì ở mức ổn định bao nhiêu?", a: "Khoảng 5%.", b: "Khoảng 10%.", c: "Khoảng 13%.", d: "Khoảng 20%.", ans: "c" },
                { id: 79, q: "Sự khác biệt cơ bản nhất giữa hột của cây Hột trần (Gymnosperm) và cây Hột kín (Angiosperm) là gì?", a: "Cây hột trần không có phôi bên trong hột.", b: "Cây hột kín không có nội nhũ dự trữ dinh dưỡng.", c: "Cây hột trần chỉ nảy mầm trên mặt đất.", d: "Cây hột kín có noãn được bao bọc bởi vỏ noãn (bầu noãn).", ans: "d" },

                                  ${state.history.length > 0 ? `<button onclick="clearHistory()" class="text-rose-500 hover:text-rose-700 p-2 hover:bg-rose-50 rounded-lg transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>` : ''}

                            <div class="p-4 bg-rose-50 dark:bg-rose-950/20 rounded-2xl border border-rose-100"><p class="text-rose-500 dark:text-rose-400 text-xs font-extrabold uppercase tracking-wider mb-1">Sai / Thiếu</p><p class="text-4xl font-black text-rose-500 dark:text-rose-400">${state.wrongScore}</p></div>

                        </div>
                    </div>`;
                return;
            }

            const currentQ = state.questions[state.currentQuestionIndex];
            const progress = ((state.currentQuestionIndex + 1) / state.questions.length) * 100;

            root.innerHTML = `
                <div class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 flex items-center justify-center p-4 ${state.isConfirming ? 'block' : 'hidden'}">
                  <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-8 max-w-sm w-full shadow-2xl border border-slate-100">
                    <h3 class="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tight mb-2">Nộp bài & kết thúc?</h3>
                    <p class="text-xs text-slate-400 dark:text-slate-500 font-medium mb-6">Kết quả bài làm hiện tại của bạn sẽ được lưu giữ lại hệ thống.</p>
                    <div class="flex gap-3">
                      <button onclick="setConfirming(false)" class="flex-1 py-3 px-4 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors">Tiếp bài làm</button>
                      <button onclick="confirmFinish()" class="flex-1 py-3 px-4 bg-rose-500 text-white rounded-xl font-bold text-xs uppercase tracking-wider shadow-lg transition-colors">Nộp bài ngay</button>
                    </div>
                  </div>
                </div>

                <div class="min-h-screen flex flex-col items-center p-4 sm:p-6 w-full max-w-3xl mx-auto relative justify-start">

                        <button onclick="requestFinish()" class="p-2.5 rounded-xl text-slate-400 hover:text-rose-500 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                        <div class="glass-panel px-4 py-2 rounded-full border text-xs font-bold text-slate-600 dark:text-slate-300 tracking-wide uppercase">Câu ${state.currentQuestionIndex + 1} / ${state.questions.length}</div>
                        <div class="flex items-center gap-1 text-emerald-600 dark:text-emerald-400 font-extrabold text-xs bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 px-3 py-1.5 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${state.score}</div>
                    </div>
                    
                    <div class="w-full mb-8">
                        <div class="h-2.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all rounded-full" style="width: ${progress}%"></div></div>
                    </div>
                    
                    <div class="w-full bg-white dark:bg-slate-900 p-6 sm:p-10 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/60 mb-24 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-500 to-emerald-600"></div>
                        
                        <div>
                            <div class="mb-6">
                                <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                                    <span class="inline-block bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 text-[10px] font-extrabold px-2.5 py-1 rounded-md tracking-wider border border-slate-100">ID: #${currentQ.id}</span>
                                    <span class="text-[10px] font-black tracking-wider uppercase px-2.5 py-1 rounded-full ${currentQ.isMultiple ? 'bg-amber-50 text-amber-600 border border-amber-200' : 'bg-teal-50 text-teal-600 border border-teal-200'}">
                                        ${currentQ.isMultiple ? "☑ Tích chọn nhiều đáp án" : "🔘 Chọn một đáp án"}
                                    </span>
                                </div>
                                <h2 class="text-xl sm:text-2xl font-black text-slate-800 dark:text-slate-100 leading-snug tracking-tight">${currentQ.q}</h2>
                            </div>
                            
                            <div class="space-y-3.5">
                                ${state.shuffledOptions.map((option) => {
                                    const isSelected = state.selectedOptions.includes(option.key);
                                    const isOptCorrect = currentQ.correct.split('').includes(option.key);
                                    
                                    let containerClass = "w-full p-5 rounded-2xl border text-left font-semibold transition-all duration-200 transform active:scale-[0.98] flex justify-between items-center relative overflow-hidden text-sm ";
                                    
                                    if (state.isSubmitted) {
                                      containerClass += " active:scale-100 cursor-not-allowed "; 
                                      if (isOptCorrect) containerClass += "border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 ring-2 ring-emerald-200 dark:ring-emerald-900/40 shadow-inner";
                                      else if (isSelected) containerClass += "border-rose-500 bg-rose-50 dark:bg-rose-950/30 text-rose-800 ring-2 ring-rose-200 shadow-inner";
                                      else containerClass += "border-slate-100 text-slate-400 opacity-50";
                                    } else {
                                      if (isSelected) containerClass += "border-emerald-500 bg-emerald-50/60 dark:bg-slate-800/80 text-emerald-900 dark:text-teal-300 ring-2 ring-emerald-200 dark:ring-emerald-900/40 shadow-md -translate-y-0.5";
                                      else containerClass += "border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-brand-50/40 hover:border-brand-200 hover:shadow-sm hover:-translate-y-0.5";
                                    }

                                    return `
                                        <button onclick="handleOptionSelect('${option.key}', ${currentQ.isMultiple})" ${state.isSubmitted ? 'disabled' : ''} class="${containerClass}">
                                            <div class="flex items-center gap-4 relative z-10">
                                                <div class="w-5 h-5 flex items-center justify-center border-2 flex-shrink-0 rounded-md transition-colors ${isSelected ? 'border-brand-500 bg-brand-500 text-white' : 'border-slate-300 bg-white dark:bg-slate-900'}">
                                                    ${isSelected ? '<svg class="w-3 h-3 fill-current" viewBox="0 0 20 20"><path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/></svg>' : ''}
                                                </div>
                                                <span>${option.text}</span>
                                            </div>
                                            ${state.isSubmitted && isOptCorrect ? '<svg class="text-emerald-600 dark:text-emerald-400 flex-shrink-0 ml-4" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' : ''}
                                            ${state.isSubmitted && isSelected && !isOptCorrect ? '<svg class="text-red-600 dark:text-red-400 flex-shrink-0 ml-4" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' : ''}
                                        </button>`;
                                }).join('')}
                            </div>
                            
                            ${!state.isSubmitted && state.selectedOptions.length > 0 ? `
                                <div class="mt-6 flex justify-end">
                                    <button onclick="checkAnswerSubmission()" class="px-6 py-3 bg-gradient-to-r from-brand-500 to-emerald-600 text-white font-extrabold rounded-xl text-xs uppercase tracking-wider shadow-md transform active:scale-95 transition-transform">
                                        Xác nhận đáp án
                                    </button>
                                </div>` : ''}
                        </div>
                    </div>

                    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-900/60 flex justify-center items-center gap-4 z-20">
                        <button onclick="prevQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''} class="w-14 h-14 rounded-2xl flex items-center justify-center border text-slate-600 dark:text-slate-400 disabled:opacity-25 transform active:scale-95 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <button onclick="nextQuestion()" ${!state.isSubmitted ? 'disabled' : ''} class="flex-1 max-w-md h-14 rounded-2xl font-black text-xs uppercase tracking-wider shadow-lg flex items-center justify-center gap-2 disabled:bg-slate-200 dark:disabled:bg-slate-800/50 disabled:text-slate-400 dark:disabled:text-slate-600 disabled:shadow-none bg-brand-600 text-white disabled:cursor-not-allowed transform active:scale-[0.99] transition-all">
                            ${state.currentQuestionIndex === state.questions.length - 1 ? "Xem kết quả" : "Câu tiếp theo"} <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                </div>`;
        }

        auth.onAuthStateChanged((currentUser) => {
            if (currentUser) {
                const ADMIN_EMAIL = "ngocyen@cucdang.com";
                const userEmail = currentUser.email.toLowerCase();
                
                if (userEmail !== ADMIN_EMAIL && !userEmail.includes(".stpt")) {
                    state.authError = "Tài khoản này không có quyền truy cập môn Sinh trưởng phát triển!";
                    auth.signOut();
                    state.user = null;
                } else {
                    const token = getOrCreateDeviceToken();
                    const sessionRef = db.ref(`active_sessions/mon_stpt/${currentUser.uid}`);
                    const isAdmin = userEmail === ADMIN_EMAIL;

                    if (!state.user && !isAdmin) {
                        sessionRef.set({ 
                            deviceToken: token, 
                            lastLogin: firebase.database.ServerValue.TIMESTAMP, 
                            email: currentUser.email 
                        });
                    }

                    sessionRef.on("value", (snap) => {
                        const val = snap.val();
                        if (val && val.deviceToken !== token && !isAdmin) {
                            state.isKicked = true;
                            auth.signOut();
                            state.user = null;
                            render();
                        }
                    });
                    state.user = currentUser;
                }
            } else {
                state.user = null;
            }
            state.loading = false;
            render();
        });

        function handleLogin(e) {
            e.preventDefault();
            state.authError = "";
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            state.emailInput = email; state.passwordInput = password;

            auth.signInWithEmailAndPassword(email, password).catch(err => {
                state.authError = "Tài khoản hoặc mật khẩu bảo mật không chính xác.";
                render();
            });
        }

        function handleGoHome() {
            if (window.confirm("Bạn có chắc muốn rời môn học và quay về trang chủ không?")) {
                if (state.user) db.ref(`active_sessions/mon_stpt/${state.user.uid}`).remove();
                auth.signOut().then(() => { window.location.href = "./index.html"; });
            }
        }

        function startQuiz(part) {
            const raw = TEST_DATA[part] || [];
            state.questions = raw.map(item => ({
                id: item.id, q: item.q, correct: item.ans, isMultiple: item.ans.length > 1,
                options: [{ key: 'a', text: item.a }, { key: 'b', text: item.b }, { key: 'c', text: item.c }, { key: 'd', text: item.d }].filter(o => o.text !== undefined)
            }));
            state.currentPart = part; state.currentQuestionIndex = 0; state.score = 0; state.wrongScore = 0;
            state.sessionAnswers = []; state.showResult = false; state.selectedOptions = []; state.isSubmitted = false;
            if (state.questions.length > 0) state.shuffledOptions = shuffleArray(state.questions[0].options);
            render();
        }

        function handleOptionSelect(key, isMultiple) {
            if (state.isSubmitted) return;
            if (isMultiple) {
                if (state.selectedOptions.includes(key)) {
                    state.selectedOptions = state.selectedOptions.filter(k => k !== key);
                } else {
                    state.selectedOptions.push(key);
                }
            } else {
                state.selectedOptions = [key];
            }
            render();
        }

        function checkAnswerSubmission() {
            if (state.selectedOptions.length === 0 || state.isSubmitted) return;
            const currentQ = state.questions[state.currentQuestionIndex];
            const userAnsStr = [...state.selectedOptions].sort().join('');
            const correctAnsStr = currentQ.correct.split('').sort().join('');
            const correct = userAnsStr === correctAnsStr;
            
            state.isSubmitted = true;
            if (correct) state.score++; else state.wrongScore++;
            state.sessionAnswers.push({ ...currentQ, userSelected: userAnsStr, options: state.shuffledOptions });
            render();
        }

        function nextQuestion() {
            if (state.currentQuestionIndex < state.questions.length - 1) {
                state.currentQuestionIndex++;
                const newQ = state.questions[state.currentQuestionIndex];
                const existing = state.sessionAnswers.find(a => a.id === newQ.id);
                if (existing) {
                    state.shuffledOptions = existing.options;
                    state.selectedOptions = existing.userSelected.split('');
                    state.isSubmitted = true;
                } else {
                    state.shuffledOptions = shuffleArray(newQ.options); state.selectedOptions = []; state.isSubmitted = false;
                }
                render();
            } else {
                state.showResult = true;
                saveHistoryToLocal();
                render();
            }
        }

        function prevQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                const newQ = state.questions[state.currentQuestionIndex];
                const existing = state.sessionAnswers.find(a => a.id === newQ.id);
                state.shuffledOptions = existing.options;
                state.selectedOptions = existing.userSelected.split('');
                state.isSubmitted = true;
                render();
            }
        }

        function saveHistoryToLocal() {
            const record = {
                id: Date.now(), date: new Date().toLocaleString('vi-VN'), part: state.currentPart,
                score: state.score, wrong: state.wrongScore, total: state.questions.length,
                details: state.sessionAnswers.map(q => ({ id: q.id, q: q.q, o: q.options || [], s: q.userSelected, c: q.correct }))
            };
            state.history.unshift(record);
            try { localStorage.setItem('stpt_local_history', JSON.stringify(state.history)); } catch (e) {}
        }

        function clearHistory() {
            if (window.confirm('Bạn có chắc muốn xóa toàn bộ lịch sử kết quả không?')) {
                state.history = []; localStorage.removeItem('stpt_local_history'); render();
            }
        }

        function viewHistoryDetail(index) {
            state.reviewData = state.history[index].details || []; state.reviewMode = true; render();
        }

        function setReviewMode(val) { state.reviewMode = val; render(); }
        function requestFinish() { state.isConfirming = true; render(); }
        function setConfirming(val) { state.isConfirming = val; render(); }
        function confirmFinish() { state.showResult = true; state.isConfirming = false; saveHistoryToLocal(); render(); }
        function resetQuiz() { state.currentPart = null; state.questions = []; state.reviewMode = false; render(); }

        window.addEventListener('DOMContentLoaded', () => { render(); });
    </script>
</body>
</html>
