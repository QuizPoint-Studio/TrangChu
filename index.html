<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Điều hướng Học tập - QuizPoint Studio</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            background: linear-gradient(135deg, #ecfdf5 0%, #f0f9ff 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- HỆ THỐNG BIỂU TƯỢNG SVG ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
        const User = (props) => <IconWrapper {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
        const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const Layers = (props) => <IconWrapper {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconWrapper>;
        const Presentation = (props) => <IconWrapper {...props}><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></IconWrapper>;
        const Target = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><polyline points="6 9 12 15 18 9"/></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
        const HelpCircle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconWrapper>;
        const Check = (props) => <IconWrapper {...props}><polyline points="20 6 9 17 4 12"/></IconWrapper>;
        const Mail = (props) => <IconWrapper {...props}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></IconWrapper>;

        function App() {
            const [openSection, setOpenSection] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");

            const toggleSection = (sectionId) => {
                setOpenSection(openSection === sectionId ? null : sectionId);
            };

            const goToSubjectLink = (url) => {
                if(url === "#") {
                    alert("Phân hệ nội dung này đang được thiết kế và cập nhật!");
                } else {
                    window.location.href = url;
                }
            };

            const subSubjects = {
                "on-thi-chuan-dau-ra": [
                    { name: "ACCESS: Đề ôn đầu ra Access", url: "#" },
                    { name: "TIN A: Đề ôn đầu ra Tin A", url: "TinHocDauRaPhan1.html" }
                ],
                "on-tap-mon-hoc": [
                    { name: "Môn 1: Sinh Lý Thực Vật", url: "SinhLyThucVat.html" },
                    { name: "Môn 2: Khí Tượng Nông Nghiệp", url: "KhiTuongNongNghiep.html" },
                    { name: "Môn 3: Rèn Nghề", url: "RenNghe.html" }
                ],
                "noi-dung-yeu-cau": [
                    { name: "Yêu Cầu 1: Phân nhánh nội dung tự tạo số 1", url: "#" },
                    { name: "Yêu Cầu 2: Phân nhánh nội dung tự tạo số 2", url: "#" }
                ]
            };

            const filterItems = (sectionId) => {
                const items = subSubjects[sectionId] || [];
                if (!searchQuery.trim()) return items;
                return items.filter(item => 
                    item.name.toLowerCase().includes(searchQuery.toLowerCase())
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* LOGO GÓC TRÊN TRÁI HỆ THỐNG */}
                    <div className="absolute top-4 left-4 sm:top-6 sm:left-8 z-50 flex items-center gap-3 px-5 py-3 rounded-2xl border border-brand-200/50 glass-panel shadow-lg">
                        <div className="bg-brand-500 text-white p-2 rounded-xl shadow-md transform hover:rotate-12 transition-transform">
                            <Target size={24} />
                        </div>
                        <div className="flex flex-col items-start gap-0">
                            <span className="text-sm font-black text-brand-700 leading-none tracking-tighter uppercase">QuizPoint</span>
                            <span className="text-[11px] font-bold text-gray-400 leading-tight uppercase tracking-widest">Studio</span>
                        </div>
                    </div>

                    {/* BANNER THƯƠNG HIỆU - ĐÃ TRANG TRÍ HỌA TIẾT CÔNG NGHỆ, TOÁN HỌC CHẠY NGẦM CHUẨN ĐẸP */}
                    <div className="w-full bg-gradient-to-r from-brand-700 via-emerald-600 to-teal-700 text-white shadow-xl relative overflow-hidden text-center select-none">
                        {/* Lớp lưới mờ và vòng tròn phát sáng tâm điểm */}
                        <div className="absolute inset-0 opacity-15 bg-[radial-gradient(circle_at_50%_50%,#fff,transparent)] animate-pulse-slow"></div>

                        {/* HỌA TIẾT KÝ HIỆU CHẠY NGẦM THEO PHONG CÁCH SƠ ĐỒ MẠNG (TRÁI VÀ PHẢI) */}
                        <div className="absolute top-4 left-10 text-emerald-300/20 text-xs font-mono hidden md:block text-left space-y-1">
                            <p>├── ALU_CORE: active</p>
                            <p>├── MATRIX [60x60]</p>
                            <p>└── SYSTEM_OK: 100%</p>
                        </div>
                        <div className="absolute bottom-4 right-10 text-emerald-300/20 text-xl font-serif hidden md:block text-right tracking-widest">
Chúc bạn Ôn và Thi 💯 nhé!
                        </div>
                        
                        {/* KHỐI TRANG TRÍ CÁC NGÔI SAO LẤP LÁNH BAY TỰ DO */}
                        <div className="absolute top-4 right-[25%] opacity-20 text-yellow-200 animate-bounce-slow"><Sparkles size={16} /></div>
                        <div className="absolute bottom-6 left-[20%] opacity-20 text-emerald-200 animate-pulse-slow"><Sparkles size={24} /></div>
                        <div className="absolute top-8 left-[30%] opacity-15 text-white animate-pulse"><Sparkles size={14} /></div>

                        <div className="max-w-6xl mx-auto px-4 py-12 md:py-14 flex flex-col items-center justify-center gap-4 relative z-10">
                            <div className="p-3.5 bg-white/10 rounded-2xl backdrop-blur-md border border-white/20 animate-bounce-slow inline-block shadow-lg">
                                <Sparkles size={38} className="text-emerald-300" />
                            </div>
                            <div className="space-y-1">
                                <h1 className="text-2xl md:text-4xl font-black tracking-tight drop-shadow-md uppercase">
                                    QUIZPOINT STUDIO
                                </h1>
                                <p className="text-emerald-100 text-xs md:text-sm font-bold tracking-widest uppercase">
                                    Nền tảng Học tập & Khảo thí Trực tuyến Thông minh
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* KHU VỰC CHỨA CÁC PHÂN HỆ SỰ KIỆN CHÍNH */}
                    <div className="max-w-5xl mx-auto px-4 py-12 flex-1 w-full anonymity-container">
                        
                        {/* THÔNG TIN LIÊN HỆ CÁ NHÂN */}
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 text-gray-600 bg-white/70 py-3.5 px-8 rounded-2xl border border-white inline-flex mx-auto shadow-sm mb-8 w-full max-w-xl left-1/2 transform -translate-x-1/2 relative">
                            <div className="flex items-center gap-2 font-bold text-slate-700 text-sm">
                                <User size={18} className="text-brand-500" /> 
                                <span>Tác giả: Nguyễn Văn Lượng</span>
                            </div>
                            <div className="flex items-center gap-2 font-bold text-slate-700 text-sm">
                                <Search size={18} className="text-brand-500" /> 
                                <span>Zalo: 0333738861</span>
                            </div>
                        </div>

                        {/* Ô TÌM KIẾM THÔNG MINH */}
                        <div className="w-full max-w-xl mx-auto mb-12 relative animate-enter">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <Search size={20} />
                            </div>
                            <input 
                                type="text"
                                placeholder="Tìm kiếm nhanh tên môn học, mã đề ôn tập..."
                                value={searchQuery}
                                onChange={(e) => {
                                    setSearchQuery(e.target.value);
                                    if(e.target.value.trim() !== "") {
                                        setOpenSection("all");
                                    } else {
                                        setOpenSection(null);
                                    }
                                }}
                                className="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 focus:border-brand-500 glass-panel shadow-sm text-sm font-semibold text-slate-700 focus:outline-none focus:ring-4 focus:ring-brand-50/50 transition-all placeholder:text-slate-400"
                            />
                        </div>

                        {/* BANNER DỊCH VỤ KHỐI QUẢNG CÁO */}
                        <div className="bg-gradient-to-r from-brand-600 to-teal-700 text-white p-6 rounded-3xl shadow-xl max-w-3xl mx-auto border border-brand-500/30 overflow-hidden relative group mb-12 text-center">
                            <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:rotate-12 transition-transform">
                                <Sparkles size={100} />
                            </div>
                            <div className="relative z-10 flex flex-col items-center gap-4">
                                <div className="flex items-center justify-center gap-3">
                                    <Sparkles size={28} className="text-yellow-300 animate-pulse" />
                                    <span className="font-bold text-xl sm:text-2xl leading-tight">Nhận làm Quiz Ôn Tập & PowerPoint Cơ Bản</span>
                                </div>
                                <div className="flex flex-wrap justify-center gap-4 mt-2">
                                     <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
                                        <Award size={18} className="text-emerald-300" /> 
                                        <span className="font-medium text-sm">Hệ thống Quiz</span>
                                     </div>
                                     <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
                                        <Presentation size={18} className="text-sky-300" /> 
                                        <span className="font-medium text-sm">Thiết kế PPT</span>
                                     </div>
                                     <div className="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm">
                                        <Layers size={18} className="text-orange-300" /> 
                                        <span className="font-medium text-sm">Tài liệu học tập</span>
                                     </div>
                                </div>
                            </div>
                        </div>

                        {/* GRID HIỂN THỊ 3 KHỐI CHỌN NỘI DUNG LỚN */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8 mt-4 animate-enter items-start">
                            
                            {/* KHỐI 1: ÔN THI CHUẨN ĐẦU RA */}
                            <div className="flex flex-col gap-3">
                                <div 
                                    onClick={() => toggleSection("on-thi-chuan-dau-ra")}
                                    className={`group bg-white rounded-3xl p-8 shadow-md hover:shadow-xl border transition-all duration-300 cursor-pointer flex flex-col justify-between ${(openSection === "on-thi-chuan-dau-ra" || openSection === "all") ? "border-brand-500 ring-2 ring-brand-100" : "border-slate-100 hover:border-brand-300"}`}
                                >
                                    <div>
                                        <div className="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-all duration-300 mb-6 shadow-inner"><Award size={28} /></div>
                                        <h3 className="text-xl font-bold text-slate-800 group-hover:text-brand-600 transition-colors flex items-center justify-between">
                                            <span>ÔN THI CHUẨN ĐẦU RA</span>
                                            <ChevronDown size={18} className={`text-slate-400 transition-transform duration-300 ${(openSection === "on-thi-chuan-dau-ra" || openSection === "all") ? "rotate-180 text-brand-500" : ""}`} />
                                        </h3>
                                        <p className="text-slate-500 text-sm mt-3 leading-relaxed">Hệ thống tổng hợp đề thi thử chứng chỉ chuẩn đầu ra công nghệ thông tin và ngoại ngữ.</p>
                                    </div>
                                </div>
                                {(openSection === "on-thi-chuan-dau-ra" || openSection === "all") && (
                                    <div className="bg-white/80 backdrop-blur-md rounded-2xl p-4 border border-brand-100 shadow-md space-y-2 animate-enter">
                                        {filterItems("on-thi-chuan-dau-ra").length === 0 ? (
                                            <p className="text-xs text-slate-400 italic p-2 text-center">Không tìm thấy kết quả</p>
                                        ) : filterItems("on-thi-chuan-dau-ra").map((item, index) => (
                                            <button key={index} onClick={() => goToSubjectLink(item.url)} className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-brand-50 hover:text-brand-700 rounded-xl flex items-center justify-between group transition-colors">
                                                <span>{item.name}</span>
                                                <ArrowRight size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" />
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* KHỐI 2: ÔN TẬP CÁC MÔN HỌC */}
                            <div className="flex flex-col gap-3">
                                <div 
                                    onClick={() => toggleSection("on-tap-mon-hoc")}
                                    className={`group bg-white rounded-3xl p-8 shadow-md hover:shadow-xl border transition-all duration-300 cursor-pointer flex flex-col justify-between ${(openSection === "on-tap-mon-hoc" || openSection === "all") ? "border-brand-500 ring-2 ring-brand-100" : "border-slate-100 hover:border-brand-300"}`}
                                >
                                    <div>
                                        <div className="w-14 h-14 bg-sky-50 rounded-2xl flex items-center justify-center text-sky-500 group-hover:bg-sky-500 group-hover:text-white transition-all duration-300 mb-6 shadow-inner"><BookOpen size={28} /></div>
                                        <h3 className="text-xl font-bold text-slate-800 group-hover:text-brand-600 transition-colors flex items-center justify-between">
                                            <span>ÔN TẬP CÁC MÔN HỌC</span>
                                            <ChevronDown size={18} className={`text-slate-400 transition-transform duration-300 ${(openSection === "on-tap-mon-hoc" || openSection === "all") ? "rotate-180 text-brand-500" : ""}`} />
                                        </h3>
                                        <p className="text-slate-500 text-sm mt-3 leading-relaxed">Ngân hàng câu hỏi trắc nghiệm rèn luyện kiểm tra định kỳ, ôn thi giữa học kỳ và ôn thi cuối kỳ.</p>
                                    </div>
                                </div>
                                {(openSection === "on-tap-mon-hoc" || openSection === "all") && (
                                    <div className="bg-white/80 backdrop-blur-md rounded-2xl p-4 border border-brand-100 shadow-lg space-y-2 animate-enter">
                                        {filterItems("on-tap-mon-hoc").length === 0 ? (
                                            <p className="text-xs text-slate-400 italic p-2 text-center">Không tìm thấy kết quả</p>
                                        ) : filterItems("on-tap-mon-hoc").map((item, index) => (
                                            <button key={index} onClick={() => goToSubjectLink(item.url)} className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-brand-50 hover:text-brand-700 rounded-xl flex items-center justify-between group transition-colors">
                                                <span>{item.name}</span>
                                                <ArrowRight size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" />
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* KHỐI 3: MÔN HỌC YÊU CẦU TẠO */}
                            <div className="flex flex-col gap-3">
                                <div 
                                    onClick={() => toggleSection("noi-dung-yeu-cau")}
                                    className={`group bg-white rounded-3xl p-8 shadow-md hover:shadow-xl border transition-all duration-300 cursor-pointer flex flex-col justify-between ${(openSection === "noi-dung-yeu-cau" || openSection === "all") ? "border-brand-500 ring-2 ring-brand-100" : "border-slate-100 hover:border-brand-300"}`}
                                >
                                    <div>
                                        <div className="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-brand-500 group-hover:bg-brand-500 group-hover:text-white transition-all duration-300 mb-6 shadow-inner"><Layers size={28} /></div>
                                        <h3 className="text-xl font-bold text-slate-800 group-hover:text-brand-600 transition-colors flex items-center justify-between">
                                            <span>MÔN HỌC YÊU CẦU TẠO</span>
                                            <ChevronDown size={18} className={`text-slate-400 transition-transform duration-300 ${(openSection === "noi-dung-yeu-cau" || openSection === "all") ? "rotate-180 text-brand-500" : ""}`} />
                                        </h3>
                                        <p className="text-slate-500 text-sm mt-3 leading-relaxed">Không gian tùy chỉnh cấu trúc bài tập đặc thù, nhánh tài liệu mở rộng thiết kế theo yêu cầu riêng.</p>
                                    </div>
                                </div>
                                {(openSection === "noi-dung-yeu-cau" || openSection === "all") && (
                                    <div className="bg-white/80 backdrop-blur-md rounded-2xl p-4 border border-brand-100 shadow-md space-y-2 animate-enter">
                                        {filterItems("noi-dung-yeu-cau").length === 0 ? (
                                            <p className="text-xs text-slate-400 italic p-2 text-center">Không tìm thấy kết quả</p>
                                        ) : filterItems("noi-dung-yeu-cau").map((item, index) => (
                                            <button key={index} onClick={() => goToSubjectLink(item.url)} className="w-full text-left px-4 py-3 text-sm font-semibold text-slate-700 bg-slate-50 hover:bg-brand-50 hover:text-brand-700 rounded-xl flex items-center justify-between group transition-colors">
                                                <span>{item.name}</span>
                                                <ArrowRight size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" />
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                        </div>
                    </div>

                    {/* CHÂN TRANG FOOTER */}
                    <footer className="mt-auto bg-slate-900 text-slate-400 py-10 border-t border-slate-800 text-sm">
                        <div className="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
                            
                            {/* CỘT 1: SỨ MỆNH GIÁO DỤC */}
                            <div className="space-y-3">
                                <div className="flex items-center gap-2 text-white font-bold text-base">
                                    <Target size={18} className="text-emerald-400" />
                                    <span>TẦM NHÌN PHÁT TRIỂN</span>
                                </div>
                                <p className="text-xs leading-relaxed text-slate-400 font-medium">
                                    Đồng hành cùng sinh viên nâng cao kỹ năng tư duy logic và kiến thức ứng dụng thực tiễn. Học tập thông minh, tự tin bứt phá điểm số trong mọi kỳ thi thử thách.
                                </p>
                            </div>

                            {/* CỘT 2: QUY TRÌNH HỌC TẬP */}
                            <div className="space-y-2.5">
                                <h4 className="text-white font-semibold text-sm uppercase tracking-wider flex items-center gap-1.5">
                                    <BookOpen size={16} className="text-emerald-400" />
                                    <span>QUY TRÌNH LUYỆN ĐỀ</span>
                                </h4>
                                <ul className="space-y-2 text-xs text-slate-400">
                                    <li className="flex items-center gap-2"><Check size={12} className="text-emerald-400" /> Bước 1: Sử dụng Kính lúp tìm môn học cần luyện tập</li>
                                    <li className="flex items-center gap-2"><Check size={12} className="text-emerald-400" /> Bước 2: Chọn phân hệ và mở danh mục đề thi thử</li>
                                    <li className="flex items-center gap-2"><Check size={12} className="text-emerald-400" /> Bước 3: Hoàn thành câu hỏi và đối chiếu kết quả</li>
                                </ul>
                            </div>
