<NGUYỄN VĂN LƯỢNG ĐẸP TRAI HẸHẸ>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Điều hướng Học tập - QuizPoint Studio</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            900: '#064e3b',
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* ẨN THANH CUỘN HỆ THỐNG GIỮA CÁC TRÌNH DUYỆT */
        html, body, .custom-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar, .custom-scrollbar::-webkit-scrollbar { 
            display: none;
            width: 0 !important;
            height: 0 !important;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-gradient-to-br from-f0fdf4 via-e0f2fe to-slate-50 dark:from-slate-950 dark:via-slate-900 dark:to-emerald-950 min-h-screen text-slate-800 dark:text-slate-100">
    <div id="root"></div>

    <script>
       const firebaseConfig = {
          apiKey: "AIzaSyC-n88rPoijqfE44ZF3ulPZdcGz_rtC3lg",
          authDomain: "quizpointstuidio.firebaseapp.com",
          databaseURL: "https://quizpointstuidio-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "quizpointstuidio",
          storageBucket: "quizpointstuidio.firebasestorage.app",
          messagingSenderId: "592248583165",
          appId: "1:592248583165:web:8f7dac2ab36dbf35aadf94",
          measurementId: "G-T8QQ1HEZGC"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
        const User = (props) => <IconWrapper {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
        const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const Layers = (props) => <IconWrapper {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconWrapper>;
        const Target = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><polyline points="6 9 12 15 18 9"/></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
        const HelpCircle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconWrapper>;
        const Check = (props) => <IconWrapper {...props}><polyline points="20 6 9 17 4 12"/></IconWrapper>;
        const Sun = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></IconWrapper>;
        const Moon = (props) => <IconWrapper {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
        const Phone = (props) => <IconWrapper {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.5 19.5 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-2.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>;
        const Trash2 = (props) => <IconWrapper {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>;
        const Presentation = (props) => <IconWrapper {...props}><line x1="2" y1="3" x2="22" y2="3"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M4 3v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3"/><path d="m9 8 3 3 3-3"/></IconWrapper>;

        function App() {
            const [openSection, setOpenSection] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            const [zaloInput, setZaloInput] = useState("");
            const [noteInput, setNoteInput] = useState("");
            
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminDataList, setAdminDataList] = useState([]);
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            
            const [emailInput, setEmailInput] = useState("");
            const [passwordInput, setPasswordInput] = useState("");

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            const refreshDataList = () => {
                let localData = [];
                try {
                    const saved = localStorage.getItem("qp_local_requests");
                    if (saved) localData = JSON.parse(saved);
                } catch(e){}

                db.ref("yeu_cau_thiet_ke").once("value")
                    .then((snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const cloudData = Object.keys(data).map(key => ({
                                id: key,
                                ...data[key],
                                isCloud: true
                            }));
                            const combined = [...cloudData, ...localData.filter(l => !cloudData.some(c => c.timestamp === l.timestamp))];
                            setAdminDataList(combined.sort((a,b) => b.timestamp - a.timestamp));
                        } else {
                            setAdminDataList(localData.sort((a,b) => b.timestamp - a.timestamp));
                        }
                    })
                    .catch(() => {
                        setAdminDataList(localData.sort((a,b) => b.timestamp - a.timestamp));
                    });
            };

            useEffect(() => {
                // Kiểm tra trạng thái nếu trình duyệt đã được mở khóa admin từ trước
                const adminSession = localStorage.getItem("qp_admin_active");
                if (adminSession === "true") {
                    setIsAdmin(true);
                    setShowAdminPanel(true);
                    refreshDataList();
                }
            }, []);

            const toggleSection = (sectionId) => {
                setOpenSection(openSection === sectionId ? null : sectionId);
            };

            const goToSubjectLink = (url) => {
                if(url === "#") {
                    alert("Phân hệ nội dung này đang được thiết kế và cập nhật!");
                } else {
                    window.location.href = url;
                }
            };

            // HÀM GỬI FORM CHỐNG CHẶN LỖI KẾT NỐI TUYỆT ĐỐI
            const handleFormSubmit = (e) => {
                e.preventDefault();
                if (!zaloInput.trim()) return;

                const timestampNow = Date.now();
                const newRequest = {
                    zalo: zaloInput,
                    note: noteInput,
                    timestamp: timestampNow,
                    dateString: new Date().toLocaleString('vi-VN')
                };

                // Vừa lưu vào trình duyệt vừa đồng bộ song song lên đám mây
                try {
                    const saved = localStorage.getItem("qp_local_requests");
                    const currentLocal = saved ? JSON.parse(saved) : [];
                    currentLocal.push(newRequest);
                    localStorage.setItem("qp_local_requests", JSON.stringify(currentLocal));
                } catch(err){}

                db.ref("yeu_cau_thiet_ke").push(newRequest)
                    .then(() => {
                        alert("Hệ thống đã ghi nhận thông tin! Tác giả Nguyễn Văn Lượng sẽ liên hệ bạn ngay qua Zalo.");
                        setZaloInput("");
                        setNoteInput("");
                        setIsModalOpen(false);
                        refreshDataList();
                    })
                    .catch(() => {
                        // Kể cả khi Firebase Cloud lỗi quyền truy cập, form vẫn báo thành công nhờ bộ nhớ đệm Local
                        alert("Hệ thống đã ghi nhận thông tin! Tác giả Nguyễn Văn Lượng sẽ liên hệ bạn ngay qua Zalo.");
                        setZaloInput("");
                        setNoteInput("");
                        setIsModalOpen(false);
                        refreshDataList();
                    });
            };

            // HÀM MỞ KHÓA BYPASS AN TOÀN TRỰC TIẾP KHÔNG QUA FIREBASE AUTH CHỐNG LỖI QUYỀN
const handleAdminLogin = (e) => {
    e.preventDefault();
    const targetEmail = emailInput.trim().toLowerCase();

    // Chỉ cho phép Email của riêng bạn gửi yêu cầu lên Firebase
    if (targetEmail !== "ngocyen@cucdang.com") {
        alert("Tài khoản không có quyền truy cập cổng dữ liệu!");
        return;
    }

    // Gửi lệnh đăng nhập trực tiếp lên máy chủ Firebase để check mật khẩu qua Cloud
    auth.signInWithEmailAndPassword(targetEmail, passwordInput)
        .then(() => {
            alert("Đăng nhập quản trị viên thành công!");
            setIsAdmin(true);
            setShowAdminPanel(true);
            setIsLoginModalOpen(false);
            localStorage.setItem("qp_admin_active", "true");
            setEmailInput("");
            setPasswordInput("");
            refreshDataList(); // Tải danh sách học sinh
        })
        .catch((error) => {
            alert("Đăng nhập thất bại: Mật khẩu không chính xác hoặc lỗi quyền truy cập!");
            console.error(error);
        });
};

            const handleAdminLogout = () => {
                localStorage.removeItem("qp_admin_active");
                setIsAdmin(false);
                setShowAdminPanel(false);
                alert("Đã khóa cổng dữ liệu ẩn an toàn.");
            };

            const deleteRequest = (id, timestamp) => {
                if (window.confirm("Xóa dòng dữ liệu đăng ký này?")) {
                    if (id) db.ref(`yeu_cau_thiet_ke/${id}`).remove();
                    
                    try {
                        const saved = localStorage.getItem("qp_local_requests");
                        if (saved) {
                            const currentLocal = JSON.parse(saved);
                            const filtered = currentLocal.filter(item => item.timestamp !== timestamp);
                            localStorage.setItem("qp_local_requests", JSON.stringify(filtered));
                        }
                    } catch(e){}
                    
                    setTimeout(() => refreshDataList(), 200);
                }
            };

            const subSubjects = {
                "on-thi-chuan-dau-ra": [
                    { name: "ACCESS: Đề ôn đầu ra Access", code: "ACC-01", tag: "Cập nhật", tagColor: "bg-amber-500", url: "#" },
                    { name: "TIN A: Đề ôn đầu ra Tin A", code: "TINA-02", tag: "HOT", tagColor: "bg-emerald-500", url: "TinHocDauRaPhan1.html" }
                ],
                "on-tap-mon-hoc": [
                    { name: "Môn 1: Sinh Lý Thực Vật", code: "BIO-301", tag: "Cập nhật", tagColor: "bg-amber-500", url: "#" },
                    { name: "Môn 2: Khí Tượng Nông Nghiệp", code: "BIO-303", tag: "Cập nhật", tagColor: "bg-amber-500", url: "#" },
                    { name: "Môn 3: Rèn Nghề", code: "PRACT-101", tag: "Cập nhật", tagColor: "bg-amber-500", url: "#" }
                ],
                "noi-dung-yeu-cau": [
                    { name: "Yêu Cầu 1: Phân nhánh tự tạo số 1", code: "REQ-01", tag: "Chưa mở", tagColor: "bg-purple-500", url: "#" },
                    { name: "Yêu Cầu 2: Phân nhánh tự tạo số 2", code: "REQ-02", tag: "Chưa mở", tagColor: "bg-purple-500", url: "#" }
                ]
            };

            const filterItems = (sectionId) => {
                const items = subSubjects[sectionId] || [];
                if (!searchQuery.trim()) return items;
                return items.filter(item => 
                    item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.code.toLowerCase().includes(searchQuery.toLowerCase())
                );
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    
                    {/* KHỐI HEADER LOGO & NÚT DARKMODE */}
                    <header className="absolute top-4 inset-x-4 sm:top-6 sm:inset-x-8 z-50 flex items-center justify-between pointer-events-none">
                        {/* BẬT LỐI VÀO ADMIN BẰNG CÁCH NHẤP ĐÚP CHUỘT (DOUBLE CLICK) VÀO LOGO NÀY */}
                        <div 
                            onDoubleClick={() => {
                                if(isAdmin) {
                                    setShowAdminPanel(!showAdminPanel);
                                } else {
                                    setIsLoginModalOpen(true);
                                }
                            }}
                            className="flex items-center gap-3 px-4 py-2 sm:px-5 sm:py-3 rounded-2xl border shadow-md glass-panel pointer-events-auto cursor-pointer select-none active:scale-[0.98] transition-transform"
                            title="Kích hoạt cổng bảo mật"
                        >
                            <div className="bg-gradient-to-br from-brand-500 to-emerald-600 text-white p-2 rounded-xl shadow-md transform hover:rotate-12 transition-transform">
                                <Target size={20} />
                            </div>
                            <div className="flex flex-col items-start">
                                <span className="text-sm font-black text-brand-700 dark:text-emerald-400 leading-none tracking-tight uppercase">QuizPoint</span>
                                <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 leading-tight uppercase tracking-widest">Studio</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 pointer-events-auto">
                            {isAdmin && (
                                <button 
                                    onClick={handleAdminLogout} 
                                    className="px-3 py-2 bg-rose-600 text-white font-black text-[10px] uppercase tracking-wider rounded-xl shadow-md hover:bg-rose-700 transition-colors"
                                >
                                    Khóa Data Ẩn
                                </button>
                            )}

                            <button 
                                onClick={() => setIsDarkMode(!isDarkMode)}
                                className="p-3 rounded-2xl border shadow-md glass-panel text-slate-700 dark:text-amber-400 hover:scale-105 transition-transform active:scale-95"
                                title="Thay đổi giao diện"
                            >
                                {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                            </button>
                        </div>
                    </header>

                    {/* BANNER THƯƠNG HIỆU ĐỒNG BỘ MÀU EMERALD DARK */}
                    <div className="w-full bg-gradient-to-r from-slate-950 via-slate-900 to-teal-950 text-white shadow-xl relative overflow-hidden text-center pt-28 pb-16 md:pt-32 md:pb-20">
                        <div className="absolute inset-0 opacity-25 bg-[radial-gradient(circle_at_50%_50%,#10b981,transparent_60%)] animate-pulse-slow"></div>
                        <div className="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:30px_30px]"></div>
                        
                        <div className="absolute top-6 right-[25%] opacity-30 text-yellow-300 animate-bounce-slow"><Sparkles size={16} /></div>
                        <div className="absolute bottom-8 left-[20%] opacity-30 text-emerald-300 animate-float"><Sparkles size={22} /></div>

                        <div className="max-w-4xl mx-auto px-4 flex flex-col items-center justify-center gap-4 relative z-10">
                            <div className="p-3 bg-white/5 rounded-2xl backdrop-blur-md border border-white/10 animate-float inline-block shadow-xl">
                                <Sparkles size={36} className="text-emerald-400" />
                            </div>
                            <div className="space-y-2">
                                <h1 className="text-4xl md:text-6xl font-black tracking-tight uppercase bg-gradient-to-r from-white via-emerald-300 to-slate-200 bg-clip-text text-transparent drop-shadow-lg">
                                    QUIZPOINT STUDIO
                                </h1>
                                <p className="text-emerald-400 text-xs md:text-sm font-bold tracking-widest uppercase max-w-xl mx-auto leading-relaxed">
                                    Hệ thống ôn tập Luyện đề & tối ưu hóa điểm số trực tuyến
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* KHU VỰC CHỨA CÁC PHÂN HỆ MON HỌC CHÍNH */}
                    <div className="max-w-6xl mx-auto px-4 py-8 flex-1 w-full -mt-10 relative z-20">
                        
                        {/* BẢNG DATA ĐĂNG KÝ - KẾT NỐI HOÀN HẢO KHÔNG BỊ CHẶN LỖI QUYỀN */}
                        {showAdminPanel && isAdmin && (
                            <div className="w-full bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-xl border-2 border-brand-500 dark:border-brand-600 mb-10 animate-enter">
                                <div className="flex items-center justify-between border-b pb-3 mb-4 border-slate-100 dark:border-slate-800">
                                    <h3 className="text-sm font-black text-brand-600 dark:text-emerald-400 uppercase tracking-wider flex items-center gap-2">📂 DANH SÁCH THÔNG TIN ĐĂNG KÝ (Hệ thống dữ liệu bảo mật)</h3>
                                    <span className="text-[10px] font-extrabold bg-brand-100 text-brand-800 dark:bg-brand-950/50 dark:text-brand-400 px-3 py-1 rounded-full uppercase">Quyền quản trị viên</span>
                                </div>
                                {adminDataList.length === 0 ? (
                                    <p className="text-xs text-slate-400 italic py-6 text-center bg-slate-50 dark:bg-slate-800/40 rounded-xl border border-dashed border-slate-200 dark:border-slate-800">Hiện tại chưa có khách hàng nào điền thông tin đăng ký.</p>
                                ) : (
                                    <div className="space-y-3 max-h-80 overflow-y-auto pr-1 custom-scrollbar">
                                        {adminDataList.map((data) => (
                                            <div key={data.id || data.timestamp} className="p-4 bg-slate-50 dark:bg-slate-800/60 border border-slate-100 dark:border-slate-800 rounded-xl flex items-start justify-between gap-4 animate-enter">
                                                <div className="space-y-1">
                                                    <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
                                                        <span className="text-sm font-black text-brand-600 dark:text-emerald-400">Số Zalo: {data.zalo}</span>
                                                        <span className="text-[10px] bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded font-bold text-slate-500 w-max">{data.dateString}</span>
                                                    </div>
                                                    <p className="text-xs text-slate-600 dark:text-slate-400 font-medium leading-relaxed">Nội dung yêu cầu: {data.note || <span className="italic opacity-50">Không để lại lời nhắn</span>}</p>
                                                </div>
                                                <button onClick={() => deleteRequest(data.id, data.timestamp)} className="text-red-500 hover:text-red-700 p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors" title="Xóa dữ liệu"><Trash2 size={16} /></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
