                                            <div class="flex items-center gap-4 relative z-10">
                                                <div class="w-5 h-5 flex items-center justify-center border-2 flex-shrink-0 rounded-md transition-colors ${isSelected ? 'border-brand-500 bg-brand-500 text-white' : 'border-slate-300 bg-white dark:bg-slate-900'}">
                                                    ${isSelected ? '<svg class="w-3 h-3 fill-current" viewBox="0 0 20 20"><path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/></svg>' : ''}
                                                </div>
                                                <span>${option.text}</span>
                                            </div>
                                            ${state.isSubmitted && isOptCorrect ? '<svg class="text-emerald-600 dark:text-emerald-400 flex-shrink-0 ml-4" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' : ''}
                                            ${state.isSubmitted && isSelected && !isOptCorrect ? '<svg class="text-red-600 dark:text-red-400 flex-shrink-0 ml-4" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' : ''}
                                        </button>`;
                                }).join('')}
                            </div>
                            
                            ${!state.isSubmitted && state.selectedOptions.length > 0 ? `
                                <div class="mt-6 flex justify-end">
                                    <button onclick="checkAnswerSubmission()" class="px-6 py-3 bg-gradient-to-r from-brand-500 to-emerald-600 text-white font-extrabold rounded-xl text-xs uppercase tracking-wider shadow-md transform active:scale-95 transition-transform">
                                        Xác nhận đáp án
                                    </button>
                                </div>` : ''}
                        </div>
                    </div>

                    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-900/60 flex justify-center items-center gap-4 z-20">
                        <button onclick="prevQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''} class="w-14 h-14 rounded-2xl flex items-center justify-center border text-slate-600 dark:text-slate-400 disabled:opacity-25 transform active:scale-95 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <button onclick="nextQuestion()" ${!state.isSubmitted ? 'disabled' : ''} class="flex-1 max-w-md h-14 rounded-2xl font-black text-xs uppercase tracking-wider shadow-lg flex items-center justify-center gap-2 disabled:bg-slate-200 dark:disabled:bg-slate-800/50 disabled:text-slate-400 dark:disabled:text-slate-600 disabled:shadow-none bg-brand-600 text-white disabled:cursor-not-allowed transform active:scale-[0.99] transition-all">
                            ${state.currentQuestionIndex === state.questions.length - 1 ? "Xem kết quả" : "Câu tiếp theo"} <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                </div>`;
        }

        auth.onAuthStateChanged((currentUser) => {
            if (currentUser) {
                const ADMIN_EMAIL = "ngocyen@cucdang.com";
                const userEmail = currentUser.email.toLowerCase();
                
                if (userEmail !== ADMIN_EMAIL && !userEmail.includes(".vsvn")) {
                    state.authError = "Tài khoản này không có quyền truy cập môn VSV Nông Nghiệp!";
                    auth.signOut();
                    state.user = null;
                } else {
                    const token = getOrCreateDeviceToken();
                    const sessionRef = db.ref(`active_sessions/mon_vsvn/${currentUser.uid}`);
                    
                    const isAdmin = userEmail === ADMIN_EMAIL;

                    if (!state.user) {
                        if (!isAdmin) {
                            sessionRef.set({ 
                                deviceToken: token, 
                                lastLogin: firebase.database.ServerValue.TIMESTAMP, 
                                email: currentUser.email 
                            });
                        }
                    }

                    sessionRef.on("value", (snap) => {
                        const val = snap.val();
                        
                        if (val && val.deviceToken !== token && !isAdmin) {
                            state.isKicked = true;
                            auth.signOut();
                            state.user = null;
                            render();
                        }
                    });
                    state.user = currentUser;
                }
            } else {
                state.user = null;
            }
            state.loading = false;
            render();
        });

        function handleLogin(e) {
            e.preventDefault();
            state.authError = "";
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            state.emailInput = email; state.passwordInput = password;

            auth.signInWithEmailAndPassword(email, password).catch(err => {
                state.authError = "Tài khoản hoặc mật khẩu bảo mật không chính xác.";
                render();
            });
        }

        function handleGoHome() {
            if (window.confirm("Bạn có chắc muốn rời môn học và quay về trang chủ không?")) {
                if (state.user) db.ref(`active_sessions/mon_vsvn/${state.user.uid}`).remove();
                auth.signOut().then(() => { window.location.href = "./index.html"; });
            }
        }

        function startQuiz(part) {
            const raw = TEST_DATA[part] || [];
            state.questions = raw.map(item => ({
                id: item.id, q: item.q, correct: item.ans, isMultiple: item.ans.length > 1,
                options: [{ key: 'a', text: item.a }, { key: 'b', text: item.b }, { key: 'c', text: item.c }, { key: 'd', text: item.d }].filter(o => o.text !== undefined)
            }));
            state.currentPart = part; state.currentQuestionIndex = 0; state.score = 0; state.wrongScore = 0;
            state.sessionAnswers = []; state.showResult = false; state.selectedOptions = []; state.isSubmitted = false;
            if (state.questions.length > 0) state.shuffledOptions = shuffleArray(state.questions[0].options);
            render();
        }

        function handleOptionSelect(key, isMultiple) {
            if (state.isSubmitted) return;
            if (isMultiple) {
                if (state.selectedOptions.includes(key)) {
                    state.selectedOptions = state.selectedOptions.filter(k => k !== key);
                } else {
                    state.selectedOptions.push(key);
                }
            } else {
                state.selectedOptions = [key];
            }
            render();
        }

        function checkAnswerSubmission() {
            if (state.selectedOptions.length === 0 || state.isSubmitted) return;
            const currentQ = state.questions[state.currentQuestionIndex];
            const userAnsStr = [...state.selectedOptions].sort().join('');
            const correctAnsStr = currentQ.correct.split('').sort().join('');
            const correct = userAnsStr === correctAnsStr;
            
            state.isSubmitted = true;
            if (correct) state.score++; else state.wrongScore++;
            state.sessionAnswers.push({ ...currentQ, userSelected: userAnsStr, options: state.shuffledOptions });
            render();
        }

        function nextQuestion() {
            if (state.currentQuestionIndex < state.questions.length - 1) {
                state.currentQuestionIndex++;
                const newQ = state.questions[state.currentQuestionIndex];
                const existing = state.sessionAnswers.find(a => a.id === newQ.id);
                if (existing) {
                    state.shuffledOptions = existing.options;
                    state.selectedOptions = existing.userSelected.split('');
                    state.isSubmitted = true;
                } else {
                    state.shuffledOptions = shuffleArray(newQ.options); state.selectedOptions = []; state.isSubmitted = false;
                }
                render();
            } else {
                state.showResult = true;
                saveHistoryToLocal();
                render();
            }
        }

        function prevQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                const newQ = state.questions[state.currentQuestionIndex];
                const existing = state.sessionAnswers.find(a => a.id === newQ.id);
                state.shuffledOptions = existing.options;
                state.selectedOptions = existing.userSelected.split('');
                state.isSubmitted = true;
                render();
            }
        }

        function saveHistoryToLocal() {
            const record = {
                id: Date.now(), date: new Date().toLocaleString('vi-VN'), part: state.currentPart,
                score: state.score, wrong: state.wrongScore, total: state.questions.length,
                details: state.sessionAnswers.map(q => ({ id: q.id, q: q.q, o: q.options || [], s: q.userSelected, c: q.correct }))
            };
            state.history.unshift(record);
            try { localStorage.setItem('vsvn_local_history', JSON.stringify(state.history)); } catch (e) {}
        }

        function clearHistory() {
            if (window.confirm('Bạn có chắc muốn xóa toàn bộ lịch sử kết quả không?')) {
                state.history = []; localStorage.removeItem('vsvn_local_history'); render();
            }
        }

        function viewHistoryDetail(index) {
            state.reviewData = state.history[index].details || []; state.reviewMode = true; render();
        }

        function setReviewMode(val) { state.reviewMode = val; render(); }
        function requestFinish() { state.isConfirming = true; render(); }
        function setConfirming(val) { state.isConfirming = val; render(); }
        function confirmFinish() { state.showResult = true; state.isConfirming = false; saveHistoryToLocal(); render(); }
        function resetQuiz() { state.currentPart = null; state.questions = []; state.reviewMode = false; render(); }

        window.addEventListener('DOMContentLoaded', () => { render(); });
    </script>
</body>
</html>
