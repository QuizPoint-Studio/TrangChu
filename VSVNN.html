        { id: 7, q: "Cơ chế chính mà phân bón sinh học vi sinh dùng để nâng cao độ phì nhiêu của đất là gì?", a: "Làm chặt kết cấu vật lý của đất để giữ rễ cây bám chắc hơn", b: "Tăng cường khả năng cung cấp các chất dinh dưỡng thiết yếu cho cây trồng", c: "Khử hoàn toàn các hợp chất nitơ hữu cơ thành dạng khí tự do", d: "Ngăn cản sự lưu thông của nước và không khí xuống tầng đất sâu", ans: "b" },
        { id: 8, q: "Nhóm vi sinh vật nào dưới đây là thành phần phổ biến trong các chế phẩm phân bón sinh học cố định đạm?", a: "Pseudomonas và Bacillus", b: "Rhizobium và Azotobacter", c: "Trichoderma và Beauveria", d: "Salmonella và Escherichia coli", ans: "b" },
        { id: 9, q: "Vi sinh vật hòa tan lân (photphat) trong phân bón sinh học giúp ích gì cho dinh dưỡng thực vật?", a: "Chuyển photpho dễ tan thành dạng khó tan để tích lũy lâu dài", b: "Chuyển đổi các nguồn photpho không tan thành dạng cây có thể hấp thu", c: "Giải phóng khí phosphine độc hại ra ngoài môi trường không khí", d: "Thao túng hệ miễn dịch của cây để cây tự tổng hợp photpho", ans: "b" },
        { id: 10, q: "Việc ứng dụng phân bón sinh học vi sinh mang lại lợi ích sinh thái nào đối với thực hành bón phân?", a: "Tăng gấp đôi nhu cầu sử dụng phân bón hóa học đa lượng", b: "Cải thiện hiệu quả sử dụng dinh dưỡng và giảm phụ thuộc phân bón hóa học", c: "Tiêu diệt toàn bộ quần xã vi sinh vật hoại sinh bản địa trong đất", d: "Làm đông cứng dung dịch đất để hạn chế hiện tượng rửa trôi khoáng", ans: "b" },
        { id: 11, q: "Thuốc bảo vệ thực vật sinh học dựa trên vi sinh vật (Microbial Biopesticides) được sử dụng để quản lý các đối tượng nào?", a: "Các loại máy móc cơ giới và công cụ lao động bị hư hỏng", b: "Quản lý bệnh hại, sâu hại và cỏ dại một cách bền vững", c: "Quần thể các loài chim và động vật hoang dã trên đồng ruộng", d: "Sự phân bổ lượng nước tưới của các hệ thống thủy lợi", ans: "b" },
        { id: 12, q: "Khác biệt lớn nhất về mặt an toàn của thuốc trừ sâu sinh học so với thuốc hóa học truyền thống là gì?", a: "Có khả năng tiêu diệt tất cả các sinh vật trên đồng ruộng không phân biệt", b: "Thân thiện với môi trường, an toàn cho sinh vật có ích và giảm dư lượng", c: "Có thời gian tồn dư độc chất kéo dài hàng trăm năm trong đất", d: "Không thể bị phân hủy bởi các tác nhân tự nhiên như ánh sáng và nhiệt độ", ans: "b" },
        { id: 13, q: "Tác nhân vi khuẩn kiểm soát sinh học nào được ứng dụng rộng rãi nhất để diệt côn trùng hại nhờ sản sinh độc tố tinh thể delta?", a: "Pseudomonas fluorescens", b: "Bacillus thuringiensis (Bt)", c: "Rhizobium leguminosarum", d: "Azotobacter chroococcum", ans: "b" },
        { id: 14, q: "Cơ chế diệt sâu hại của độc tố từ vi khuẩn Bacillus thuringiensis (Bt) diễn ra tại cơ quan nào của côn trùng?", a: "Hệ thống thần kinh trung ương gây tê liệt cơ vận động", b: "Đường ruột của côn trùng sau khi chúng ăn phải độc tố", c: "Hệ thống hô hấp qua các lỗ thở ngoài biểu bì", d: "Các cơ quan xúc giác và khứu giác trên râu côn trùng", ans: "b" },
        { id: 15, q: "Nhóm nấm nào sau đây là tác nhân kiểm soát sinh học phổ biến chống lại côn trùng hại (nấm ký sinh côn trùng)?", a: "Trichoderma spp. và Ampelomyces spp.", b: "Beauveria bassiana và Metarhizium anisopliae", c: "Penicillium chrysogenum và Aspergillus niger", d: "Saccharomyces cerevisiae và Agaricus bisporus", ans: "b" },
        { id: 16, q: "Các virus thuộc họ Baculoviridae được ứng dụng trong công nghệ sinh học nông nghiệp làm tác nhân bảo vệ thực vật để nhắm vào đối tượng nào?", a: "Các loài nấm gây bệnh thối rễ thực vật họ Đậu", b: "Các loài côn trùng hại cụ thể (đặc biệt là sâu bướm Lepidoptera)", c: "Các chủng vi khuẩn cố định đạm sống tự do trong đất", d: "Hệ thống mạch dẫn gỗ của các cây trồng lâu năm", ans: "b" },
        { id: 17, q: "Khái niệm \"Xử lý sinh học\" (Bioremediation) nhờ chế phẩm vi sinh cải tạo đất được định nghĩa là gì?", a: "Sử dụng các chất tẩy rửa hóa học mạnh để làm sạch bề mặt luống cây", b: "Sử dụng vi sinh vật để phân hủy hoặc trung hòa các chất ô nhiễm trong đất, nước", c: "Trồng cây xanh thân gỗ lớn để ngăn chặn hiện tượng rửa trôi cơ học", d: "Lọc sạch nước ô nhiễm bằng hệ thống màng lọc nhân tạo khép kín", ans: "b" },
        { id: 18, q: "Chế phẩm vi sinh cải tạo đất giúp phân hủy nhóm chất độc hại nào tồn dư từ hoạt động canh tác nông nghiệp cũ?", a: "Các hạt cát thô, sỏi vô cơ và các mảnh đá vôi", b: "Thuốc trừ sâu, thuốc diệt cỏ và các chất ô nhiễm hữu cơ khác", c: "Các ion sắt và magie dạng hòa tan hữu ích cho cây", d: "Các mảnh nilon bọc luống làm từ nhựa polymer cứng", ans: "b" },
        { id: 19, q: "Ngoài việc khử độc, các chế phẩm vi sinh cải tạo đất còn góp phần cải thiện các tính chất vật lý nào của đất bị thoái hóa?", a: "Làm tăng độ nén chặt và tính lún sụt của bề mặt tầng mặt", b: "Cải thiện cấu trúc đất, độ phì nhiêu và khả năng giữ nước", c: "Đẩy toàn bộ lượng oxy ra khỏi các khe hở hạt đất", d: "Cô lập hoàn toàn hệ rễ thực vật khỏi dung dịch đất xung quanh", ans: "b" },
        { id: 20, q: "Công nghệ tiến tiến nào sau đây KHÔNG thuộc nhóm \"Công nghệ Omics\" (Omics Technologies) được ứng dụng trong vi sinh vật học nông nghiệp hiện đại?", a: "Metagenomics và Metatranscriptomics", b: "Metaproteomics và Metabolomics", c: "Kỹ thuật cấy chuyển mô tế bào gỗ truyền thống", d: "Tin sinh học (Bioinformatics) liên quan đến hệ vi sinh", ans: "c" },
        { id: 21, q: "Công nghệ Metagenomics cho phép các nhà khoa học làm được điều gì đột phá khi nghiên cứu vi sinh vật đất?", a: "Nuôi cấy thuần khiết tất cả các loài vi khuẩn trong phòng thí nghiệm", b: "Phân tích trực tiếp toàn bộ vật liệu di truyền (DNA) từ mẫu môi trường", c: "Xác định kích thước vật lý của một bào tử nấm hoại sinh bằng thước kẹp", d: "Định lượng chính xác lượng phân bón hóa học bón vào vùng rễ", ans: "b" },
        { id: 22, q: "Việc ứng dụng công nghệ Metatranscriptomics và Metaproteomics giúp làm sáng tỏ khía cạnh nào của quần xã vi sinh vật?", a: "Bản đồ địa hình hình thái và độ dốc cơ học của luống cây", b: "Các gen đang hoạt động (biểu hiện) và các protein được sản sinh, làm sáng tỏ chức năng và hoạt động", c: "Trọng lượng khô thô của toàn bộ sinh khối thực vật trên đồng ruộng", d: "Công thức cấu tạo hóa học của các thuốc trừ sâu tổng hợp", ans: "b" },
        { id: 23, q: "Công nghệ Metabolomics cung cấp thông tin quý giá về khía cạnh nào của hệ sinh thái rễ thực vật?", a: "Các tầng địa chất sâu phân bố dưới lòng đất canh tác", b: "Các hồ sơ chất chuyển hóa, giúp hiểu rõ mạng lưới trao đổi chất trong tương tác đất - rễ - vi sinh vật", c: "Chiều dài tuyệt đối của hệ mạch dẫn thân cây lâu năm", d: "Số lượng máy cày cơ giới hoạt động trên đồng ruộng", ans: "b" },
        { id: 24, q: "Công cụ chỉnh sửa gen tiên tiến nào được nhắc đến mở ra khả năng thiết kế các chủng vi sinh vật có đặc tính ưu việt theo ý muốn?", a: "Kỹ thuật đột biến bằng tia X phổ rộng", b: "Hệ thống CRISPR-Cas9 và các công cụ chỉnh sửa gen khác", c: "Phương pháp lai hữu tính truyền thống giữa các dòng vi khuẩn", d: "Kỹ thuật xử lý sốc nhiệt và sốc hóa chất mạnh", ans: "b" },
        { id: 25, q: "Việc chỉnh sửa gen vi sinh vật hướng tới mục tiêu cải thiện những tính trạng chức năng nào có lợi cho nông nghiệp?", a: "Tăng khả năng gây bệnh thối rễ cho các giống cây trồng", b: "Tăng cường hiệu quả cố định đạm, hòa tan photphat hoặc kiểm soát sinh học", c: "Biến đổi vi sinh vật thành dạng bất hoạt không thể phân chia tế bào", d: "Giúp vi sinh vật tự tổng hợp được các lớp sừng bằng nhựa cứng", ans: "b" },
        { id: 26, q: "Khái niệm \"Quản lý hệ vi sinh chính xác\" (Precision Microbiome Management) được xây dựng dựa trên sự tích hợp giữa các lĩnh vực nào?", a: "Cơ khí động lực, luyện kim và tự động hóa nhà máy đóng gói", b: "Phân tích hệ vi sinh, nông nghiệp chính xác và công nghệ nông nghiệp số", c: "Kinh tế vĩ mô, quản trị chuỗi cung ứng và thương mại quốc tế", d: "Khí tượng thủy văn, trắc địa đất và quy hoạch đô thị ven biển", ans: "b" },
        { id: 27, q: "Mục tiêu cốt lõi của quản lý hệ vi sinh chính xác là thiết kế các biện pháp can thiệp vi sinh như thế nào?", a: "Các biện pháp can thiệp đồng nhất cho tất cả các loại đất và cây trồng", b: "Các biện pháp can thiệp vi sinh theo hướng cá thể hóa, tối ưu hóa cho từng điều kiện sinh thái nông nghiệp cụ thể", c: "Ngừng hoàn toàn việc tưới nước và bón tất cả các phân bón hữu cơ đất", d: "Thay thế toàn bộ đất tự nhiên bằng các hệ thống giá thể nhựa nhân tạo", ans: "b" },
        { id: 28, q: "Một trong những thách thức lớn đối với việc quản lý hệ vi sinh chính xác trong thực tế đồng ruộng là gì?", a: "Kích thước của các vi sinh vật quá lớn làm tắc nghẽn béc phun thuốc", b: "Tính biến động lớn của các điều kiện môi trường tự nhiên và tương tác phức tạp của hệ vi sinh vật bản địa", c: "Vi sinh vật dễ bị tiêu diệt hoàn toàn bởi các phân tử nước mưa tự nhiên", d: "Giá thành của các hạt cát và sỏi vô cơ quá đắt đỏ trên thị trường", ans: "b" },
        { id: 29, q: "Cơ quan quản lý nhà nước ban hành các khung pháp lý (Regulatory Frameworks) điều chỉnh sản phẩm vi sinh nhằm mục đích gì?", a: "Cấm hoàn toàn việc ứng dụng công nghệ sinh học trong trồng trọt", b: "Đảm bảo an toàn sinh học, bảo vệ sức khỏe con người, động vật và môi trường", c: "Tăng doanh thu thuế ngắn hạn cho các công ty vật tư hóa chất tổng hợp", d: "Hạn chế sự cạnh tranh của các sản phẩm phân bón sinh học vi sinh", ans: "b" },
        { id: 30, q: "Khía cạnh đạo đức (Ethical Implications) nào cần được xem xét cẩn trọng khi ứng dụng công nghệ sinh học vi sinh hiện đại?", a: "Việc lựa chọn màu sắc nhãn mác bao bì cho các sản phẩm thương mại", b: "Việc giải phóng vi sinh vật chỉnh sửa gen ra môi trường và tác động tiềm tàng đến đa dạng sinh học bản địa", c: "Tốc độ chuyển dịch cơ cấu lao động từ nông nghiệp sang dịch vụ số", d: "Chi phí tiền lương trả cho các công nhân vận hành máy cày đồng ruộng", ans: "b" },
        { id: 31, q: "Để đảm bảo sự phát triển và ứng dụng có trách nhiệm của công nghệ vi sinh, yếu tố nào sau đây là không thể thiếu?", a: "Tăng cường phun các loại thuốc bảo vệ thực vật hóa học phổ rộng", b: "Sự kết hợp giữa đánh giá khoa học nghiêm ngặt, quy định pháp lý minh bạch và đối thoại công chúng", c: "Giữ bí mật tuyệt đối các công thức chỉnh sửa gen vi sinh vật", d: "Ngừng nhập khẩu tất cả các giống cây trồng từ nước ngoài về", ans: "b" },
        { id: 32, q: "Theo phần tóm tắt của Chương 5, công nghệ sinh học vi sinh vật cung cấp các công cụ mạnh mẽ hướng tới mục tiêu tối hậu nào?", a: "Gia tăng thâm canh cơ giới hóa và tối đa hóa việc dùng hóa chất bón", b: "Xây dựng một nền nông nghiệp bền vững, hiệu quả và có khả năng phục hồi trước biến đổi khí hậu", c: "Chuyển đổi toàn bộ diện tích đất canh tác sang mô hình nhà màng khép kín", d: "Từ bỏ các phương thức sản xuất truyền thống để chuyển sang kinh tế số", ans: "b" },
        { id: 33, q: "Việc tiếp tục đổi mới và hợp tác giữa các nhà khoa học, nhà quản lý và nông dân có ý nghĩa gì đối với tương lai ngành công nghệ vi sinh?", a: "Sẽ làm bão hòa thị trường vật tư nông nghiệp và giảm giá thành sản phẩm", b: "Là chìa khóa để hiện thực hóa toàn bộ tiềm năng của công nghệ sinh học vi sinh vật trong nông nghiệp", c: "Loại bỏ nhu cầu nghiên cứu khoa học phân tử trong các phòng thí nghiệm", d: "Thúc đẩy việc mở rộng diện tích đất hoang để canh tác truyền thống", ans: "b" },
        { id: 34, q: "Các tiến bộ trong công nghệ bào chế và phương pháp đưa chế phẩm vào sử dụng đã giúp ích gì cho các sản phẩm vi sinh trong thực tế?", a: "Làm tăng trọng lượng cơ học của các khối đá khoáng cứng tầng địa chất sâu", b: "Nâng cao hiệu quả và tính thực tiễn của các sản phẩm vi sinh trong sản xuất nông nghiệp", c: "Tiêu diệt toàn bộ hệ thảm thực vật hoại sinh phân hủy mùn đất mặt", d: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời ban ngày của tán lá", ans: "b" },
        { id: 35, q: "Trước những thách thức ngày càng gia tăng do biến đổi khí hậu đối với nông nghiệp, việc phát triển các giải pháp vi sinh tập trung vào mục tiêu nào?", a: "Tăng lượng bón phân hóa học đa lượng phối trộn nồng độ bão hòa cao vào mùa mưa bão", b: "Nâng cao khả năng thích ứng của cây trồng với các stress phi sinh học như hạn hán, nhiệt độ cao và mặn", c: "Thay thế toàn bộ hệ đất tự nhiên bằng mô hình giá thể nhựa khép kín phòng thí nghiệm", d: "Cắt giảm tối đa hàm lượng chất hữu cơ mùn để đất trở nên thông thoáng hoàn toàn vô sinh", ans: "b" },
        { id: 36, q: "Vai trò của vi sinh vật có lợi trong việc xây dựng các mô hình nông nghiệp thông minh thích ứng với khí hậu bao gồm:", a: "Tốc độ thoát hơi nước qua khí khổng khiến lá cây bị héo rũ nhanh chóng mùa khô", b: "Tăng cường khả năng chịu stress của cây, điều hòa tín hiệu hormone thực vật và nâng cao hiệu quả sử dụng nước và dinh dưỡng", c: "Biến đổi cấu trúc bộ gen di truyền DNA thực vật thành dòng sinh vật hoàn toàn nhân tạo", d: "Tiêu diệt toàn bộ quần xã vi khuẩn cố định đạm Rhizobium có ích phân bố ở vùng rễ", ans: "b" },
        { id: 37, q: "Theo phần tổng kết của mục Ứng dụng, việc bón các vi sinh vật thúc đẩy sinh trưởng vào sản xuất nông nghiệp giúp mang lại lợi ích gì cho cây trồng?", a: "Làm giảm diện tích lông hút của hệ rễ để tránh bệnh hại bám dính xâm nhiễm", b: "Nâng cao năng suất và khả năng chống chịu stress của cây trồng trước các điều kiện bất lợi của môi trường", c: "Kích thích các mầm bệnh nấm hại xâm nhiễm nhanh hơn vào hệ thống mạch dẫn dẫn gỗ", d: "Bao bọc hệ rễ bằng một lớp vỏ polymer nhựa cứng chống thấm hoàn toàn dung dịch nước", ans: "b" },
        { id: 38, q: "Sự ra đời của các ứng dụng và phương pháp tiếp cận mới trong công nghệ sinh học vi sinh nông nghiệp bám sát mục tiêu vĩ mô nào?", a: "Gia tăng thâm canh hóa chất và tối đa hóa việc dùng thuốc trừ sâu tổng hợp bảo quản", b: "Nâng cao năng suất nông nghiệp, cải thiện sức khỏe đất và thúc đẩy tính bền vững môi trường", c: "Loại bỏ hoàn toàn quy trình kiểm định an toàn sinh học của cơ quan nhà nước ban ban", d: "Chuyển dịch toàn bộ mô hình sản xuất nông nghiệp truyền thống sang kinh tế số loại bỏ đất", ans: "b" },
        { id: 39, q: "Tập hợp các nghiên cứu về hệ vi sinh vật của cây trồng (microbiome) cho phép các nhà khoa học khám phá ra điều gì?", a: "Bản đồ địa hình không gian 3D chi tiết về độ dốc và hướng rãnh thoát nước luống đất", b: "Khám phá vai trò của chúng đối với sức khỏe cây, chu trình dinh dưỡng và khả năng chịu stress", c: "Trọng lượng khô thô tuyệt đối của một khuẩn lạc nấm hoại sinh phát triển thạch phòng", d: "Công thức cấu tạo hóa học nguyên tử chính xác của các phân tử thuốc bảo vệ thực vật clo", ans: "b" },
        { id: 40, q: "Nhóm vi sinh vật nào tiết ra các enzyme phosphatase giúp giải phóng ion photphat hòa tan từ quặng apatit khó tan trong đất?", a: "Vi khuẩn cố định đạm sống tự do", b: "Vi khuẩn và nấm hòa tan lân (PSMs)", c: "Virus thực vật truyền nhiễm qua rầy nâu", d: "Động vật nguyên sinh ký sinh nội bào rễ", ans: "b" },
        { id: 41, q: "Chế phẩm phân bón sinh học chứa vi khuẩn Azospirillum spp. thường được bón cho nhóm cây trồng nào để kích thích phát triển bộ rễ?", a: "Các cây lương thực họ Hòa thảo (lúa, ngô, mía)", b: "Các giống cây họ Đậu lấy hạt (đậu tương, đậu xanh)", c: "Các loài nấm ăn hoại sinh trong nhà màng", d: "Các cây lâm nghiệp lấy gỗ lâu năm tầng cao", ans: "a" },
        { id: 42, q: "Độc tố tinh thể delta (δ-endotoxin) của vi khuẩn Bacillus thuringiensis (Bt) hoạt động như một chất độc đối với côn trùng thông qua cơ chế nào?", a: "Phá hủy hệ thống màng tế bào biểu bì ruột giữa của côn trùng, gây rò rỉ và chết vì nhiễm trùng huyết", b: "Làm đông cứng các khớp cơ vận động khiến côn trùng không thể di chuyển", c: "Ngăn cản quá trình lột xác tự nhiên của ấu trùng côn trùng hại", d: "Bất hoạt toàn bộ hệ thống các enzyme hô hấp tế bào vùng ngực", ans: "a" },
        { id: 43, q: "Ưu điểm sinh thái nổi bật của việc ứng dụng nấm ký sinh côn trùng Beauveria bassiana trong quản lý dịch hại là gì?", a: "栽培 lấn át toàn bộ thảm thực vật cỏ dại xung quanh luống", b: "Có tính đặc hiệu cao, ký sinh trên côn trùng mục tiêu thông qua sự xâm nhiễm trực tiếp qua lớp vỏ cutin mà không gây độc cho môi trường", c: "Thời gian tồn lưu chất độc hóa học kéo dài hàng thế kỷ dưới lòng đất", d: "Có thể tự tổng hợp được hạt diệp lục để tự nuôi dưỡng không cần cơ chất", ans: "b" },
        { id: 44, q: "Các virus thuộc chi Nucleopolyhedrovirus (NPV) trong họ Baculoviridae kiểm soát sâu hại theo cơ chế sinh học nào?", a: "Cạnh tranh không gian sinh thái vùng rễ với vi khuẩn gây thối nhũn củ", b: "Gây bệnh nhiễm trùng virus cấp tính, làm ly giải tế bào và làm chết sâu non sau khi ăn phải hạt virus", c: "Sản sinh ra các acid hữu cơ mạnh làm chua hóa bề mặt tá lá thực vật", d: "Thao túng hệ miễn dịch ETI để cây trồng tự tiết ra chất kháng sinh diệt sâu", ans: "b" },
        { id: 45, q: "Trong công nghệ cải tạo đất, hoạt động \"Kích thích sinh học\" (Biostimulation) được thực hiện bằng biện pháp nào?", a: "Bổ sung các chủng vi sinh vật ngoại lai được chỉnh sửa gen vào đất", b: "Bổ sung chất dinh dưỡng hoặc cơ chất thích hợp để thúc đẩy hoạt động phân hủy của quần xã vi sinh vật bản địa", c: "Phun các thuốc diệt cỏ hóa học phổ rộng để làm sạch bề mặt luống cây", d: "Sử dụng các tia phóng xạ gamma để kích thích sự đột biến tự nhiên của đất", ans: "b" },
        { id: 46, q: "Biện pháp \"Tăng cường sinh học\" (Bioaugmentation) trong xử lý ô nhiễm đất nông nghiệp khác với kích thích sinh học ở điểm nào?", a: "Sử dụng các màng bọc nilon kéo sợi để cách ly hoàn toàn vùng đất ô nhiễm", b: "Bổ sung các chủng vi sinh vật có khả năng phân hủy chất độc chuyên biệt vào môi trường ô nhiễm", c: "Chỉ bón phân vô cơ đa lượng phối trộn nồng độ cao để pha loãng chất độc", d: "Ngừng tưới nước hoàn toàn để chất ô nhiễm tự bốc hơi ra khí quyển", ans: "b" },
        { id: 47, q: "Dữ liệu trình tự gen khổng lồ thu được từ công nghệ Metagenomics đất nông nghiệp cần được xử lý bằng công cụ ngành khoa học nào?", a: "Kỹ thuật cơ khí động lực đồng ruộng", b: "Tin sinh học (Bioinformatics) và sinh học máy tính", c: "Thống kế kế toán kinh tế trang trại", d: "Trắc địa học và phân tích bản đồ địa chất", ans: "b" },
        { id: 48, q: "Công nghệ Metatranscriptomics tập trung phân tích loại vật liệu di truyền nào để xác định các con đường sinh học đang hoạt động của hệ vi sinh vật?", a: "Các chuỗi DNA mạch kép độ dài lớn trong khoáng vật đá", b: "Toàn bộ các phân tử RNA thông tin (mRNA) biểu hiện trong mẫu môi trường", c: "Các protein cấu trúc thành tế bào của các loài nấm hoại sinh", d: "Các chất chuyển hóa thứ cấp hòa tan trong dung dịch keo đất", ans: "b" },
        { id: 49, q: "Việc ứng dụng CRISPR-Cas9 để loại bỏ các gen bất lợi ở vi khuẩn PGPR nhằm mục đích tối ưu hóa đặc tính nào?", a: "Làm giảm khả năng sinh trưởng của vi khuẩn để tiết kiệm chất hữu cơ đất", b: "Nâng cao tính ổn định và hiệu quả chức năng của vi khuẩn trong điều kiện đồng ruộng thực tế", c: "Biến đổi vi khuẩn thành dạng ký sinh bắt buộc trên hệ rễ thực vật họ Đậu", d: "Giúp vi khuẩn có khả năng tự phát quang ban đêm để xua đuổi côn trùng hại", ans: "b" },
        { id: 50, q: "Trở ngại lớn nhất trong việc thương mại hóa các chế phẩm vi sinh dựa trên các vi sinh vật chỉnh sửa gen (GMMs) hiện nay là gì?", a: "Kích thước cơ học của vi sinh vật biến đổi gen quá nhỏ không thể đóng gói", b: "Quy trình pháp lý nghiêm ngặt và những lo ngại của công chúng về an toàn sinh học và môi trường", c: "Vi sinh vật biến đổi gen hoàn toàn không thể sinh trưởng trên môi trường nhân tạo", d: "Sự phân hủy hoàn toàn của vi sinh vật khi tiếp xúc với ánh sáng mặt trời", ans: "b" }],
        p2: [{ id: 51, q: "Sự tích hợp của công nghệ nông nghiệp số (Digital Agriculture) trong quản lý hệ vi sinh chính xác cho phép người nông dân thực hiện hoạt động nào?", a: "Tự chế tạo thành công tất cả các loại máy móc cơ giới công suất lớn", b: "Bản đồ hóa độ phì sinh học của đất và bón phân sinh học biến thiên theo nhu cầu thực tế của từng vị trí trên đồng ruộng", c: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của tán lá thực vật", d: "Tính toán chính xác hiệu quả kinh tế biên của ngành chăn nuôi gia súc", ans: "b" },
        { id: 52, q: "Đạo luật hoặc quy định nào quản lý việc tiếp cận nguồn gen vi sinh vật và chia sẻ lợi ích một cách công bằng trên phạm vi quốc tế?", a: "Nghị định thư Kyoto về biến đổi khí hậu", b: "Nghị định thư Nagoya", c: "Công ước Liên hợp quốc về Luật Biển (UNCLOS)", d: "Hiệp định Thương mại Tự do Toàn cầu (WTO)", ans: "b" },
        { id: 53, q: "Theo nội dung Chương 5, việc sử dụng phân bón sinh học vi sinh góp phần vào mục tiêu giảm thiểu phát thải khí nhà kính nào từ phân bón hóa học?", a: "Khí Clo phân tử (Cl2)", b: "Khí Nitơ oxit (N2O) phát sinh từ quá trình phản nitrat hóa phân đạm hóa học", c: "Khí Methane tinh khiết phát sinh từ sự hô hấp của hệ rễ cây trồng", d: "Khí Sulfur dioxide độc hại phát sinh từ sự phong hóa khoáng vật đá", ans: "b" },
        { id: 54, q: "Nhóm nấm Trichoderma spp. trong các chế phẩm phân bón sinh học đa chức năng vừa có vai trò kích thích rễ vừa có vai trò nào dưới đây?", a: "Ký sinh gây bệnh vàng lá sọc tăm cho các giống cây lương thực", b: "Tác nhân kiểm soát sinh học, đối kháng mạnh với nhiều nấm bệnh hại trong đất", c: "Tăng cường khả năng hấp thu các ion kim loại nặng độc hại vào mô quả", d: "Làm đông cứng cấu trúc vật lý cơ giới của các tập hợp hạt cát thô", ans: "b" },
        { id: 55, q: "Sự phân hủy sinh học (Biodegradation) của vi sinh vật đối với thuốc diệt cỏ tồn dư lâu năm (như Atrazine hoặc Glyphosate) dựa trên việc tiết loại hợp chất nào?", a: "Các ion khoáng đa lượng dạng muối kết tủa rắn", b: "Các enzyme phân giải chuyên biệt (degradative enzymes)", c: "Các protein hiệu ứng effector gây hoại tử tế bào biểu bì lá", d: "Các chuỗi polysaccharide dính kết cấu trúc keo sét tầng mặt", ans: "b" },
        { id: 56, q: "Công nghệ Metabolomics sử dụng thiết bị tiên tiến nào để định lượng các phân tử nhỏ (chất chuyển hóa) trong tương tác vùng rễ?", a: "Kính hiển vi quang học truyền thống và phương pháp nhuộm màu Gram", b: "Sắc ký khối phổ (GC-MS, LC-MS) hoặc cộng hưởng từ hạt nhân (NMR)", c: "Máy gặt đập liên hợp phối hợp với hệ thống định vị vệ tinh GPS", d: "Lò sấy thăng hoa phối hợp với cân phân tích khối lượng sinh khối khô", ans: "b" },
        { id: 57, q: "Hệ thống CRISPR-Cas9 thực hiện việc chỉnh sửa bộ gen vi sinh vật bằng cách thức chính xác nào dưới đây?", a: "Bắn các tia phóng xạ cường độ cao phá hủy ngẫu nhiên cấu trúc DNA", b: "Sử dụng một RNA hướng dẫn để định vị và enzyme Cas9 để cắt chính xác tại vị trí DNA mục tiêu", c: "Phối trộn vi khuẩn với các hóa chất gây đột biến mạnh trong ống nghiệm", d: "Thao túng hệ miễn dịch PTI của vi khuẩn để vi khuẩn tự thay đổi mã di truyền", ans: "b" },
        { id: 58, q: "Khái niệm \"Nông nghiệp thông minh với khí hậu\" (Climate-Smart Agriculture) liên quan đến công nghệ vi sinh thông qua khía cạnh nào?", a: "Việc chế tạo các loại nhà màng bằng nhựa cứng bọc kín đồng ruộng", b: "Khai thác hệ vi sinh vật để nâng cao khả năng chống chịu stress hạn, mặn của cây và giảm dấu chân carbon của nông nghiệp", c: "Sử dụng các máy cày công suất lớn để thay đổi độ dốc của địa hình canh tác", d: "Tăng lượng bón phân bón vô cơ đa lượng phối trộn nồng độ bão hòa", ans: "b" },
        { id: 59, q: "Một quy trình can thiệp vi sinh chính xác thành công đòi hỏi phải thu thập dữ liệu nền tảng nào của vùng đất canh tác?", a: "Sơ đồ mạng lưới kênh mương thủy lợi vùng hạ lưu sông", b: "Hồ sơ đa dạng hệ vi sinh vật bản địa, tính chất lý hóa đất và kiểu gen cây trồng", c: "Giá cả thu mua thương mại của các loại nông sản trên thị trường vĩ mô", d: "Bản vẽ thiết kế cơ khí của các hệ thống béc phun thuốc tự động", ans: "b" },
        { id: 60, q: "Việc giải phóng một chủng vi khuẩn chỉnh sửa gen có khả năng cạnh tranh quá mạnh ra đồng ruộng có thể gây ra rủi ro sinh thái tiềm tàng nào?", a: "Làm tăng hàm lượng chất mùn hữu cơ ổn định trong đất lên mức quá cao", b: "Làm xáo trộn cấu trúc và chức năng của quần xã vi sinh vật bản địa, ảnh hưởng đến đa dạng sinh học", c: "Biến đổi toàn bộ các hạt cát thô thành cấu trúc keo sét mịn không thông khí", d: "Kích thích sự phát triển bùng phát số lượng của các loài sâu hại tán lá", ans: "b" },
        { id: 61, q: "Vai trò của các nghiên cứu \"Đánh giá Rủi ro\" (Risk Assessment) trước khi thương mại hóa sản phẩm vi sinh hiện đại là gì?", a: "Để tối đa hóa lợi nhuận thương mại ngắn hạn cho các tập đoàn hóa chất", b: "Đánh giá khoa học các tác động tiềm tàng đến môi trường và sức khỏe để đưa ra quyết định quản lý rủi ro phù hợp", c: "Rút ngắn chu kỳ sinh trưởng của cây trồng xuống một nửa thời gian canh tác", d: "Thay thế hoàn toàn vai trò quản lý nhà nước của các bộ ngành liên quan", ans: "b" },
        { id: 62, q: "Chế phẩm thuốc trừ sâu sinh học dựa trên virus Granulovirus (GV) giữ vai trò kiểm soát đối tượng dịch hại cụ thể nào?", a: "Các loài vi khuẩn gây thối nhũn rễ cây họ Đậu", b: "Loài sâu đục quả táo (Cydia pomonella) và các sâu hại bộ Cánh vẩy", c: "Quần thể các loài cỏ dại hoại sinh phân bố ở đất cát thô", d: "Sự xâm nhiễm của các loài nấm đối kháng Trichoderma spp.", ans: "b" },
        { id: 63, q: "Chất chuyển hóa thứ cấp \"Siderophore\" do vi khuẩn PGPR tiết ra trong công nghệ phân bón sinh học có chức năng hóa học gì?", a: "Kết dính các liên kết hạt đất hạt cát thành khối vật chất cứng chặt", b: "Chelat hóa và hòa tan sắt (Fe^3+), giúp cây dễ hấp thu và kìm hãm mầm bệnh do thiếu sắt", c: "Phá hủy vách tế bào lông hút thực vật để lấy đường carbohydrate quang hợp", d: "Ngăn cản quá trình hấp thu đạm amoni của các loài cỏ dại xung quanh", ans: "b" },
        { id: 64, q: "Công nghệ Metaproteomics tập trung nghiên cứu toàn bộ thành phần phân tử nào trong mẫu hệ vi sinh vật đất?", a: "Các chuỗi RNA thông tin đang biểu hiện con đường sinh học hoạt động", b: "Toàn bộ các protein được tổng hợp bởi quần xã vi sinh vật tại một thời điểm cụ thể", c: "Các chất chuyển hóa có khối lượng phân tử nhỏ hòa tan trong dung dịch keo", d: "Các mảnh bộ gen DNA mạch kép của hệ virus ký sinh thực vật", ans: "b" },
        { id: 65, q: "Việc áp dụng công cụ CRISPR để cải thiện khả năng chịu nhiệt của nấm đối kháng Trichoderma hướng tới mục tiêu ứng dụng nào?", a: "Làm giảm khả năng sinh bào tử của nấm trong điều kiện phòng thí nghiệm", b: "Đảm bảo hiệu quả kiểm soát sinh học của nấm ở các vùng khí hậu nóng và khô hạn cực đoan", c: "Biến đổi nấm Trichoderma thành nhóm sinh vật ký sinh bắt buộc trên thân cây", d: "Kích thích nấm tự tổng hợp được các hạt diệp lục để tự quang hợp ban ngày", ans: "b" },
        { id: 66, q: "Khái niệm \"Dấu chân Carbon\" (Carbon Footprint) của sản xuất trồng trọt được giảm thiểu rõ rệt nhờ vào thực hành nào dưới đây?", a: "Tăng cường bón phân đạm vô cơ phối trộn nồng độ cao vào mùa mưa bão", b: "Thay thế một phần phân bón hóa học bằng phân bón sinh học vi sinh và áp dụng canh tác tối thiểu", c: "Sử dụng các loại màng phủ nilon dày bọc kín bề mặt đất canh tác quanh năm", d: "Thường xuyên vận hành các máy cày công suất lớn để xáo trộn kết cấu đất", ans: "b" },
        { id: 67, q: "Vi khuẩn lam (Cyanobacteria) ứng dụng trong công nghệ sinh học đất lúa nước mang lại lợi ích kép nào cho hệ sinh thái?", a: "Tiêu diệt toàn bộ các loài thiên địch có ích của sâu hại thực vật", b: "Vừa quang hợp tích lũy carbon hữu cơ, vừa cố định đạm sinh học làm giàu dinh dưỡng đất", c: "Làm đóng băng hoàn toàn hoạt động sinh bào tử của quần xã nấm hoại sinh", d: "Làm tăng độ chua (giảm pH) của nước ruộng xuống mức cực đoan", ans: "b" },
        { id: 68, q: "Enzyme laccase và peroxidase do hệ nấm Basidiomycota tiết ra trong công nghệ cải tạo đất có ưu thế vượt trội nào?", a: "Hòa tan khoáng thạch anh vô cơ thành các hạt cát mịn tầng mặt", b: "Có khả năng phân hủy các hợp chất hữu cơ vòng thơm phức tạp và chất ô nhiễm khó phân hủy (lignin, hydrocarbon)", c: "Triệt tiêu hoàn toàn sự trao đổi chất dinh dưỡng giữa đất và hệ rễ cây", d: "Bao bọc các kim loại nặng độc hại thành các cấu trúc tinh thể rắn trơ", ans: "b" },
        { id: 69, q: "Công nghệ nông nghiệp chính xác (Precision Agriculture) phối hợp với quản lý hệ vi sinh sử dụng thiết bị nào để thu thập dữ liệu không gian đồng ruộng?", a: "Các dụng cụ cày bừa cơ giới hóa thô sơ cầm tay truyền thống", b: "Cảm biến đất, thiết bị định vị vệ tinh (GPS) và máy bay không người lái (UAV)", c: "Sơ đồ hạch toán kế toán tài chính của trang trại quy mô gia đình", d: "Các hệ thống béc phun thuốc bảo vệ thực vật điều khiển cơ học bằng tay", ans: "b" },
        { id: 70, q: "Sự phát triển bền vững của nền kinh tế sinh học (Bioeconomy) toàn cầu coi công nghệ sinh học vi sinh vật nông nghiệp là yếu tố mang tính chất gì?", a: "Một nhánh phụ thuộc, ít có đóng góp vào cơ cấu tổng sản phẩm nội địa", b: "Một trong những trụ cột cốt lõi để xây dựng hệ thống sản xuất thực phẩm và vật liệu sinh học bền vững", c: "Công cụ ngắn hạn mang tính ứng phó tạm thời với các đợt khủng hoảng tài chính", d: "Biện pháp can thiệp nhằm loại bỏ hoàn toàn các phương thức sản xuất truyền thống", ans: "b" },
        { id: 71, q: "Khi vi sinh vật nội sinh tiết ra enzyme ACC deaminase, cơ chế này giúp cây trồng vượt qua stress hạn hán như thế nào?", a: "Làm tăng hàm lượng nước tiêu thụ của tế bào thực vật để nhanh héo rụng leaf", b: "Làm giảm nồng độ hormone ethylene gây căng thẳng ở cây, giúp bộ rễ tiếp tục kéo dài phát triển", c: "Ngăn cản hoàn toàn quá trình hấp thu đạm amoni của hệ thống lông hút rễ", d: "Tạo lớp màng bọc cơ học polymer bọc kín bề mặt biểu bì lá chống thoát nước", ans: "b" },
        { id: 72, q: "Sự phong phú của nhóm vi sinh vật nào trong chế phẩm vi sinh hữu hiệu (EM) quyết định hiệu quả phân hủy chất hữu cơ và khử mùi hôi chuồng trại?", a: "Hệ virus thực vật truyền nhiễm qua côn trùng môi giới vector", b: "Tập đoàn vi khuẩn lactic, vi khuẩn quang hợp và nấm men phối trộn hiệp đồng", c: "Các vi khuẩn phản nitrat hóa yếm khí bắt buộc phân bố sâu dưới lòng đất", d: "Động vật nguyên sinh trùng amip ký sinh nội bào hệ thống mạch dẫn mạch gỗ", ans: "b" },
        { id: 73, q: "Khung quản lý an toàn sinh học quốc gia (Biosafety Frameworks) áp dụng quy trình kiểm định nghiêm ngặt nào đối với sinh vật biến đổi gen (GMO)?", a: "Cho phép giải phóng tự do ra đồng ruộng mà không cần qua thử nghiệm phòng thí nghiệm", b: "Thử nghiệm đánh giá an toàn nhiều giai đoạn: từ phòng thí nghiệm, nhà kính đến khảo nghiệm đồng ruộng có kiểm soát", c: "Bắt buộc người sản xuất phải bón phân hóa học nồng độ cực cao để tiêu diệt GMO", d: "Chỉ kiểm tra màu sắc cảm quan bên ngoài của bao bì chứa chế phẩm vi sinh", ans: "b" },
        { id: 74, q: "Công nghệ Metatranscriptomics giúp nhà nghiên cứu phân biệt được thông tin sinh học quan trọng nào so với Metagenomics?", a: "Phân biệt được tổng khối lượng sinh khối khô của các loài nấm hoại sinh đất", b: "Không chỉ biết vi sinh vật nào hiện diện (DNA) mà còn biết các gen nào đang thực sự hoạt động và phản ứng với môi trường (RNA)", c: "Đo đạc chính xác tuyệt đối nồng độ các chất độc hóa học tồn dư hữu cơ", d: "Xác định được hướng dốc địa hình và dung tích giữ nước vật lý của keo đất", ans: "b" },
        { id: 75, q: "Vi việc bổ sung chủng nấm Trichoderma harzianum được cải biến di truyền tăng tiết enzyme chitinase hướng tới hoạt động đối kháng nào?", a: "Hòa tan các quặng photphat vô cơ khó tan thành dạng ion lỏng dễ tiêu", b: "Phân hủy mạnh mẽ vách tế bào cấu tạo từ chitin của các nấm gây bệnh hại thực vật", c: "Tạo lớp màng polysaccharide dính kết các hạt cát thô thành đất sét mịn", d: "Kích thích sự nhân đôi bộ gen di truyền của hệ virus thực vật gây bệnh", ans: "b" },
        { id: 76, q: "Sự luân chuyển vật chất hữu cơ từ các phế phụ phẩm nông nghiệp (rơm rạ, vỏ cà phê) thành phân bón hữu cơ vi sinh dựa trên quá trình công nghệ nào?", a: "Quá trình phong hóa cơ học địa chất lâu dài dưới tác động của nước mưa", b: "Công nghệ ủ phân hữu cơ (Composting) sử dụng hệ vi sinh vật phân giải xenlulozo", c: "Sự can thiệp thô bạo bằng các dòng hóa chất acid vô cơ mạnh tổng hợp", d: "Kỹ thuật chiếu xạ ion hóa cường độ cao phá hủy cấu trúc tế bào thô", ans: "b" },
        { id: 77, q: "Nhóm vi khuẩn Pseudomonas spp. ứng dụng trong công nghệ thuốc trừ bệnh sinh học tiết ra kháng sinh nào nổi tiếng để diệt nấm hại?", a: "Kháng sinh penicillin phổ rộng dùng trong y học thú y", b: "Kháng sinh 2,4-diacetylphloroglucinol (DAPG) hoặc phenazine", c: "Độc tố tinh thể delta gây thủng ruột giữa của ấu trùng sâu hại", d: "Enzyme amylase thủy phân tinh bột thành đường đơn carbohydrate", ans: "b" },
        { id: 78, q: "Sự tích lũy nồng độ hợp chất \"Glomalin\" do nấm mycorrhiza tiết ra trong đất cải thiện đặc tính bền vững nào của hệ sinh thái đất?", a: "Làm giảm dung tích giữ nước và tăng độ rửa trôi các khoáng chất vô cơ", b: "Tăng tính ổn định của các tập hợp đất, giúp đất chống lại sự xói mòn do nước và gió và cô lập carbon", c: "Đẩy toàn bộ lượng không khí ra ngoài các khe hở để hạt đất chặt cứng khít", d: "Tăng độ chua (giảm pH) của dung dịch keo đất xuống mức cực đoan kiềm", ans: "b" }, // Thay thế câu trùng lặp số 78 cũ bằng câu glomalin tương thích logic.
        { id: 79, q: "Việc xây dựng \"Ngân hàng Chủng vi sinh vật\" (Microbial Culture Collections) quốc gia giữ vai trò chiến lược gì đối với công nghệ sinh học nông nghiệp?", a: "Để bán thương mại độc quyền các mẫu vi sinh vật cho các đại lý vật tư hóa chất", b: "Bảo tồn đa dạng sinh học vi sinh vật, lưu giữ các nguồn gen quý và cung cấp chủng chuẩn cho nghiên cứu, phát triển sản phẩm", c: "Thay thế hoàn toàn hệ thống các trường đại học và viện nghiên cứu nông nghiệp", d: "Để theo dõi và giám sát diễn biến thời tiết lượng mưa khí quyển toàn cầu", ans: "b" },
        { id: 80, q: "Khái niệm \"Nông nghiệp tái sinh\" (Regenerative Agriculture) coi việc ứng dụng công nghệ sinh học vi sinh vật là giải pháp cốt lõi để thực hiện mục tiêu nào?", a: "Tăng tối đa năng suất cây trồng ngắn hạn bất chấp sự suy thoái của đất đai", b: "Phục hồi và làm giàu lớp đất mặt, tăng cường đa dạng sinh học đất và tối ưu hóa chu trình dinh dưỡng tự nhiên nhờ vi sinh vật", c: "Chuyển đổi toàn bộ diện tích đất canh tác sang mô hình thủy canh khép kín", d: "Tự động hóa hoàn toàn quy trình trồng trọt bằng robot sinh học nhân tạo", ans: "b" },
        { id: 81, q: "Công nghệ Metabolomics phát hiện các hợp chất \"Strigolactone\" do rễ cây tiết ra; chất này hoạt động như phân tử tín hiệu kích thích quá trình nào?", a: "Quá trình ly giải tế bào vi khuẩn giải phóng độc tố Bt diệt sâu hại", b: "Sự nảy mầm của bào tử và sự phân nhánh sợi nấm của nấm rễ cộng sinh mycorrhiza", c: "Sự biến đổi di truyền biến vi khuẩn vùng rễ thành cấu trúc virus thực vật", d: "Hoạt động phản nitrat hóa yếm khí giải phóng khí nhà kính ra ngoài môi trường", ans: "b" },
        { id: 82, q: "Sự kết hợp giữa vi khuẩn cố định đạm sống tự do Azotobacter và vi khuẩn hòa tan lân Bacillus trong một chế phẩm phân bón sinh học hỗn hợp mang bản chất gì?", a: "Mối quan hệ đối kháng triệt tiêu hoàn toàn khả năng sinh trưởng của nhau", b: "Hiệu ứng hiệp đồng đa chức năng, cung cấp đồng thời cả đạm và lân dễ tiêu cho cây", c: "Sự đột biến gen nhân tạo làm thay đổi màu sắc của tán lá thực vật canh tác", d: "Hiện tượng đông cứng dung dịch đất khiến rễ cây hoàn toàn không hút được nước", ans: "b" },
        { id: 83, q: "Trong quản lý hệ vi sinh chính xác, kỹ thuật \"Phân tích rủi ro sinh thái\" (Ecological Risk Analysis) tập trung đánh giá khía cạnh nào dưới đây?", a: "Tổng chi phí tài chính bồi thường thiệt hại cho công nhân vận hành máy cày", b: "Khả năng chủng vi sinh vật ngoại lai cạnh tranh bất lợi, làm mất đi các loài vi sinh vật bản địa quý hiếm và phá vỡ cân bằng sinh thái", c: "Tốc độ bay hơi tự nhiên của các hợp chất đạm khí quyên vùng rễ thực vật", d: "Sơ đồ thiết kế mạch điện cơ khí bên trong của các loại máy gặt đập liên hợp", ans: "b" },
        { id: 84, q: "Sự biểu hiện của gen nif (nif genes) ở vi khuẩn cố định đạm chịu trách nhiệm tổng hợp nên phức hệ enzyme quyết định nào dưới đây?", a: "Enzyme phosphatase hòa tan các photphat vô cơ khó tan trong quặng đá", b: "Phức hệ enzyme nitrogenase thực hiện phản ứng khử nitơ khí quyển thành amoniac", c: "Enzyme chitinase phân hủy thành tế bào của các loài nấm gây bệnh hại rễ", d: "Enzyme cellulase thủy phân cấu trúc xơ gỗ cứng của tàn dư thực vật thô", ans: "b" },
        { id: 85, q: "Công cụ tin sinh học giúp các nhà khoa học lắp ráp các đoạn trình tự DNA ngắn thu được từ máy giải trình tự thành bộ gen hoàn chỉnh được gọi là gì?", a: "Quy trình phân tích hóa học thể tích phòng thí nghiệm thô sơ", b: "Các thuật toán lắp ráp bộ gen (Genome assembly algorithms) và chú giải chức năng gen", c: "Hệ thống định vị vệ tinh phối hợp với bản đồ địa hình luống đất", d: "Kỹ thuật cân khối lượng sinh khối khô và sấy thăng hoa phân tử nhỏ", ans: "b" },
        { id: 86, q: "Việc chỉnh sửa gen vi khuẩn Ralstonia solanacearum (mầm bệnh héo xanh) làm mất khả năng tiết protein hiệu ứng effector hướng tới mục đích nghiên cứu nào?", a: "Tạo ra chủng siêu độc lực để tiêu diệt các thảm thực vật cỏ hoang dã", b: "Nghiên cứu cơ chế bệnh học, phát triển dòng vắc-xin thực vật hoặc chủng giảm độc lực để cạnh tranh không gian sinh thái", c: "Biến đổi vi khuẩn gây bệnh thành nhóm sinh vật cố định đạm cộng sinh rễ", d: "Làm thay đổi hoàn toàn đặc tính lý hóa cơ giới của các hạt keo sét đất", ans: "b" },

        { id: 11, q: "Các tác nhân vi sinh kiểm soát sinh học bao gồm những nhóm phân loại chính nào?", a: "Cây phân xanh, phân chuồng hoai mục và khoáng lân", b: "Nấm, vi khuẩn, vi rút và tuyến trùng", c: "Côn trùng ăn lá, chim hoang dã và chuột đồng", d: "Các hạt keo sét, hạt limon và đá vôi địa chất", ans: "b" },
        { id: 12, q: "Cơ chế đối kháng mà vi sinh vật có lợi dùng để thực hiện kiểm soát sinh học KHÔNG bao gồm yếu tố nào?", a: "Cạnh tranh dinh dưỡng và không gian sống", b: "Sản xuất các hợp chất kháng khuẩn (như kháng sinh và enzyme), ký sinh", c: "Kích thích khả năng kháng bệnh toàn thân ở cây trồng", d: "Thao túng hệ thống miễn dịch của cây để mầm bệnh xâm nhập nhanh hơn", ans: "d" },
        { id: 13, q: "Ý nghĩa của \"Ứng chế mầm bệnh có mục tiêu\" (tính đặc hiệu cao) của các tác nhân kiểm soát sinh học là gì?", a: "Có khả năng tiêu diệt tất cả các sinh vật vô hại xung quanh vùng rễ", b: "Chỉ tác động lên một số mầm bệnh hoặc sinh vật gây hại nhất định mà không gây ảnh hưởng đến các sinh vật không mục tiêu", c: "Làm giảm khả năng tự vệ tự nhiên ETI của thực vật chủ", d: "Giúp mầm bệnh tiến hóa nhanh hơn thành các dòng siêu độc lực", ans: "b" },
        { id: 14, q: "Việc tác nhân kiểm soát sinh học không gây ảnh hưởng đến sinh vật không mục tiêu mang lại lợi ích môi trường nào?", a: "Làm tăng lượng tồn dư hóa chất độc hại trong nông sản sau thu hoạch", b: "Giảm nguy cơ ô nhiễm môi trường và hạn chế tác động tiêu cực đến các sinh vật có lợi", c: "Bắt buộc người sản xuất phải ngừng tưới nước hoàn toàn cho luống cây", d: "Làm đông cứng kết cấu cơ giới vật lý của toàn bộ các tầng hạt đất", ans: "b" },
        { id: 15, q: "Yếu tố sinh thái nào quyết định \"tuyến phòng vệ\" bền vững chống lại mầm bệnh và nâng cao khả năng phục hồi của hệ sinh thái nông nghiệp?", a: "Sự đồng nhất tuyệt đối về mặt kiểu gen của một chủng vi khuẩn duy nhất", b: "Mức độ đa dạng của các loài vi sinh vật trong hệ sinh thái nông nghiệp", c: "Việc sử dụng liên tục phân bón đạm hóa học nồng độ cao", d: "Diện tích bề mặt đất canh tác được che phủ bởi màng nilon nhựa", ans: "b" },
        { id: 16, q: "Các tác nhân vi sinh kiểm soát sinh học được thương mại hóa dưới những dạng bào chế phổ biến nào?", a: "Thể khí hóa lỏng áp suất cao chứa trong bình vỏ thép dày", b: "Dung dịch huyền phù, bột, hạt và các chế phẩm được tích hợp vào hạt giống hoặc vật liệu trồng", c: "Khối tinh thể vô cơ rắn cần đun nóng chảy trước khi sử dụng", d: "Các màng bọc polymer kéo sợi bọc quanh thân cây", ans: "b" },
        { id: 17, q: "Các sản phẩm kiểm soát sinh học vi sinh được đưa vào sử dụng thông qua những kỹ thuật thực tế nào?", a: "Đốt cháy chế phẩm tạo khói hun toàn bộ đồng ruộng", b: "Phun lên lá, tưới vào đất, xử lý hạt giống hoặc thông qua hệ thống tưới", c: "Chôn sâu dưới tầng địa chất đá mẹ thiếu hoàn toàn không khí", d: "Phối trộn trực tiếp với thuốc diệt cỏ hóa học phổ rộng nồng độ bão hòa", ans: "b" },
        { id: 18, q: "Khuôn khổ quản lý dịch hại tổng hợp (IPM) tích hợp kiểm soát sinh học với các biện pháp nào?", a: "Biện pháp cơ giới tự động, kỹ thuật số hóa và thương mại điện tử", b: "Các biện pháp sinh học, canh tác, vật lý và hóa học một cách toàn diện", c: "Các phương thức canh tác hoang dã tự nhiên biệt lập hoàn toàn", d: "Kỹ thuật bức xạ tia gamma phối hợp với hệ thống thủy lợi thâm canh", ans: "b" },
        { id: 19, q: "Mục tiêu tối cao của việc áp dụng IPM trong quản lý dịch hại là gì?", a: "Tăng tối đa sự phụ thuộc của nông dân vào các tập đoàn hóa chất tổng hợp", b: "Quản lý sâu bệnh một cách toàn diện và bền vững, giảm sự phụ thuộc vào thuốc hóa học và hạn chế sự hình thành tính kháng thuốc", c: "Thay thế hoàn toàn lao động của con người bằng robot tự động", d: "Loại bỏ tuyệt đối sự xuất hiện của quần xã vi sinh vật hoại sinh đất", ans: "b" },
        { id: 20, q: "Lĩnh vực khoa học nào đang thúc đẩy sự đổi mới liên tục trong nghiên cứu kiểm soát sinh học?", a: "Cơ khí động lực học, luyện kim và tự động hóa nhà máy đóng gói", b: "Sinh thái học vi sinh, hệ gen học và công nghệ sinh học", c: "Kinh tế chính trị học vĩ mô, logistics và quản trị chuỗi cung ứng", d: "Địa chất học trắc địa, phân tích khoáng vật và quy hoạch vùng ven", ans: "b" },
        { id: 21, q: "Các nhà khoa học không ngừng làm sáng tỏ cơ chế hoạt động và tối ưu hóa hiệu quả tác nhân sinh học nhờ vào công cụ hiện đại nào?", a: "Kính hiển vi quang học thô sơ và phương pháp nhuộm màu Gram", b: "Thao tác di truyền, công nghệ bào chế và các công cụ tin sinh học", c: "Các phương pháp thống kê tài chính kế toán của trang trại gia đình", d: "Hệ thống định vị vệ tinh GPS kết hợp bản vẽ kỹ thuật cơ khí", ans: "b" },
        { id: 22, q: "Hoạt động thử nghiệm nào đóng vai trò quan trọng trong việc đánh giá hiệu quả của các tác nhân kiểm soát sinh học trong điều kiện thực tế?", a: "Các thí nghiệm trong phòng kín vô trùng ở điều kiện nhiệt độ hằng định", b: "Các thí nghiệm và mô hình trình diễn ngoài thực địa", c: "Quy trình phân tích cấu trúc nguyên tử của bào tử nấm hoại sinh", d: "Việc chạy mô phỏng thuật toán trên các phần mềm máy tính lý thuyết", ans: "b" },
        { id: 23, q: "Sự hợp tác giữa các bên nào góp phần thúc đẩy việc áp dụng các biện pháp kiểm soát sinh học và xây dựng khung pháp lý an toàn sản phẩm?", a: "Giữa các đại lý bán buôn hóa chất và các công ty logistics vận tải", b: "Các nhà nghiên cứu, nông dân, hệ thống khuyến nông và cơ quan quản lý", c: "Các kỹ sư cơ khí, công nhân đóng gói và người tiêu dùng nông sản", d: "Các nhà hoạch định chính sách đô thị và kiến trúc sư cảnh quan ven biển", ans: "b" },
        { id: 24, q: "Nhóm sinh vật nào sau đây thể hiện hoạt tính đối kháng đối với mầm bệnh thực vật được nhắc đến ở mục \"Quản lý bệnh hại\"?", a: "Cây họ Đậu cố định đạm và nấm rễ cộng sinh ngoại", b: "Một số loài nấm (Trichoderma spp.), vi khuẩn (Bacillus spp.) và vi rút (mycovirus)", c: "Tuyến trùng ký sinh nội bào và côn trùng ăn lá", d: "Tảo độc tầng mặt dung dịch đất và thực khuẩn thể hoại sinh", ans: "b" },
        { id: 25, q: "Cơ chế đối kháng trực tiếp của vi sinh vật có lợi giúp làm giảm yếu tố nào của mầm bệnh?", a: "Kích thước tế bào và hàm lượng DNA của bào tử mầm bệnh", b: "Mật độ mầm bệnh và mức độ gây hại", c: "Khả năng chịu đựng thuốc bảo vệ thực vật hóa học tổng hợp", d: "Tốc độ di truyền các đặc tính di truyền sang thế hệ sau", ans: "b" },
        { id: 26, q: "Từ viết tắt tiếng Anh \"ISR\" dùng để chỉ cơ chế phòng vệ nào ở thực vật do vi sinh vật kích thích?", a: "Miễn dịch khởi phát bởi protein hiệu ứng độc lực cao của mầm bệnh", b: "Kháng cảm ứng toàn thân (Induced Systemic Resistance)", c: "Trạng thái bất hoạt hoàn toàn chu trình dinh dưỡng nitơ vùng rễ", d: "Hiện tượng chết tế bào theo chương trình diện rộng ở tán lá", ans: "b" },
        { id: 27, q: "Nhóm vi sinh vật có lợi nào có khả năng kích thích cơ chế kháng cảm ứng toàn thân (ISR) ở cây trồng?", a: "Vi khuẩn gây bệnh héo xanh Ralstonia và virus đốm lá", b: "Vi khuẩn vùng rễ kích thích sinh trưởng (PGPR) và nấm cộng sinh rễ", c: "Các vi khuẩn phản nitrat hóa yếm khí bắt buộc tầng đất sâu", d: "Hệ virus thực vật truyền nhiễm qua trung gian côn trùng vector", ans: "b" },
        { id: 28, q: "Khi cơ chế ISR được kích hoạt, cây trồng sẽ sản sinh ra các hợp chất phòng vệ nào để phản ứng hiệu quả với mầm bệnh?", a: "Các acid vô cơ mạnh phá hủy cấu trúc màng tế bào rễ cây", b: "Protein liên quan đến bệnh và phytoalexin", c: "Các hợp chất đường carbohydrate và glucose tự do", d: "Lớp màng nhựa polymer bọc ngoài biểu bì tế bào mạch dẫn", ans: "b" },
        { id: 29, q: "Các đại lượng kiểm soát sinh học vi sinh được bào chế thành các thể trạng nào để tích hợp vào chương trình IPM?", a: "Thể khí nén áp suất cao bọc trong bình vỏ kim loại chống va đập", b: "Dung dịch, bột hoặc hạt", c: "Các khối đá khoáng vô cơ thô cần nghiền nhỏ trước khi bón", d: "Các sợi nhựa kéo màng bọc bọc quanh bầu rễ hạt giống", ans: "b" },
        { id: 30, q: "Việc sử dụng các tổ hợp vi sinh vật (Microbial consortia) bao gồm nhiều chủng vi sinh vật bổ trợ cho nhau hướng tới hiệu ứng nào?", a: "Hiệu ứng đối kháng triệt tiêu hoàn toàn hoạt động của nhau", b: "Tác dụng hiệp đồng (Synergistic effect) nhằm tăng cường hiệu quả quản lý bệnh", c: "Hiệu ứng đột biến gen làm thay đổi màu sắc cảm quan của hoa", d: "Hiện tượng đông cứng dung dịch đất ngăn cản rễ cây hút nước", ans: "b" },
        { id: 31, q: "Nghiên cứu về tương tác cây trồng – vi sinh vật ở mức độ phân tử cung cấp hiểu biết sâu sắc về khía cạnh nào?", a: "Tốc độ mài mòn vật lý của các công cụ cơ giới hóa đồng ruộng", b: "Cách vi sinh vật điều hòa phản ứng phòng vệ của cây và góp phần ức chế bệnh hại", c: "Công thức toán học tính biên lợi nhuận kinh tế của trang trại", d: "Sự biến động nhiệt độ của tầng khí quyển sát bề mặt canh tác", ans: "b" },
        { id: 32, q: "Nhóm yếu tố môi trường nào sau đây ảnh hưởng trực tiếp đến hiệu quả của chiến lược quản lý bệnh bằng vi sinh?", a: "Sơ đồ lắp đặt các hệ thống kênh mương thủy lợi vùng hạ lưu sông lớn", b: "pH đất, nhiệt độ, độ ẩm và cấu trúc quần xã vi sinh vật đất hiện diện", c: "Giá cả thu mua nông sản thương mại của các đại lý bán buôn", d: "Bản vẽ kỹ thuật thiết kế cơ khí bên trong của máy gặt liên hợp", ans: "b" },
        { id: 33, q: "Hoạt động phối hợp giữa các nhà nghiên cứu, hệ thống khuyến nông và người sản xuất giúp thực hiện nhiệm vụ gì?", a: "Tăng doanh thu thương mại ngắn hạn cho các công ty hóa chất tổng hợp", b: "Chuyển giao tri thức và công nghệ từ phòng thí nghiệm ra thực tế sản xuất", c: "Loại bỏ hoàn toàn quy trình kiểm định an toàn sinh học của nhà nước", d: "Thiết lập các mô hình trang trại thủy canh nhân tạo loại bỏ vai trò của đất", ans: "b" },
        { id: 34, q: "Vi sinh vật bảo vệ cây trồng góp phần quan trọng vào mục tiêu vĩ mô nào của nông nghiệp bền vững?", a: "Tăng cường thâm canh hóa chất và tối đa hóa việc dùng thuốc trừ sâu tổng hợp", b: "Phát triển các chương trình IPM và giảm sự phụ thuộc vào thuốc hóa học", c: "Chuyển đổi toàn bộ diện tích đất canh tác sang mô hình nhà màng khép kín", d: "Hạn chế sự trao đổi chất tự nhiên giữa thực vật và môi trường tự nhiên", ans: "b" },
        { id: 35, q: "Xu hướng mới trong vi sinh vật học nông nghiệp đánh dấu bước chuyển biến mang tính bước ngoặt nào?", a: "Từ việc chỉ tập trung bón phân hóa học sang dùng phân bón vô cơ nồng độ cao", b: "Từ việc chỉ tập trung vào việc chống lại mầm bệnh có hại sang việc khai thác tiềm năng to lớn của vi sinh vật có lợi", c: "Từ mô hình canh tác trên đất sang thủy canh hoàn toàn trong nhà máy khép kín", d: "Từ việc nghiên cứu sinh học phân tử sang áp dụng các kinh nghiệm dân gian cổ", ans: "b" },
        { id: 36, q: "Sự chuyển đổi hướng nghiên cứu sang vi sinh vật có lợi được thúc đẩy bởi nhận thức ngày càng tăng về mối liên hệ chặt chẽ giữa các yếu tố nào?", a: "Giữa giá nhân công lao động, chi phí logistics và giá cả thị trường nông sản", b: "Sức khỏe đất, sinh trưởng cây trồng và cộng đồng vi sinh vật", c: "Giữa chiều dài hệ mạch dẫn, diện tích tán lá và độ sâu bám rễ thực vật", d: "Giữa cấu trúc cơ giới vật lý đất và độ mài mòn của lưỡi cày máy kéo", ans: "b" },
        { id: 37, q: "Trước thách thức của biến đổi khí hậu, gia gia tăng dân số và suy giảm diện tích đất canh tác, khai thác sức mạnh vi sinh vật được xem là hướng đi giúp đảm bảo mục tiêu nào?", a: "Tự động hóa hoàn toàn quy trình trồng trọt bằng hệ thống robot thông minh", b: "Đảm bảo an ninh lương thực và tính bền vững môi trường", c: "Triệt tiêu hoàn toàn sự cạnh tranh sinh thái giữa thực vật và cỏ dại", d: "Biến đổi toàn bộ các chất vô cơ trong lòng đất thành sinh khối protein thô", ans: "b" },
        { id: 38, q: "Nội dung cốt lõi được thảo luận trong cuốn sách toàn diện \"Khai thác vi sinh vật cho nông nghiệp bền vững\" tập trung vào yếu tố nào?", a: "Các quy trình kỹ thuật để lắp ráp các máy cày máy bừa công suất lớn", b: "Các kết quả nghiên cứu mới nhất, tiến bộ công nghệ và các ứng dụng thực tiễn nhằm khai thác vi sinh vật có lợi", c: "Các thuật toán lập trình phần mềm quản trị chuỗi cung ứng nông sản thương mại", d: "Bản đồ phân bổ địa chất chi tiết của các mỏ khoáng sản tự nhiên vùng ven", ans: "b" },
        { id: 39, q: "Ngoài khía cạnh kỹ thuật đa dạng sinh học, cuốn sách còn đề cập đến nhóm vấn đề vĩ mô nào liên quan đến công nghệ vi sinh?", a: "Các vấn đề pháp lý, đạo đức và xã hội liên quan đến thương mại hóa và áp dụng công nghệ vi sinh", b: "Chiến lược quản lý tài chính kế toán và cắt giảm nhân công trang trại công nghiệp", c: "Quy trình đăng ký bản quyền sở hữu trí tuệ cho các loại máy gặt liên hợp", d: "Xu hướng dịch chuyển cơ cấu kinh tế từ trồng trọt sang dịch vụ du lịch sinh thái", ans: "a" },
        { id: 40, q: "Khía cạnh \"Đa dạng vi sinh và chức năng hệ sinh thái\" thảo luận nội dung nghiên cứu nào?", a: "Phương pháp phân tích hàm lượng kim loại nặng độc hại trong tầng địa chất đá mẹ", b: "Khám phá sự đa dạng của vi sinh vật và vai trò của chúng trong chu trình dinh dưỡng, độ phì đất và khả năng phục hồi hệ sinh thái", c: "Kỹ thuật cày lật sâu đất để phơi các khoáng chất dưới ánh sáng mặt trời ban ngày", d: "Các phương thức đóng gói và bảo quản chế phẩm sinh học ở môi trường áp suất cao", ans: "b" },
        { id: 41, q: "Nội dung \"Tương tác cây trồng – vi sinh trong cải thiện cây trồng\" tập trung phân tích cơ chế nào?", a: "Cơ chế thoát hơi nước và điều hòa nhiệt độ tế bào tán lá thực vật", b: "Các cơ chế tương tác cây – vi sinh, bao gồm quan hệ cộng sinh và kháng bệnh cảm ứng", c: "Quá trình tự nhân đôi bộ gen di truyền DNA của hệ virus ký sinh biểu bì", d: "Sự phong hóa hóa học của các khoáng vật silicat vùng rễ sâu dưới lòng đất", ans: "b" },
        { id: 42, q: "Chế phẩm vi sinh cấy bổ sung (Microbial inoculants) thể hiện tiềm năng lớn nhất ở khía cạnh nào đối với cây trồng?", a: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của toàn bộ tán lá", b: "Thúc đẩy sinh trưởng, năng suất và khả năng chịu stress của cây", c: "Làm giảm kích thước hệ rễ để cây tiết kiệm hàm lượng chất hữu cơ đất", d: "Biến đổi cấu trúc di truyền của cây trồng thành dòng sinh vật hoàn toàn nhân tạo", ans: "b" },
        { id: 43, q: "Hai nhóm phân bón sinh học vi sinh cốt lõi được mô tả cơ chế hoạt động trong mục nâng cao hiệu quả sử dụng dinh dưỡng là gì?", a: "Phân bón đạm urê tổng hợp và quặng lân apatit vô cơ nồng độ cao", b: "Vi khuẩn cố định đạm và vi sinh vật hòa tan lân", c: "Tập đoàn nấm nội sinh biểu bì lá và virus ký sinh nội bào tuyến trùng", d: "Vi tảo lục đơn bào tầng mặt nước và vi khuẩn phản nitrat hóa yếm khí sâu", ans: "b" },
        { id: 44, q: "Lợi ích thực tiễn của việc bón phân bón sinh học vi sinh đối với đất nông nghiệp bao gồm yếu tố nào?", a: "Làm tăng độ chặt và tính ổn định cơ giới của các khối đá khoáng cứng", b: "Cải thiện độ phì đất, khả năng cung cấp dinh dưỡng và năng suất cây trồng", c: "Triệt tiêu hoàn toàn hoạt động phân hủy chất xơ của hệ nấm hoại sinh bản địa", d: "Ngăn cản sự lưu thông của không khí giữa môi trường đất và tầng khí quyển mặt", ans: "b" },
        { id: 45, q: "Mục \"Thuốc BVTV sinh học và bảo vệ cây trồng dựa trên vi sinh\" khám phá việc ứng dụng tác nhân kiểm soát sinh học để quản lý đối tượng nào?", a: "Quản lý sự phân bổ các hệ thống kênh mương thủy lợi vùng hạ lưu sông lớn", b: "Quản lý bệnh, sâu hại và cỏ dại", c: "Quần thể các loài động vật ăn hạt và chim hoang dã cư trú trên đồng ruộng", d: "Sự hao mòn vật lý cơ giới của các linh kiện bên trong máy gặt đập liên hợp", ans: "b" },
        { id: 46, q: "Hoạt động ứng dụng vi sinh vật trong cải tạo đất bao gồm những nội dung công nghệ cốt lõi nào?", a: "Sử dụng các hóa chất tẩy rửa mạnh để khử trùng toàn bộ bề mặt luống cây canh tác", b: "Xử lý sinh học chất ô nhiễm và phục phục hồi đất suy thoái", c: "Lai tạo các giống thực vật thân gỗ lớn có khả năng chịu mặn cực đoan nhà màng", d: "Lọc sạch nguồn nước tưới bị ô nhiễm bằng hệ thống màng lọc cơ học nhân tạo", ans: "b" },
        { id: 47, q: "Công nghệ vi sinh vật cải tạo đất thể hiện tiềm năng to lớn trong việc cải thiện các đặc tính lý hóa nào của đất?", a: "Làm giảm độ xốp và ngăn chặn sự thấm hút nước của các hạt keo sét tầng canh tác", b: "Cải thiện cấu trúc đất, độ phì và khả năng giữ nước", c: "Đẩy toàn bộ lượng khí oxy ra khỏi các khe hở hạt đất để kết cấu chặt khít vững", d: "Hòa tan hoàn toàn các hạt cát thô thành dung dịch muối khoáng lượng lớn bão hòa", ans: "b" },
        { id: 48, q: "Lĩnh vực \"Quản lý hệ vi sinh vật chính xác\" (Precision Microbiome Management) là sự kết hợp của các thành phần công nghệ hiện đại nào?", a: "Kỹ thuật đúc cơ khí thô sơ, luyện kim đồng ruộng và hạch toán tài chính trang trại", b: "Phân tích hệ vi sinh, nông nghiệp chính xác và công nghệ số", c: "Phương thức canh tác hoang dã tự nhiên biệt lập tuyệt đối không có con người quản lý", d: "Kỹ thuật bức xạ tia X phổ rộng kết hợp với hệ thống tưới ngập úng sâu nội đồng", ans: "b" },
        { id: 49, q: "Mục tiêu của quản lý hệ vi sinh vật chính xác hướng tới xây dựng các biện pháp can thiệp vi sinh như thế nào?", a: "Các biện pháp can thiệp đồng nhất áp dụng chung cho mọi điều kiện địa hình canh tác", b: "Xây dựng các can thiệp vi sinh phù hợp, tối ưu hóa cho từng điều kiện sinh thái nông nghiệp", c: "Ngừng hoàn toàn việc cung cấp nước tưới và bón các phân bón hữu cơ thô cho đất", d: "Thay thế toàn bộ hệ đất tự nhiên bằng mô hình giá thể nhựa khép kín phòng thí nghiệm", ans: "b" },
        { id: 50, q: "Bản chất của việc triển khai các giải pháp vi sinh trong nông nghiệp theo phần \"Các vấn đề pháp lý và đạo đức\" đòi hỏi phải đảm bảo khía cạnh nào?", a: "Triển khai một cách bí mật tuyệt đối để tránh sự cạnh tranh thương mại của đối thủ", b: "Đảm bảo việc triển khai các giải pháp vi sinh một cách có trách nhiệm và bền vững", c: "Cho phép giải phóng tự do các chủng biến đổi gen mà không cần khảo nghiệm an toàn", d: "Bắt buộc người nông dân phải tăng liều lượng bón thuốc bảo vệ thực vật hóa học phối trộn", ans: "b" }],
        p2: [{ id: 51, q: "Tóm lược phần kết luận của cuốn sách nhấn mạnh tiềm năng mang tính chất gì của việc khai thác vi sinh vật trong nông nghiệp bền vững?", a: "Tiềm năng ứng phó ngắn hạn mang tính cục bộ vùng miền nhỏ", b: "Tiềm năng chuyển đổi (Transformative potential)", c: "Khả năng thay thế hoàn toàn nhu cầu hấp thu chất hữu cơ vùng rhizosphere thực vật", d: "Vai trò độc quyền thương mại của các công ty sản xuất vật tư hóa chất tổng hợp", ans: "b" },
        { id: 52, q: "Yếu tố phương pháp luận nào được nhấn mạnh là cực kỳ quan trọng trong việc thúc đẩy nông nghiệp vi sinh nhằm đảm bảo an ninh lương thực toàn cầu?", a: "Tăng cường thâm canh cơ giới hóa và tối đa hóa việc dùng thuốc trừ sâu hóa học", b: "Tầm quan trọng của hợp tác liên ngành (Interdisciplinary cooperation)", c: "Giữ nguyên các phương thức sản xuất thô sơ cổ xưa không có sự cải tiến khoa học", d: "Chuyển dịch toàn bộ cơ cấu kinh tế nông nghiệp sang mô hình nhà máy khép kín vô sinh", ans: "b" },
        { id: 53, q: "Cơ chế ức chế mầm bệnh \"Cạnh tranh tài nguyên\" của nấm đối kháng Trichoderma spp. thể hiện thông qua hoạt động nào đối với nấm hại?", a: "Trichoderma tiêu thụ hết các nguồn carbon hữu cơ và không gian bám dính trước mầm bệnh", b: "Trichoderma truyền các hạt virus độc lực cao vào tế bào sợi nấm gây bệnh hại cây", c: "Trichoderma làm thay đổi cấu trúc di truyền bộ gen DNA của nấm bệnh thành vô hại", d: "Trichoderma bọc kín hệ thống mạch dẫn mạch gỗ của thân cây trồng để cách ly mầm bệnh", ans: "a" },
        { id: 54, q: "Hợp chất \"Phytoalexin\" do cây trồng sản sinh trong cơ chế ISR kích hoạt bởi PGPR hoạt động như thế nào?", a: "Chất điều hòa sinh trưởng kích thích rễ cây kéo dài nhanh chóng xuống tầng đất sâu hơn", b: "Các chất kháng vi sinh vật có trọng lượng phân tử nhỏ, ức chế trực tiếp mầm bệnh", c: "Chất keo dính kết các liên kết hạt đất hạt cát thành cấu trúc khối chặt vững chắc", d: "Nguồn cung cấp chất hữu cơ carbon phong phú nuôi dưỡng tế bào lông hút khỏe mạnh", ans: "b" },
        { id: 55, q: "Việc sử dụng \"Mycovirus\" (virus ký sinh trên nấm) làm tác nhân kiểm soát sinh học hướng tới mục đích sinh học nào?", a: "Kích thích nấm gây bệnh phát triển nhanh hơn để tự tiêu thụ hết chất dinh dưỡng đất", b: "Nhiễm bệnh và làm suy giảm độc lực (Hypovirulence) của nấm gây bệnh hại thực vật", c: "Biến đổi nấm gây bệnh thành nhóm nấm rễ cộng sinh mycorrhiza hữu ích cho hệ rễ", d: "Phân hủy toàn bộ cấu trúc xenlulozo vách tế bào thực vật chủ để lấy đạm hữu cơ thô", ans: "b" },
        { id: 56, q: "Sự hiện diện của một quần xã vi sinh vật đa dạng trên bề mặt lá (Phyllosphere) đóng vai trò gì trong bảo vệ cây trồng?", a: "Làm giảm diện tích quang hợp hiệu dụng của lá cây do che khuất ánh sáng mặt trời", b: "Tạo hàng rào sinh học đối kháng, cạnh tranh không gian và ngăn cản bào tử nấm bệnh nảy mầm", c: "Kích thích sự phát triển bùng phát số lượng của các loài sâu cuốn lá hại tán lá cao", d: "Tăng tốc độ bay hơi của lượng nước tưới nội đồng ra ngoài môi trường bầu khí quyển", ans: "b" },
        { id: 57, q: "Trong các chương trình IPM, việc sử dụng thuốc bảo vệ thực vật hóa học chỉ được khuyến nghị áp dụng vào thời điểm nào?", a: "Phun định kỳ hàng tuần theo lịch cố định bất kể sự xuất hiện của mầm bệnh hại cây", b: "Áp dụng như giải pháp cuối cùng khi mật độ dịch hại vượt ngưỡng gây thiệt hại kinh tế", c: "Phun nồng độ cực cao ngay từ giai đoạn hạt giống chưa nảy mầm sinh trưởng dưới đất", d: "Chỉ phun vào ban đêm khi quần xã vi sinh vật bản địa đang ở trạng thái ngủ đóng băng", ans: "b" },
        { id: 58, q: "Đâu là một thách thức lớn trong việc ứng dụng thực tế các tác nhân kiểm soát sinh học vi sinh ngoài đồng ruộng so với phòng thí nghiệm?", a: "Kích thước cơ học của bào tử vi sinh vật quá nhỏ không thể phối trộn trong béc phun", b: "Hiệu quả kiểm soát có thể không ổn định do chịu tác động mạnh bởi các yếu tố khí hậu, môi trường", c: "Vi sinh vật có lợi dễ dàng bị phân hủy hoàn toàn khi tiếp xúc với phân bón hữu cơ thô", d: "Chi phí sản xuất chế phẩm sinh học đắt hơn hàng triệu lần thuốc bảo vệ thực vật hóa học", ans: "b" },
        { id: 59, q: "Thành tựu nghiên cứu về \"Hệ gen học vi sinh vật\" (Microbial genomics) giúp ích gì cho lĩnh vực kiểm soát sinh học?", a: "Đo đạc chính xác trọng lượng khô thô của toàn bộ sinh khối thực vật đồng ruộng diện rộng", b: "Xách định các cụm gen chịu trách nhiệm tổng hợp các hợp chất kháng khuẩn và yếu tố độc lực", c: "Thay thế hoàn toàn quy trình khảo nghiệm đồng ruộng thực tế của các cơ quan quản lý", d: "Thiết kế sơ đồ mạch điện tự động hóa cho các máy gặt đập liên hợp công suất lớn nông thôn", ans: "b" },
        { id: 60, q: "Việc duy trì \"Vệ sinh đồng ruộng\" (như tiêu hủy tàn dư cây bị bệnh) trong IPM nhằm mục đích cốt lõi nào?", a: "Phá hủy kết cấu vật lý cơ giới của các tập hợp hạt đất tầng canh tác mặt luống", b: "Giảm nguồn bệnh ban đầu (inoculum), ngăn chặn sự lây lan và bùng phát dịch bệnh mùa sau", c: "Loại bỏ hàm lượng chất mùn hữu cơ ổn định để đất trở nên thông thoáng hoàn toàn vô sinh", d: "Ngăn cản quá trình quang hợp tự nhiên ban ngày của thảm thực vật cỏ dại hoang dã", ans: "b" },
        { id: 61, q: "Hoạt động \"Ký sinh bậc hai\" (Hyperparasitism) của tác nhân kiểm soát sinh học được định nghĩa sinh học là gì?", a: "Vi sinh vật có lợi ký sinh trực tiếp trên hệ rễ thực vật họ Đậu để lấy đường carbohydrate", b: "Vi sinh vật có lợi ký sinh trực tiếp trên một ký sinh trùng khác (mầm bệnh thực vật)", c: "Sự lây nhiễm của virus thực vật vào tế bào lông hút thông qua vết thương cơ học của rễ", d: "Hoạt động ăn mồi biểu diễn mật độ tế bào hữu ích phân bố ở vùng rhizosphere", ans: "b" },
        { id: 62, q: "Khi vi khuẩn Bacillus subtilis sản sinh ra hợp chất kháng sinh lipopeptide (như surfactin, fengycin), chất này phá hủy mầm bệnh nấm hại bằng cơ chế nào?", a: "Thao túng bộ gen DNA của nấm hại biến nấm thành dòng sinh vật hoàn toàn vô hại ngủ hoài", b: "Tương tác và làm rối loạn cấu trúc màng tế bào của nấm gây bệnh, gây ly giải tế bào", c: "Kết dính các bào tử nấm lại với nhau thành khối tinh thể rắn không thể nảy mầm sinh trưởng", d: "Ngăn cản nấm hấp thu các ion khoáng đa lượng Kali và Photpho hòa tan từ dung dịch đất", ans: "b" },
        { id: 63, q: "Khái niệm \"Giống cây trồng kháng bệnh\" trong quản lý bệnh cây tổng hợp được hiểu là gì?", a: "Các giống cây trồng được phun thuốc hóa học nồng độ cao bọc kín bề mặt biểu bì thân lá", b: "Giống cây mang các gen kháng (R genes) giúp nhận biết hiệu quả effector và kích hoạt hệ đề kháng nội bào", c: "Các dòng thực vật nhân tạo được tổng hợp hoàn toàn từ nguồn protein thô trong phòng thí nghiệm", d: "Những cây có chu kỳ sinh trưởng ngắn lại một nửa thời gian để né tránh sự bùng phát dịch bệnh", ans: "b" },
        { id: 64, q: "Sự dư thừa chức năng (Functional redundancy) của một quần xã vi sinh vật đa dạng vùng rễ mang lại lợi ích bảo vệ cây trồng như thế nào?", a: "Đảm bảo các chức năng ức chế mầm bệnh được duy trì ổn định ngay cả khi một vài loài vi sinh bị suy giảm", b: "Làm giảm diện tích lông hút của hệ rễ để tránh sự xâm nhiễm của các loài tuyến trùng ký sinh", c: "Tăng tốc độ phân hủy cơ học các khoáng silicat thành hạt keo sét đất không thông thoáng khí", d: "Triệt tiêu hoàn toàn sự trao đổi chất dinh dưỡng tự nhiên giữa đất canh tác và hệ rễ thực vật", ans: "a" },
        { id: 65, q: "Việc bổ sung chất hữu cơ mùn hoai mục vào đất cải thiện hiệu quả của thuốc trừ sâu sinh học dựa trên vi sinh vật nhờ khía cạnh nào?", a: "Làm tăng nồng độ độc chất hóa học tồn dư hữu cơ lên mức bão hòa phá hủy quần xã bản địa", b: "Cung cấp môi trường trú ẩn, bảo vệ vi sinh vật có lợi khỏi tác động cực đoan của ánh sáng và nhiệt", c: "Đông cứng các phân tử nước dung dịch đất khiến mầm bệnh hoàn toàn không thể di chuyển bám rễ", d: "Biến đổi toàn bộ bộ gen di truyền của tác nhân sinh học thành cấu trúc virus thực vật hoại sinh", ans: "b" },
        { id: 66, q: "Khái niệm \"Ngưỡng hành động\" (Action threshold) trong khung quản lý dịch hại IPM được định nghĩa là gì?", a: "Điểm thời gian cố định hàng tháng để nông dân tiến hành phun thuốc bảo vệ thực vật hóa học tổng hợp", b: "Mật độ dịch hại hoặc mức độ nghiêm trọng của bệnh mà tại đó phải áp dụng biện pháp kiểm soát", c: "Độ sâu vật lý tối đa của lưỡi cày khi tiến hành xáo trộn kết cấu các tầng hạt đất đồng ruộng", d: "Tổng chi phí tài chính tối đa được phép chi cho hoạt động mua sắm vật tư nông nghiệp trang trại", ans: "b" },
        { id: 67, q: "Enzyme chitinase do vi khuẩn Serratia marcescens tiết ra cấu thành cơ chế đối kháng nào chống lại mầm bệnh nấm hại?", a: "Hòa tan các liên kết hạt cát thô vô cơ thành cấu trúc hạt keo sét mịn tầng canh tác mặt luống", b: "Phân hủy cấu trúc polyme chitin – thành phần cấu tạo vách tế bào của nấm gây bệnh thực vật", c: "Thao túng hệ thống miễn dịch PTI của cây trồng để kích thích hiện tượng rụng lá già đồng loạt", d: "Bao bọc các bào tử mầm bệnh thành những tinh thể rắn trơ cô lập hoàn toàn khỏi nguồn nước tưới", ans: "b" },
        { id: 68, q: "Sự truyền gen ngang qua trung gian virus (Transduction) đóng góp vào sự thích nghi của vi khuẩn kiểm soát sinh học như thế nào?", a: "Làm bão hòa và đóng băng hoàn toàn hoạt động phân chia tế bào của quần thể vi khuẩn có lợi", b: "Cho phép lan truyền nhanh các gen kháng thuốc, gen tổng hợp kháng sinh, nâng cao khả năng thích nghi", c: "Biến đổi vi khuẩn kiểm soát sinh học thành nhóm vi sinh vật phản nitrat hóa yếm khí làm nghèo đất", d: "Phá hủy hoàn toàn cấu trúc vách tế bào lông hút thực vật khiến cây trồng bị còi cọc héo rũ thân", ans: "b" },
        { id: 69, q: "Việc ứng dụng các kỹ thuật bao gói kết hợp vi sinh vật đối kháng trong bảo vệ nông sản sau thu hoạch hướng tới mục tiêu gì?", a: "Làm tăng lượng tồn dư hóa chất bảo quản hữu cơ để nông sản giữ được độ cứng cơ học lâu dài hơn", b: "Ức chế sự phát triển của vi sinh vật gây hư hỏng, kéo dài thời gian bảo quản và duy trì chất lượng sản phẩm", c: "Thay thế hoàn toàn quy trình xử lý nhiệt thanh trùng và tiệt trùng trong các nhà máy đóng gói đóng hộp", d: "Kích thích sự đột biến tự nhiên của các tế bào mô quả chín thành dòng sản phẩm hoàn toàn nhân tạo", ans: "b" },
        { id: 70, q: "Sự tích hợp của công nghệ kỹ thuật số trong giám sát sâu bệnh cây trồng sử dụng công cụ tiên tiến nào để phát hiện sớm dịch bệnh?", a: "Các phương pháp quan sát bằng mắt thường thô sơ và kinh nghiệm canh tác dân gian cổ xưa biệt lập", b: "Máy ảnh đa phổ lắp trên máy bay không người lái (UAV), cảm biến IoT và thuật toán trí tuệ nhân tạo", c: "Bản vẽ kỹ thuật thiết kế cơ khí cấu trúc bên trong của các loại máy cày máy bừa công suất lớn nông thôn", d: "Hệ thống hạch toán sổ sách kế toán quản trị tài chính biên lợi nhuận của mô hình trang trại gia đình", ans: "b" },
        { id: 71, q: "Khi vi khuẩn kiểm soát sinh học Pseudomonas fluorescens tiết ra hợp chất siderophore, cơ chế này ức chế nấm bệnh Pythium gây thối rễ bằng cách thức nào?", a: "Pseudomonas hấp thu hết lượng nước dung dịch đất khiến Pythium bị khô héo chết hoàn toàn tự nhiên", b: "Siderophore chelat hóa sắt hòa tan (Fe^3+), làm nấm bệnh bị kìm hãm sinh trưởng do thiếu sắt", c: "Siderophore trực tiếp phá hủy vách tế bào cellulose của lông hút rễ để ngăn nấm bám dính xâm nhiễm", d: "Thay đổi hoàn toàn đặc tính lý hóa cơ giới của hạt cát thô xung quanh vùng rễ thành khối đá chặt cứng", ans: "b" },
        { id: 72, q: "Sự kết hợp giữa nấm đối kháng Trichoderma và giống cây họ Đậu có nốt sần cố định đạm Rhizobium tạo ra hiệu ứng sinh học gì cho hệ sinh thái rễ?", a: "Hiệu ứng đối kháng khốc liệt, triệt tiêu hoàn toàn khả năng hình thành nốt sần cố định đạm của Rhizobium", b: "Hiệu ứng hiệp đồng kép: vừa bảo vệ rễ trước nấm bệnh hại, vừa tối ưu hóa hiệu quả hấp thu đạm của cây", c: "Hiệu ứng đột biến gen làm thay đổi cấu trúc cơ học của bộ mạch dẫn thân cây lâu năm canh tác", d: "Hiện tượng đóng băng hoàn toàn hoạt động hấp thu dinh dưỡng khoáng đa lượng Kali và Photpho vùng rễ", ans: "b" },
        { id: 73, q: "Trong quy trình phân tích an toàn sinh học đối với sản phẩm vi sinh, bước \"Khảo nghiệm đồng ruộng có kiểm soát\" nhằm mục đích gì?", a: "Cho phép các công ty thương mại tự do tiếp thị quảng cáo chế phẩm rộng rãi ra thị trường vĩ mô", b: "Đánh giá hiệu quả thực tế và các tác động sinh thái tiềm tàng của vi sinh vật trong môi trường tự nhiên giới hạn", c: "Thay thế hoàn toàn quy trình phân tích giải trình tự bộ gen DNA trong các phòng thí nghiệm hiện đại", d: "Tính toán biên lợi nhuận kinh tế tài chính ngắn hạn của các tập đoàn sản xuất vật tư nông nghiệp hóa chất", ans: "b" },
        { id: 74, q: "Sự biểu hiện của hệ thống bài tiết tuýp III ở vi khuẩn gây bệnh thực vật chịu trách nhiệm điều khiển chức năng cốt lõi nào?", a: "Enzyme tổng hợp polysaccharide dính kết hạt đất cải thiện độ xốp cấu trúc hạt kết tập đất", b: "Dụng để tiêm các protein hiệu ứng effector vào bên trong tế bào thực vật chủ nhằm thao túng hệ miễn dịch", c: "Phức hệ enzyme nitrogenase thực hiện phản ứng khử nitơ khí quyển thành hợp chất amoni hữu ích vùng rễ", d: "Phân tử kháng sinh tự nhiên dùng để bảo vệ tế bào vi khuẩn khỏi sự tấn công của thực khuẩn thể đối kháng", ans: "b" },
        { id: 75, q: "Kỹ thuật tin sinh học đóng vai trò gì trong việc thiết kế các chủng thực khuẩn thể (phage) kiểm soát sinh học chính xác?", a: "Đo đạc kích thước vật lý cơ giới của vỏ protein virus dưới kính hiển vi quang học phòng thí nghiệm thô sơ", b: "Cho phép phân tích bộ gen, chú giải chức năng gen và dự đoán chính xác phạm vi vi khuẩn mục tiêu của phage", c: "Thiết lập sơ đồ hệ thống kênh mương thủy lợi phối hợp bản đồ địa hình luống đất đồng ruộng diện rộng", d: "Tính toán khối lượng sinh khối khô thô và định lượng hàm lượng tinh bột tích lũy trong nông sản thu hoạch", ans: "b" },
        { id: 76, q: "Việc sử dụng các giống cây trồng mang gen kháng giúp thực vật nhận diện mầm bệnh theo cơ chế phân tử nào?", a: "Tiêu diệt toàn bộ quần xã vi sinh vật hoại sinh bản địa phân bố xung quanh vùng rễ rhizosphere thực vật", b: "Sử dụng các thụ thể chuyên biệt (như NLR nội bào) để nhận diện protein hiệu ứng từ mầm bệnh", c: "Rút ngắn chu kỳ sinh trưởng của cây xuống một nửa thời gian canh tác để tăng thâm canh cơ giới hóa đồng ruộng", d: "Cách ly tuyệt đối hệ sinh thái trồng trọt khỏi các tương tác sinh học tự nhiên với môi trường bầu khí quyển", ans: "b" },
        { id: 77, q: "Chế phẩm thuốc trừ sâu sinh học dựa trên vi khuẩn như Bacillus thuringiensis (Bt) chuyên biệt kiểm soát nhóm dịch hại nào?", a: "Các loài nấm sợi gây bệnh rỉ sắt và phấn trắng trên lá cây lương thực họ Hòa thảo", b: "Các nhóm sâu hại, côn trùng mục tiêu thông qua hoạt động tiết độc tố diệt côn trùng", c: "Các vi khuẩn phản nitrat hóa yếm khí làm nghèo hàm lượng dinh dưỡng đạm vô cơ của đất mặt", d: "Quần thể các loài cỏ dại hoại sinh phân bố ở những vùng đất cát thô hoang mạc thiếu nước tưới", ans: "b" },
        { id: 78, q: "Sự tích lũy nồng độ hợp chất \"Phytoalexin\" ở thực vật biểu hiện trạng thái đáp ứng sinh học nào trước sự xâm nhiễm của mầm bệnh?", a: "Sự đóng băng hoàn toàn hoạt động quang hợp tự nhiên ban ngày để tiết kiệm nguồn năng lượng tế bào", b: "Phản ứng tự vệ hóa học chủ động, kích hoạt cơ chế đáp ứng để kìm hãm mầm bệnh hại", c: "Quá trình thoái hóa mô dẫn đến sự chết héo rũ nhanh chóng của toàn bộ cơ thể hệ thống thực vật canh tác", d: "Sự can thiệp cơ học làm đông cứng cấu trúc mạch dẫn gỗ ngăn chặn hoàn toàn dòng lưu thông dinh dưỡng lỏng", ans: "b" },
        { id: 79, q: "Hiện tượng \"ngạt rễ\" và thối rễ cây trồng khi đất bị ngập úng lâu ngày có sự tham gia của quá trình vi sinh vật bất lợi nào?", a: "Sự tăng trưởng bùng phát của vi khuẩn cố định đạm Rhizobium có lợi", b: "Hoạt động hô hấp yếm khí của vi sinh vật sinh khí độc và vi khuẩn khử sulfate tạo sulfide độc hại", c: "Quá trình quang hợp tự nhiên của các loài tảo lục phân bố tầng canh tác mặt", d: "Sự đóng băng hoàn toàn hoạt động ly giải tế bào của hệ virus thực vật", ans: "b" },
        { id: 80, q: "Điền vào chỗ trống: \"Khung pháp lý điều chỉnh việc sử dụng sản phẩm vi sinh trong nông nghiệp cần đảm bảo sự cân bằng giữa ______ và thúc đẩy đổi mới công nghệ vì mục tiêu phát triển bền vững.\"", a: "Gia tăng doanh thu lợi nhuận kinh tế thương mại ngắn hạn cho doanh nghiệp", b: "Đánh giá quản lý rủi ro an toàn sinh học chặt chẽ", c: "Tốc độ chuyển dịch cơ giới hóa thâm canh cao độ sử dụng máy móc lớn", d: "Việc cắt giảm tối đa chi phí tiền lương chi trả cho đội ngũ kỹ sư khuyến nông", ans: "b" },
        { id: 81, q: "Chế phẩm sinh học ứng dụng để xử lý hạt giống trước khi gieo trồng mang lại lợi ích bảo vệ nào cho cây non?", a: "Tiêu diệt toàn bộ các vi khuẩn PGPR có ích xung quanh hạt giống do hiện tượng cạnh tranh khống sinh học", b: "Giúp định cư các tác nhân vi sinh có lợi sớm trên rễ, ức chế mầm bệnh và bảo vệ cây trồng từ giai đoạn đầu", c: "Làm đông cứng lớp vỏ hạt giống biến hạt thành cấu trúc tinh thể rắn trơ chống chịu mọi loại máy móc cơ giới", d: "Thay thế hoàn toàn nhu cầu hấp thu các nguyên tố khoáng đa lượng đạm, lân và kali của thực vật giai đoạn đầu", ans: "b" },
        { id: 82, q: "Cơ chế ký sinh của nấm đối kháng (như các chủng nấm hoại sinh hoặc đối kháng mầm bệnh) chống lại nấm bệnh hại thực vật diễn ra theo cách nào?", a: "Nấm đối kháng tiết chất độc làm chết rễ cây để mầm bệnh không còn nguồn chất hữu cơ carbon tự nuôi dưỡng", b: "Thực hiện hoạt động ức chế nấm gây bệnh thông qua cơ chế ký sinh trực tiếp trên cấu trúc sợi mầm bệnh", c: "Biến đổi cấu trúc bộ gen DNA của mầm bệnh thành dòng virus thực vật hoàn toàn bất hoạt ngủ hoài vĩnh viễn", d: "Gắn kết các bào tử của mầm bệnh thành khối cấu trúc hạt cát thô kích thước lớn dễ dàng bị nước mưa rửa trôi sâu", ans: "b" },
        { id: 83, q: "Việc tìm hiểu sâu sắc về con đường tín hiệu và mô hình biểu hiện gen trong tương tác cây trồng - vi sinh vật cung cấp điều gì?", a: "Sơ đồ thiết lập hệ thống kênh mương thủy lợi nội đồng cho các mô hình trang trại công nghệ cao", b: "Cung cấp hiểu biết sâu sắc về cách vi sinh vật điều hòa phản ứng phòng vệ của cây và góp phần ức chế bệnh", c: "Phương thức cắt giảm tối đa lượng phân bón hữu cơ thô bón bón bổ sung hàng năm vào đất canh tác", d: "Khả năng tự động hóa hoàn toàn quy trình đóng gói nông sản thương mại loại bỏ sức lao động con người", ans: "b" },
        { id: 84, q: "Các biện pháp quản lý bệnh bền vững hướng tới mục tiêu cốt lõi nào đối với môi trường đồng ruộng?", a: "Tăng tối đa nồng độ hóa chất bảo vệ thực vật tích tụ trong các tầng hạt đất mặt", b: "Hướng đến việc giảm thiểu sử dụng hóa chất và bảo vệ sức khỏe hệ sinh thái", c: "Cách ly hoàn toàn hệ sinh thái trồng trọt khỏi các tương tác sinh học với thảm thực vật tự nhiên", d: "Biến đổi toàn bộ các vi sinh vật hoại sinh bản địa thành quần thể vi sinh vật nhân tạo", ans: "b" },

            7: {

                    { id: 1, q: "Khái niệm \"Vùng rễ\" (Rhizosphere) được định nghĩa lần đầu tiên vào năm 1904 bởi nhà khoa học Lorenz Hiltner để chỉ vùng không gian nào?", a: "Toàn bộ lớp đất bề mặt không chịu sự ảnh hưởng của hệ rễ thực vật", b: "Vùng đất bao quanh rễ chịu ảnh hưởng trực tiếp bởi các chất tiết từ rễ thực vật", c: "Phần biểu bì tán lá tầng cao tiếp xúc trực tiếp với ánh sáng mặt trời", d: "Tầng địa chất đá mẹ trơ lỳ nằm sâu dưới lòng đất đồng ruộng", ans: "b" },
                    { id: 2, q: "Thành phần nào dưới đây chiếm tỷ lệ lớn và là động lực chính thúc đẩy sự phát triển của quần xã vi sinh vật vùng rễ?", a: "Các hạt cát thô vô cơ kích thước lớn không thấm hút dung dịch lỏng", b: "Chất tiết từ rễ thực vật (Rhizodeposition/Root exudates) gồm đường, axit amin và axit hữu cơ", c: "Hàm lượng thuốc bảo vệ thực vật hóa học tồn dư hữu cơ bão hòa", d: "Các mảnh nhựa polymer plastic khó phân hủy sinh học tự nhiên", ans: "b" },
                    { id: 3, q: "Hiện tượng \"Hiệu ứng vùng rễ\" (Rhizosphere effect) thể hiện qua chỉ số sinh học nào so với vùng đất không có rễ (bulk soil)?", a: "Sự sụt giảm nghiêm trọng mật độ tế bào của quần thể vi sinh vật hoại sinh", b: "Mật độ và hoạt tính sinh học của vi sinh vật ở vùng rễ cao hơn gấp nhiều lần so với đất ngoài vùng rễ", c: "Sự đóng băng hoàn toàn hoạt động phân chia khuẩn lạc của các loài vi khuẩn PGPR", d: "Tốc độ bay hơi bùng phát của lượng nước tưới nội đồng ra bầu khí quyển", ans: "b" },
