        { id: 53, q: "Công nghệ omics nào trong tương lai giúp lập bản đồ các protein chức năng thực tế được sản sinh bởi hệ vi sinh vật đất?", a: "Metagenomics", b: "Metaproteomics", c: "Metatranscriptomics", d: "Metabolomics", ans: "b" },
        { id: 54, q: "Việc ứng dụng công cụ tin sinh học (bioinformatics) trong nghiên cứu vi sinh vật nông nghiệp tương lai giải quyết bài toán thách thức nào?", a: "Lập bản vẽ kỹ thuật chi tiết cấu trúc cơ khí vật chất của các máy cày máy bừa", b: "Xử lý và phân tích khối lượng dữ liệu khổng lồ thu được từ giải trình tự gen môi trường", c: "Hạch toán sổ sách kế toán quản trị tài chính biên lợi nhuận kinh doanh trang trại", d: "Thiết kế quy trình đóng gói bao bì nông sản xuất khẩu tự động hóa hoàn toàn", ans: "b" },
        { id: 55, q: "Khái niệm \"Dấu chân sinh thái\" (Ecological footprint) của sản xuất trồng trọt được giảm thiểu rõ rệt nhờ xu hướng khai thác vi sinh vật theo hướng nào?", a: "Tăng liều lượng phun bón các phân bón vô cơ đa lượng và thuốc trừ sâu hóa học", b: "Tối ưu hóa chu trình dinh dưỡng tự nhiên nhờ vi sinh vật có lợi, giảm phân bón vô cơ", c: "Che phủ toàn bộ bề mặt đồng ruộng bằng màng nhựa polymer dày khó phân hủy", d: "Vận hành liên tục các máy cày công suất lớn để xáo trộn mạnh kết cấu vật lý đất", ans: "b" },
        { id: 56, q: "Việc thiết kế các chủng vi khuẩn \"thiết kế\" (designer microbes) nhờ phương pháp sinh học tổng hợp CRISPR-Cas9 hướng tới mục đích gì?", a: "Làm giảm khả năng sinh trưởng của vi khuẩn để chúng dễ bị tiêu diệt bởi hóa chất", b: "Tối ưu hóa các con đường chuyển hóa, cải thiện khả năng chịu stress và tăng sản xuất chất có lợi", c: "Biến đổi vi khuẩn có lợi thành dạng sinh vật ký sinh bắt buộc gây thối rễ cây trồng", d: "Giúp vi khuẩn có khả năng tự phát quang ban đêm để xua đuổi các loài côn trùng hại", ans: "b" },
        { id: 57, q: "Xu hướng \"Nông nghiệp thông minh thích ứng với khí hậu\" coi giải pháp vi sinh nào là trọng tâm để giúp cây trồng chống chịu stress hạn hán, nắng nóng cực đoan?", a: "Sử dụng các chất kích thích sinh trưởng vi sinh điều hòa phytohormone và tăng hiệu quả dùng nước", b: "Bơm các dung dịch chất độc hóa học hữu cơ clo nồng độ cao bọc kín bầu rễ thực vật", c: "Vận hành các máy cày công suất lớn để thay đổi độ chặt vật lý của tầng đất canh tác mặt", d: "Tăng lượng bón phân bón hóa học đa lượng phối trộn nồng độ bão hòa cao vào mùa mưa", ans: "b" },
        { id: 58, q: "Sự biểu hiện của gen acdS (mã hóa enzyme ACC deaminase) ở vi khuẩn PGPR thế hệ mới có vai trò sinh học gì khi cây gặp stress mặn hoặc ngập úng?", a: "Phá hủy hệ thống vách tế bào lông hút thực vật để hút cạn kiệt lượng carbohydrate", b: "Phân hủy tiền chất ethylene, kìm hãm hormone căng thẳng giúp cây duy trì sinh trưởng bộ rễ", c: "Tạo lớp màng bọc cơ học polymer bọc kín bề mặt biểu bì lá chống thoát nước tưới", d: "Gắn kết các bào tử mầm bệnh thành cấu trúc khối kết tập hạt đất mặt rãnh luống đồng", ans: "b" },
        { id: 59, q: "Khái niệm \"Nông nghiệp chính xác\" tích hợp quản lý hệ vi sinh sử dụng dữ liệu nào để đưa ra quyết định bón phân sinh học biến thiên?", a: "Sơ đồ mạng lưới kênh mương thủy lợi vùng hạ lưu sông phối hợp bản đồ giao thông", b: "Bản đồ phân tích đa dạng hệ vi sinh vật vùng rễ, đặc tính lý hóa đất và kiểu gen cây", c: "Sổ sách hạch toán hạch toán tài chính biên lợi nhuận kinh doanh nông sản của trang trại", d: "Bản vẽ thiết kế cơ khí cấu trúc bên trong của các hệ thống béc phun thuốc bảo vệ thực vật", ans: "b" },
        { id: 60, q: "Việc giải phóng các chủng vi sinh vật chỉnh sửa gen (GMMs) ra đồng ruộng trên diện rộng trong tương lai đòi hỏi phải tuân thủ nghiêm ngặt bộ tiêu chuẩn nào?", a: "Tiêu chuẩn quảng cáo tiếp thị thương mại điện tử vĩ mô chuỗi cung ứng logistics vận tải", b: "Quy định về Đánh giá rủi ro an toàn sinh học (Biosafety Risk Assessment) dựa trên khoa học", c: "Tiêu chuẩn hạch toán kế toán thuế và quản trị tài chính doanh nghiệp quy mô công nghiệp", d: "Bản vẽ kỹ thuật thiết kế cơ khí cấu trúc vật chất của nhà máy đóng gói bao bì vật tư", ans: "b" },
        { id: 61, q: "Mối quan hệ hiệp đồng trong tập đoàn vi sinh vật tổng hợp (Synthetic communities - SynComs) được thiết kế nhằm mục đích chức năng gì?", a: "Triệt tiêu hoàn toàn khả năng phát triển sinh khối tế bào của nhau do hiện tượng khống sinh", b: "Tạo hiệu ứng hiệp đồng đa chức năng, nâng cao tính ổn định và hiệu quả bảo vệ thực vật", c: "Gây ra đột biến gen di truyền làm thay đổi hoàn toàn chu kỳ ra hoa kết trái quả cây trồng", d: "Làm đông cứng toàn bộ lượng nước dung dịch đất khiến lông hút hoàn toàn héo rũ ngạt khí", ans: "b" },
        { id: 62, q: "Ngân hàng dữ liệu trình tự gen môi trường thu được từ Metagenomics đất được chú giải chức năng nhờ ngành khoa học nào?", a: "Kỹ thuật cơ khí động lực học và tự động hóa nhà máy đóng gói bao bì nhãn mác thương mại", b: "Tin sinh học (Bioinformatics) và sinh học máy tính (Computational biology)", c: "Thống kê kế toán tài chính quản trị doanh nghiệp quy mô trang trại công nghiệp lớn", d: "Địa chất học trắc địa, phân tích khoáng vật và quy hoạch vùng ven đô thị nông thôn", ans: "b" },
        { id: 63, q: "Xu hướng phát triển phân bón sinh học vi sinh đa chức năng hướng tới việc thay thế loại vật tư đầu vào nào trong canh tác bền vững?", a: "Thay thế hoàn toàn hệ thống các máy móc cơ giới nông nghiệp thâm canh công suất lớn máy cày", b: "Giảm dần và hướng tới thay thế phân bón hóa học và thuốc bảo vệ thực vật hóa học độc hại", c: "Thay thế vai trò của các phân tử nước tưới tự nhiên và ánh sáng mặt trời ban ngày cần thiết", d: "Thay thế hoàn toàn hệ thống sổ sách kế toán quản trị tài chính biên lợi nhuận kinh doanh", ans: "b" },
        { id: 64, q: "Sự tích lũy carbon hữu cơ bền vững trong cấu trúc đất mùn nhờ hoạt động của nấm mycorrhiza đóng góp vào chiến lược toàn cầu nào?", a: "Tăng tốc độ giải phóng khí nhà kính carbon dioxide vào bầu khí quyển vùng cao gây nóng lên", b: "Cô lập carbon trong đất (soil carbon sequestration), giảm thiểu biến đổi khí hậu toàn cầu", c: "Biến đổi hợp chất carbon thành các khối quặng than đá cứng trơ khó phân hủy sinh học tự", d: "Ngăn cản thực vật thực hiện phản ứng quang hợp tự nhiên ban ngày thu nhận ánh sáng tán lá", ans: "b" },
        { id: 65, q: "Khung pháp lý quốc tế (Nghị định thư Nagoya) quản lý hoạt động nào liên quan đến tài nguyên vi sinh vật nông nghiệp?", a: "Quản lý hạn ngạch xuất khẩu nông sản thương mại điện tử qua các cửa khẩu quốc tế toàn", b: "Tiếp cận nguồn gen vi sinh vật và chia sẻ lợi ích một cách công bằng, hợp pháp", c: "Quy định về công suất thiết kế cơ khí tối đa của các loại máy gặt đập liên hợp đồng ruộng", d: "Tiêu chuẩn quốc tế về hàm lượng tro thô cho phép trong thức ăn chăn nuôi gia súc gia gia", ans: "b" },
        { id: 66, q: "Sự phát triển của các \"Chế phẩm kích thích sinh học vi sinh\" (Microbial biostimulants) thế hệ mới tập trung tối ưu hóa chỉ số nào của sản phẩm thương mại?", a: "Hàm lượng muối vô cơ đa lượng phối trộn để tăng độ bền vật lý của bao bì nhựa chứa chứa", b: "Thời hạn sử dụng (shelf-life), mật độ tế bào sống sót và tính ổn định hiệu quả đồng ruộng", c: "Tốc độ chuyển dịch cơ giới hóa của các hệ thống băng chuyền tự động nhà máy đóng gói nhãn", d: "Giá cả thu mua nguyên liệu thô trên thị trường vĩ mô quốc tế của chuỗi cung ứng logistics", ans: "b" },
        { id: 67, q: "Khi vi sinh vật vùng rễ tiết ra các hợp chất hữu cơ bay hơi (VOCs), các phân tử này hoạt động như loại tín hiệu nào?", a: "Chất độc sinh học tiêu diệt toàn bộ thảm quần xã vi khuẩn cố định đạm sống tự do vùng mặt đất", b: "Phân tử tín hiệu kích hoạt cơ chế kháng cảm ứng toàn thân (ISR) ở các mô lá trên cao của cây", c: "Chất keo dính kết các liên kết hạt đất hạt cát thành cấu trúc khối chặt vững chắc chống xói", d: "Enzyme phân giải polyme xenlulozo vách tế bào thực vật để làm mềm kết cấu nông sản sau đóng", ans: "b" },
        { id: 68, q: "Công nghệ chuyên sâu nào cung cấp thông tin quý giá về các hồ sơ chất chuyển hóa, mạng lưới trao đổi chất trong tương tác đất - rễ - vi sinh vật?", a: "Metagenomics môi trường", b: "Metabolomics", c: "Kỹ thuật đúc linh kiện luyện kim cơ khí nông nghiệp", d: "Hệ thống định vị trắc địa địa hình không gian đồng ruộng", ans: "b" },
        { id: 69, q: "Việc ứng dụng các phương pháp sinh học tổng hợp trong công nghệ vi sinh nông nghiệp tương lai được định hướng theo khung nguyên tắc nào?", a: "Tự do phóng thích các chủng biến đổi gen ra tự nhiên mà không cần qua đánh giá rủi ro an an", b: "Đánh giá khoa học nghiêm ngặt, đảm bảo an toàn sinh học và tuân thủ các khung pháp lý quản lý", c: "Bắt buộc người sản xuất phải bón thêm hóa chất độc hại để kìm hãm sự lan truyền gen biến đổi", d: "Giữ bí mật tuyệt đối toàn bộ quy trình công nghệ để độc quyền chiếm lĩnh thị trường vật tư nông", ans: "b" },
        { id: 70, q: "Sự hiện diện của màng sinh học (Biofilm) do tập đoàn vi khuẩn PGPR thiết kế bọc quanh bộ rễ thực vật mang lại năng lực tự vệ nào?", a: "Phá hủy bộ gen di truyền DNA của cây trồng biến cây thành dòng thực vật nhân tạo hoàn toàn vô", b: "Tạo hàng rào sinh học cơ học và hóa học bền vững, ngăn chặn sự xâm nhiễm của mầm bệnh hại rễ", c: "Làm đông cứng dung dịch đất khiến rễ cây hoàn toàn không hút được nguồn nước tưới tiêu nội đồng", d: "Kích thích lá cây tăng cường giải phóng các hợp chất đạm khí quyển ra môi trường không khí sát", ans: "b" },
        { id: 71, q: "Hoạt động \"Ủ phân hữu cơ chính xác\" (Precision composting) sử dụng tập đoàn vi sinh vật mật độ cao hướng tới mục tiêu gì?", a: "Phân hủy hoàn toàn các hạt cát thô vô cơ khoáng thạch anh silicat tầng canh tác mặt luống đồng ruộng diện rộng nông", b: "Chuyển hóa phế phụ phẩm nông nghiệp thành phân bón hữu cơ sinh học giàu dinh dưỡng, sạch mầm bệnh", c: "Tạo ra các hợp chất acid vô cơ mạnh tổng hợp nhà máy để khử trùng toàn bộ bề mặt luống luống", d: "Cách ly tuyệt đối hệ sinh thái trồng trọt khỏi các tương tác sinh học tự nhiên với môi trường bầu", ans: "b" },
        { id: 72, q: "Sự phát triển của các công cụ \"Bao bì sinh học hoạt tính\" (Bioactive packaging) tích hợp vi sinh vật đối kháng nhằm mục đích bảo quản nông sản sau thu hoạch ra sao?", a: "Làm tăng lượng tồn dư hóa chất bảo quản hữu cơ để nông sản giữ được độ cứng cơ học lâu dài hơn", b: "Giải phóng chất kháng khuẩn tự nhiên từ vi sinh vật bọc ngoài vỏ bao bì, kìm hãm mầm bệnh hư hỏng", c: "Thay thế hoàn toàn quy trình xử lý nhiệt thanh trùng và tiệt trùng trong các nhà máy đóng gói đóng", d: "Kích thích sự đột biến tự nhiên của các tế bào mô quả chín thành dòng sản phẩm hoàn toàn nhân tạo", ans: "b" },
        { id: 73, q: "Công nghệ \"Hệ gen học chức năng\" (Functional genomics) ứng dụng trong bảo vệ cây trồng tương lai giúp xác định thông tin cốt lõi nào?", a: "Bản đồ địa hình không gian chi tiết về hướng dốc luống rãnh và độ xốp vật lý của cấu trúc đất ruộng", b: "Chức năng chính xác của các gen chi phối đặc tính độc lực của mầm bệnh hoặc tính kháng của vi sinh", c: "Phương thức cắt giảm hoàn toàn quy trình khảo nghiệm an toàn sinh học đa giai đoạn của cơ quan quản", d: "Tính toán chính xác lượng nước tưới tiêu biến thiên tự động điều khiển bằng sóng vô tuyến điện loại", ans: "b" },
        { id: 74, q: "Sự can thiệp hệ vi sinh vật theo hướng \"Cá thể hóa\" (Tailored microbial interventions) bám sát các chỉ số đặc thù nào của trang trại?", a: "Tổng chi phí tài chính bồi thường thiệt hại cho công nhân vận hành máy cày cơ giới vật chất đồng đồng", b: "Chỉ số đa dạng vi sinh vật bản địa, đặc tính lý hóa đất và kiểu gen giống cây trồng cụ thể", c: "Bản vẽ thiết kế cơ khí và tổng công suất xung nhịp vận hành của các động cơ máy gặt đập liên hợp", d: "Biên lợi nhuận tài chính vĩ mô của chuỗi cung ứng thương mại điện tử nông sản xuất khẩu toàn cầu toàn", ans: "b" },
        { id: 75, q: "Việc bón bổ sung chế phẩm vi sinh chứa vi khuẩn hòa tan lân chịu nhiệt thích ứng với kịch bản biến đổi khí hậu nào?", a: "Kịch bản ngập úng ngạt rễ kéo dài do triều cường dâng cao vùng hạ lưu các con sông lớn nội đồng", b: "Kịch bản nhiệt độ toàn cầu gia tăng, đất bị khô hạn và nắng nóng cực đoan kéo dài mùa canh tác", c: "Sự tích lũy nồng độ các phức chất hữu cơ chứa nguyên tố kim loại nặng độc hại trong dung dịch keo đất", d: "Tốc độ mài mòn vật lý cơ giới vật chất của các linh kiện bên trong lưỡi cày máy kéo đồng ruộng thâm", ans: "b" },
        { id: 76, q: "Xu hướng ứng dụng \"Công nghệ nông nghiệp số\" (AgTech) phối hợp với quản lý vi sinh vật cho phép thực hiện hoạt động nào thông qua điện thoại thông minh?", a: "Tự chế tạo thành công tất cả các loại phân bón vô cơ đa lượng đa lượng phối trộn nồng độ bão hòa", b: "Giám sát thời gian thực sức khỏe đất sinh học và điều khiển hệ thống bón phân sinh học chính xác", c: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của tán lá thực vật canh tác thâm canh cao độ", d: "Tính toán biên lợi nhuận tài chính tài chính ngắn hạn của các tập đoàn sản xuất vật tư nông nghiệp", ans: "b" },
        { id: 77, q: "Công nghệ sinh học tổng hợp tạo ra các chủng vi khuẩn Pseudomonas tiết lượng lớn DAPG hướng tới mục tiêu kiểm soát sinh học nào?", a: "Hòa tan các quặng photphat vô cơ khó tan thành dạng ion lỏng dễ tiêu nuôi dưỡng bộ rễ thực vật họ Đậu", b: "Thiết lập hàng rào bảo vệ vững chắc tiêu diệt triệt để nấm bệnh gây héo rũ, thối rễ cây trồng diện diện", c: "Tạo ra lớp màng polysaccharide dính kết các hạt cát thô thành đất sét mịn không thông thoáng khí đất canh", d: "Kích thích sự nhân đôi bộ gen di truyền của hệ virus thực vật gây hội chứng đốm vàng sọc tăm lá lá tán", ans: "b" },
        { id: 78, q: "Sự kết hợp giữa phân tích hệ vi sinh vật và kỹ thuật bón phân sinh học biến thiên mang bản chất của mô hình canh tác nào?", a: "Mô hình thâm canh hóa chất truyền thống phụ thuộc hoàn toàn vào vật tư vô cơ nhập khẩu thương mại vĩ", b: "Thực hành nông nghiệp chính xác sinh học (Precision biological agriculture) thế hệ mới", c: "Phương thức canh tác hoang dã tự nhiên biệt lập tuyệt đối không có sự quản lý giám sát của con người", d: "Hệ thống sản xuất nông sản nhân tạo hoàn toàn trong các phòng thí nghiệm vô sinh loại bỏ vai trò đất", ans: "b" },
        { id: 79, q: "Trong quản lý hệ vi sinh chính xác, hoạt động \"Đánh giá tác động đa dạng sinh học\" (Biodiversity impact assessment) kiểm tra khía cạnh nào?", a: "Tổng chi phí tiền lương chi trả cho đội ngũ công nhân vận hành máy cày máy bừa công suất thiết kế cơ cơ", b: "Nguy cơ chủng vi sinh vật ngoại lai hoặc chỉnh sửa gen làm suy giảm độ phong phú của quần xã bản địa", c: "Tốc độ bốc hơi tự nhiên của các hợp chất đạm khí quyển vùng rễ thực vật họ Đậu cố định đạm nốt sần rễ", d: "Sơ đồ hệ thống các béc phun thuốc bảo vệ thực vật tự động điều khiển từ xa bằng sóng vô tuyến điện toàn", ans: "b" },
        { id: 80, q: "Sự tích hợp của \"Kinh tế tuần hoàn\" (Circular economy) với công nghệ vi sinh nông nghiệp tối ưu hóa chu trình luân chuyển chất nào từ chất thải hữu cơ?", a: "Các ion khoáng độc hại bám dính bề mặt hạt keo sét tầng canh tác mặt luống đồng ruộng diện rộng nông", b: "Tái chế các nguyên tố Carbon, Nitơ, Photpho từ phụ phẩm thành dinh dưỡng hữu cơ sinh học cho đất cây", c: "Làm đông cứng kết cấu vật lý cơ giới hạt đất đất biến đất thành khối tinh thể đá thạch anh rắn chặt cứng", d: "Thao túng bộ gen di truyền của tác nhân sinh học biến vi khuẩn PGPR thành nhóm sinh vật phản nitrat hóa", ans: "b" },
        { id: 81, q: "Khái niệm \"Nông nghiệp tái sinh\" hướng tới việc sử dụng các can thiệp vi sinh để đạt được mục tiêu cốt lõi nào cho tài nguyên đất?", a: "Gia tăng thâm canh cơ giới hóa và cày lật sâu liên tục phá hủy các tầng hạt kết tập", b: "Phục hồi và làm giàu lớp đất mặt, tăng cường đa dạng sinh học đất và tối ưu chu trình dinh dưỡng tự nhiên", c: "Đông cứng các mạch dẫn lỏng để ngăn rễ cây hấp thu nước và dinh dưỡng khoáng đa lượng", d: "Loại bỏ tuyệt đối sự có mặt của tất cả các loài sinh vật hoại sinh bản địa nền đất", ans: "b" },
        { id: 82, q: "Sự biểu hiện của phức hệ enzyme nitrogenase (qua hệ thống gen nif) ở vi khuẩn cố định đạm vùng rễ tương lai chịu trách nhiệm vận hành con đường sinh học nào?", a: "Tiết acid hữu cơ để giải phóng ion kali hòa tan từ cấu trúc quặng khoáng mica khó tan", b: "Khử nitơ tự do từ khí quyển thành amoniac cung cấp dinh dưỡng đạm vô cơ cho thực vật", c: "Thao túng hệ thống miễn dịch PTI của tế bào rễ thực vật họ Đậu để tạo nốt sần gây hại", d: "Phân hủy các mảnh cellulose hữu cơ rơm rạ phế phụ phẩm sau mùa thu hoạch hoa quả quả", ans: "b" },
        { id: 83, q: "Trong quản lý hệ vi sinh chính xác, kỹ thuật \"Phân tích rủi ro sinh thái\" tập trung kiểm định nguy cơ nghiêm trọng nào khi đưa chủng vi sinh vào đồng ruộng?", a: "Tổng chi phí tài chính bồi thường thiệt hại cho công nhân trang trại quy mô thâm canh", b: "Khả năng chủng ngoại lai cạnh tranh bất lợi, làm mất đi loài bản địa quý hiếm và phá vỡ cân bằng sinh thái", c: "Tốc độ bay hơi tự nhiên của các phân tử dinh dưỡng đạm lỏng ra ngoài không khí sát bề mặt", d: "Bản vẽ thiết kế cơ khí cấu trúc mạch điện tự động của các loại máy gặt đập liên hợp liên hợp", ans: "b" },
        { id: 84, q: "Công nghệ giải trình tự chuỗi gen nào thế hệ mới giúp nhà khoa học thiết lập bản đồ đầy đủ về thành phần loài và tiềm năng chức năng di truyền của quần xã vi sinh vật đất mà không cần nuôi cấy?", a: "Kỹ thuật phân tích hóa học thể tích phòng thí nghiệm thô sơ truyền thống", b: "Công nghệ giải trình tự Metagenomics môi trường đất nông nghiệp", c: "Thuật toán phân tích biên lợi nhuận kinh tế kinh doanh vật tư hóa chất trang trại", d: "Hệ thống định vị vệ tinh GPS phối hợp với bản vẽ kỹ thuật cơ khí luống đất rãnh rãnh", ans: "b" },
        { id: 85, q: "Việc chỉnh sửa gen chủng vi khuẩn Ralstonia solanacearum (mầm bệnh héo xanh) làm mất gen độc lực tiết effector hướng tới mục tiêu ứng dụng thực tiễn nào?", a: "Tạo dòng virus thực vật siêu độc lực diệt trừ triệt để toàn bộ hệ thực vật hoại sinh cỏ", b: "Nghiên cứu cơ chế bệnh học, phát triển dòng vắc-xin thực vật hoặc chủng giảm độc lực cạnh tranh sinh thái bảo vệ cây", c: "Hòa tan các quặng lân photphat vô cơ khó tan thành dạng ion khoáng lỏng dễ tiêu vùng vùng", d: "Làm thay đổi hoàn toàn kết cấu đặc tính lý hóa cơ giới của hạt cát thô đồng ruộng nông nông", ans: "b" },
        { id: 86, q: "Chế phẩm sinh học dựa trên vi khuẩn Pasteuria penetrans được định hướng ứng dụng công nghệ tương lai để kiểm soát đối tượng dịch hại nguy hiểm nào dưới lòng đất?", a: "Các loài nấm hoại sinh phân hủy chất hữu cơ hữu cơ cellulose rơm rạ thô cứng hoai mục", b: "Các loài tuyến trùng ký sinh rễ cây (Root-knot nematodes) gây sần rễ nghẽn mạch mạch", c: "Các vi khuẩn phản nitrat hóa yếm khí làm nghèo hàm lượng dinh dưỡng đạm vô cơ amoni", d: "Sự phát triển bùng phát số lượng loài của các hạt virus thực vật truyền nhiễm vùng lá tán tán", ans: "b" },
        { id: 87, q: "Sự bón bổ sung chế phẩm vi sinh chứa vi khuẩn chịu mặn Halotolerant giúp điều hòa áp suất thẩm thấu tế bào rễ thực vật khi gặp stress mặn nhờ tiết hợp chất nào?", a: "Các ion khoáng đa lượng Kali và Photpho dạng lỏng kết tủa nồng độ bão hòa cao phá hủy hủy", b: "Các hợp chất tương thích bảo vệ tế bào (osmoprotectants) như proline, glycine betaine", c: "Các protein hiệu ứng effector kích ứng hiện tượng chết tế bào theo chương trình diện diện", d: "Các độc tố tinh thể protein độc delta gây rò rỉ màng tế bào biểu bì lông hút rễ rễ", ans: "b" },
        { id: 88, q: "Sự tích lũy nồng độ hợp chất chất lượng \"Glomalin\" do nấm mycorrhiza tiết ra cải thiện đặc tính bền vững nào của hệ sinh thái đất nông nghiệp?", a: "Làm giảm dung tích giữ nước và tăng độ rửa trôi chất khoáng vô cơ xuống tầng mạch nước ngầm sâu", b: "Tăng tính ổn định của tập hợp đất, giúp đất chống lại xói mòn do nước, gió và cô lập carbon", c: "Đẩy toàn bộ lượng không khí oxy ra khỏi các khe hở hạt đất khiến kết cấu hạt đất dẽ chặt cứng", d: "Tăng độ kiềm (tăng mạnh pH) của dung dịch keo đất mặt luống cây gây độc tính cấp tính lông rễ", ans: "b" },
        { id: 89, q: "Điền vào chỗ trống: \"Khung pháp lý minh bạch và các quy trình ______ nghiêm ngặt dựa trên khoa học là điều cần thiết để đảm bảo việc triển khai các giải pháp vi sinh một cách có trách nhiệm trong nông nghiệp tương lai.\"", a: "Tiếp thị thương mại quảng cáo sản phẩm rộng rãi ra thị trường tiêu dùng vĩ mô", b: "Đánh giá an toàn sinh học và cấp phép sản phẩm vi sinh", c: "Tính toán biên lợi nhuận kinh tế tài chính trang trại thâm canh công nghiệp lớn nông", d: "Thiết kế cấu trúc cơ khí vật lý của nhà máy đóng gói bao bì vật tư nhãn mác thương thương", ans: "b" },
        { id: 90, q: "Tiến bộ của công nghệ \"Giải trình tự tế bào đơn\" (Single-cell sequencing) trong vi sinh vật học nông nghiệp tương lai cho phép làm được điều gì đột phá?", a: "Đo đạc kích thước của các hạt cát thô một cách chính xác tuyệt đối bằng kính hiển vi quang học học", b: "Phân tích hồ sơ di truyền và chức năng của từng tế bào vi sinh vật riêng lẻ trong mẫu đất phức tạp", c: "Thay thế hoàn toàn nhu cầu sử dụng máy tính điện tử giải trình tự thế hệ mới (NGS) trong các viện viện", d: "Tính toán chính xác lượng nước tưới tiêu cần thiết cho một diện tích đồng ruộng loại bỏ sức sức", ans: "b" },
        { id: 91, q: "Chế phẩm vi sinh ứng dụng để \"Ủ hoai mục phế phụ phẩm tại ruộng\" chứa tập đoàn vi sinh vật tiết hệ enzyme nào giúp nông dân tránh việc đốt rơm rạ gây ô nhiễm?", a: "Các loài virus thực vật truyền nhiễm gây hội chứng đốm vàng sọc tăm lá qua trung gian rầy rầy rầy", b: "Hệ vi sinh vật tiết phức hệ enzyme phân giải cellulase, hemicellulase và xylanase mạnh mẽ", c: "Các vi khuẩn phản nitrat hóa yếm khí hoạt động mạnh ở môi trường ngập nước úng bão hòa dung dung", d: "Động vật nguyên sinh trùng amip và trùng lông ký sinh nội bào hệ thống mạch dẫn dẫn trung trụ trung", ans: "b" },
        { id: 92, q: "Cơ chế \"Ký sinh nấm\" (Mycoparasitism) của nấm đối kháng Trichoderma harzianum chống lại nấm bệnh Rhizoctonia solani được tối ưu hóa trong tương lai nhờ hoạt động biểu hiện gen tiết enzyme nào?", a: "Enzyme amylase và phân giải lipid tinh bột thô thô thành đường đơn glucose tự nuôi khuẩn lạc", b: "Tăng cường biểu hiện các gen mã hóa enzyme chitinase và glucanase phân hủy vách tế bào nấm mầm bệnh", c: "Phức hệ gen nif điều khiển nitrogenase thực hiện phản ứng khử đạm đạm khí quyển thành amoniac amoniac amoniac", d: "Gen ligase thực hiện nối các mạch phân tử DNA bộ gen di truyền virus thực vật gây hội chứng vàng vàng", ans: "b" },
        { id: 93, q: "Công nghệ phân tích hệ vi sinh vật vùng rễ tương lai phát hiện sự suy giảm mật độ gen tổng hợp kháng sinh DAPG, điều này đưa ra cảnh báo nguy cơ nào cho sức khỏe cây?", a: "Đất đất bước vào giai đoạn phục hồi độ phì nhiêu sinh học hoàn hảo tự nhiên vĩnh viễn tuyệt đối tự tự", b: "Nguy cơ đất mất khả năng ức chế tự nhiên đối với mầm bệnh nấm hại gây bệnh thối rễ, héo rũ cây", c: "Hệ thống mạch dẫn mạch gỗ thân thực vật đang tăng trưởng sinh khối một cách bùng phát số lượng diện", d: "Quần thể virus thực vật mới nổi truyền qua vector côn trùng đang tự động bất hoạt hoàn toàn do yếu tố tố", ans: "b" },
        { id: 94, q: "Khía cạnh \"Quản lý hệ vi sinh vật chính xác\" (Precision Microbiome Management) dự đoán can thiệp vi sinh hiệu quả dựa trên việc xây dựng công cụ số nào?", a: "Các bản đồ kỹ thuật cơ khí thô thô đồng ruộng phối hợp sổ sách hạch toán hạch toán kế toán quản trị tài", b: "Các thuật toán máy tính, mô hình dự đoán và dữ liệu lớn (Big Data) phân tích hệ vi sinh đất", c: "Mô hình cách ly cơ học tuyệt đối đất đất canh tác mặt luống khỏi các tương tác sinh học tự nhiên tự tự", d: "Các béc phun phân tử tín hiệu hóa học hữu cơ clo điều khiển tự động hóa từ xa bằng ảnh ảnh vệ vệ", ans: "b" },
        { id: 95, q: "Khi chất lượng chế phẩm sinh học tương lai được nâng cao nhờ \"Công nghệ màng bọc vi nang\" (Microencapsulation), công nghệ này mang lại ưu thế bảo vệ gì cho tế bào vi khuẩn có lợi?", a: "Tăng hàm lượng độc chất hóa học tồn dư hữu cơ lên mức bão hòa phá hủy hoàn toàn thảm thảm thảm quần xã bản bản", b: "Bao bọc tế bào vi khuẩn trong lớp màng polyme sinh học, bảo vệ vi sinh vật khỏi sốc nhiệt, tia UV và kéo dài thời hạn sử dụng", c: "Đông cứng các phân tử nước dung dịch đất khiến mầm bệnh hoàn toàn không thể di chuyển bám rễ gây thối nhũn", d: "Biến đổi toàn bộ cấu trúc bộ gen di truyền của vi khuẩn có lợi thành dạng virus thực vật hoại sinh hoại hoại", ans: "b" },

        { id: 98, q: "Biện pháp ứng dụng chế phẩm thuốc trừ sâu sinh học Bt phối hợp với kỹ thuật phun thuốc bảo vệ thực vật hóa học ở liều lượng thấp hợp lý trong khung IPM mang ý nghĩa gì?", a: "Làm cạn kiệt nguồn carbon hữu cơ khiến quần xã vi sinh vật bản địa bị bất hoạt hoàn toàn vĩnh viễn đất đất ruộng canh tác thâm canh", b: "Tối ưu hóa khả năng kiểm soát sâu bệnh hại cây trồng, ngăn ngừa sự hình thành tính kháng thuốc của sâu và giảm thiểu ô nhiễm môi trường", c: "Tăng tốc độ khử nitrat giải phóng khí nitơ oxit độc hại vào tầng khí quyển mặt gây ô nhiễm hiệu ứng nhà kính toàn cầu bùng phát bùng bùng", d: "Biến đổi toàn bộ các dưỡng chất khoáng đa lượng đạm, lân, kali thành dạng muối kết tủa rắn trơ khó tan vùng rễ rhizosphere thực vật họ", ans: "b" },
        { id: 99, q: "Trong một kịch bản hướng tới một mô hình nông nghiệp thông minh, việc ứng dụng các can thiệp vi sinh chính xác cá thể hóa bám sát nguyên tắc quản lý nào?", a: "Bán phân bón sinh học và chế phẩm sinh học một cách đồng nhất cho mọi vùng miền địa lý bất kể sự khác biệt thổ nhưỡng địa hình", b: "Thiết kế can thiệp vi sinh dựa trên phân tích đặc thù về hệ vi sinh bản địa, tính chất đất và kiểu gen giống cây trồng của từng đồng ruộng", c: "Thay thế vai trò của các phân tử nước tưới tự nhiên và ánh sáng mặt trời ban ngày cần thiết cho quá trình quang hợp thực hiện hô hấp lá", d: "Thay thế hoàn toàn hệ thống sổ sách kế toán quản trị tài chính biên lợi nhuận kinh doanh nông sản thương mại của mô hình trang trại trang trang", ans: "b" },

                            <div class="absolute inset-0 bg-yellow-400 blur-xl opacity-30 rounded-full"></div>
                            <svg class="w-20 h-20 text-yellow-500 relative z-10" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                          </div>
                          <h2 class="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight mb-2">Hoàn Thành Bài Ôn Tập!</h2>
                          <div class="grid grid-cols-2 gap-4 mb-8 mt-6">
                            <div class="p-4 bg-emerald-50 dark:bg-emerald-950/20 rounded-2xl border border-emerald-100"><p class="text-emerald-600 dark:text-emerald-400 text-xs font-extrabold uppercase tracking-wider mb-1">Đúng</p><p class="text-4xl font-black text-emerald-600 dark:text-emerald-400">${state.score}</p></div>
                            <div class="p-4 bg-rose-50 dark:bg-rose-950/20 rounded-2xl border border-rose-100"><p class="text-rose-500 dark:text-rose-400 text-xs font-extrabold uppercase tracking-wider mb-1">Sai / Thiếu</p><p class="text-4xl font-black text-rose-500 dark:text-rose-400">${state.wrongScore}</p></div>
                          </div>
                          <button onclick="resetQuiz()" class="w-full py-4 bg-gradient-to-r from-brand-500 to-emerald-600 text-white rounded-xl font-extrabold text-xs uppercase tracking-wider shadow-lg flex items-center justify-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Về màn hình chính</button>
                        </div>
                    </div>`;
                return;
            }

            const currentQ = state.questions[state.currentQuestionIndex];
            const progress = ((state.currentQuestionIndex + 1) / state.questions.length) * 100;

            root.innerHTML = `
                <div class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 flex items-center justify-center p-4 ${state.isConfirming ? 'block' : 'hidden'}">
                  <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 sm:p-8 max-w-sm w-full shadow-2xl border border-slate-100">
                    <h3 class="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tight mb-2">Nộp bài & kết thúc?</h3>
                    <p class="text-xs text-slate-400 dark:text-slate-500 font-medium mb-6">Kết quả bài làm hiện tại của bạn sẽ được lưu giữ lại hệ thống.</p>
                    <div class="flex gap-3">
                      <button onclick="setConfirming(false)" class="flex-1 py-3 px-4 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors">Tiếp bài làm</button>
                      <button onclick="confirmFinish()" class="flex-1 py-3 px-4 bg-rose-500 text-white rounded-xl font-bold text-xs uppercase tracking-wider shadow-lg transition-colors">Nộp bài ngay</button>
                    </div>
                  </div>
                </div>

                <div class="min-h-screen flex flex-col items-center p-4 sm:p-6 w-full max-w-3xl mx-auto relative justify-start">
                    <div class="w-full flex justify-between items-center mb-6 pt-2">
                        <button onclick="requestFinish()" class="p-2.5 rounded-xl text-slate-400 hover:text-rose-500 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
                        <div class="glass-panel px-4 py-2 rounded-full border text-xs font-bold text-slate-600 dark:text-slate-300 tracking-wide uppercase">Câu ${state.currentQuestionIndex + 1} / ${state.questions.length}</div>
                        <div class="flex items-center gap-1 text-emerald-600 dark:text-emerald-400 font-extrabold text-xs bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 px-3 py-1.5 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${state.score}</div>
                    </div>
                    
                    <div class="w-full mb-8">
                        <div class="h-2.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all rounded-full" style="width: ${progress}%"></div></div>
                    </div>
                    
                    <div class="w-full bg-white dark:bg-slate-900 p-6 sm:p-10 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/60 mb-24 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-500 to-emerald-600"></div>
                        
                        <div>
                            <div class="mb-6">
                                <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                                    <span class="inline-block bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 text-[10px] font-extrabold px-2.5 py-1 rounded-md tracking-wider border border-slate-100">ID: #${currentQ.id}</span>
                                    <span class="text-[10px] font-black tracking-wider uppercase px-2.5 py-1 rounded-full ${currentQ.isMultiple ? 'bg-amber-50 text-amber-600 border border-amber-200' : 'bg-teal-50 text-teal-600 border border-teal-200'}">
                                        ${currentQ.isMultiple ? "☑ Tích chọn nhiều đáp án" : "🔘 Chọn một đáp án"}
                                    </span>
                                </div>
                                <h2 class="text-xl sm:text-2xl font-black text-slate-800 dark:text-slate-100 leading-snug tracking-tight">${currentQ.q}</h2>
                            </div>
                            
                            <div class="space-y-3.5">
                                ${state.shuffledOptions.map((option) => {
                                    const isSelected = state.selectedOptions.includes(option.key);
                                    const isOptCorrect = currentQ.correct.split('').includes(option.key);
                                    
                                    let containerClass = "w-full p-5 rounded-2xl border text-left font-semibold transition-all duration-200 transform active:scale-[0.98] flex justify-between items-center relative overflow-hidden text-sm ";
                                    
                                    if (state.isSubmitted) {
                                      containerClass += " active:scale-100 cursor-not-allowed "; 
                                      if (isOptCorrect) containerClass += "border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 ring-2 ring-emerald-200 dark:ring-emerald-900/40 shadow-inner";
                                      else if (isSelected) containerClass += "border-rose-500 bg-rose-50 dark:bg-rose-950/30 text-rose-800 ring-2 ring-rose-200 shadow-inner";
                                      else containerClass += "border-slate-100 text-slate-400 opacity-50";
                                    } else {
                                      if (isSelected) containerClass += "border-emerald-500 bg-emerald-50/60 dark:bg-slate-800/80 text-emerald-900 dark:text-teal-300 ring-2 ring-emerald-200 dark:ring-emerald-900/40 shadow-md -translate-y-0.5";
                                      else containerClass += "border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-300 hover:bg-brand-50/40 hover:border-brand-200 hover:shadow-sm hover:-translate-y-0.5";
                                    }

                                    return `
                                        <button onclick="handleOptionSelect('${option.key}', ${currentQ.isMultiple})" ${state.isSubmitted ? 'disabled' : ''} class="${containerClass}">
                                            <div class="flex items-center gap-4 relative z-10">
                                                <div class="w-5 h-5 flex items-center justify-center border-2 flex-shrink-0 rounded-md transition-colors ${isSelected ? 'border-brand-500 bg-brand-500 text-white' : 'border-slate-300 bg-white dark:bg-slate-900'}">
                                                    ${isSelected ? '<svg class="w-3 h-3 fill-current" viewBox="0 0 20 20"><path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/></svg>' : ''}
                                                </div>
                                                <span>${option.text}</span>
                                            </div>
                                            ${state.isSubmitted && isOptCorrect ? '<svg class="text-emerald-600 dark:text-emerald-400 flex-shrink-0 ml-4" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' : ''}
                                            ${state.isSubmitted && isSelected && !isOptCorrect ? '<svg class="text-red-600 dark:text-red-400 flex-shrink-0 ml-4" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' : ''}
                                        </button>`;
                                }).join('')}
                            </div>
                            
                            ${!state.isSubmitted && state.selectedOptions.length > 0 ? `
                                <div class="mt-6 flex justify-end">
                                    <button onclick="checkAnswerSubmission()" class="px-6 py-3 bg-gradient-to-r from-brand-500 to-emerald-600 text-white font-extrabold rounded-xl text-xs uppercase tracking-wider shadow-md transform active:scale-95 transition-transform">
                                        Xác nhận đáp án
                                    </button>
                                </div>` : ''}
                        </div>
                    </div>

                    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-900/60 flex justify-center items-center gap-4 z-20">
                        <button onclick="prevQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''} class="w-14 h-14 rounded-2xl flex items-center justify-center border text-slate-600 dark:text-slate-400 disabled:opacity-25 transform active:scale-95 transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
                        <button onclick="nextQuestion()" ${!state.isSubmitted ? 'disabled' : ''} class="flex-1 max-w-md h-14 rounded-2xl font-black text-xs uppercase tracking-wider shadow-lg flex items-center justify-center gap-2 disabled:bg-slate-200 dark:disabled:bg-slate-800/50 disabled:text-slate-400 dark:disabled:text-slate-600 disabled:shadow-none bg-brand-600 text-white disabled:cursor-not-allowed transform active:scale-[0.99] transition-all">
                            ${state.currentQuestionIndex === state.questions.length - 1 ? "Xem kết quả" : "Câu tiếp theo"} <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                </div>`;
        }

        auth.onAuthStateChanged((currentUser) => {
            if (currentUser) {
                const ADMIN_EMAIL = "ngocyen@cucdang.com";
                const userEmail = currentUser.email.toLowerCase();
                
                if (userEmail !== ADMIN_EMAIL && !userEmail.includes(".vsvnn")) {
                    state.authError = "Tài khoản này không có quyền truy cập môn VSVNN!";
                    auth.signOut();
                    state.user = null;
                } else {
                    const token = getOrCreateDeviceToken();
                    const sessionRef = db.ref(`active_sessions/mon_vsvnn/${currentUser.uid}`);
                    const isAdmin = userEmail === ADMIN_EMAIL;

                    if (!state.user) {
                        if (!isAdmin) {
                            sessionRef.set({ 
                                deviceToken: token, 
                                lastLogin: firebase.database.ServerValue.TIMESTAMP, 
                                email: currentUser.email 
                            });
                        }
                    }

                    sessionRef.on("value", (snap) => {
                        const val = snap.val();
                        if (val && val.deviceToken !== token && !isAdmin) {
                            state.isKicked = true;
                            auth.signOut();
                            state.user = null;
                            render();
                        }
                    });
                    state.user = currentUser;
                }
            } else {
                state.user = null;
            }
            state.loading = false;
            render();
        });

        function handleLogin(e) {
            e.preventDefault();
            state.authError = "";
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            state.emailInput = email; state.passwordInput = password;

            auth.signInWithEmailAndPassword(email, password).catch(err => {
                state.authError = "Tài khoản hoặc mật khẩu bảo mật không chính xác.";
                render();
            });
        }

        function handleGoHome() {
            if (window.confirm("Bạn có chắc muốn rời môn học và quay về trang chủ không?")) {
                if (state.user) db.ref(`active_sessions/mon_vsvnn/${state.user.uid}`).remove();
                auth.signOut().then(() => { window.location.href = "./index.html"; });
            }
        }

        function startQuiz(chapterNum, partStr) {
            const raw = (TEST_DATA[chapterNum] && TEST_DATA[chapterNum][partStr]) ? TEST_DATA[chapterNum][partStr] : [];
            state.questions = raw.map(item => ({
                id: item.id, q: item.q, correct: item.ans, isMultiple: item.ans.length > 1,
                options: [{ key: 'a', text: item.a }, { key: 'b', text: item.b }, { key: 'c', text: item.c }, { key: 'd', text: item.d }].filter(o => o.text !== undefined)
            }));
            state.currentPart = partStr; state.currentQuestionIndex = 0; state.score = 0; state.wrongScore = 0;
            state.sessionAnswers = []; state.showResult = false; state.selectedOptions = []; state.isSubmitted = false;
            if (state.questions.length > 0) state.shuffledOptions = shuffleArray(state.questions[0].options);
            render();
        }

        function handleOptionSelect(key, isMultiple) {
            if (state.isSubmitted) return;
            if (isMultiple) {
                if (state.selectedOptions.includes(key)) {
                    state.selectedOptions = state.selectedOptions.filter(k => k !== key);
                } else {
                    state.selectedOptions.push(key);
                }
            } else {
                state.selectedOptions = [key];
            }
            render();
        }

        function checkAnswerSubmission() {
            if (state.selectedOptions.length === 0 || state.isSubmitted) return;
            const currentQ = state.questions[state.currentQuestionIndex];
            const userAnsStr = [...state.selectedOptions].sort().join('');
            const correctAnsStr = currentQ.correct.split('').sort().join('');
            const correct = userAnsStr === correctAnsStr;
            
            state.isSubmitted = true;
            if (correct) state.score++; else state.wrongScore++;
            state.sessionAnswers.push({ ...currentQ, userSelected: userAnsStr, options: state.shuffledOptions });
            render();
        }

        function nextQuestion() {
            if (state.currentQuestionIndex < state.questions.length - 1) {
                state.currentQuestionIndex++;
                const newQ = state.questions[state.currentQuestionIndex];
                const existing = state.sessionAnswers.find(a => a.id === newQ.id);
                if (existing) {
                    state.shuffledOptions = existing.options;
                    state.selectedOptions = existing.userSelected.split('');
                    state.isSubmitted = true;
                } else {
                    state.shuffledOptions = shuffleArray(newQ.options); state.selectedOptions = []; state.isSubmitted = false;
                }
                render();
            } else {
                state.showResult = true;
                saveHistoryToLocal();
                render();
            }
        }

        function prevQuestion() {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                const newQ = state.questions[state.currentQuestionIndex];
                const existing = state.sessionAnswers.find(a => a.id === newQ.id);
                state.shuffledOptions = existing.options;
                state.selectedOptions = existing.userSelected.split('');
                state.isSubmitted = true;
                render();
            }
        }

        function saveHistoryToLocal() {
            const record = {
                id: Date.now(), date: new Date().toLocaleString('vi-VN'), chapter: state.currentChapter, part: state.currentPart,
                score: state.score, wrong: state.wrongScore, total: state.questions.length,
                details: state.sessionAnswers.map(q => ({ id: q.id, q: q.q, o: q.options || [], s: q.userSelected, c: q.correct }))
            };
            state.history.unshift(record);
            try { localStorage.setItem('vsvnn_local_history', JSON.stringify(state.history)); } catch (e) {}
        }

        function clearHistory() {
            if (window.confirm('Bạn có chắc muốn xóa toàn bộ lịch sử kết quả không?')) {
                state.history = []; localStorage.removeItem('vsvnn_local_history'); render();
            }
        }

        function viewHistoryDetail(index) {
            state.reviewData = state.history[index].details || []; state.reviewMode = true; render();
        }

        function setReviewMode(val) { state.reviewMode = val; render(); }
        function requestFinish() { state.isConfirming = true; render(); }
        function setConfirming(val) { state.isConfirming = val; render(); }
        function confirmFinish() { state.showResult = true; state.isConfirming = false; saveHistoryToLocal(); render(); }
        function resetQuiz() { state.currentChapter = null; state.currentPart = null; state.questions = []; state.reviewMode = false; render(); }

        window.addEventListener('DOMContentLoaded', () => { render(); });
    </script>
</body>
</html>
