        { id: 13, q: "Nhóm nấm nào hình thành mối quan hệ cộng sinh với rễ cây nhằm hỗ trợ hấp thu dinh dưỡng?", a: "Nấm hoại sinh phân hủy gỗ", b: "Nấm rễ cộng sinh", c: "Nấm nội sinh gây bệnh đốm lá", d: "Nấm ký sinh côn trùng đất", ans: "b" },
        { id: 14, q: "Mối quan hệ tương hỗ của nấm rễ cộng sinh giúp ích gì cho cấu trúc và thể trạng của đất nông nghiệp?", a: "Làm tăng độ nén chặt của đất để hạn chế rễ cây phát triển quá mức", b: "Tăng khả năng chống chịu của cây và thúc đẩy sự kết tập cũng như cấu trúc đất", c: "Tiêu diệt toàn bộ các quần thể vi khuẩn bản địa xung quanh vùng rễ", d: "Làm giảm độ xốp và ngăn cản sự lưu thông của không khí trong đất", ans: "b" },
        { id: 15, q: "Một số loài nấm đóng vai trò là tác nhân kiểm soát sinh học nhờ hoạt động nào đối với mầm bệnh thực vật?", a: "Cung cấp thêm carbohydrate cho mầm bệnh phát triển nhanh hơn", b: "Hoạt tính đối kháng nhằm ức chế bệnh hại trong đất và tăng cường sức khỏe cây trồng", c: "Kích thích mầm bệnh xâm nhiễm vào hệ thống mạch dẫn của thân cây", d: "Tạo lớp màng bọc cơ học ngăn cách hoàn toàn rễ cây khỏi nguồn nước", ans: "b" },
        { id: 16, q: "Nhận định nào sau đây là đúng khi nói về virus trong hệ sinh thái nông nghiệp theo các nghiên cứu gần đây?", a: "Virus hoàn toàn không có tính đa dạng di truyền và chỉ tồn tại ở dạng tinh thể vô sinh", b: "Virus có tác động đáng kể đến sức khỏe cây trồng, động lực bệnh hại và năng suất mùa vụ; bên cạnh virus gây hại còn phát hiện virus có lợi", c: "Virus có kích thước tế bào lớn hơn nhiều so với các loài nấm và vi khuẩn đất", d: "Virus trong đất nông nghiệp hoàn toàn không có khả năng lây nhiễm cho thực vật", ans: "b" },
        { id: 17, q: "Các nghiên cứu gần đây đã phát hiện sự tồn tại của các virus có lợi có khả năng giúp cây trồng làm được điều gì?", a: "Ngừng hoàn toàn quá trình hô hấp tế bào để tiết kiệm năng lượng", b: "Tăng khả năng chịu đựng stress phi sinh học và tăng cường cơ chế phòng vệ", c: "Thay thế vai trò quang hợp của chất diệp lục khi thiếu ánh sáng", d: "Hòa tan trực tiếp các hạt khoáng photphat kích thước lớn trong đất", ans: "b" },
        { id: 18, q: "Sự tương tác giữa nhóm sinh vật nào với cây chủ cho thấy một động lực phức tạp và năng động mới trong nông nghiệp?", a: "Giữa côn trùng thụ phấn và virus", b: "Giữa virus và cây chủ", c: "Giữa động vật ăn cỏ và nấm hoại sinh", d: "Giữa các hạt đá mẹ vô cơ và thực khuẩn thể", ans: "b" },
        { id: 19, q: "Đa dạng vi sinh vật trong hệ thống nông nghiệp, bao gồm vi khuẩn, nấm và virus, là nền tảng của yếu tố nào?", a: "Sự cơ giới hóa nông nghiệp và thương mại hóa nông sản", b: "Chức năng hệ sinh thái và tính bền vững nông nghiệp", c: "Quá trình chọn tạo các giống cây trồng biến đổi gen bằng tia phóng xạ", d: "Sự phân bổ các mạng lưới kênh mương thủy lợi nội đồng", ans: "b" },
        { id: 20, q: "Việc hiểu rõ vai trò và sự tương tác của các cộng đồng vi sinh vật đa dạng là cần thiết để xây dựng chiến lược nào?", a: "Tăng tối đa lượng phân bón hóa học và thuốc trừ sâu tổng hợp bón vào đất", b: "Nâng cao sức khỏe đất, thúc đẩy sinh trưởng cây và giảm thiểu tác động của stress môi trường cũng như bệnh hại", c: "Luôn loại bỏ sự có mặt của tất cả các loài sinh vật hoại sinh bản địa", d: "Thay thế đất canh tác tự nhiên bằng các hệ thống giá thể nhựa hoàn toàn", ans: "b" },
        { id: 21, q: "Vai trò của vi sinh vật trong chu trình dinh dưỡng của đất nông nghiệp thể hiện qua hoạt động nào?", a: "Tổng hợp các nguyên tố khoáng đa lượng từ năng lượng mặt trời", b: "Phân hủy chất hữu cơ, phá vỡ các hợp chất phức tạp thành các dạng đơn giản mà cây trồng có thể hấp thu", c: "Ngăn cản quá trình khoáng hóa để tích lũy chất hữu cơ nguyên vẹn", d: "Làm bay hơi các hợp chất nitơ lỏng ra ngoài không khí để làm sạch đất", ans: "b" },
        { id: 22, q: "Vi khuẩn đặc biệt quan trọng trong việc phân hủy tàn dư hữu cơ và khoáng hóa các chất dinh dưỡng nào cho cây trồng?", a: "Sắt, Kẽm và Mangan", b: "Nitơ, photpho và lưu huỳnh", c: "Canxi, Magie và Silicon", d: "Cacbon vô cơ và Oxy phân tử", ans: "b" },
        { id: 23, q: "Quá trình cố định đạm sinh học được thực hiện nhờ khả năng của nhóm vi khuẩn nào?", a: "Pseudomonas và Bacillus", b: "Rhizobium và Azotobacter", c: "Trichoderma và Beauveria", d: "Salmonella và Escherichia coli", ans: "b" },
        { id: 24, q: "Vi khuẩn cố định đạm sinh học chuyển đổi nitơ khí quyển thành hợp chất nào mà cây có thể sử dụng?", a: "Axit nitric nồng độ cao", b: "Amoniac hoặc các dạng khác cây có thể sử dụng", c: "Các hợp chất muối nitrat kết tủa khó tan", d: "Khí nitơ oxit bay hơi tự do", ans: "b" },
        { id: 25, q: "Quá trình cố định đạm sinh học đóng vai trò quan trọng trong việc cung cấp phần lớn lượng chất dinh dưỡng nào cho cây trồng?", a: "Photpho", b: "Nitơ", c: "Kali", d: "Lưu huỳnh", ans: "b" },
        { id: 26, q: "In hệ thống nông nghiệp nào thì quá trình cố định đạm sinh học của vi khuẩn thể hiện tầm quan trọng cao nhất?", a: "Hệ thống thâm canh cao độ sử dụng tối đa phân bón hóa học", b: "Những hệ thống hạn chế sử dụng phân đạm hóa học", c: "Hệ thống canh tác thủy canh khép kín trong nhà màng nhân tạo", d: "Những vùng đất cát hoang mạc hoàn toàn không tiến hành gieo trồng", ans: "b" },
        { id: 27, q: "Vi khuẩn vùng rễ thúc đẩy sinh trưởng cây trồng bằng những cơ chế sinh học nào sau đây?", a: "Làm héo các lông hút của rễ để cây tập trung hút nước tầng sâu", b: "Hòa tan khoáng, sản sinh hormone sinh trưởng và kích thích phát triển rễ", c: "Ngăn chặn tuyệt đối sự trao đổi chất dinh dưỡng giữa đất và rễ", d: "Bao bọc hệ rễ bằng một lớp màng polysaccharide chống thấm nước", ans: "b" },
        { id: 28, q: "Một số vi khuẩn trong đất nông nghiệp có đặc tính kiểm soát sinh học giúp thực hiện hoạt động gì?", a: "Kích thích sự nảy mầm đồng loạt của các hạt cỏ dại nguy hiểm", b: "Ức chế mầm bệnh và bệnh cây", c: "Tăng cường tốc độ xâm nhiễm của các loài nấm độc vào thân cây", d: "Phân giải các mô mạch dẫn của thực vật để lấy chất hữu cơ", ans: "b" },
        { id: 29, q: "Cơ chế nào giúp vi khuẩn kiểm soát sinh học làm giảm mức độ và mức nghiêm trọng của bệnh cây?", a: "Tiêu diệt hệ miễn dịch tự nhiên của cây trồng để tự đối phó với bệnh", b: "Cạnh tranh với sinh vật gây bệnh về dinh dưỡng và không gian sống, sản sinh các hợp chất kháng khuẩn hoặc kích thích khả năng kháng toàn thân của cây", c: "Làm tăng độ ẩm vùng rễ lên mức bão hòa để mầm bệnh bị ngạt khí", d: "Thay đổi hoàn toàn mã di truyền của mầm bệnh thành dạng vô hại", ans: "b" },
        { id: 30, q: "Chất nào do vi khuẩn sản sinh ra đóng vai trò quan trọng trong việc hình thành và ổn định kết cấu tập hợp đất?", a: "Các acid hữu cơ mạnh hòa tan đá mẹ", b: "Polysaccharide và các chất khác", c: "Enzyme xenlulozo nồng độ cao", d: "Các protein hiệu ứng kích ứng rễ cây", ans: "b" },
        { id: 31, q: "Việc vi khuẩn tạo thành các tập hợp đất ổn định mang lại lợi ích gì cho cấu trúc lý hóa của đất?", a: "Làm giảm độ xốp và tăng tính lún sụt của bề mặt đất canh tác", b: "Cải thiện cấu trúc đất, khả năng thấm nước và thông khí", c: "Ngăn cản hoàn toàn sự xâm nhập của rễ cây xuống tầng đất sâu hơn", d: "Đẩy toàn bộ lượng oxy ra khỏi các khe hở hạt đất tầng mặt", ans: "b" },
        { id: 32, q: "Khả năng phân hủy các chất ô nhiễm hữu cơ, thuốc trừ sâu và thuốc diệt cỏ của một số vi khuẩn đất được gọi là gì?", a: "Quá trình phản nitrat hóa sinh học", b: "Khả năng xử lý sinh học", c: "Hiện tượng kháng cảm ứng toàn thân", d: "Quá trình amôn hóa chất hữu cơ", ans: "b" },
        { id: 33, q: "Vi khuẩn giúp hệ thống nông nghiệp tăng khả năng chống chịu trước các tác nhân stress phi sinh học nào?", a: "Sự tấn công của sâu cuốn lá, rầy nâu và chim ăn hạt", b: "Hạn hán, mặn và nhiệt độ cực đoan", c: "Sự thiếu hụt phân bón kali và phospho nồng độ cao", d: "Sự xáo trộn cơ học mạnh do hoạt động cày bừa đất của con người", ans: "b" },
        { id: 34, q: "Để thúc đẩy quần thể vi khuẩn có lợi trong đất nông nghiệp, chiến lược quản lý nào được khuyến nghị?", a: "Thường xuyên cày lật sâu, phơi ải đất liên tục và phun thuốc trừ nấm", b: "Duy trì hàm lượng chất hữu cơ, hạn chế xáo trộn đất và sử dụng chế phẩm vi sinh", c: "Ngừng tưới nước hoàn toàn và bón phân hóa học đa lượng nồng độ cao", d: "Đốt bỏ toàn bộ tàn dư thực vật ngay trên bề mặt luống cây trồng", ans: "b" },
        { id: 35, q: "Đất nông nghiệp là nơi cư trú của many loài nấm khác nhau. Các loài này được phân thành các nhóm chức năng dựa trên cơ sở nào?", a: "Kích thước của sợi nấm và màu sắc của bào tử khi quan sát mắt thường", b: "Vai trò của chúng trong chu trình dinh dưỡng, phân hủy và quan hệ cộng sinh với cây trồng", c: "Khả năng chịu đựng nhiệt độ cao trong các lò sấy phòng thí nghiệm", d: "Tốc độ sinh trưởng của chúng trên môi trường thạch nhân tạo", ans: "b" },
        { id: 36, q: "Mối quan hệ hỗ trợ lẫn nhau giữa nấm rễ cộng sinh và rễ cây giúp tăng cường hấp thu chất dinh dưỡng nào đặc biệt?", a: "Sắt và Canxi", b: "Photpho và nitơ", c: "Kali và Silicon", d: "Magie và Natri", ans: "b" },
        { id: 37, q: "Nhóm nấm nào sống bên trong mô cây mà không gây hại rõ rệt cho cây chủ?", a: "Nấm hoại sinh rễ", b: "Nấm nội sinh", c: "Nấm ký sinh bắt buộc", d: "Nấm rễ cộng sinh ngoại", ans: "b" },
        { id: 38, q: "Lợi ích mà nấm nội sinh có thể mang lại cho cây chủ bao gồm những khía cạnh nào?", a: "Làm tăng tốc độ thoát hơi nước để cây hút many phân bón hơn", b: "Tăng khả năng chịu stress, kháng sâu bệnh và thúc đẩy sinh trưởng", c: "Làm giảm hàm lượng chất diệp lục trong tế bào tán lá thực vật", d: "Kích thích cây ra hoa sớm khi chưa đủ kích thước sinh khối", ans: "b" },
        { id: 39, q: "Vai trò sinh thái chính của nhóm nấm phân hủy trong hệ sinh thái nông nghiệp là gì?", a: "Ký sinh tiêu diệt hệ rễ của các cây cỏ dại xung quanh luống", b: "Phá vỡ chất hữu cơ như tàn dư cây trồng và góp phần vào chu trình dinh dưỡng", c: "Tổng hợp các hợp chất hữu cơ phức tạp từ chất vô cơ trong đất", d: "Tạo lớp màng dính liên kết các hạt cát thành khối đá cứng", ans: "b" },
        { id: 40, q: "Hoạt động phân hủy tàn dư thực vật của nhóm nấm phân hủy mang lại lợi ích gì cho độ phì nhiêu của đất?", a: "Loại bỏ hoàn toàn chất hữu cơ để đất trở nên thông thoáng hơn", b: "Bổ sung chất hữu cơ cho đất và duy trì độ phì nhiêu", c: "Làm giảm nồng độ các chất khoáng hòa tan trong dung dịch đất", d: "Làm tăng độ chua (giảm pH) của đất xuống mức cực đoan", ans: "b" },
        { id: 41, q: "Nấm đối kháng thực hiện vai trò tác nhân kiểm soát sinh học đối với mầm bệnh thực vật thông qua cơ chế nào?", a: "Kích thích mầm bệnh sản sinh many bào tử độc lựcer hơn", b: "Cạnh tranh tài nguyên, tạo chất kháng sinh hoặc ký sinh", c: "Bao bọc mầm bệnh để bảo vệ chúng khỏi thuốc trừ nấm hóa học", d: "Hòa tan vách tế bào lông hút của cây để mầm bệnh dễ xâm nhập", ans: "b" },
        { id: 42, q: "Biện pháp canh tác nào sau đây được đề cập là có thể làm gián đoạn quần thể nấm có lợi và tạo điều kiện cho mầm bệnh phát triển?", a: "Bón phân hữu cơ và duy trì độ ẩm ổn định cho đất tầng mặt", b: "Làm đất, luân canh và sử dụng thuốc bảo vệ thực vật không hợp lý", c: "Trồng xen canh các cây họ đậu và để cỏ che phủ tự nhiên", d: "Sử dụng các chế phẩm nấm rễ cộng sinh định kỳ vào mùa mưa", ans: "b" },
        { id: 43, q: "Yếu tố nào của quần thể nấm ảnh hưởng đến khả năng thích nghi của chúng với sự thay đổi môi trường, khí hậu và biện pháp quản lý đất?", a: "Chiều dài tuyệt đối của sợi nấm trong phòng thí nghiệm", b: "Tính đa dạng di truyền", c: "Trọng lượng khô của một bào tử nấm hoại sinh", d: "Màu sắc của khuẩn lạc phát triển trên môi trường thạch", ans: "b" },
        { id: 44, q: "Nội dung nghiên cứu về 'Virus trong đất' ở Chương 2 bao gồm khía cạnh nào?", a: "Phương pháp phân lập virus để sản xuất thuốc trừ cỏ hóa học", b: "Sự đa dạng rộng lớn của virus hiện diện trong các hệ sinh thái đất, bao gồm phân loại học và vai trò sinh thái", c: "Kỹ thuật nhân nuôi virus quy mô công nghiệp lớn trong bể chứa", d: "Cách thức virus phá hủy kết cấu vật lý của các tập hợp hạt đất", ans: "b" },
        { id: 45, q: "Virus trong đất tương tác with các đối tượng nào để ảnh hưởng đến chu trình dinh dưỡng, khả năng cô lập carbon và sức khỏe đất?", a: "Các hạt keo đất, phân bón vô cơ và các hợp chất kim loại nặng", b: "Vi khuẩn, nấm và các vi sinh vật đất khác", c: "Hệ rễ của các cây trồng biến đổi gen kháng sâu bệnh hại", d: "Các loài côn trùng ăn lá và chim hoang dã trên đồng ruộng", ans: "b" },

        p2: [{ id: 51, q: "Một trong những thách thức lớn liên quan đến việc sử dụng phage trong nông nghiệp thực tế là gì?", a: "Kích thước của phage quá lớn làm tắc nghẽn hệ thống béc phun thuốc", b: "Rào cản pháp lý và sự tiến hóa của các mầm bệnh kháng phage", c: "Phage dễ dàng bị phân hủy hoàn toàn khi tiếp xúc với phân bón hữu cơ", d: "Giá thành sản xuất phage đắt hơn hàng triệu lần thuốc hóa học", ans: "b" },

        { id: 56, q: "Chiến lược nào cần thiết để phát hiện sớm các đợt bùng phát virus mới nổi trong sản xuất nông nghiệp?", a: "Tăng cường phun thuốc bảo vệ thực vật hóa học định kỳ hàng tuần", b: "Các chiến lược giám sát và theo dõi để phát hiện sớm, cùng tầm quan trọng của hợp tác quốc tế", c: "Cách ly hoàn toàn tất cả các vùng canh tác nông nghiệp độc lập với nhau", d: "Ngừng nhập khẩu tất cả các loại giống cây trồng từ nước ngoài về", ans: "b" },

        { id: 77, q: "Nhóm vi sinh vật nào tham gia vào quá trình oxy hóa lưu huỳnh nguyên tố hoặc các hợp chất sulfide thành dạng sulfate (SO4^2-) cho cây hấp thu?", a: "Vi khuẩn oxy hóa lưu huỳnh", b: "Nấm rễ cộng sinh ngoại", c: "Virus ký sinh nội sinh tế bào thực vật", d: "Động vật nguyên sinh ăn mồi vùng rễ", ans: "a" },
        { id: 78, q: "Sự đa dạng di truyền của quần thể vi sinh vật mang lại lợi ích sinh thái nào cho hệ thống nông nghiệp trước biến đổi khí hậu?", a: "Giúp quần thể vi sinh vật đồng nhất tuyệt đối về mặt chức năng sinh học", b: "Nâng cao khả năng thích nghi và phục hồi của hệ sinh thái trước các biến động cực đoan", c: "Làm giảm nhu cầu hấp thu chất hữu cơ vùng rễ của thực vật", d: "Triệt tiêu hoàn toàn sự cạnh tranh sinh thái giữa các loài vi sinh vật", ans: "b" },
        { id: 79, q: "Nhóm sinh vật nào thực hiện hoạt động kiểm soát mật độ vi khuẩn và nấm trong đất thông qua cơ chế ăn mồi (predation)?", a: "Hệ virus thực vật truyền qua vector côn trùng", b: "Động vật nguyên sinh (trùng amip, trùng roi, trùng lông)", c: "Vi khuẩn vùng rễ kích thích sinh trưởng cây (PGPR)", d: "Các loài nấm nội sinh sống trong mô biểu bì lá cây", ans: "b" },
        { id: 80, q: "Hiện tượng kháng phage của một số vi khuẩn mầm bệnh thực vật đặt ra yêu cầu gì cho nghiên cứu kiểm soát sinh học?", a: "Ngừng hoàn toàn việc ứng dụng biện pháp sinh học trong nông nghiệp", b: "Liên tục nghiên cứu, phát hiện các chủng phage mới và tối ưu hóa tổ hợp vi sinh", c: "Tăng cường sử dụng thuốc bảo vệ thực vật hóa học nồng độ cực cao", d: "Thay thế toàn bộ giống cây trồng bằng các dòng thực vật nhân tạo", ans: "b" },
        { id: 81, q: "Ngành vi sinh vật nào ít phổ biến hơn vi khuẩn trong vùng rễ nhưng lại giữ vai trò không thể thay thế trong chuyển hóa methane?", a: "Vi khuẩn lam (Cyanobacteria)", b: "Vi khuẩn cổ (Archaea)", c: "Nấm sợi (Ascomycota)", d: "Virus thực vật (Plant viruses)", ans: "b" },
        { id: 82, q: "Biện pháp luân canh cây trồng (ví dụ xen canh cây họ Đậu) giúp cải thiện đa dạng vi sinh vật đất theo hướng nào?", a: "Làm cạn kiệt nguồn dinh dưỡng carbon của vi khuẩn vùng rễ", b: "Thúc đẩy sự phát triển của quần thể vi khuẩn cố định đạm và vi sinh vật có lợi", c: "Tăng cường mật độ xâm nhiễm của các loài nấm gây bệnh thối rễ", d: "Loại bỏ hoàn toàn sự tồn tại của các tập hợp nấm phân hủy chất hữu cơ", ans: "b" },
        { id: 83, q: "Sự tương tác đối kháng giữa nấm Trichoderma và các nấm gây bệnh hại cây trồng dựa trên cơ chế nào?", a: "Trichoderma cung cấp chất dinh dưỡng để nuôi nấm gây bệnh", b: "Trichoderma kìm hãm, sản sinh chất kháng sinh hoặc trực tiếp ký sinh tiêu diệt nấm hại", c: "Trichoderma làm thay đổi cấu trúc di truyền của hệ rễ cây trồng", d: "Trichoderma ngăn cản rễ cây hấp thu nước để làm khô mầm bệnh", ans: "b" },
        { id: 84, q: "Thành phần khí quyển đất bao gồm Oxy và Nitơ chịu tác động trực tiếp bởi hoạt động sinh học nào của vi sinh vật?", a: "Quá trình quang hợp của hệ nấm nội sinh trên tán lá", b: "Các quá trình cố định đạm, nitrat hóa, phản nitrat hóa và hô hấp tế bào của vi sinh vật", c: "Quá trình phong hóa cơ học các khối đá vôi nằm sâu trong lòng đất", d: "Quá trình tự sao chép của các hạt virus thực vật trong mô gỗ", ans: "b" },
        { id: 85, q: "Metagenomics được định nghĩa là phương pháp tiếp cận tiên tiến như thế nào trong nghiên cứu vi sinh vật học nông nghiệp?", a: "Nuôi cấy thuần khiết một chủng vi khuẩn duy nhất trong điều kiện tối ưu", b: "Phân tích trực tiếp toàn bộ vật liệu di truyền (DNA) từ mẫu môi trường không cần nuôi cấy", c: "Đo đạc kích thước cơ học của bào tử nấm dưới kính hiển vi quang học", d: "Phân tích hàm lượng hóa chất độc hại tồn dư trong mô quả sau thu hoạch", ans: "b" },
        { id: 86, q: "Nhóm vi khuẩn nào tiết ra các hợp chất siderophore để cạnh tranh sắt hòa tan, từ đó kìm hãm sự phát triển của nấm gây bệnh vùng rễ?", a: "Vi khuẩn kiểm soát sinh học (Biocontrol bacteria)", b: "Vi khuẩn phản nitrat hóa yếm khí", c: "Vi khuẩn gây thối nhũn củ và thân cây", d: "Vi khuẩn lam cố định đạm tầng nước mặt", ans: "a" },
        { id: 87, q: "Cấu trúc sợi nấm (hyphae) của nấm rễ cộng sinh Mycorrhiza có ưu thế vật lý nào so với lông hút của rễ cây?", a: "Có kích thước lớn hơn giúp phá vỡ các cấu trúc hạt sỏi cứng", b: "Có đường kính nhỏ hơn và chiều dài lớn hơn giúp len lỏi vào các khe hở hạt đất siêu nhỏ", c: "Có vỏ bọc bằng nhựa cứng giúp ngăn chặn sự xâm nhiễm của virus", d: "Có khả năng tự tổng hợp hạt diệp lục để tự nuôi dưỡng không cần cây", ans: "b" },
        { id: 88, q: "Hàm lượng mùn (humus) trong đất nông nghiệp bền vững có mối liên hệ mật thiết với hoạt động của nhóm sinh vật nào?", a: "Hoạt động phân hủy tàn dư thực vật và hình thành chất hữu cơ ổn định của nấm và vi khuẩn", b: "Hoạt động tự sao chép mật độ cao của hệ virus ký sinh thực vật", c: "Quá trình phong hóa cơ học của các khoáng vật thạch anh vô cơ", d: "Hoạt động phun thuốc diệt cỏ phổ rộng của người nông dân trên đồng", ans: "a" },
        { id: 89, q: "Nhóm sinh vật nào được xem là 'kẻ thù tự nhiên' giúp kiểm soát số lượng vi khuẩn mầm bệnh mà không để lại tồn dư hóa chất độc hại?", a: "Các loài tuyến trùng ký sinh rễ cây", b: "Thực khuẩn thể (Phage)", c: "Các loài nấm sợi gây bệnh rụng lá", d: "Vi khuẩn phản nitrat hóa yếm khí", ans: "b" },
        { id: 90, q: "Hiện tượng chuyển gen ngang (horizontal gene transfer) qua trung gian virus ở vi khuẩn đất đóng góp vào khía cạnh nào của quần xã?", a: "Làm đồng nhất hoàn toàn cấu trúc bộ gen của tất cả các loài vi khuẩn", b: "Tạo động lực cho sự tiến hóa, đa dạng hóa tính trạng và khả năng thích nghi của vi khuẩn", c: "Triệt tiêu khả năng sản sinh kháng sinh tự nhiên của các chủng vi khuẩn có lợi", d: "Tăng tốc độ phân hủy cơ học các hạt cát thô thành hạt keo sét", ans: "b" },
        { id: 91, q: "Đặc tính di truyền của một quần thể virus thực vật mới nổi có độc lực gia tăng sẽ gây ra rủi ro lớn nhất cho khía cạnh nào?", a: "Cấu trúc vật lý và độ bền cơ học của các tập hợp hạt đất tầng mặt", b: "Năng suất mùa vụ, an ninh lương thực toàn cầu và kinh tế nông nghiệp", c: "Khả năng hấp thu nitơ khí quyển của các loài vi khuẩn sống tự do", d: "Tốc độ phân hủy các chất hữu cơ thô của hệ nấm hoại sinh vùng rễ", ans: "b" },
        { id: 92, q: "Hoạt động canh tác bón phân hữu cơ (như phân chuồng hoai mục) có tác động tích cực nào đến hệ vi sinh vật đất?", a: "Tiêu diệt toàn bộ các vi khuẩn PGPR do hiện tượng sốc dinh dưỡng", b: "Cung cấp nguồn thức ăn carbon và năng lượng phong phú, thúc đẩy đa dạng vi sinh vật có lợi", c: "Làm đóng băng toàn bộ hoạt động sinh bào tử của quần xã nấm hoại sinh", d: "Kích thích sự nhân đôi độc lực của các loài virus thực vật gây bệnh vàng lá", ans: "b" },
        { id: 93, q: "Ngành nấm Basidiomycota trong đất nông nghiệp thực hiện vai trò chức năng cốt lõi nào?", a: "Ký sinh nội bào bắt buộc trong tế bào virus thực vật", b: "Phân hủy các hợp chất hữu cơ phức tạp (như lignin) và chu trình dinh dưỡng", c: "Tổng hợp phân bón lân vô cơ từ các hạt cát thô vùng rễ", d: "Ngăn cản sự lưu thông của nước và không khí giữa các tầng đất", ans: "b" },
        { id: 94, q: "Vi khuẩn nội sinh (Endophytic bacteria) được tìm thấy ở vị trí nào trong hệ thống nông nghiệp?", a: "Chỉ tồn tại ở dạng bào tử khô lơ lửng trong không khí phía trên đồng ruộng", b: "Sống bên trong các mô nội bào của cây trồng mà không gây ra triệu chứng bệnh", c: "Bám chặt bên ngoài bề mặt của các hạt đá mẹ ở tầng địa chất sâu", d: "Chỉ xuất hiện trong các dung dịch hóa chất thuốc bảo vệ thực vật tổng hợp", ans: "b" },
        { id: 95, q: "Cơ chế 'cạnh tranh không gian sinh thái' của vi sinh vật có lợi giúp bảo vệ vùng rễ cây như thế nào?", a: "Vi sinh vật có lợi định cư dày đặc trên bề mặt rễ, ngăn cản mầm bệnh bám dính và xâm nhiễm", b: "Vi sinh vật có lợi tiêu tốn toàn bộ lượng oxy khiến mầm bệnh và rễ cây cùng bị ngạt khí", c: "Vi sinh vật có lợi thúc đẩy rễ cây phát triển ngắn lại để tránh vùng có mầm bệnh", d: "Vi sinh vật có lợi phá hủy toàn bộ cấu trúc các tập hợp hạt đất xung quanh rễ", ans: "a" },
        { id: 96, q: "Sự chuyển gen qua trung gian virus (Transduction) ở môi trường đất nông nghiệp là một ví dụ minh họa cho khía cạnh nào?", a: "Sự can thiệp thô bạo của con người bằng công nghệ chỉnh sửa gen nhân tạo", b: "Mối liên hệ chặt chẽ, năng động và tinh vi giữa virus và quần xã vi khuẩn đất", c: "Quá trình thoái hóa di truyền dẫn đến sự diệt vong của các loài vi sinh vật có lợi", d: "Sự độc lập hoàn toàn không tương tác giữa các nhóm vi sinh vật trong tự nhiên", ans: "b" },
        { id: 97, q: "Tính ổn định chức năng của hệ sinh thái đất nông nghiệp trước các xáo trưng môi trường được duy trì nhờ vào khía cạnh nào của cộng đồng vi sinh vật?", a: "Sự đồng nhất tuyệt đối về mặt kiểu gen của một chủng vi khuẩn duy nhất", b: "Tính dư thừa chức năng của một cộng đồng vi sinh vật đa dạng", c: "Sự biến mất hoàn toàn của nhóm nấm hoại sinh và hệ virus thực vật", d: "Việc sử dụng liên tục và liều lượng cao các loại thuốc bảo vệ thực vật hóa học", ans: "b" },
        { id: 98, q: "Khi một hệ sinh thái đất bị xáo trộn mạnh và mất đi 'tính dư thừa chức năng' của vi sinh vật, hậu quả trực tiếp là gì?", a: "Tốc độ phân hủy chất hữu cơ và độ phì nhiêu của đất bị suy giảm nghiêm trọng", b: "Rễ cây trồng sẽ phát triển dài ra gấp hàng trăm lần để tự tìm kiếm phân bón", c: "Toàn bộ các loài virus thực vật gây bệnh sẽ bị tiêu diệt hoàn toàn tự nhiên", d: "Các hạt cát thô sẽ tự động liên kết thành cấu trúc tập hợp đất ổn định", ans: "a" },
        { id: 99, q: "Việc nghiên cứu toàn diện về đa dạng vi sinh vật (vi khuẩn, nấm, virus) trong nông nghiệp hướng tới xây dựng mô hình sản xuất như thế nào?", a: "Mô hình thâm canh công nghiệp ngắn hạn phụ thuộc hoàn toàn vào hóa chất bón tổng hợp", b: "Hệ thống nông nghiệp bền vững, thông minh thích ứng với khí hậu và bảo vệ môi trường", c: "Mô hình canh tác hoang dã tự nhiên tuyệt đối không có sự quản lý của con người", d: "Hệ thống sản xuất nông sản nhân tạo trong các phòng thí nghiệm loại bỏ vai trò của đất", ans: "b" },
        { id: 100, q: "Nhận định nào sau đây tổng kết chính xác nhất về vai trò của đa dạng vi sinh vật trong hệ thống nông nghiệp theo Chương 2?", a: "Vi sinh vật là những thành phần ngẫu nhiên, ít có ảnh hưởng đến năng suất mùa vụ", b: "Đa dạng vi sinh vật (vi khuẩn, nấm, virus) là nền tảng cốt lõi của chức năng hệ sinh thái và tính bền vững nông nghiệp", c: "Chỉ có nhóm vi khuẩn là mang lại lợi ích, còn nấm và virus hoàn toàn gây hại cho nông nghiệp", d: "Sự đa dạng vi sinh vật đất chỉ được duy trì khi con người ngừng toàn bộ hoạt động trồng trọt", ans: "b" }]
            },
            3: {
                 p1: [{ id: 1, q: "Đất được mô tả là một hệ sinh thái như thế nào trong phần giới thiệu Chương 3?", a: "Hệ sinh thái tĩnh, trơ lì và không có sự thay đổi vật chất", b: "Hệ sinh thái năng động, tràn đầy sự sống, trong đó phần lớn không thể quan sát bằng mắt thường", c: "Hệ sinh thái nhân tạo phụ thuộc hoàn toàn vào cấu trúc cơ giới", d: "Khối đá mẹ vô cơ hoàn toàn không chứa các liên kết sinh học", ans: "b" },
        { id: 2, q: "Quần xã vi sinh vật đất được nhắc đến tập hợp những nhóm sinh vật nào?", a: "Côn trùng, tuyến trùng, động vật chân khớp và chuột đồng", b: "Vi khuẩn, nấm, cổ khuẩn, động vật nguyên sinh và tảo", c: "Rễ thực vật, các hạt cát, keo sét và chất mùn hữu cơ", d: "Virus thực vật, sâu hại và các loài chim ăn hạt", ans: "b" },
        { id: 3, q: "Vai trò quan trọng bậc nhất của những sinh vật nhỏ bé trong đất là gì?", a: "Làm tăng tốc độ xói mòn và rửa trôi các khoáng thạch anh", b: "Duy trì sức khỏe đất và thúc đẩy chu trình dinh dưỡng", c: "Ngăn cản sự lưu thông của nước giữa các tầng địa chất", d: "Triệt tiêu hoàn toàn sự phát triển của các loài cỏ hoang", ans: "b" },
        { id: 4, q: "Một trong những chức năng chính của vi sinh vật đất trong việc phân giải vật chất hữu cơ được gọi là gì?", a: "Quá trình nitrat hóa sinh học", b: "Sự phân hủy", c: "Hiện tượng kháng cảm ứng toàn thân", d: "Quá trình cô lập carbon cơ học", ans: "b" },

        { id: 90, q: "Tiến bộ của công nghệ \"Hệ gen học môi trường\" (Metagenomics) đất cho phép các nhà khoa học xác định được thông tin sinh học cốt lộ nào?", a: "Bản đồ địa hình không gian chi tiết về hướng rãnh thoát nước và độ dốc luống đất", b: "Đặc trưng cấu trúc, thành phần loài và tiềm năng chức năng của cả quần xã vi sinh", c: "Quy trình cắt giảm hoàn toàn các bước khảo nghiệm an toàn sinh học đa giai đoạn của", d: "Công thức cấu tạo hóa học chính xác nguyên tử của bộ gen di truyền DNA virus thực", ans: "b" },

        { id: 96, q: "Sự hiện diện của nấm cộng sinh arbuscular mycorrhizal (AM) giúp mở rộng hệ rễ thực vật vào đất, cải thiện hiệu quả hấp thu khoáng lượng lớn nào?", a: "Ion clo phân tử và phức chất độc hữu cơ bão hòa nồng độ cao bề mặt hạt cát thô", b: "Nước và chất dinh dưỡng, đặc biệt là photpho", c: "Khí methane tinh khiết phát sinh từ sự hô hấp yếm khí của vi sinh vật sinh methane đất", d: "Các nguyên tố kim loại nặng khó phân hủy sinh học tự nhiên bám dính bề mặt keo keo", ans: "b" },
        { id: 97, q: "Hiện tượng \"Ngạt rễ\" ở rễ cây khi ruộng bị ngập úng lâu ngày có sự tham gia trực tiếp của hoạt động vi sinh vật bất lợi nào?", a: "Sự tăng trưởng bùng phát số lượng loài của các vi khuẩn PGPR cố định đạm Rhizobium spp.", b: "Hoạt động hô hấp yếm khí của vi sinh vật và vi khuẩn khử sulfate tạo sulfide gây độc", c: "Quá trình quang hợp tự nhiên ban ngày của các loài tảo lục đơn bào phân bố tầng canh", d: "Sự đóng băng hoàn toàn hoạt động ly giải tế bào của hệ thực khuẩn thể đối kháng vi vi", ans: "b" },
        { id: 98, q: "Biện pháp thực hành quản lý đất bền vững nào được khuyến nghị để bảo vệ chu trình carbon và hệ vi sinh mùn đất mặt?", a: "Cày sâu bừa kĩ liên tục, đốt sạch phế phụ phẩm rơm rạ và bón phân hóa học liều lượng cao", b: "Canh tác tối thiểu (hạn chế xáo trộn đất), duy trì thảm che phủ và bón phân sinh học", c: "Chuyển đổi toàn bộ diện tích đất nông nghiệp trang trại sang mô hình canh tác thủy canh", d: "Phun các hợp chất hóa học chất kháng sinh phổ rộng định kỳ hàng tuần lên đồng ruộng diện", ans: "b" },
         {
        id: 99,
        q: "Trong một hệ sinh thái đất ổn định, tính dư thừa chức năng giúp duy trì các hoạt động sinh thái cốt lõi nào khi một vài loài vi khuẩn nhạy cảm bị tiêu diệt do stress nhiệt?",
        a: "Hoạt động cơ giới hóa thâm canh cao độ sử dụng các loại máy móc cày bừa công suất thiết kế cơ khí lớn đồng ruộng",
        b: "Các chức năng thiết yếu như chu trình dinh dưỡng, phân hủy chất hữu cơ và cấu trúc quần xã",
        c: "Sự tự nhân đôi bộ gen di truyền DNA của hệ virus thực vật ký sinh nội bào biểu bì thân cây lâu năm canh tác",
        d: "Tổng chi phí tài chính nông dân chi cho hoạt động mua sắm vật tư nông nghiệp phân bón vô cơ nhập khẩu thương mại",
        ans: "b"
    },
        { id: 100, q: "Nhận định nào sau đây tổng kết đầy đủ và chính xác nhất về vai trò sinh thái của Vi sinh vật đất đối với sức khỏe đất và chu trình dinh dưỡng theo Chương 3?", a: "Vi sinh vật đất chỉ mang ý nghĩa lý thuyết, vai trò của chúng hoàn toàn bị phân bón hóa học thâm canh thay thế", b: "Vi sinh vật đất là thành phần không thể thiếu, chi phối sức khỏe đất, chuyển hóa và luân chuyển liên tục các nguyên tố dinh dưỡng thiết yếu (C, N, P, S), quyết định độ phì nhiêu bền vững của hệ sinh thái nông nghiệp", c: "Tất cả các loài vi sinh vật đất đều mang bản chất phá hủy cấu trúc vật lý của hạt kết tập keo sét đất mặt", d: "Hệ vi sinh vật đất chỉ phát huy tác dụng kích thích sinh trưởng tốt khi con người ngừng bón phân hữu cơ hoai mục", ans: "b" }]
            },
            4: {
                p1: [{ id: 1, q: "Các tương tác giữa thực vật và vi sinh vật tạo nên nền tảng của khía cạnh nào trong hệ sinh thái?", a: "Sự phân tầng địa chất sâu dưới lòng đất", b: "Động lực hệ sinh thái, ảnh hưởng sâu sắc đến sức khỏe, năng suất và khả năng thích nghi của cây trồng", c: "Tốc độ bào mòn vật lý của các khối đá mẹ", d: "Xuương hướng tự động hóa quy trình đóng gói nông sản", ans: "b" },
        { id: 2, q: "Ba khía cạnh cơ bản làm nền tảng cho sự cân bằng phức tạp trong các quần xã sinh thái được đề cập ở Chương 4 là gì?", a: "Cạnh tranh, ký sinh bắt buộc và hoại sinh", b: "Cộng sinh, gây bệnh và kiểm soát sinh học", c: "Hô hấp, quang hợp và thoát hơi nước qua lá", d: "Đột biến gen, ly giải tế bào và chuyển gen ngang", ans: "b" },
        { id: 3, q: "Việc hiểu rõ động lực tương tác giữa thực vật và vi sinh vật mang lại ý nghĩa quan trọng cho lĩnh vực nào?", a: "Cơ khí động lực, chế tạo máy và tự động hóa nhà máy", b: "Nông nghiệp, quản lý hệ sinh thái và sức khỏe con người", c: "Kinh tế vĩ mô, quản trị chuỗi cung ứng toàn cầu", d: "Trắc địa, bản đồ đất và quy hoạch đô thị ven biển", ans: "b" },
        { id: 4, q: "Bản chất của mối liên kết \"Cộng sinh\" giữa thực vật và vi sinh vật trải rộng trên phổ quan hệ nào?", a: "Từ quan hệ cùng có lợi đến quan hệ ký sinh", b: "Hoàn toàn là quan hệ đối kháng tiêu diệt lẫn nhau vĩnh viễn", c: "Chỉ có quan hệ hội sinh một bên có lợi hoàn toàn trơ", d: "Tách biệt tuyệt đối không có sự trao đổi phân tử tín hiệu", ans: "a" },
        { id: 5, q: "Yếu tố nào điều phối một trạng thái cân bằng mong manh trong tương tác cộng sinh, giúp mỗi bên mang lại lợi ích hoặc khai thác tài nguyên để tồn tại?", a: "Sự thay đổi cơ học của cấu trúc hạt đất tầng canh tác", b: "Những cuộc đối thoại phân tử tinh vi giữa vật chủ và sinh vật cộng sinh", c: "Hoạt động phun thuốc bảo vệ thực vật hóa học định kỳ", d: "Sự biến động của lượng nước mưa tự nhiên vùng rễ", ans: "b" },
        { id: 6, q: "Việc làm sáng tỏ cơ sở phân tử của các tương tác cộng sinh giúp mở ra chiến lược nào cho trồng trọt?", a: "Tăng tối đa hàm lượng phân bón vô cơ đa lượng phối trộn", b: "Nâng cao năng suất cây trồng, khả năng hấp thu dinh dưỡng và khả năng chống chịu trước các thách thức môi trường", c: "Cách ly hoàn toàn hệ rễ thực vật khỏi thế giới vi sinh vật đất", d: "Chuyển đổi toàn bộ cơ cấu cây trồng sang mô hình thủy canh khép kín", ans: "b" },
        { id: 7, q: "Quá trình gây bệnh (Pathogenesis) thể hiện mặt nào của các tương tác giữa thực vật và vi sinh vật?", a: "Mặt tích cực thúc đẩy sinh khối thực vật phát triển bùng phát", b: "Mặt tối, khi các tác nhân xâm nhiễm vi sinh vật lợi dụng những điểm yếu trong hệ thống phòng vệ của cây để gây bệnh", c: "Hoạt động cân bằng không gây ra bất kỳ triệu chứng tổn thương nào", d: "Cơ chế hiệp đồng cùng có lợi giữa tế bào vi khuẩn và mô rễ", ans: "b" },
        { id: 8, q: "Cuộc chạy đua vũ trang sinh học giữa cây trồng và mầm bệnh thúc đẩy sự tiến hóa của yếu tố nào?", a: "Tốc độ bay hơi của lượng đạm hữu cơ vùng rễ", b: "Các cơ chế độc lực và chiến lược phòng vệ", c: "Độ dày cơ học của lớp màng nhựa phủ luống đất", d: "Sự đồng nhất tuyệt đối về mặt kiểu gen của quần xã bản địa", ans: "b" },
        { id: 9, q: "Việc giải mã sự phức tạp trong phản ứng miễn dịch của cây và các yếu tố độc lực của mầm bệnh mở ra cơ hội gì?", a: "Loại bỏ hoàn toàn vai trò của các nhà khoa học nông nghiệp", b: "Phát triển các chiến lược quản lý dịch bệnh mới và lai tạo cây trồng kháng bệnh nhằm bảo vệ an ninh lương thực toàn cầu", c: "Tăng nồng độ chất độc hóa học trong thuốc trừ sâu lên gấp nhiều lần", d: "Thiết kế các hệ thống béc phun thuốc tự động điều khiển bằng ảnh vệ tinh", ans: "b" },
        { id: 10, q: "Chiến lược \"Kiểm soát sinh học\" (Biocontrol) hướng tới mục tiêu gì thông qua việc khai thác các hoạt động đối kháng của vi sinh vật có lợi?", a: "Tiêu diệt toàn bộ hệ thảm thực vật xung quanh vùng nhiễm bệnh", b: "Ức chế sự phát triển của mầm bệnh và tăng cường sức khỏe cây trồng bằng các biện pháp sinh thái", c: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của tán lá", d: "Làm đông cứng kết cấu vật lý của các hạt keo sét vùng rhizosphere", ans: "b" },
        { id: 11, q: "Mối quan hệ cộng sinh tương hỗ (Mutualism) trong lĩnh vực tương tác sinh học được định nghĩa là gì?", a: "Mối quan hệ trong đó một bên được lợi mà gây hại nghiêm trọng cho bên còn lại", b: "Mối quan hệ cộng sinh, nơi cả hai bên đều được hưởng lợi", c: "Sự chung sống ngẫu nhiên hoàn toàn không có bất kỳ trao đổi vật chất nào", d: "Hoạt động ăn mồi tiêu diệt tế bào con mồi để lấy dinh dưỡng", ans: "b" },
        { id: 12, q: "Mối quan hệ hội sinh (Commensalism) giữa thực vật và vi sinh vật được hiểu là gì?", a: "Cả hai bên cùng chịu tổn thương nghiêm trọng về sinh khối tế bào", b: "Mối quan hệ nơi một bên được lợi mà không gây hại cho bên còn lại", c: "Sự ký sinh bắt buộc phá hủy hoàn toàn vách tế bào lông hút thực vật", d: "Hoạt động đối kháng sản sinh kháng sinh tiêu diệt hoàn toàn đối phương", ans: "b" },
        { id: 13, q: "Ví dụ điển hình và được nghiên cứu nhiều nhất về mối quan hệ cộng sinh tương hỗ cố định đạm là tương tác giữa nhóm sinh vật nào?", a: "Giữa vi khuẩn Pseudomonas và hệ rễ cây lúa nước", b: "Giữa vi khuẩn cố định đạm (như các loài Rhizobium) và cây họ Đậu", c: "Giữa nấm Trichoderma và các loài cỏ hoại sinh đất cát", d: "Giữa hệ virus thực vật và cấu trúc tế bào biểu bì lá", ans: "b" },
        { id: 14, q: "Cấu trúc chuyên biệt nào được hình thành trên rễ cây họ Đậu sau khi bị vi khuẩn Rhizobium xâm nhiễm?", a: "Các sợi nấm mở rộng phạm vi hút nước tầng sâu", b: "Các nốt sần rễ", c: "Lớp màng nhầy polysaccharide chống thấm vô cơ", d: "Các khối u hoại tử làm nghẽn mạch dẫn thân cây", ans: "b" },
        { id: 15, q: "Trong nốt sần rễ, vi khuẩn Rhizobium thực hiện chức năng sinh học cốt lõi nào cho cây họ Đậu?", a: "Phân hủy các mảnh hợp chất cellulose gỗ cứng khó tan", b: "Cố định nitơ trong khí quyển thành amoniac mà cây có thể sử dụng cho sinh trưởng", c: "Tổng hợp hormone kích thích hoa thực vật nở đồng loạt ban đêm", d: "Hấp thu toàn bộ năng lượng nhiệt từ các tầng đất sâu bên dưới", ans: "b" },
        { id: 16, q: "Đổi lại lượng amoniac nhận được, cây họ Đậu cung cấp yếu tố nào cho vi khuẩn Rhizobium trong nốt sần?", a: "Các chất độc sinh học kìm hãm sự phân chia tế bào vi khuẩn", b: "Nguồn năng lượng (carbohydrate) và nơi trú ẩn trong các nốt sần rễ", c: "Phân tử phân bón kali vô cơ nồng độ bão hòa", d: "Hệ thống các màng lọc cơ học bảo vệ vách tế bào vi khuẩn", ans: "b" },
        { id: 17, q: "Mạng lưới cấu trúc nào được nấm mycorrhiza tạo ra trong đất giúp mở rộng đáng kể phạm vi hoạt động của hệ rễ thực vật?", a: "Các chuỗi polymer nhựa nhân tạo chống thấm", b: "Các mạng lưới sợi nấm rộng lớn", c: "Các nốt sần chứa đầy vi khuẩn cố định đạm sống tự do", d: "Lớp vỏ bọc cơ học bằng chất sừng cellulose cứng", ans: "b" },
        { id: 18, q: "Nấm mycorrhiza tăng cường khả năng hấp thu các chất dinh dưỡng nào từ đất để đổi lấy carbohydrate từ quá trình quang hợp của cây?", a: "Sắt, Kẽm và Mangan vi lượng hòa tan", b: "Nước và dinh dưỡng, đặc biệt là photpho và nitơ", c: "Canxi carbonat và Magie sulfate kết tủa rắn", d: "Khí methane và carbon dioxide lỏng tầng rễ", ans: "b" },
        { id: 19, q: "Các vi sinh vật nội sinh (Endophytes) sinh sống ở vị trí nào trong cấu trúc của thực vật?", a: "Bám chặt bên ngoài bề mặt lá tiếp xúc trực tiếp với không khí", b: "Sinh sống trong mô bên trong của cây mà không gây hại rõ rệt", c: "Chỉ phát triển khi toàn bộ các cơ quan của thực vật đã chết hoai mục", d: "Tồn tại trong các dung dịch chất độc hóa học bảo vệ thực vật", ans: "b" },
        { id: 20, q: "Lợi ích sinh học mà vi khuẩn và nấm nội sinh mang lại cho cây chủ bao gồm những khía cạnh nào?", a: "Làm tăng lượng nước tiêu thụ của tế bào thực vật để nhanh héo", b: "Tăng cường hấp thu dinh dưỡng, khả năng chịu stress và khả năng phòng vệ trước mầm bệnh", c: "Làm giảm hàm lượng chất diệp lục trong tế bào tán lá tầng mặt", d: "Thúc đẩy mầm bệnh gây bệnh vàng lá xâm nhập nhanh hơn", ans: "b" },
        { id: 21, q: "Vi sinh vật nội sinh thúc đẩy sinh trưởng và điều hòa hormone thực vật nhờ vào hoạt động tổng hợp hợp chất nào?", a: "Các acid vô cơ mạnh phá hủy cấu trúc tế bào rễ", b: "Các hợp chất thứ cấp", c: "Các chuỗi protein hiệu ứng gây hoại tử mô thực vật", d: "Hợp chất màu polymer bọc kín bề mặt biểu bì lá", ans: "b" },
        { id: 22, q: "Con đường trao đổi thông tin phân tử giữa thực vật và vi sinh vật cộng sinh được điều khiển thông qua các phân tử tín hiệu nào?", a: "Các hạt cát, sỏi vô cơ phân bố xung quanh vùng lông hút", b: "Các phân tử tín hiệu như phytohormone và các yếu tố hiệu ứng cộng sinh", c: "Các ion kim loại nặng khó tan trong dung dịch keo đất", d: "Các phân tử nước bão hòa khí hydro sulfide mùi trứng thối", ans: "b" },
        { id: 23, q: "Việc hiểu rõ cơ sở phân tử của tương tác cộng sinh cung cấp những hiểu biết quan trọng về khía cạnh nào?", a: "Tốc độ mài mòn vật lý của các công cụ cày bừa cơ giới hóa", b: "Cơ chế đặc hiệu vật chủ, nhận diện đối tác và chức năng của sinh vật cộng sinh", c: "Công thức hóa học phối trộn phân bón vô cơ đa lượng thương mại", d: "Biến động nhiệt độ của tầng khí quyển sát bề mặt đồng ruộng", ans: "b" },
        { id: 24, q: "Mối quan hệ cộng sinh giữa thực vật và vi sinh vật định hình sự cạnh tranh và diễn thế thực vật thông qua tác động nào?", a: "Làm giảm khả năng hút dinh dưỡng khiến cây trồng còi cọc đồng loạt", b: "Tăng cường khả năng hấp thu dinh dưỡng của cây, ảnh hưởng đến thành phần và tính đa dạng của quần xã thực vật", c: "Triệt tiêu hoàn toàn sự quang hợp tự nhiên ban ngày của tán lá", d: "Thay đổi độ chua (pH) của toàn bộ hệ thống nguồn nước ngầm vùng", ans: "b" },
        { id: 25, q: "Quá trình gây bệnh (Pathogenesis) trong tương tác giữa thực vật và vi sinh vật đề cập đến cơ chế nào của mầm bệnh?", a: "Hỗ trợ rễ cây hấp thu nước nhanh hơn vào mùa khô hạn cực đoan", b: "Mầm bệnh xâm nhập vào mô thực vật, né tránh hệ thống phòng vệ của vật chủ và gây ra các triệu chứng bệnh", c: "Tổng hợp các hormone tăng trưởng giúp lá cây phát triển xanh tốt hơn", d: "Gắn kết các hạt keo sét lại với nhau để cải thiện độ xốp của cấu trúc đất", ans: "b" },
        { id: 26, q: "Mầm bệnh sử dụng cấu trúc chuyên biệt nào dưới đây để tạo điều kiện cho sự định cư, xâm nhiễm vững chắc trên vật chủ?", a: "Các nốt sần cố định đạm hoặc mạng lưới sợi nấm cộng sinh mycorrhiza", b: "Giác bám (appressoria) hoặc cơ quan hút (haustoria)", c: "Lớp vỏ bọc polysaccharide chống thấm dung dịch hóa chất hữu cơ", d: "Các lông hút nhân tạo được tổng hợp từ nguồn protein thô đất", ans: "b" },
        { id: 27, q: "Yếu tố nào đóng vai trò then chốt quyết định mức độ thành công của quá trình xâm nhiễm của mầm bệnh vào mô thực vật?", a: "Trọng lượng khô của một bào tử nấm hoại sinh phân hủy chất xơ", b: "Khả năng nhận biết và phản ứng with các tín hiệu từ vật chủ (như hormone thực vật và thành phần thành tế bào)", c: "Độ sâu vật lý của tầng đất nơi hạt giống nảy mầm sinh trưởng", d: "Nồng độ của phân bón kali clorua hòa tan trong nước tưới nội đồng", ans: "b" },
        { id: 28, q: "Hợp chất nào dưới đây KHÔNG phải là một yếu tố độc lực (Virulence Factors) do mầm bệnh tiết ra để thao túng tế bào vật chủ?", a: "Độc tố và enzyme phân giải thành tế bào thực vật", b: "Protein hiệu ứng (effector) và các hợp chất chuyển hóa thứ cấp", c: "Các phytohormone sinh trưởng kích thích kéo dài lông hút rễ khỏe mạnh", d: "Các protein làm thao túng quá trình tế bào và ức chế hệ miễn dịch cây", ans: "c" },
        { id: 29, q: "Vai trò sinh học cốt lõi của các protein hiệu ứng (effector) do mầm bệnh tiết ra là gì?", a: "Cung cấp thêm đạm hữu cơ giúp tế bào thực vật tăng tốc độ phân chia", b: "Điều chỉnh hệ miễn dịch của cây, thay đổi sinh lý tế bào và thúc đẩy sự nhân lên của mầm bệnh", c: "Kết dính các hạt keo sét xung quanh rễ thành cấu trúc tập hợp ổn định", d: "Kích thích lá cây tăng cường hấp thu năng lượng ánh sáng ban ngày", ans: "b" },
        { id: 30, q: "Hệ thống miễn dịch của thực vật phát hiện các phân tử vi sinh vật bảo tồn (PAMPs) nhờ vào cấu trúc thụ thể nào trên bề mặt tế bào?", a: "Thụ thể nội bào giàu leucine nhóm NLR", b: "Các thụ thể nhận diện mẫu (PRRs)", c: "Các lông hút cơ học cấu tạo từ chất sừng cellulose cứng", d: "Lớp màng nhầy protein bọc ngoài biểu bì tế bào mạch dẫn", ans: "b" },
        { id: 31, q: "Viết tắt \"PTI\" trong hệ miễn dịch thực vật dùng để chỉ trạng thái miễn dịch nào?", a: "Miễn dịch khởi phát bởi protein hiệu ứng effector độc lực cao", b: "Miễn dịch khởi phát bởi PAMP", c: "Trạng thái bất hoạt hoàn toàn cơ chế tự vệ của tế bào vật chủ", d: "Hiện tượng chết tế bào theo chương trình diện rộng ở hệ rễ", ans: "b" },
        { id: 32, q: "Trạng thái miễn dịch khởi phát bởi effector (ETI) ở thực vật được kích hoạt nhờ vào nhóm thụ thể nội bào nào?", a: "Thụ thể nhận diện mẫu PRRs phân bố bề mặt tế bào thực vật", b: "Thụ thể nội bào thuộc nhóm NLR (chứa vùng gắn nucleotide và giàu leucine)", c: "Các béc phun phân tử tín hiệu hormone điều hòa sinh trưởng cây", d: "Mạng lưới các chuỗi enzyme amôn hóa phân hóa cấu trúc protein", ans: "b" },
        { id: 33, q: "Kết quả cuối cùng của mối quan hệ chiến đấu giữa cây và mầm bệnh được quyết định bởi sự tương tác động giữa hai trạng thái miễn dịch nào?", a: "Giữa quá trình quang hợp ban ngày và hô hấp tế bào ban đêm", b: "Giữa miễn dịch PTI và miễn dịch ETI", c: "Giữa quan hệ cộng sinh Rhizobium và liên kết nấm rễ Mycorrhiza", d: "Giữa sự hấp thu đạm amoni và sự cố định đạm nitrat hữu cơ", ans: "b" },
        { id: 34, q: "Triệu chứng bệnh vàng lá (chlorosis) trên cây bị nhiễm mầm bệnh là kết quả trực tiếp của hoạt động nào?", a: "Sự tăng cường hàm lượng chất diệp lục giúp lá cây quang hợp mạnh hơn", b: "Mầm bệnh thao túng các quá trình sinh lý, làm gián đoạn vận chuyển nước, dinh dưỡng hoặc thay đổi tín hiệu hormone", c: "Hoạt động tiết chất polysaccharide dính kết hạt đất của vi khuẩn PGPR", d: "Quá trình cố định đạm khí quyển quá mức của các nốt sần hệ rễ", ans: "b" },
        { id: 35, q: "Mức độ nghiêm trọng và tiến triển của triệu chứng bệnh cây phụ thuộc vào nhóm yếu tố nào?", a: "Chỉ phụ thuộc vào giá cả thị trường của các loại thuốc trừ nấm hóa học", b: "Độc lực của mầm bệnh, mức độ mẫn cảm của cây chủ và các yếu tố môi trường", c: "Chiều dài tuyệt đối của hệ mạch dẫn thân cây lâu năm canh tác", d: "Tổng số lượng máy cày cơ giới hoạt động trên đồng ruộng xung quanh", ans: "b" },
        { id: 36, q: "Một cách tiếp cận đa chiều trong quản lý hiệu quả bệnh cây bền vững đòi hỏi sự tích hợp của các biện pháp nào?", a: "Chỉ phun thuốc hóa học độc hại nồng độ cao liên tục theo lịch cố định", b: "Kết hợp các biện pháp canh tác, tính kháng của giống, tác nhân kiểm soát sinh học và thuốc bảo vệ thực vật hóa học hợp lý", c: "Ngừng hoàn toàn việc tưới nước và bón tất cả các loại phân hữu cơ đất", d: "Thay thế toàn bộ lớp đất tự nhiên bằng các khối giá thể nhựa nhân tạo", ans: "b" },
        { id: 37, q: "Mục tiêu cốt lõi của các chiến lược quản lý bệnh cây bền vững hướng tới điều gì?", a: "Tăng tối đa chi phí đầu vào vật tư hóa chất để kích thích sinh khối ngắn hạn", b: "Giảm nguồn bệnh ban đầu, tăng cường đề kháng của cây, giảm thiểu dùng hóa chất và bảo vệ sức khỏe hệ sinh thái", c: "Tiêu diệt toàn bộ quần xã sinh vật hoại sinh bản địa quanh rhizosphere", d: "Cách ly tuyệt đối hệ sinh thái đồng ruộng khỏi thảm thực vật tự nhiên", ans: "b" },
        { id: 38, q: "Khác biệt cốt lõi giữa tác nhân kiểm soát sinh học (Biocontrol agents) và thuốc bảo vệ thực vật hóa học truyền thống là gì?", a: "Kiểm soát sinh học sử dụng các chất hữu cơ độc hại được tổng hợp nhân tạo", b: "Kiểm soát sinh học khai thác hoạt động đối kháng của các vi sinh vật tự nhiên (nấm, vi khuẩn, virus)", c: "Kiểm soát sinh học có thời gian tồn dư độc chất kéo dài hàng trăm năm trong đất", d: "Kiểm soát sinh học chỉ có khả năng tiêu diệt các cấu trúc tế bào thực vật chủ", ans: "b" },
        { id: 39, q: "Tác nhân kiểm soát sinh học ức chế và kìm hãm mầm bệnh thông qua những cơ chế đối kháng nào?", a: "Cung cấp đường carbohydrate giúp mầm bệnh tăng sinh khối nhanh hơn để tự chết", b: "Cạnh tranh dinh dưỡng và không gian sinh thái, sản xuất hợp chất kháng khuẩn, cảm ứng tính kháng hệ thống, ký sinh hoặc ăn thịt", c: "Làm đông cứng dung dịch đất khiến mầm bệnh không thể di chuyển tìm rễ cây", d: "Thay đổi hoàn toàn bộ gen DNA của cây trồng thành cấu trúc vô sinh", ans: "b" },
        { id: 40, q: "Loài nấm kiểm soát sinh học Trichoderma spp. thực hiện hoạt động đối kháng mầm bệnh nấm hại nhờ cơ chế nào?", a: "Trực tiếp truyền virus độc lực cao vào tế bào thực vật chủ để cây tự vệ", b: "Sản xuất enzyme phân giải thành tế bào nấm gây bệnh", c: "Bọc kín hệ rễ cây trồng bằng lớp màng nhựa polymer chống bám dính", d: "Hút cạn kiệt nguồn nước vùng rhizosphere để mầm bệnh bị khô héo chết", ans: "b" },
        { id: 41, q: "Nhóm nấm ký sinh Ampelomyces thực hiện hoạt động kiểm soát mầm bệnh bằng cách thức trực tiếp nào?", a: "Cạnh tranh sắt hòa tan bằng cách tiết ra hợp chất dính keo hạt đất", b: "Trực tiếp ký sinh trên nấm gây bệnh", c: "Thao túng hệ miễn dịch PTI của cây trồng để cây tăng tốc độ rụng lá", d: "Phan̂ hiệu toàn bộ cấu trúc xenlulozo của vách tế bào lông hút hệ rễ", ans: "b" },
        { id: 42, q: "Vi khuẩn kiểm soát sinh học thuộc chi Bacillus spp. ức chế sự phát triển của mầm bệnh nhờ hoạt động tổng hợp chất nào?", a: "Các acid vô cơ mạnh làm chua hóa dung dịch đất cực đoan", b: "Kháng sinh hoặc siderophore", c: "Các protein hiệu ứng kích ứng hoại tử mô tế bào rễ cây hoang", d: "Hormone hữu cơ bay hơi làm rụng hoa đồng loạt ban đêm", ans: "b" },
        { id: 43, q: "Việc hiểu rõ phạm vi vật chủ và tính đặc hiệu của các tác nhân kiểm soát sinh học có vai trò quan trọng như thế nào?", a: "Để tăng hàm lượng độc chất lên mức tối đa phá hủy quần xã bản địa", b: "Để lựa chọn tác nhân phù hợp cho quản lý bệnh, hạn chế tác động không mong muốn lên sinh vật có lợi và quá trình sinh thái", c: "Giúp rút ngắn chu kỳ sinh trưởng và phát triển sinh khối của cây trồng", d: "Phục vụ cho việc thiết kế các máy gặt đập cơ giới công suất lớn đồng ruộng", ans: "b" },
        { id: 44, q: "Các tác nhân kiểm soát sinh học thường được thương mại hóa dưới dạng chế phẩm vi sinh được bào chế thành các thể trạng nào?", a: "Thể khí nén áp suất cao bọc trong các bình vỏ kim loại dày", b: "Dung dịch, bột hoặc hạt để thuận tiện cho việc bảo quản và sử dụng", c: "Các khối đá cứng vô cơ cần nghiền nhỏ trước khi bón ruộng", d: "Các màng bọc nilon kéo sợi dùng để bao phủ bề mặt luống luống cây", ans: "b" },
        { id: 45, q: "Phương pháp ứng dụng phổ biến của chế phẩm vi sinh kiểm soát sinh học trên đồng ruộng bao gồm những kỹ thuật nào?", a: "Đốt cháy chế phẩm tạo khói hun toàn bộ thảm thực vật tán lá cao", b: "Tưới vào đất, phun lên lá, xử lý hạt giống và nhúng rễ", c: "Chôn sâu chế phẩm dưới tầng địa chất đá mẹ hoàn toàn thiếu không khí", d: "Phối trộn trực tiếp chế phẩm với thuốc diệt cỏ hóa học phổ rộng nồng độ cao", ans: "b" },
        { id: 46, q: "Hoạt động kiểm soát sinh học bằng vi sinh vật đạt được hiệu quả cao nhất khi kết hợp với chiến lược quản lý nào?", a: "Mô hình canh tác thâm canh cao độ sử dụng tối đa vật tư hóa chất tổng hợp", b: "Các chiến lược quản lý bệnh khác như luân canh cây trồng, vệ sinh đồng ruộng và sử dụng giống kháng bệnh", c: "Biện pháp bỏ hoang đất đai hoàn toàn không có sự quản lý của con người", d: "Mô hình trồng cây độc canh liên tục một giống duy nhất qua nhiều thập kỷ", ans: "b" },
        { id: 47, q: "Hệ thống quản lý dịch hại tổng hợp (IPM) phối trộn các biện pháp nào nhằm tối ưu hiệu quả kiểm soát bệnh, giảm tác động môi trường và chi phí?", a: "Biện pháp cơ giới tự động, kỹ thuật số hóa và thương mại điện tử nông sản", b: "Biện pháp sinh học, canh tác và hóa học hợp lý", c: "Các phương thức canh tác hoang dã tự nhiên biệt lập hoàn toàn vô sinh", d: "Kỹ thuật bức xạ tia gamma phối hợp with hệ thống tưới tiêu ngập úng sâu", ans: "b" },
        { id: 48, q: "Tương tác Rhizobium - Cây họ Đậu mang tính đặc hiệu vật chủ rất cao, điều này có nghĩa là gì?", a: "Bất kỳ loài vi khuẩn Rhizobium nào cũng có thể tạo nốt sần trên tất cả các loài thực vật", b: "Một chủng Rhizobium cụ thể chỉ có thể nhận diện đối tác và cộng sinh with một nhóm loài cây họ Đậu nhất định", c: "Vi khuẩn Rhizobium tự động tiêu diệt hệ rễ của các cây không phải họ Đậu", d: "Cây họ Đậu tự tiết ra chất độc để tiêu diệt tất cả các quần thể Rhizobium đất", ans: "b" },
        { id: 49, q: "Hiện tượng \"Kháng cảm ứng toàn thân\" (ISR) do vi sinh vật vùng rễ kích thích giúp thực vật thiết lập trạng thái sinh học nào?", a: "Ngừng hoàn toàn hoạt động trao đổi chất để né tránh sự tấn công của sâu hại", b: "Kích hoạt và đưa toàn bộ cơ thể cây vào trạng thái sẵn sàng phòng vệ hiệu quả trước mầm bệnh", c: "Tăng tốc độ thoát hơi nước khiến lá cây bị rụng đồng loạt vào mùa mưa", d: "Thay đổi cấu trúc bộ gen DNA biến cây thành cơ thể sinh vật nhân tạo", ans: "b" },
        { id: 50, q: "Nhận định nào sau đây tổng kết chính xác và đầy đủ nhất bản chất của các tương tác Thực vật – Vi sinh vật theo Chương 4?", a: "Vi sinh vật chỉ tương tác ngẫu nhiên bề mặt, không ảnh hưởng đến sinh lý của cây", b: "Tương tác Thực vật – Vi sinh vật (Cộng sinh, Gây bệnh, Kiểm soát sinh học) là mạng lưới động lực phức tạp chi phối sức khỏe, năng suất cây trồng và sự ổn định hệ sinh thái", c: "Tất cả các tương tác vi sinh vật đều mang bản chất gây bệnh và phá hủy mùa màng", d: "Kiểm soát sinh học bằng vi sinh vật hoàn toàn có thể thay thế nhu cầu tưới nước cho cây", ans: "b" }],
        p2: [{ id: 51, q: "Sự thích nghi tiến hóa đáng chú ý trong tương tác giữa thực vật và vi sinh vật nhằm thúc đẩy điều gì trong tự nhiên?", a: "Thành công sinh thái và lợi ích song phương", b: "Sự tích lũy nồng độ muối khoáng bão hòa", c: "Tốc độ bào mòn cơ học lớp đá mẹ địa chất", d: "Xu hướng tự động hóa của hệ thống canh tác", ans: "a" },
        { id: 52, q: "Cuộc đối thoại phân tử giữa thực vật và vi sinh vật cộng sinh điều phối trạng thái nào sau đây?", a: "Trạng thái bất hoạt hoàn toàn cơ chế hấp thu nước của rễ cây", b: "Một trạng thái cân bằng mong manh", c: "Sự đông cứng vật lý của cấu trúc keo sét đất vùng mặt", d: "Quá trình biến đổi gen đồng loạt các quần thể sinh vật bản địa", ans: "b" },
        { id: 53, q: "Việc nấm mycorrhiza mở rộng mạng lưới sợi nấm rộng lớn trong đất giúp thực vật tăng cường hấp thu chất nào?", a: "Carbohydrate và glucose tự do vùng rễ", b: "Nước và dinh dưỡng, đặc biệt là photpho và nitơ", c: "Các kim loại nặng độc hại và muối kết tủa", d: "Khí oxygen và nitrogen oxit áp suất cao", ans: "b" },
        { id: 54, q: "Nhóm sinh vật nào sinh sống trong mô bên trong của cây mà không gây hại rõ rệt cho cây chủ?", a: "Các loài nấm hoại sinh rễ sâu", b: "Các vi sinh vật nội sinh (Endophyte)", c: "Các vi khuẩn phản nitrat hóa yếm khí", d: "Tuyến trùng ký sinh gây thối nhũn tế bào", ans: "b" },
        { id: 55, q: "Vi khuẩn và nấm nội sinh sản xuất các hợp chất nào giúp thúc đẩy sinh trưởng cây và kích hoạt phản ứng phòng vệ?", a: "Các hợp chất thứ cấp", b: "Các axit vô cơ mạnh làm chua hóa mô tế bào", c: "Các protein hiệu ứng gây chết tế bào diện rộng", d: "Lớp màng dính polysaccharide chống thấm dung dịch", ans: "a" },
        { id: 56, q: "Các con đường tín hiệu phân tử giữa cây trồng và vi sinh vật điều hòa trực tiếp quá trình nào?", a: "Quá trình quang hợp ban đêm của tán lá thực vật", b: "Hình thành nốt sần, cộng sinh mycorrhiza và sự xâm nhập vào mô thực vật", c: "Tốc độ mài mòn vật lý của các máy cày cơ giới", d: "Sự bay hơi của các hợp chất nitơ lỏng ra ngoài không khí", ans: "b" },
        { id: 57, q: "Các tương tác cộng sinh định hình sự cạnh tranh và diễn thế thực vật, qua đó ảnh hưởng đến yếu tố nào của quần xã?", a: "Độ dốc cơ học và hướng thoát nước của luống đất", b: "Thành phần và tính đa dạng của quần xã thực vật", c: "Tổng khối lượng máy móc cơ giới hoạt động trên đồng ruộng", d: "Giá cả thu mua nông sản thương mại trên thị trường", ans: "b" },
        { id: 58, q: "Việc khai thác tiềm năng của cộng sinh giữa thực vật và vi sinh vật hướng tới mục tiêu sinh thái nào?", a: "Tăng cường lượng phân bón hóa học đa lượng phối trộn", b: "Nâng cao tính bền vững của nông nghiệp, phục hồi các hệ sinh thái bị suy thoái", c: "Tiêu diệt toàn bộ hệ vi sinh vật hoại sinh bản địa quanh rhizosphere", d: "Cách ly tuyệt đối hệ sinh thái đồng ruộng khỏi thảm thực vật tự nhiên", ans: "b" },
        { id: 59, q: "Quá trình gây bệnh (Pathogenesis) đề cập đến việc các vi sinh vật gây bệnh thực hiện hoạt động nào?", a: "Hỗ trợ rễ cây hấp thu dinh dưỡng khoáng nhanh hơn vào mùa khô", b: "Xâm nhập vào mô thực vật, né tránh hệ thống phòng vệ của vật chủ và gây triệu chứng bệnh", c: "Tổng hợp các hormone sinh trưởng kích thích phát triển hệ lông hút rễ", d: "Gắn kết các hạt cát thô thành cấu trúc kết tập đất ổn định", ans: "b" },
        { id: 60, q: "Hàng rào vật lý nào sau đây của cây trồng là con đường xâm nhập phổ biến của mầm bệnh?", a: "Lớp sáp cutin nguyên vẹn không có vết thương", b: "Khí khổng, vết thương hoặc các lỗ tự nhiên", c: "Mạch dẫn gỗ nằm sâu bên trong trung trụ thân cây", d: "Hệ thống các không bào chứa đầy dung dịch axit hữu cơ", ans: "b" },
        { id: 61, q: "Mầm bệnh hình thành cấu trúc chuyên biệt nào để tạo điều kiện cho sự định cư vững chắc trên vật chủ?", a: "Các nốt sần cố định đạm hoặc mạng lưới sợi nấm cộng sinh", b: "Giác bám (appressoria) hoặc cơ quan hút (haustoria)", c: "Lớp vỏ bọc polysaccharide chống thấm dung dịch hóa chất", d: "Các lông hút nhân tạo được tổng hợp từ protein thô", ans: "b" },
        { id: 62, q: "Yếu tố nào đóng vai trò then chốt quyết định mức độ thành công của quá trình xâm nhiễm của mầm bệnh?", a: "Chiều dài tuyệt đối của hệ mạch dẫn thân cây lâu năm", b: "Khả năng nhận biết và phản ứng with các tín hiệu từ vật chủ", c: "Độ sâu vật lý của tầng đất nơi hạt giống nảy mầm", d: "Nồng độ của phân bón kali clorua hòa tan trong nước tưới", ans: "b" },
        { id: 63, q: "Hợp chất nào dưới đây KHÔNG phải là một yếu tố độc lực (Virulence Factors) do mầm bệnh tiết ra?", a: "Độc tố và enzyme phân giải thành tế bào thực vật", b: "Protein hiệu ứng (effector) và các hợp chất chuyển hóa thứ cấp", c: "Các phân tử phytohormone kích thích rễ phát triển khỏe mạnh", d: "Các chất nhằm thao túng các quá trình tế bào của vật chủ", ans: "c" },
        { id: 64, q: "Vai trò sinh học của các protein hiệu ứng (effector) do mầm bệnh tiết ra là gì?", a: "Cung cấp chất hữu cơ giúp tế bào thực vật tăng tốc độ phân chia", b: "Thao túng hệ miễn dịch của cây, thay đổi sinh lý tế bào và thúc đẩy sự nhân lên của mầm bệnh", c: "Kết dính các hạt keo sét xung quanh rễ thành cấu trúc tập hợp ổn định", d: "Kích thích lá cây tăng cường hấp thu năng lượng ánh sáng ban ngày", ans: "b" },
        { id: 65, q: "Hệ thống miễn dịch của thực vật nhận biết các phân tử vi sinh vật bảo tồn (PAMPs) nhờ vào cấu trúc nào?", a: "Thụ thể nội bào giàu leucine nhóm NLR", b: "Các thụ thể nhận diện mẫu (PRRs) trên bề mặt tế bào", c: "Các lông hút cơ học cấu tạo từ chất sừng cellulose cứng", d: "Lớp màng nhầy protein bọc ngoài biểu bì tế bào mạch dẫn", ans: "b" },
        { id: 66, q: "Trạng thái miễn dịch \"PTI\" ở thực vật được định nghĩa là gì?", a: "Miễn dịch khởi phát bởi protein hiệu ứng effector độc lực cao", b: "Miễn dịch khởi phát bởi PAMP", c: "Trạng thái bất hoạt hoàn toàn cơ chế tự vệ của tế bào vật chủ", d: "Hiện tượng chết tế bào theo chương trình diện rộng ở hệ rễ", ans: "b" },
        { id: 67, q: "Trạng thái miễn dịch khởi phát bởi effector (ETI) được kích hoạt nhờ vào nhóm thụ thể nội bào nào?", a: "Thụ thể nhận diện mẫu PRRs phân bố bề mặt tế bào", b: "Thụ thể nội bào thuộc nhóm NLR (chứa vùng gắn nucleotide và giàu leucine)", c: "Các béc phun phân tử tín hiệu hormone điều hòa sinh trưởng cây", d: "Mạng lưới các chuỗi enzyme amôn hóa phân hóa cấu trúc protein", ans: "b" },
        { id: 68, q: "Sự tương tác động giữa hai trạng thái miễn dịch nào quyết định kết quả cuối cùng của mối quan hệ cây – mầm bệnh?", a: "Giữa quá trình quang hợp ban ngày và hô hấp tế bào ban đêm", b: "Giữa miễn dịch PTI và miễn dịch ETI", c: "Giữa quan hệ cộng sinh Rhizobium và liên kết nấm rễ Mycorrhiza", d: "Giữa sự hấp thu đạm amoni và sự cố định đạm nitrat hữu cơ", ans: "b" },
        { id: 69, q: "Triệu chứng bệnh nào sau đây KHÔNG phải là kết quả của việc mầm bệnh thao túng các quá trình sinh lý của cây chủ?", a: "Hoại tử, héo rũ, vàng lá (chlorosis) và phì đại mô", b: "Tăng cường hàm lượng diệp lục giúp lá cây xanh thẫm và quang hợp mạnh hơn", c: "Làm gián đoạn sự vận chuyển nước và dinh dưỡng", d: "Thay đổi các con đường tín hiệu hormone và kích thích quá trình chết tế bào", ans: "b" },
        { id: 70, q: "Việc quản lý hiệu quả bệnh cây đòi hỏi một cách tiếp cận đa chiều, tích hợp các biện pháp nào?", a: "Chỉ phun thuốc hóa học độc hại nồng độ cao liên tục theo lịch cố định", b: "Kết hợp các biện pháp canh tác, tính kháng của giống, tác nhân kiểm soát sinh học và thuốc bảo vệ thực vật hóa học", c: "Ngừng hoàn toàn việc tưới nước và bón tất cả các loại phân hữu cơ đất", d: "Thay thế toàn bộ lớp đất tự nhiên bằng các khối giá thể nhựa nhân tạo", ans: "b" },
        { id: 71, q: "Mục tiêu bền vững của các biện pháp quản lý bệnh cây hướng đến điều gì đối với hệ sinh thái?", a: "Tăng tối đa chi phí đầu vào vật tư hóa chất để kích thích sinh khối ngắn hạn", b: "Giảm thiểu sử dụng hóa chất và bảo vệ sức khỏe hệ sinh thái, đảm bảo năng suất và an ninh lương thực", c: "Tiêu diệt toàn bộ quần xã sinh vật hoại sinh bản địa quanh rhizosphere", d: "Cách ly tuyệt đối hệ sinh thái đồng ruộng khỏi thảm thực vật tự nhiên", ans: "b" },
        { id: 72, q: "Kiểm soát sinh học (Biocontrol) trong tương tác thực vật – vi sinh vật được hiểu là hoạt động gì?", a: "Sử dụng các chất hữu cơ độc hại được tổng hợp nhân tạo để khử trùng đất", b: "Việc sử dụng các vi sinh vật có lợi để ức chế bệnh cây và thúc đẩy sức khỏe cây trồng thông qua cơ chế sinh thái", c: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của tán lá thực vật", d: "Làm đông cứng kết cấu vật lý của các hạt keo sét vùng rhizosphere", ans: "b" },
        { id: 73, q: "Khác với thuốc bảo vệ thực vật hóa học, các tác nhân kiểm soát sinh học khai thác hoạt động đối kháng của đối tượng nào?", a: "Các hợp chất hữu cơ độc hại tồn dư lâu năm trong đất", b: "Các vi sinh vật tự nhiên như nấm, vi khuẩn và virus", c: "Hệ thống các màng lọc cơ học lắp đặt xung quanh vùng rễ", d: "Các nguyên tố khoáng đa lượng dạng ion hòa tan", ans: "b" },
        { id: 74, q: "Một trong những lợi ích lớn nhất của kiểm soát sinh học trong bảo vệ thực vật là gì?", a: "Tiêu diệt toàn bộ hệ thảm thực vật xung quanh vùng nhiễm bệnh", b: "Giảm sử dụng hóa chất tổng hợp và bảo vệ hệ sinh thái", c: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của tán lá", d: "Làm đông cứng kết cấu vật lý của các hạt keo sét vùng rhizosphere", ans: "b" },
        { id: 75, q: "Hoạt động đối kháng của tác nhân kiểm soát sinh học KHÔNG bao gồm cơ chế nào sau đây?", a: "Cạnh tranh dinh dưỡng và không gian sinh thái", b: "Sản xuất các hợp chất kháng khuẩn và cảm ứng tính kháng hệ thống", c: "Ký sinh hoặc ăn thịt các sinh vật gây bệnh", d: "Thúc đẩy sự nhân lên và độc lực của các mầm bệnh nguy hiểm", ans: "d" },
        { id: 76, q: "Cơ chế tác động (Mode of Action) của các tác nhân kiểm soát sinh học thay đổi tùy thuộc vào yếu tố nào?", a: "Kích thước cơ học của vòi phun thuốc bảo vệ thực vật", b: "Mối tương tác cụ thể giữa tác nhân, mầm bệnh và cây chủ", c: "Tổng lượng phân bón vô cơ đa lượng đã bón vào đất trước đó", d: "Giá cả thương mại của sản phẩm trên thị trường vật tư nông nghiệp", ans: "b" },
        { id: 77, q: "Loài nấm kiểm soát sinh học Trichoderma spp. ức chế mầm bệnh nấm hại nhờ hoạt động sản xuất chất gì?", a: "Hormone hữu cơ bay hơi làm rụng lá già để tiết kiệm năng lượng", b: "Enzyme phân giải thành tế bào nấm", c: "Lớp màng nhầy polymer bọc kín bề mặt biểu bì rễ cây", d: "Các acid vô cơ mạnh làm chua hóa dung dịch đất cực đoan", ans: "b" },
        { id: 78, q: "Nhóm nấm ký sinh Ampelomyces thực hiện hoạt động kiểm soát sinh học thông qua cơ chế trực tiếp nào?", a: "Cạnh tranh sắt hòa tan bằng cách tiết ra hợp chất dính keo hạt đất", b: "Trực tiếp ký sinh trên nấm gây bệnh", c: "Thao túng hệ miễn dịch PTI của cây trồng để cây tăng tốc độ rụng lá", d: "Phan̂ hiệu toàn bộ cấu trúc xenlulozo của vách tế bào lông hút hệ rễ", ans: "b" },
        { id: 79, q: "Vi khuẩn kiểm soát sinh học thuộc chi Bacillus spp. sản xuất chất nào để ức chế sự phát triển của mầm bệnh?", a: "Các acid vô cơ mạnh làm chua hóa dung dịch đất cực đoan", b: "Kháng sinh hoặc siderophore", c: "Các protein hiệu ứng kích ứng hoại tử mô tế bào rễ cây hoang", d: "Hormone hữu cơ bay hơi làm rụng hoa đồng loạt ban đêm", ans: "b" },
        { id: 80, q: "Một số vi khuẩn kiểm soát sinh học có khả năng kích thích tính kháng hệ thống của cây thông qua việc tạo ra chất nào?", a: "Các chất cảm ứng hoặc hợp chất hữu cơ bay hơi", b: "Enzyme amôn hóa phân hóa cấu trúc protein hữu cơ", c: "Các hạt cát, sỏi vô cơ phân bố xung quanh vùng lông hút", d: "Các ion kim loại nặng khó tan trong dung dịch keo đất", ans: "a" },
