                    { id: 6, q: "Hợp chất hữu cơ nào có trong chất tiết rễ đóng vai trò là phân tử tín hiệu để thu hút vi khuẩn cố định đạm Rhizobium đến ký sinh ở rễ cây họ Đậu?", a: "Đường sucrose tinh khiết", b: "Các hợp chất Flavonoid chuyên biệt", c: "Axit sulfuric loãng", d: "Khí methane lỏng", ans: "b" },
                    { id: 7, q: "Quá trình \"Hòa tan lân\" (Phosphorus solubilization) của vi khuẩn vùng rễ giúp chuyển hóa chất nào thành dạng ion dễ tiêu cho cây?", a: "Chuyển hóa phức hợp quặng photphat vô cơ khó tan thành các ion photphat hòa tan (HPO4^2-, H2PO4^-)", b: "Biến đổi nguyên tố photpho thành dạng hợp chất khí độc hại bay hơi tự do", c: "Thủy phân hoàn toàn mạch polymer cellulose cấu tạo vách tế bào lông hút rễ", d: "Ngăn cản thực vật hấp thu các ion khoáng đa lượng Kali từ dung dịch keo đất", ans: "a" },
                    { id: 8, q: "Loại nấm cộng sinh vùng rễ nào hình thành các cấu trúc túi và túi sợi (arbuscules) bên trong tế bào vỏ rễ để trao đổi dinh dưỡng với cây trồng?", a: "Nấm sợi hoại sinh phân hủy rơm rạ Phanerochaete chrysosporium", b: "Nấm rễ nội cộng sinh (Arbuscular Mycorrhizal Fungi - AMF)", c: "Nấm ký sinh gây bệnh vàng lá rỉ sắt Puccinia graminis", d: "Nấm đối kháng kiểm soát sinh học Trichoderma harzianum", ans: "b" },
                    { id: 9, q: "Vi khuẩn vùng rễ tiết ra hormone Indole-3-acetic acid (IAA) mang lại lợi ích sinh học trực tiếp nào cho hệ rễ thực vật?", a: "Làm teo nhỏ các tế bào lông hút để né tránh vùng đất có độc chất hóa học", b: "Kích thích sự kéo dài tế bào, phân nhánh rễ và tăng diện tích hấp thu dinh dưỡng của hệ rễ", c: "Đóng băng hoàn toàn hoạt động hút nước của hệ thống mạch dẫn trung trụ", d: "Biến đổi cấu trúc gen di truyền của rễ thành dòng sinh vật nhân tạo", ans: "b" },
                    { id: 10, q: "Thành phần \"Rhizoplane\" trong cấu trúc không gian vùng rễ được định nghĩa sinh học là gì?", a: "Vùng đất nằm cách bề mặt rễ cây trồng một khoảng cách vật lý từ 5 đến 10 cm", b: "Bề mặt rễ thực vật, bao gồm cả lớp biểu bì và các lông rễ bám dính vi sinh vật", c: "Khoảng không khí bầu khí quyển bao quanh tán lá tầng cao thực vật", d: "Lớp màng nhựa nilon polymer bọc kín bề mặt tầng canh tác luống đất", ans: "b" },
                    { id: 11, q: "Chất tiết rễ thực vật chứa các axit hữu cơ có trọng lượng phân tử nhỏ (như axit citric, axit malic) giải phóng ion lân bị cố định bằng cơ chế hóa học nào?", a: "Oxy hóa trực tiếp ion photphat thành dạng tinh thể đá khoáng rắn trơ vĩnh viễn", b: "Chelat hóa các cation kim loại (Al^3+, Fe^3+, Ca^2+), giải phóng ion photphat tự do vào dung dịch đất", c: "Tăng độ pH dung dịch đất lên mức kiềm cực đoan để đông cứng màng tế bào vi khuẩn", d: "Phân hủy toàn bộ sinh khối tế bào của hệ nấm hoại sinh bản địa phân bố xung quanh", ans: "b" },
                    { id: 12, q: "Nhóm vi khuẩn tự dưỡng nào thực hiện bước oxy hóa amoni (NH4+) thành nitrite (NO2-) trong chu trình nitơ diễn ra tại vùng rễ?", a: "Vi khuẩn Nitrobacter", b: "Vi khuẩn Nitrosomonas", c: "Vi khuẩn Rhizobium", d: "Vi khuẩn Clostridium", ans: "b" },
                    { id: 13, q: "Sự cộng sinh giữa nấm Mycorrhiza và rễ cây trồng mang lại lợi ích tương hỗ cốt lõi nào cho cả hai bên sinh vật?", a: "Cây cung cấp đạm vô cơ, nấm cung cấp hormone tăng trưởng chiều cao thân lá trên cao", b: "Cây cung cấp carbon hữu cơ (đường quang hợp), nấm cung cấp nước và các khoáng chất (đặc biệt là lân)", c: "Nấm phân hủy hoàn toàn biểu bì rễ cây để lấy không gian bám dính bọc kín mạch gỗ", d: "Cả hai bên cùng tiết ra các chất độc hữu cơ vòng thơm để triệt tiêu quần xã vi khuẩn bản địa", ans: "b" },
                    { id: 14, q: "Khi nồng độ oxy trong đất vùng rễ bị cạn kiệt do ngập úng, hoạt động của nhóm vi sinh vật nào sẽ tăng mạnh gây thất thoát đạm phân bón?", a: "Vi khuẩn cố định đạm hiếu khí tự do Azotobacter", b: "Vi khuẩn phản nitrat hóa yếm khí (Denitrifiers), chuyển nitrate thành khí nitơ (N2)", c: "Nấm rễ nội cộng sinh mở rộng mạng lưới sợi nấm hút dinh dưỡng khoáng", d: "Xạ khuẩn Streptomyces sản sinh kháng sinh ức chế bào tử nấm mầm bệnh", ans: "b" },
                    { id: 15, q: "Thuật ngữ \"Endosphere\" trong phân vùng sinh học rễ thực vật dùng để chỉ không gian cư trú nào của vi sinh vật?", a: "Lớp đất mặt thô ráp phân bố cách xa hệ thống lông hút rễ thực vật nông thôn", b: "Vùng không gian nằm bên trong các mô rễ thực vật, giữa các tế bào hoặc nội bào", c: "Bề mặt ngoài của vỏ hạt giống trước khi tiến hành gieo trồng xuống luống đất", d: "Phần không khí lưu thông giữa các tán lá tầng cao tiếp xúc trực tiếp ánh sáng", ans: "b" },
                    { id: 16, q: "Vi khuẩn cố định đạm cộng sinh Rhizobium sau khi xâm nhập vào tế bào rễ cây họ Đậu sẽ biến đổi hình thái thành cấu trúc nào để thực hiện chức năng?", a: "Khuẩn lạc sợi nấm hoại sinh kéo dài phân nhánh", b: "Thể khuẩn khuẩn lạc vô hình (Bacteroid) bọc trong màng bao nốt sần", c: "Tinh thể độc tố hình quả trám gây thủng màng ruột côn trùng hại cây", d: "Hạt virus trần không có vỏ protein capsid bao bọc bên ngoài di truyền", ans: "b" },
                    { id: 17, q: "Hợp chất \"Glomalin\" do sợi nấm Mycorrhiza tiết ra ở vùng rễ có vai trò sinh học vật lý quan trọng nào đối với đất?", a: "Hòa tan cấu trúc khoáng thạch anh mịn thành dạng dung dịch lỏng hòa tan bão hòa", b: "Hoạt động như chất keo sinh học ổn định, gắn kết các hạt đất thành cấu trúc hạt kết tập bền vững", c: "Tiêu diệt toàn bộ hệ vi khuẩn PGPR do hiện tượng khống sinh học độc quyền dinh dưỡng", d: "Làm tăng độ dốc và tính lún sụt cơ học của hệ thống rãnh luống thoát nước nội đồng", ans: "b" },
                    { id: 18, q: "Hiện tượng \"Cạnh tranh không gian sống và dinh dưỡng\" của vi khuẩn PGPR ở rhizosphere là cơ chế đối kháng chống lại mầm bệnh theo cách nào?", a: "Vi khuẩn PGPR tiết chất độc làm chết tế bào lông rễ để mầm bệnh mất nguồn thức ăn", b: "Vi khuẩn PGPR nhanh chóng định cư bọc kín bề mặt rễ và tiêu thụ nguồn cơ chất, ngăn cản mầm bệnh bám dính", c: "Vi khuẩn PGPR thay đổi hoàn toàn cấu trúc bộ gen di truyền DNA của nấm hại thực vật", d: "Đông cứng các phân tử nước dung dịch đất khiến bào tử nấm bệnh không nảy mầm được", ans: "b" },
                    { id: 19, q: "Yếu tố nào dưới đây của cây trồng quyết định tính chuyên biệt và thành phần loài của quần xã vi sinh vật cư trú tại vùng rễ của cây đó?", a: "Chiều cao vật lý của thân cây và số lượng cành nhánh phân bố trên tầng không lưu thông", b: "Thành phần và số lượng của các chất tiết rễ (Root exudates) thay đổi theo loài cây và giai đoạn sinh trưởng", c: "Màu sắc tự nhiên của cánh hoa và cấu trúc cơ học của vỏ quả chín thu hoạch thương mại", d: "Độ sâu vật lý tối đa của lưỡi cày khi tiến hành xáo trộn kết cấu các tầng hạt đất mặt luống", ans: "b" },
                    { id: 20, q: "Vi khuẩn vùng rễ thuộc chi Bacillus (như Bacillus megaterium) hòa tan lân vô cơ khó tan chủ yếu nhờ vào hoạt động bài tiết chất nào?", a: "Axit vô cơ mạnh như axit sunfuric và axit nitric nồng độ bão hòa độc tính", b: "Các axit hữu cơ (như axit lactic, axit gluconic) làm giảm pH cục bộ và giải phóng ion lân", c: "Hợp chất glycoprotein glomalin bám dính bề mặt cấu trúc hạt cát kết tập đất", d: "Phân tử kháng sinh lipopeptide phá hủy màng tế bào sợi nấm gây bệnh thối mục rễ", ans: "b" },
                    { id: 21, q: "Khi đất vùng rễ bị chua hóa cực đoan (pH < 4.5), hoạt động của nhóm vi sinh vật chức năng nào bị ức chế mạnh nhất, ảnh hưởng đến dinh dưỡng đạm của cây?", a: "Hệ nấm hoại sinh phân hủy chất hữu cơ xơ xenlulozo gỗ cứng rơm rạ", b: "Vi khuẩn nitrat hóa hiếu khí và vi khuẩn cố định đạm nốt sần Rhizobium", c: "Quần thể virus thực vật ký sinh nội bào truyền qua vector côn trùng hại lá", d: "Các loài động vật nguyên sinh trùng amip ăn mồi khuẩn lạc vùng rhizosphere", ans: "b" },
                    { id: 22, q: "Khái niệm \"Chất tiết rễ thực vật chứa hợp chất phenol như \"Strigolactone\" đóng vai trò sinh học phân tử cốt lõi nào đối với nấm Mycorrhiza?", a: "Chất độc ức chế tuyệt đối sự nảy mầm của bào tử nấm rễ nội cộng sinh đất", b: "Phân tử tín hiệu kích thích sự nảy mầm của bào tử và sự phân nhánh sợi nấm Mycorrhiza để tiếp cận rễ cây", c: "Nguồn cung cấp nguyên tố khoáng đa lượng đạm và kali nồng độ cao bão hòa dung dịch", d: "Lớp màng nhầy polymer bảo vệ sợi nấm khỏi tác động cực đoan của ánh sáng cực tím mặt", ans: "b" },
                    { id: 23, q: "Khái niệm \"Rhizosphere competence\" (năng lực vùng rễ) của một chủng vi khuẩn kiểm soát sinh học được hiểu là khả năng:", a: "Tự tiêu biến hoàn toàn sinh khối tế bào sau khi tiếp xúc với phân bón hóa học urê thâm canh", b: "Định cư, nhân rộng mật độ quần thể và duy trì sự sống ổn định tại vùng rễ cây trồng sau khi bổ sung", c: "Biến đổi cấu trúc gen di truyền thành dòng virus thực vật ký sinh nội bào biểu bì thân lá cao", d: "Phân hủy cơ học các khoáng silicat đá mẹ thành hạt keo sét mịn không thông thoáng không khí", ans: "b" },
                    { id: 24, q: "Hoạt động tiết enzyme \"Phytase\" của vi sinh vật vùng rễ có chức năng sinh học cụ thể nào trong chu trình phospho?", a: "Thủy phân hợp chất photphat hữu cơ phytate (axit phytic) giải phóng ion photphat vô cơ cây hấp thu", b: "Oxy hóa quặng photphat apatit rắn trơ thành tinh thể đá khoáng mịn kích thước hạt keo sét", c: "Tổng hợp các chuỗi polymer photphat phân tử lớn tích lũy bên trong không bào khuẩn lạc khuẩn", d: "Kết hợp ion photphat với kim loại nặng chì và cadmium để tăng độc tính cấp dung dịch đất", ans: "a" },
                    { id: 25, q: "Sự tương tác giữa tuyến trùng ký sinh thực vật (như Meloidogyne incognita) và vi khuẩn vùng rễ Pasteuria penetrans thể hiện mối quan hệ:", a: "Cộng sinh tương hỗ cùng có lợi thúc đẩy sinh trưởng bộ rễ kéo dài sâu tầng đất", b: "Ký sinh hoặc đối kháng sinh học (Pasteuria penetrans ký sinh tiêu diệt tuyến trùng hại rễ)", c: "Hội sinh không gây ảnh hưởng sinh học rõ rệt đến mật độ quần thể của nhau vùng rễ", d: "Hiệp đồng kép giúp tăng tốc độ xâm nhiễm phá hủy hệ thống mạch dẫn trung trụ thân cây", ans: "b" },
                    { id: 26, q: "Thành phần chất tiết rễ thực vật bao gồm hợp chất nhầy \"Mucilage\" do tế bào mũ rễ tiết ra có chức năng vật lý sinh học nào?", a: "Làm khô cằn hoàn toàn dung dịch keo đất xung quanh bề mặt hệ thống lông hút thực vật", b: "Bôi trơn chóp rễ giúp rễ dễ xuyên qua đất, bảo vệ rễ khỏi bị khô và tạo môi trường cho vi sinh vật bám dính", c: "Đông cứng các liên kết hạt cát thô thành khối đá cứng trơ chống chịu mọi loại máy móc cơ giới", d: "Tiêu diệt tuyệt đối quần xã vi khuẩn cố định đạm sống tự do do hiện tượng khống sinh học đất", ans: "b" },
                    { id: 27, q: "Mối quan hệ giữa động vật nguyên sinh (Protozoa) ăn vi khuẩn và quần thể vi khuẩn PGPR ở rhizosphere tạo ra hiệu ứng gì cho chu trình nitơ?", a: "Triệt tiêu hoàn toàn lượng đạm vô cơ trong đất do tiêu thụ hết sinh khối tế bào vi khuẩn có ích", b: "\"Hiệu ứng vòng lặp dinh dưỡng đất\" (Microbial loop), giải phóng đạm amoni (NH4+) dễ tiêu từ sinh khối vi khuẩn cho cây", c: "Kích thích vi khuẩn biến đổi thành dòng virus thực vật truyền nhiễm vàng lá sọc tăm tán lá cao", d: "Làm chặt khít các hạt keo sét khiến không khí oxy không thể lưu thông giữa các tầng hạt kết tập", ans: "b" },
                    { id: 28, q: "Xạ khuẩn vùng rễ Streptomyces spp. nổi tiếng với năng lực sinh học nào giúp bảo vệ rễ cây trước tác nhân nấm bệnh hại?", a: "Quang hợp tự nhiên ban ngày tích lũy nguồn carbon hữu cơ thô nuôi dưỡng lông hút rễ", b: "Khả năng sản sinh phong phú các hợp chất kháng sinh và enzyme ly giải vách tế bào nấm bệnh (chitinase)", c: "Tự động co ngắn chiều dài sợi xạ khuẩn để nhường toàn bộ không gian bám dính cho mầm bệnh hại", d: "Thao túng hệ thống gen di truyền thực vật để cây trồng tự rụng toàn bộ hệ thống tán lá già đồng loạt", ans: "b" },
                    { id: 29, q: "Sự hiện diện của hợp chất \"Leghemoglobin\" bên trong nốt sần rễ cây họ Đậu giữ chức năng cốt lõi nào cho phức hệ enzyme nitrogenase?", a: "Hấp thu toàn bộ nguồn dinh dưỡng kali lỏng hòa tan để nuôi dưỡng tế bào khuẩn lạc vi khuẩn", b: "Liên kết và điều hòa nồng độ oxy tự do (O2) ở mức cực thấp để bảo vệ enzyme nitrogenase không bị bất hoạt", c: "Tăng nồng độ khí oxy lên mức bão hòa tối đa giúp vi khuẩn hô hấp hiếu khí mạnh mẽ phân chia nhanh", d: "Tạo lớp vỏ polymer màu đỏ cứng bao bọc nốt sần chống lại sự phá hủy cơ học của máy cày máy bừa", ans: "b" },
                    { id: 30, q: "Quá trình \"Khoáng hóa lưu huỳnh\" (Sulfur mineralization) ở vùng rễ do vi sinh vật hoại sinh thực hiện giúp chuyển hóa chất hữu cơ chứa S thành ion vô cơ nào?", a: "Ion sulfua (S2-) tích lũy độc tính làm đen thối toàn bộ hệ thống lông hút hệ rễ thực vật", b: "Ion sulfate (SO4^2-) – dạng lưu huỳnh vô cơ dễ tan cây trồng hấp thu sử dụng tổng hợp protein", c: "Khí lưu huỳnh đioxit (SO2) áp suất cao giải phóng bùng phát ra tầng không khí sát bề mặt ruộng", d: "Tinh thể lưu huỳnh nguyên tố rắn trơ bám dính chặt vào bề mặt hạt cát thô vô cơ đất tầng canh", ans: "b" },
                    { id: 31, q: "Vi khuẩn Pseudomonas tiết ra hợp chất Phenazine ở vùng rễ thực hiện cơ chế đối kháng nào chống lại nấm bệnh Fusarium oxysporum?", a: "Cung cấp carbohydrate nuôi dưỡng sợi nấm phát triển nhanh tự tiêu hao hết vòng đời", b: "Hoạt động như chất kháng sinh phổ rộng, gây rối loạn chuỗi truyền điện tử và tiêu diệt tế bào nấm bệnh", c: "Bao bọc cấu trúc bào tử nấm thành khối tinh thể đá khoáng rắn trơ khó phân hủy sinh học", d: "Kích thích nấm bệnh tiết ra nhiều độc tố hơn để phá hủy cơ giới hệ thống mạch dẫn gỗ thân cây", ans: "b" },
                    { id: 32, q: "Hiện tượng \"Kích kháng cảm ứng toàn thân\" (Induced Systemic Resistance - ISR) ở thực vật do vi khuẩn PGPR kích hoạt bắt đầu từ vùng nào?", a: "Bắt đầu từ sự nhận diện các phân tử tín hiệu (MAMPs) của vi khuẩn tại vùng rễ, truyền tín hiệu lên thân lá để tự vệ", b: "Bắt đầu từ sự phun thuốc bảo vệ thực vật hóa học nồng độ độc độc cao bọc kín biểu bì tán lá tầng cao", c: "Bắt đầu từ hiện tượng tế bào rễ thực vật tự hoại tử chết đồng loạt để cách ly hoàn toàn nguồn bệnh hại", d: "Bắt đầu từ hoạt động cơ giới hóa sử dụng máy gặt đập liên hợp xáo trộn kết cấu vật lý các tầng luống", ans: "b" },
                    { id: 33, q: "Sự biểu hiện của gen acdS mã hóa enzyme ACC deaminase ở vi khuẩn vùng rễ giúp cây trồng chống chịu stress mặn nhờ cơ chế phân tử nào?", a: "Tăng hàm lượng muối natri clorua tích lũy bên trong không bào tế bào lông hút hệ rễ thực vật", b: "Phân hủy tiền chất 1-aminocyclopropane-1-carboxylic acid, làm giảm hàm lượng khí ethylene gây già hóa stress ở cây", c: "Biến đổi toàn bộ lượng nước dung dịch đất thành cấu trúc tinh thể rắn trơ chống chịu mọi xói mòn xói lở", d: "Ngăn cản thực vật thực hiện phản ứng quang hợp tự nhiên ban ngày thu nhận năng lượng ánh sáng mặt trời", ans: "b" },
                    { id: 34, q: "Vi sinh vật vùng rễ hòa tan nguyên tố Kali (K) từ các khoáng vật silicat (như fenspat, mica) chủ yếu thông qua hoạt động hóa học nào?", a: "Tiết ra các axit hữu cơ và ion H+ thực hiện phản ứng trao đổi ion và phong hóa hóa học cấu trúc khoáng", b: "Sản sinh hợp chất kháng sinh lipopeptide bám dính bọc kín cấu trúc tinh thể đá quặng đá mẹ thô ráp", c: "Thao túng bộ gen di truyền DNA của khoáng vật biến khoáng thành sinh khối chất hữu cơ mùn ổn định", d: "Hấp thu toàn bộ lượng nước dung dịch keo đất để tạo áp suất cơ giới lớn làm nứt vỡ hạt cát thô ráp", ans: "a" },
                    { id: 35, q: "Kỹ thuật tin sinh học \"Metagenomics\" (Hệ gen học môi trường) ứng dụng nghiên cứu vùng rễ giúp khắc phục giới hạn lớn nào của phương pháp truyền thống?", a: "Khắc phục việc không thể đo đạc chính xác chiều dài vật lý cơ giới của rễ cây trồng ngoài đồng ruộng", b: "Cho phép phân tích toàn bộ quần xã vi sinh vật bao gồm cả nhóm không thể nuôi cấy (chiếm >99% trong tự nhiên)", c: "Thay thế hoàn toàn mọi hoạt động canh tác luân canh cây trồng và vệ sinh đồng ruộng của người nông dân", d: "Tính toán chính xác biên lợi nhuận kinh tế tài chính ngắn hạn của các công ty sản xuất vật tư nông nghiệp", ans: "b" },
                    { id: 36, q: "Quá trình \"Nitrat hóa\" (Nitrification) diễn ra tại vùng rễ cây trồng cạn thông thoáng khí chuyển hóa đạm amoni thành dạng đạm nào cây rất ưa thích?", a: "Khí nitơ oxit (N2O) bay hơi giải phóng ra ngoài bầu khí quyển mặt gây hiệu ứng nhà kính tầng cao", b: "Ion nitrate (NO3^-) hòa tan tự do trong dung dịch đất canh tác mặt luống thực vật hấp thu nhanh", c: "Hợp chất amin hữu cơ mạch phức tạp tích lũy bên trong cấu trúc không bào lông hút rễ thực vật", d: "Tinh thể muối amoni clorua rắn trơ bám dính chặt vào bề mặt keo sét tầng địa chất sâu đá mẹ", ans: "b" },
                    { id: 37, q: "Mối quan hệ giữa cây sợi (như cây bông) và nấm rễ nội cộng sinh AMF bị suy giảm mạnh nhất khi nông dân thực hiện biện pháp thực hành nào?", a: "Luân canh cây trồng liên tục với các loài cây họ Đậu có nốt sần cố định đạm tự nhiên vùng rễ", b: "Lạm dụng bón quá nhiều phân bón hóa học chứa lân (phospho dễ tan) vào đất canh tác vùng rễ cây", c: "Bổ sung hàm lượng chất hữu cơ mùn hoai mục định kỳ hàng năm vào các tầng hạt kết tập mặt luống", d: "Sử dụng hệ thống tưới tiêu nhỏ giọt công nghệ cao điều khiển tự động hóa lượng nước dung dịch keo", ans: "b" },
                    { id: 38, q: "Sự hình thành \"Màng sinh học\" (Biofilm) của vi khuẩn PGPR trên bề mặt rễ thực vật mang lại ưu thế sinh học nào cho vi khuẩn?", a: "Giúp vi khuẩn nhanh chóng tự phân hủy tế bào để giải phóng chất dinh dưỡng hữu cơ thô nuôi rễ cây", b: "Tăng khả năng chống chịu với các stress môi trường, duy trì mật độ quần thể ổn định và bám dính chặt vào rễ", c: "Biến đổi vi khuẩn thành nhóm vi sinh vật phản nitrat hóa yếm khí bắt buộc làm nghèo hàm lượng đạm đất", d: "Phá hủy hoàn toàn cấu trúc cơ học vách tế bào biểu bì lông hút khiến rễ cây trồng bị còi cọc thối rũ", ans: "b" },
                    { id: 39, q: "Chất tiết rễ chứa các hợp chất phenol kháng khuẩn tự nhiên do cây trồng tiết ra khi bị nấm bệnh tấn công được xếp vào nhóm nào?", a: "Hormone phytohormone kích thích sinh trưởng kéo dài chiều dài thân lá tầng cao trên không lưu thông", b: "Các chất phytoalexin hoặc hợp chất phòng vệ thực vật điều hòa quần xã vi sinh vật rhizosphere hướng có lợi", c: "Nguồn dinh dưỡng đường sucrose bão hòa nồng độ cao cung cấp cơ chất thô nuôi dưỡng khuẩn lạc nấm bệnh", d: "Các phân tử nhựa polymer cứng cách ly hoàn toàn hệ thống mạch dẫn mạch gỗ khỏi mọi tương tác dung dịch lỏng", ans: "b" },
                    { id: 40, q: "Nhóm cổ khuẩn sinh methane (Methanogens) phân bố ở vùng rễ lúa nước ngập mặt thực hiện phản ứng chuyển hóa cuối cùng tạo ra khí nào?", a: "Khí oxy tự do (O2) cung cấp không khí thông thoáng thông khí cho các tầng hạt kết tập keo sét đất mặt", b: "Khí methane (CH4) – một loại khí nhà kính phát sinh từ hoạt động phân hủy yếm khí chất hữu cơ vùng rễ", c: "Khí amoniac (NH3) mùi khai đặc trưng tích lũy hàm lượng đạm vô cơ lỏng tự nhiên cho dung dịch đất mặt", d: "Khí lưu huỳnh đioxit (SO2) áp suất cao gây chua hóa cực đoan dung dịch keo đất tầng canh tác luống cây", ans: "b" },
                    { id: 41, q: "Hiện tượng \"Sắt bị cố định\" trong đất kiềm, đất vôi khiến rễ cây không thể hấp thu được giải quyết bền vững nhờ hoạt động nào ở rhizosphere?", a: "Việc phun các dung chất tẩy rửa hóa học mạnh phổ rộng trực tiếp xuống sâu lòng tầng canh tác mặt ruộng", b: "Hoạt động tiết hợp chất chelat sắt siderophore của vi khuẩn PGPR hòa tan và vận chuyển sắt vào rễ cây", c: "Sự tự nhân đôi bộ gen di truyền DNA của hệ virus thực vật ký sinh nội bào biểu bì thân cây lâu năm canh", d: "Tốc độ chuyển dịch cơ giới hóa thâm canh cao độ sử dụng máy móc lớn công suất thiết kế cơ khí lớn nông", ans: "b" },
                    { id: 42, q: "Nhóm vi sinh vật đất nào đóng vai trò chủ đạo trong việc chuyển hóa các hợp chất mangan và sắt khó tan thành dạng ion (Mn2+, Fe2+) dễ hấp thu cho thực vật?", a: "Hệ virus thực vật ký sinh nội bào biểu bì tán lá tầng cao", b: "Các vi khuẩn khử sắt và mangan hoạt động trong điều kiện thích hợp", c: "Động vật nguyên sinh trùng amip ăn mồi khuẩn vùng rhizosphere", d: "Phức hợp quặng photphat vô cơ apatit rắn trơ phân bố sâu", ans: "b" },
                    { id: 43, q: "Sự sẵn có và luân chuyển của các nguyên tố kali, canxi và magie trong dung dịch đất phụ thuộc rất lớn vào hoạt động sinh học nào của vi sinh vật?", a: "Hoạt động bón thuốc diệt cỏ phổ rộng của nông dân thâm canh", b: "Quá trình phong hóa khoáng, phân hủy chất hữu cơ mùn và tiết các axit hữu cơ", c: "Quá trình tự nhân đôi bộ gen di truyền DNA của virus thực vật chuyên biệt", d: "Tốc độ chuyển dịch cơ giới hóa của các máy cày công suất lớn đồng ruộng", ans: "b" },
                    { id: 44, q: "Khi rễ cây trồng bị tấn công bởi côn trùng ăn rễ, chất tiết rễ sẽ thay đổi để tiết ra các hợp chất vòng thơm bay hơi nhằm mục đích sinh học nào?", a: "Thu hút các loài tuyến trùng ký sinh thực vật đến xâm nhiễm phá hủy hệ thống lông hút rễ cây trồng phối", b: "Thu hút các thiên địch tự nhiên của côn trùng (như tuyến trùng ký sinh côn trùng hoặc côn trùng bắt mồi) đến tiêu diệt hại", c: "Đông cứng toàn bộ lượng nước dung dịch keo đất biến đất xung quanh thành cấu trúc tinh thể đá khoáng rắn", d: "Tiêu dùng toàn bộ hàm lượng dưỡng chất khoáng đa lượng đạm và kali để làm tăng khối lượng sinh khối khô thô", ans: "b" },
                    { id: 45, q: "Sự hiện diện của mạng lưới ngoại sợi nấm (Extradical mycelium) của nấm Mycorrhiza lan rộng vào đất giúp thực vật tăng cường chỉ số sinh học nào trong mùa khô hạn?", a: "Làm tăng tốc độ héo rũ và chết khô tự nhiên của thảm thực vật cây trồng do cạn kiệt dòng dinh dưỡng lỏng", b: "Nâng cao hiệu quả hấp thu nước từ các khe hở hạt đất siêu nhỏ cách xa rễ, tăng khả năng chống chịu hạn hán", c: "Bọc kín toàn bộ diện tích đất canh tác mặt bằng lớp màng polymer cứng chống chịu mọi dòng rửa trôi xói lở", d: "Triệt tiêu hoàn toàn sự trao đổi khí oxy tự nhiên giữa đất canh tác đồng ruộng và môi trường bầu khí quyển sát", ans: "b" },
                    { id: 46, q: "Quá trình \"Phản nitrat hóa hóa học\" hoặc sinh học diễn ra tại vùng rễ lúa nước giải phóng khí nhà kính nào có tiềm năng gây ấm lên toàn cầu mạnh nhất?", a: "Khí oxy tự do (O2) lưu thông thông thoáng khí bề mặt tầng canh tác luống đất nông nghiệp bền vững nông thôn", b: "Khí ôxit nitơ (N2O) – sản phẩm trung gian của chu trình phản nitrat hóa vùng rễ yếm khí ngập nước lâu ngày", c: "Khí hydro tinh khiết bốc bùng phát tự do ra ngoài môi trường không khí lưu thông sát bề mặt ruộng nước đất", d: "Khí cacbonic (CO2) áp suất cao phát sinh từ phản ứng quang hợp tự nhiên ban ngày của thảm thực vật cỏ hoang", ans: "b" },
                    { id: 47, q: "Việc ứng dụng chế phẩm vi sinh vùng rễ đa chủng (Consortium) mang lại ưu thế sinh học nào so với chế phẩm đơn chủng?", a: "Dễ dàng bị tiêu diệt hoàn toàn bởi quần xã vi sinh vật bản địa do hiện tượng khống sinh học đất cát thô ráp", b: "Thể hiện tính đa chức năng (vừa cố định đạm, hòa tan lân, tiết IAA và đối kháng bệnh) và độ ổn định sinh thái cao hơn", c: "Đòi hỏi người nông dân phải ngừng hoàn toàn các hoạt động bón phân hữu cơ hoai mục vào tầng luống canh tác", d: "Làm đông cứng vách tế bào lông hút thực vật khiến rễ cây trồng không thể dài kéo dài xuống tầng địa chất sâu", ans: "b" },
                    { id: 48, q: "Khái niệm \"Quorum sensing\" (Cảm ứng mật độ) ở vi khuẩn vùng rễ điều khiển hoạt động chức năng cốt lõi nào dưới đây?", a: "Tốc độ bay hơi cơ học của lượng nước tưới nội đồng ra ngoài môi trường bầu khí quyển sát bề mặt ruộng đất", b: "Sự phối hợp biểu hiện gen đồng loạt của cả quần thể (như hình thành biofilm, tiết kháng sinh) khi đạt mật độ tế bào tới hạn", c: "Quá trình tự hoại tử chết đồng loạt để nhường toàn bộ nguồn dinh dưỡng carbon hữu cơ cho hệ sợi nấm hoại sinh", d: "Việc co ngắn chiều dài vật lý cơ giới của thân và cành cây trồng lâu năm thâm canh cơ giới hóa đồng ruộng lớn", ans: "b" },
                    { id: 49, q: "Thành tựu nghiên cứu về \"Hệ chuyển hóa học\" (Metabolomics) đất vùng rễ giúp các nhà khoa học bảo vệ thực vật xác định được thông tin nào?", a: "Sơ đồ thiết kế cơ khí cấu trúc bên trong của các loại máy cày máy bừa công suất lớn đang vận hành nông thôn", b: "Toàn bộ hồ sơ các chất chuyển hóa, phân tử tín hiệu và độc tố sinh học đang lưu thông thực tế tại rhizosphere", c: "Tổng chi phí tài chính nông dân chi trả cho hoạt động mua sắm vật tư phân bón hóa học clo hữu cơ nhập khẩu thương", d: "Bản đồ địa hình 3D chi tiết về độ dốc và hướng dốc rãnh thoát nước mặt của toàn bộ hệ thống luống đất trang trại", ans: "b" },
                    { id: 50, q: "Bản chất của việc triển khai các giải pháp vi sinh vùng rễ trong nông nghiệp theo phần \"Các vấn đề pháp lý và đạo đức\" đòi hỏi phải đảm bảo khía cạnh nào?", a: "Triển khai một cách bí mật tuyệt đối để tránh sự cạnh tranh thương mại của đối thủ", b: "Đảm bảo việc triển khai các giải pháp vi sinh một cách có trách nhiệm và bền vững", c: "Cho phép giải phóng tự do các chủng biến đổi gen mà không cần khảo nghiệm an toàn", d: "Bắt buộc người nông dân phải tăng liều lượng bón thuốc bảo vệ thực vật hóa học phối trộn", ans: "b" }
                ],
        p2: [
        { id: 51,
        q: "Biện pháp canh tác bón phân hữu cơ xanh (ủ phân xanh tại ruộng) định hình cấu trúc vi sinh vật vùng rễ theo hướng tích cực nào?",
        a: "Tiêu diệt toàn bộ hệ nấm mycorrhiza do hiện tượng sốc dinh dưỡng đa lượng hữu cơ thô",
        b: "Cung cấp cơ chất đa dạng, kích thích sự phát triển của quần xã vi sinh vật phân hủy có lợi và kìm hãm mầm bệnh",
        c: "Làm đóng băng hoạt động tiết enzyme phosphatase của các chủng vi khuẩn hòa tan lân đất",
        d: "Kích thích sự nhân đôi độc lực bộ gen di truyền của hệ virus thực vật gây bệnh đốm vàng",
        ans: "b"
    },

        b: "Vi sinh vật vùng rễ là thành phần không thể thiếu, chi phối sức khỏe cây, chuyển hóa và luân chuyển liên tục các nguyên tố dinh dưỡng thiết yếu (C, N, P, S), quyết định năng suất và độ phì nhiêu bền vững của hệ sinh thái nông nghiệp",
        c: "Tất cả các loài vi sinh vật vùng rễ đều mang bản chất phá hủy cấu trúc vật lý của rễ cây trồng",
        d: "Hệ vi sinh vật vùng rễ chỉ phát huy tác dụng kích thích sinh trưởng tốt khi con người ngừng bón phân hữu cơ hoai mục",

            8: {
                 p1: [{ id: 1, q: "Trong lĩnh vực nông nghiệp bền vững, các chế phẩm vi sinh nổi lên như những công cụ mạnh mẽ nhằm thực hiện mục tiêu nào?", a: "Thay thế hoàn toàn mọi công cụ cơ giới hóa trên đồng ruộng", b: "Nâng cao năng suất cây trồng, quản lý dịch hại và thúc đẩy sinh trưởng cây trồng, đồng thời giảm sự phụ thuộc vào các yếu tố đầu vào hóa học", c: "Tăng lượng tồn dư hóa chất trong tầng canh tác mặt", d: "Cắt giảm hoàn toàn nguồn nước tưới tự nhiên của cây", ans: "b" },
        { id: 2, q: "Nhóm chế phẩm vi sinh nào đóng vai trò then chốt trong việc cải thiện sức khỏe đất, ức chế sâu bệnh và nâng cao khả năng hấp thu dinh dưỡng của cây?", a: "Phân bón sinh học, thuốc bảo vệ thực vật sinh học và chất kích thích sinh trưởng cây trồng", b: "Thuốc diệt cỏ hữu cơ clo, phân bón vô cơ đa lượng và chất làm chặt đất", c: "Các chủng virus thực vật gây bệnh vàng lá, tuyến trùng ký sinh và vi tảo độc", d: "Các hợp chất hóa học tổng hợp nồng độ cao và chất kích thích ra hoa nhân tạo", ans: "a" },
        { id: 3, q: "Các chế phẩm vi sinh có nguồn gốc từ đối tượng nào trong tự nhiên?", a: "Các khoáng thạch anh và đá vôi địa chất tầng sâu", b: "Các vi sinh vật có lợi như vi khuẩn, nấm và vi rút", c: "Các phế thải công nghiệp nặng chưa qua xử lý", d: "Các phân tử hóa chất tổng hợp trong nhà máy", ans: "b" },
        { id: 4, q: "Cơ cơ học tác động tổng quát của các chế phẩm vi sinh trong nông nghiệp là gì?", a: "Phá hủy vách tế bào lông hút để ngăn cản sự hút nước của cây", b: "Khai thác các quá trình tự nhiên trong tương tác giữa cây trồng và vi sinh vật", c: "Thay thế hoàn toàn nhu cầu hấp thu ánh sáng mặt trời của tán lá", d: "Làm đông cứng kết cấu cơ giới vật lý của toàn bộ các hạt keo sét", ans: "b" },
        { id: 5, q: "Thuốc bảo vệ thực vật sinh học (Biopesticides) sử dụng vi sinh vật có lợi để ức chế quần thể sinh vật gây hại qua các cơ chế nào?", a: "Phun khói độc hun trùng toàn bộ thảm thực vật đồng ruộng", b: "Ăn mồi, ký sinh, cạnh tranh và kích hoạt tính kháng bệnh toàn thân ở cây trồng", c: "Làm thay đổi hoàn toàn mã di truyền của cây trồng thành dòng vô sinh", d: "Cách ly tuyệt đối rễ cây khỏi dung dịch nước đất xung quanh luống", ans: "b" },
        { id: 6, q: "Nhóm chế phẩm \"Chất kích thích sinh trưởng cây trồng\" (Plant Growth Promoters) mang lại lợi ích gì cho thực vật chủ?", a: "Làm giảm diện tích tán lá để cây tiết kiệm năng lượng quang hợp", b: "Tăng cường sinh trưởng cây, hấp thu dinh dưỡng và nâng cao khả năng chịu stress", c: "Kích thích các mầm bệnh nguy hiểm xâm nhiễm nhanh hơn vào thân", d: "Làm đông cứng bộ mạch dẫn gỗ ngăn cản dòng lưu thông dinh dưỡng lỏng", ans: "b" },
        { id: 7, q: "Nhóm nghiên cứu nào sau đây được liệt kê thuộc nhóm chất kích thích sinh trưởng cây trồng có khả năng thiết lập mối quan hệ cộng sinh với cây?", a: "Virus gây bệnh đốm sọc lá thực vật và tuyến trùng ký sinh nội bào", b: "Vi khuẩn kích thích sinh trưởng cây (PGPB), nấm cộng sinh rễ và các vi sinh vật vùng rễ", c: "Các vi khuẩn phản nitrat hóa yếm khí bắt buộc phân bố sâu dưới lòng đất", d: "Tập đoàn virus ký sinh nội nấm hoại sinh phân hủy xenlulozo rơm rạ", ans: "b" },
        { id: 8, q: "Hoạt động sinh học nào của các chất kích thích sinh trưởng giúp nâng cao thể trạng và năng suất cây trồng?", a: "Phân hủy các tế bào biểu bì lông hút khỏe mạnh của hệ rễ", b: "Thúc đẩy phát triển rễ, hòa tan dinh dưỡng và sản xuất các chất kích thích sinh trưởng như phytohormone và enzyme", c: "Tăng tốc độ bay hơi của lượng nước tưới nội đồng ra bầu khí quyển", d: "Tạo lớp màng bọc cơ học bằng chất nhựa polyme bọc kín chóp rễ", ans: "b" },
        { id: 9, q: "Thuốc sinh học có thể trực tiếp tác động lên sinh vật gây hại thông qua hoạt động nào?", a: "Cung cấp đường glucose giúp mầm bệnh tăng sinh khối nhanh hơn", b: "Hoạt động ăn mồi, ký sinh hoặc đối kháng mầm bệnh", c: "Thao túng hệ miễn dịch PTI để cây trồng tự làm rụng lá già sớm", d: "Gắn kết các bào tử mầm bệnh thành khối cấu trúc hạt cát thô cứng", ans: "b" },
        { id: 10, q: "Một trong những thách thức thực tế mà các chế phẩm vi sinh đang phải đối mặt khi triển khai rộng rãi là gì?", a: "Kích thước cơ học của bào tử vi sinh vật quá lớn làm tắc béc phun thuốc", b: "Liên quan đến công thức bào chế, hiệu quả sử dụng, phê duyệt pháp lý và mức độ chấp nhận của nông dân", c: "Vi sinh vật dễ bị tiêu diệt hoàn toàn bởi các phân tử nước mưa tự nhiên", d: "Giá thành sản xuất chế phẩm sinh học rẻ hơn hàng triệu lần thuốc hóa học", ans: "b" },
        { id: 11, q: "Hướng nghiên cứu hiện nay sử dụng tiến bộ khoa học nào để tạo ra các sản phẩm vi sinh chuyên biệt có hiệu quả và độ ổn định cao?", a: "Các phương pháp cày sâu cuốc bẫm và phơi ải đất truyền thống cổ xưa", b: "Tiến bộ trong sinh thái học vi sinh, hệ gen học và công nghệ sinh học", c: "Công nghệ tổng hợp hóa chất hữu cơ bảo vệ thực vật phổ rộng", d: "Kỹ thuật thiết kế hệ thống kênh mương thủy lợi vùng hạ lưu sông lớn", ans: "b" },
        { id: 12, q: "Định nghĩa cốt lõi của \"Phân bón sinh học\" (Biofertilizers) trong nông nghiệp bền vững là gì?", a: "Hợp chất muối khoáng vô cơ đa lượng được phối trộn trong nhà máy", b: "Các chế phẩm chứa các vi sinh vật sống có vai trò cải thiện độ phì đất và cung cấp dinh dưỡng cho cây", c: "Dung dịch hóa chất hữu cơ mạnh dùng để diệt trừ hoàn toàn cỏ hoang", d: "Lớp màng nilon bằng nhựa polymer bao bọc kín bề mặt luống cây trồng", ans: "b" },
        { id: 13, q: "Vi khuẩn cố định đạm cộng sinh hình thành mối quan hệ sinh học với thực vật theo cơ chế nào?", a: "Sống tự do trong dung dịch đất canh tác không bám dính vào rễ cây", b: "Xâm nhiễm vào hệ rễ cây trồng (như cây họ Đậu) để hình thành cấu trúc nốt sần cố định đạm", c: "Phá hủy tế bào vỏ rễ để hút cạn kiệt nguồn hợp chất carbohydrate", d: "Ký sinh nội bào biểu bì thân cây lâu năm gây hội chứng thối mục gỗ", ans: "b" },
        { id: 14, q: "Hai chi vi khuẩn nào dưới đây là đại diện điển hình cho nhóm vi khuẩn cố định đạm cộng sinh?", a: "Pseudomonas và Bacillus", b: "Rhizobium và Bradyrhizobium", c: "Trichoderma và Beauveria", d: "Escherichia và Salmonella", ans: "b" },
        { id: 15, q: "Hai chi vi khuẩn nào dưới đây đại diện cho nhóm vi khuẩn cố định đạm sống tự do trong đất nông nghiệp?", a: "Rhizobium và Bradyrhizobium", b: "Azotobacter và Azospirillum", c: "Trichoderma và Metarhizium", d: "Bacillus và Pseudomonas", ans: "b" },
        { id: 16, q: "Vai trò sinh học cốt lõi của quá trình cố định đạm sinh học (Biological nitrogen fixation) là gì?", a: "Chuyển muối nitrat kết tủa thành khí nitơ tự do bay hơi ngoài khí quyển", b: "Chuyển đổi nitơ khí quyển thành amoniac, nâng cao khả năng cung cấp nitơ cho cây", c: "Thủy phân các hợp chất cellulose hữu cơ thô thành đường đơn glucose", d: "Phong hóa các khoáng vật silicat để giải phóng nguyên tố kali hòa tan", ans: "b" },
        { id: 17, q: "Vi khuẩn hòa tan lân (Phosphate-solubilizing bacteria) cải thiện dinh dưỡng photpho cho cây nhờ năng lực nào?", a: "Biến biến lân dễ tan thành dạng photphat khó tan để đất dự trữ lâu dài", b: "Hòa tan các khoáng photphat khó tan trong đất thành dạng cây hấp thu được", c: "Giải phóng hợp chất khí phosphine bay hơi tự do trên bề mặt tán lá", d: "Tự tổng hợp nguyên tố phospho hữu cơ từ năng lượng ánh sáng mặt trời", ans: "b" },
        { id: 18, q: "Các chi vi khuẩn nào sau đây được liệt kê thuộc nhóm vi khuẩn hòa tan lân điển hình?", a: "Rhizobium, Bradyrhizobium và Azotobacter", b: "Bacillus, Pseudomonas và Pantoea", c: "Trichoderma, Beauveria và Metarhizium", d: "Salmonella, Shigella và Escherichia", ans: "b" },
        { id: 19, q: "Tác động trực tiếp của quá trình hòa tan lân do vi khuẩn thực hiện đối với thực vật là gì?", a: "Làm co ngắn chiều dài phát triển của hệ thống mạch dẫn mạch gỗ thân", b: "Cải thiện khả năng hấp thu photpho của cây trồng", c: "Kích thích hiện tượng rụng lá già đồng loạt vào mùa mưa bão lớn", d: "Ngăn cản tuyệt đối sự hấp thu đạm amoni của lông hút rễ thực vật", ans: "b" },
        { id: 20, q: "Vi khuẩn hòa tan kali (Potassium-solubilizing bacteria) thực hiện hoạt động chức năng nào ở vùng rễ?", a: "Kết tủa ion kali lỏng thành dạng cấu trúc khoáng rắn khó tan trơ", b: "Có khả năng hòa tan các khoáng kali (như fenspat, mica) trong đất", c: "Biến đổi nguyên tố kali thành hợp chất khí bay hơi tự do ra ngoài không khí", d: "Tiêu dùng toàn bộ nguyên tố kali để làm đông cứng vách tế bào vi khuẩn", ans: "b" },
        { id: 21, q: "Các chi vi khuẩn nào đại diện cho nhóm vi khuẩn hòa tan kali được nhắc đến trong tài liệu?", a: "Rhizobium, Bradyrhizobium và Azospirillum", b: "Bacillus, Pseudomonas và Enterobacter", c: "Trichoderma, Metarhizium và Beauveria", d: "Nitrosomonas, Nitrobacter và Thiobacillus", ans: "b" },
        { id: 22, q: "Các phương pháp sử dụng phân bón sinh học phổ biến trên đồng ruộng bao gồm những kỹ thuật nào?", a: "Đốt cháy chế phẩm tạo khói hun toàn bộ thảm thực vật tán lá cao", b: "Xử lý hạt giống, nhúng rễ và bón vào đất", c: "Chôn sâu chế phẩm dưới tầng địa chất đá mẹ thiếu hoàn toàn không khí", d: "Phối trộn trực tiếp chế phẩm với thuốc diệt cỏ hóa học phổ rộng nồng độ bão hòa", ans: "b" },
        { id: 23, q: "Việc áp dụng đúng kỹ thuật bón phân bón sinh học mang lại giá trị thực tiễn nào cho trồng trọt?", a: "Thay đổi cấu trúc cơ giới vật lý của các hạt cát thô tầng canh tác mặt", b: "Tối đa hóa hiệu quả của phân bón sinh học và thúc đẩy sinh trưởng cây trồng", c: "Triệt tiêu hoàn toàn hệ miễn dịch tự nhiên PTI của tế bào rễ thực vật", d: "Kích thích sự phát triển bùng phát số lượng của các loài cỏ dại nguy hiểm", ans: "b" },
        { id: 24, q: "Nhóm lợi ích môi trường và đất đai của việc sử dụng phân bón sinh học bao gồm những khía cạnh nào?", a: "Làm tăng lượng tồn dư hóa chất độc hại trong nông sản sau thu hoạch", b: "Cải thiện sức khỏe đất, tăng khả năng cung cấp dinh dưỡng và giảm ô nhiễm môi trường", c: "Bắt buộc người sản xuất phải ngừng tưới nước hoàn toàn cho luống cây", d: "Làm đông cứng kết cấu cơ giới vật lý của toàn bộ các tầng hạt đất mặt", ans: "b" },
        { id: 25, q: "Một trong những hạn chế hiện nay của phân bón sinh học khi bón ruộng thực tế là gì?", a: "Kích thước của các tế bào vi khuẩn quá lớn làm nghẽn mạch dẫn rễ cây", b: "Hiệu quả không ổn định trong các điều kiện đất khác nhau", c: "Vi sinh vật dễ dàng bị phân hủy hoàn toàn khi tiếp xúc với nước tưới tiêu", d: "Giá thành của sản phẩm phân bón sinh học đắt hơn hàng triệu lần phân vô cơ", ans: "b" },
        { id: 26, q: "Định nghĩa về \"Thuốc bảo vệ thực vật sinh học\" (Biopesticides) nhấn mạnh vai trò gì trong quản lý dịch hại?", a: "Tiêu diệt toàn bộ hệ thảm thực vật thực vật xung quanh vùng nhiễm bệnh hại", b: "Ý nghĩa trong quản lý dịch hại bền vững, kiểm soát sinh vật gây hại đồng thời giảm thiểu tác động môi trường", c: "Sử dụng các chất hữu cơ độc hại tổng hợp nhân tạo nồng độ cực cao", d: "Kiểm soát sâu bệnh hại bằng cách làm đóng băng dung dịch nước vùng rễ", ans: "b" },
        { id: 27, q: "Thuốc bảo vệ thực vật sinh học từ vi sinh vật (Microbial biopesticides) có nguồn gốc từ đối tượng nào?", a: "Các hoạt chất hóa học vô cơ chiết xuất từ quặng khoáng quặng đá tự nhiên", b: "Các vi sinh vật có lợi như vi khuẩn, nấm, vi rút và động vật nguyên sinh", c: "Các tuyến trùng ký sinh gây thối nhũn tế bào mô rễ thực vật họ Đậu", d: "Các phức chất polymer hữu cơ khó phân hủy sinh học trong môi trường nước", ans: "b" },
        { id: 28, q: "Thuốc bảo vệ thực vật sinh học từ vi khuẩn nổi tiếng nhất thế giới sử dụng chủng vi sinh vật nào?", a: "Pseudomonas fluorescens", b: "Bacillus thuringiensis (Bt)", c: "Rhizobium leguminosarum", d: "Azotobacter chroococcum", ans: "b" },
        { id: 29, q: "Đặc tính diệt côn trùng ưu việt của vi khuẩn Bacillus thuringiensis (Bt) dựa trên yếu tố nào?", a: "Khả năng hút cạn kiệt dòng nhựa lỏng bên trong thân cây của sâu hại", b: "Đặc tính diệt côn trùng của độc tố Bt (tinh thể protein độc)", c: "Sự lây nhiễm virus độc lực cao vào hệ thống thần kinh của ấu trùng sâu", d: "Hoạt động tiết các acid vô cơ mạnh làm bỏng biểu bì ngoài của côn trùng", ans: "b" },
        { id: 30, q: "Nhóm thuốc bảo vệ thực vật sinh học từ nấm bao gồm các loài nấm ký sinh côn trùng điển hình nào?", a: "Aspergillus niger, Penicillium notatum và Saccharomyces cerevisiae", b: "Beauveria bassiana, Metarhizium spp. và Trichoderma spp.", c: "Puccinia graminis, Ustilago maydis và Phytophthora infestans", d: "Agaricus bisporus, Pleurotus ostreatus và Lentinula edodes", ans: "b" },
        { id: 31, q: "Cơ chế tác động của thuốc sinh học từ nấm ký sinh côn trùng diệt trừ sâu hại bằng con đường nào?", a: "Thao túng hệ thống miễn dịch ETI của thực vật chủ để cây tự tiết chất kháng sinh", b: "Xâm nhiễm và tiêu diệt côn trùng thông qua tiếp xúc hoặc ăn phải", c: "Sản sinh ra các hormone hữu cơ bay hơi làm tê liệt cơ đập cánh của sâu bướm", d: "Hòa tan lớp vỏ sáp biểu bì của sâu hại bằng các hóa chất hữu cơ clo độc hại", ans: "b" },
        { id: 32, q: "Thuốc bảo vệ thực vật sinh học từ vi rút côn trùng thường khai thác các nhóm virus tự nhiên nào?", a: "Các virus gây bệnh đốm sọc lá thực vật lương thực (TMV)", b: "Baculovirus và nucleopolyhedrovirus", c: "Các thực khuẩn thể chuyên ký sinh trên vi khuẩn cố định đạm Rhizobium", d: "Các virus cúm gia cầm lây lây truyền qua môi giới côn trùng vector hút máu", ans: "b" },
        { id: 33, q: "Ưu điểm sinh học lớn nhất của thuốc sinh học từ vi rút côn trùng (Baculovirus) là gì?", a: "Gây nhiễm và tiêu diệt côn trùng gây hại mà không ảnh hưởng đến sinh vật không mục tiêu", b: "Có khả năng tiêu diệt tất cả các loài côn trùng và động vật hoang dã đồng ruộng", c: "Thời gian tồn lưu chất độc hóa học kéo dài hàng thế kỷ dưới lòng sâu canh tác", d: "Có thể tự thực hiện phản ứng quang hợp tự nhiên để tạo sinh khối protein thô", ans: "b" },
        { id: 34, q: "Nhóm thuốc bảo vệ thực vật sinh học từ động vật nguyên sinh bao gồm các chi ký sinh côn trùng nào?", a: "Amoeba, Paramecium và Plasmodium", b: "Nosema spp. và Steinernema spp.", c: "Pseudomonas, Bacillus và Serratia", d: "Trichoderma, Ampelomyces và Penicillium", ans: "b" },
        { id: 35, q: "Phương pháp sử dụng thuốc bảo vệ thực vật sinh học trên đồng ruộng bao gồm những kỹ thuật ứng dụng nào?", a: "Đốt cháy chế phẩm tạo khói hun toàn bộ thảm thực vật cỏ dại luống cây", b: "Phun qua lá, tưới gốc và xử lý hạt giống", c: "Chôn sâu chế phẩm dưới tầng địa chất đá mẹ hoàn toàn thiếu không khí oxy", d: "Phối trộn trực tiếp chế phẩm with thuốc diệt cỏ hóa học phổ rộng nồng độ cao", ans: "b" },
        { id: 36, q: "Các dạng bào chế thương mại của thuốc sinh học nhằm nâng cao hiệu quả và thời gian bảo quản bao gồm:", a: "Thể khí nén bọc trong bình vỏ thép chịu áp suất cao chống va đập cơ học", b: "Dạng lỏng, dạng hạt và dạng bột", c: "Các khối tinh thể khoáng rắn thô cần nghiền nhỏ phối trộn cát thô bón ruộng", d: "Các sợi nhựa polymer kéo màng màng mỏng dùng để bao bọc biểu bì thân cây", ans: "b" },
        { id: 37, q: "Vai trò chiến lược của thuốc sinh học vi sinh trong mô hình canh tác nông nghiệp hiện đại là gì?", a: "Trở thành công cụ thâm canh hóa chất nhằm tối đa hóa việc dùng thuốc bảo vệ thực vật tổng hợp", b: "Tham gia vào các chương trình quản lý dịch hại tổng hợp (IPM) hướng tới nông nghiệp bền vững", c: "Chuyển đổi toàn bộ diện tích trồng trọt trang trại sang mô hình nhà màng nhân tạo khép kín", d: "Hạn chế hoàn toàn sự tương tác trao đổi sinh học giữa thực vật canh tác và môi trường tự nhiên", ans: "b" },
        { id: 38, q: "Khái niệm \"Chất kích thích sinh trưởng cây trồng\" (Plant Growth Promoters - PGPs) giữ ý nghĩa gì trong trồng trọt?", a: "Là các hóa chất độc hại dùng để kìm hãm chiều cao của cây nhằm chống chịu gió bão", b: "Ý nghĩa trong tăng cường sinh trưởng, hấp thu dinh dưỡng và khả năng chịu stress của cây", c: "Các phức chất hữu cơ gây đột biến gen làm thay đổi màu sắc cảm quan của hoa thực vật", d: "Dung dịch chất lỏng bọc kín hệ thống lông hút để ngăn cản sự hút nước rễ cây", ans: "b" },
        { id: 39, q: "Khía cạnh \"Vi khuẩn kích thích sinh trưởng cây trồng\" (PGPB) phân tích chi tiết các chi vi khuẩn vùng rễ nào?", a: "Ralstonia, Xanthomonas và Erwinia", b: "Pseudomonas, Bacillus và Azospirillum spp.", c: "Salmonella, Shigella và Escherichia", d: "Nitrosomonas, Nitrobacter và Thiobacillus", ans: "b" },
        { id: 40, q: "Cơ chế tác động của vi khuẩn PGPB thúc đẩy sinh trưởng thực vật bao gồm các quá trình sinh học nào?", a: "Tiết các acid vô cơ mạnh phá hủy cấu trúc màng tế bào vỏ rễ thực vật", b: "Cố định đạm, hòa tan lân và sản xuất phytohormone cũng như enzyme", c: "Thao túng hệ miễn dịch PTI của cây trồng để kích thích rụng lá già đồng loạt", d: "Tạo lớp màng nhầy dính kết các hạt cát thô đất thành khối đá cứng trơ", ans: "b" },
        { id: 41, q: "Khía cạnh \"Nấm kích thích sinh trưởng cây trồng\" (PGPF) tập trung tổng quan về nhóm nấm cộng sinh rễ nào?", a: "Nấm hoại sinh phân hủy gỗ mục sâu dưới lòng các tầng địa chất đất nông nghiệp", b: "Nấm cộng sinh nội (AM) và nấm cộng sinh ngoại (ECM)", c: "Các loài nấm sợi ký sinh gây thối nhũn mô tế bào thân thực vật họ Đậu lấy hạt", d: "Tập đoàn virus ký sinh nội bào nấm đối kháng Trichoderma harzianum bản địa", ans: "b" },
        { id: 42, q: "Vai trò sinh học của mối quan hệ cộng sinh tương hỗ giữa nấm PGPF và cây trồng là gì?", a: "Làm giảm diện tích bám rễ để cây tiết kiệm nguồn carbohydrate tự nuôi dưỡng", b: "Tăng cường hấp thu dinh dưỡng, nước và khả năng chống chịu stress", c: "Kích thích các mầm bệnh nấm hại xâm nhiễm nhanh hơn vào hệ thống mạch dẫn gỗ", d: "Bao bọc hệ rễ bằng một lớp vỏ polymer nhựa cứng chống thấm dung dịch đất nước", ans: "b" },
        { id: 43, q: "Nhóm vi khuẩn vùng rễ kích thích sinh trưởng (PGPR) bao gồm các chức năng dinh dưỡng phối hợp nào?", a: "Vi khuẩn sinh methane yếm khí, vi khuẩn oxy hóa sắt và vi khuẩn lưu huỳnh thô", b: "Vi khuẩn cố định đạm, hòa tan lân và hòa tan kali", c: "Các chủng vi khuẩn gây bệnh héo xanh thối củ và virus thực vật vùng rhizosphere", d: "Tập đoàn thực khuẩn thể phân giải tinh bột và vi tảo độc tầng nước ruộng lúa", ans: "b" },
        { id: 44, q: "Cơ chế tác động ở mức độ trao đổi tín hiệu của các chất kích thích sinh trưởng (PGPs) bao gồm hoạt động nào?", a: "Phá hủy hệ thống các không bào chứa chất tự vệ tự thân của tế bào thực vật chủ", b: "Sản xuất hormone (ví dụ: auxin, cytokinin), hòa tan dinh dưỡng và kích hoạt tính kháng bệnh toàn thân", c: "Tăng tốc độ thoát hơi nước qua khí khổng khiến lá cây bị héo rũ nhanh chóng mùa khô", d: "Thay đổi cấu trúc bộ gen di truyền DNA biến thực vật thành dòng sinh vật hoàn toàn nhân tạo", ans: "b" },
        { id: 45, q: "Các phương pháp sử dụng chất kích thích sinh trưởng PGPs trên đồng ruộng bao gồm những kỹ thuật ứng dụng nào?", a: "Đốt cháy chế phẩm tạo khói hun toàn bộ thảm thực vật tán lá cao tiếp xúc ánh sáng", b: "Xử lý hạt, nhúng rễ và cải tạo đất", c: "Chôn sâu chế phẩm dưới tầng địa chất đá mẹ thiếu hoàn toàn không khí oxy tầng sâu", d: "Phối trộn trực tiếp chế phẩm with thuốc diệt cỏ hóa học phổ rộng nồng độ bão hòa cao", ans: "b" },
        { id: 46, q: "Các dạng bào chế của chất kích thích sinh trưởng PGPs nhằm nâng cao hiệu quả và thời gian bảo quản bao gồm:", a: "Thể khí nén bọc trong bình vỏ thép chịu áp suất cao chống va đập cơ học", b: "Chế phẩm lỏng, chế phẩm mang chất nền và tổ hợp vi sinh", c: "Các khối tinh thể khoáng rắn thô cần nghiền nhỏ phối trộn cát thô bón vào tầng mặt luống", d: "Các sợi nhựa polymer kéo màng mỏng dùng để bao bọc biểu bì thân cành lá cây lâu năm", ans: "b" },
        { id: 47, q: "Nhóm lợi ích thực tiễn của việc bón PGPs đối với nông sản thương mại bao gồm những chỉ số nào?", a: "Làm tăng lượng tồn dư độc chất bảo quản hữu cơ trong mô quả sau khi thu hoạch quả chín", b: "Cải thiện sinh trưởng, hấp thu dinh dưỡng và khả năng chống chịu stress, từ đó làm tăng năng suất và chất lượng nông sản", c: "Rút ngắn chu kỳ sinh trưởng của cây xuống một nửa thời gian để tăng thâm canh cơ giới hóa", d: "Cách ly tuyệt đối hệ sinh thái trồng trọt khỏi các tương tác sinh học tự nhiên with khí quyển", ans: "b" },
        { id: 48, q: "Tương lai của chất kích thích sinh trưởng PGPs trong nông nghiệp bền vững hướng tới sự tích hợp vào hệ thống nào?", a: "Tích hợp vào các dây chuyền sản xuất hóa chất bảo vệ thực vật hữu cơ clo độc tính cao", b: "Tích hợp vào các hệ thống quản lý cây trồng nhằm nâng cao năng suất và khả năng chống chịu", c: "Mô hình chuyển đổi toàn bộ diện tích đất nông nghiệp thành các khu công nghiệp khép kín vĩ mô", d: "Chiến lược loại bỏ tuyệt đối sự xuất hiện của các loài nấm hoại sinh phân hủy mùn đất mặt", ans: "b" },
        { id: 49, q: "Khi vi khuẩn cố định đạm sống tự do Azotobacter chroococcum sản sinh ra hormone auxin (IAA), cơ chế này kích thích bộ rễ phát triển nhờ hoạt động nào?", a: "Kích thích sự kéo dài tế bào rễ, tăng số lượng rễ bên và diện tích lông hút hấp thu khoáng", b: "Làm đông cứng vách tế bào khiến bộ rễ ngừng phát triển co ngắn kích thước chiều dài để tránh bệnh", c: "Tiêu hủy toàn bộ cấu trúc mô biểu bì rễ biến hệ rễ thành dòng giá thể nhựa nhân tạo trơ hoàn toàn", d: "Ngăn chặn tuyệt đối hoạt động hấp thu nước và các dưỡng chất vô cơ lỏng từ dung dịch keo đất mặt", ans: "a" },
        { id: 50, q: "Enzyme chitinase và β-1,3-glucanase có trong chế phẩm thuốc trừ bệnh sinh học dựa trên vi sinh vật thực hiện chức năng bảo vệ thực vật bằng cơ chế nào?", a: "Hòa tan các liên kết hạt cát thô vô cơ thành cấu trúc hạt keo sét mịn không thông thoáng khí đất", b: "Phân hủy các cấu trúc polyme vách tế bào của nấm mầm bệnh gây bệnh hại thực vật (như thối cổ rễ)", c: "Thao túng hệ thống miễn dịch PTI của cây trồng để kích thích hiện tượng rụng lá già đồng loạt mùa khô", d: "Bao bọc các bào tử mầm bệnh thành những tinh thể rắn trơ cô lập hoàn toàn khỏi nguồn nước tưới ẩm", ans: "b" }],
        p2: [{ id: 51, q: "Chất điều hòa sinh trưởng \"Cytokinin\" do vi khuẩn PGPR sản sinh mang lại hiệu ứng sinh học nào cho thực vật chủ?", a: "Tăng tốc độ hóa già của các cơ quan mô tế bào khiến quả chín rụng sớm đồng loạt", b: "Kích thích sự phân chia tế bào, thúc đẩy sự phát triển của chồi bên và kéo dài tuổi thọ lá", c: "Làm giảm diện tích tán lá hiệu dụng để cây tiết kiệm hàm lượng nước dung dịch đất mặt luống", d: "Đông cứng các phân tử nước mạch dẫn ngăn cản tuyệt đối sự thoát hơi nước qua khí khổng ban ngày", ans: "b" },
        { id: 52, q: "Vi khuẩn Bacillus thuringiensis (Bt) tạo ra các tinh thể protein độc (Cry proteins) ở giai đoạn nào của chu kỳ sống?", a: "Giai đoạn phân chia tế bào khuẩn lạc mạnh mẽ nhất ở môi trường dinh dưỡng lỏng hiếu khí", b: "Giai đoạn hình thành bào tử (Sporulation)", c: "Khi bị tấn công và ly giải tế bào bởi các hạt thực khuẩn thể đối kháng vùng rễ đất", d: "Khi tiếp xúc trực tiếp với các dòng hóa chất thuốc bảo vệ thực vật hữu cơ clo thâm canh", ans: "b" },
        { id: 53, q: "Chế phẩm nấm ký sinh côn trùng Metarhizium anisopliae (nấm xanh) tiêu diệt sâu hại đồng ruộng sau khi bào tử nấm bám dính vào lớp vỏ cutin sâu nhờ tiết enzyme nào?", a: "Enzyme amylase và invertase thủy phân đường đa thành đường đơn carbohydrate tự nuôi sinh khối nấm", b: "Phức hệ enzyme protease, chitinase và lipase phân hủy lớp vỏ cutin cơ học để sợi nấm xâm nhập vào thân sâu", c: "Enzyme nitrogenase thực hiện phản ứng khử nitơ khí quyển thành hợp chất amoniac gây sốc độc tính cấp sâu", d: "Enzyme ligase nối các mạch bộ gen di truyền DNA biến tế bào sâu thành tế bào virus thực vật hoại sinh", ans: "b" },
        { id: 54, q: "Hợp chất \"Siderophore\" có trong chế phẩm vi khuẩn PGPR bón bổ sung vùng rễ giúp bảo vệ bộ rễ trước nấm bệnh hại bằng phương thức hóa học nào?", a: "Pseudomonas hấp thu hết lượng nước dung dịch đất khiến Pythium bị khô héo chết hoàn toàn tự nhiên đất", b: "Chelat hóa đặc hiệu ion sắt ba (Fe^3+) trong rhizosphere, bỏ đói sắt mầm bệnh nấm hại kìm hãm sinh trưởng chúng", c: "Siderophore trực tiếp phá hủy vách tế bào cellulose của lông hút rễ để ngăn nấm bám dính xâm nhiễm thực vật", d: "Thay đổi hoàn toàn đặc tính lý hóa cơ giới của hạt cát thô xung quanh vùng rễ thành khối đá chặt cứng thô", ans: "b" },
        { id: 55, q: "Việc ứng dụng chế phẩm \"Nấm rễ cộng sinh nội\" (Arbuscular Mycorrhizal Fungui - AMF) dạng hạt bón vào đất cát thô cải thiện chỉ số sinh học nào?", a: "Tiêu diệt toàn bộ các vi khuẩn PGPR có ích xung quanh hạt giống do hiện tượng cạnh tranh khống sinh học đất", b: "Hình thành mạng lưới sợi nấm đan xen giữ hạt đất, cải thiện cấu trúc tập hợp đất và tối ưu hấp thu photpho", c: "Làm đông cứng lớp vỏ hạt giống biến hạt thành cấu trúc tinh thể rắn trơ chống chịu mọi loại máy móc cơ giới", d: "Thay thế hoàn toàn nhu cầu hấp thu các nguyên tố khoáng đa lượng đạm, lân và kali của thực vật giai đoạn đầu", ans: "b" },
        { id: 56, q: "Chế phẩm thuốc trừ sâu sinh học chứa virus Granulovirus (CpGV) thể hiện tính đặc hiệu tuyệt đối khi chỉ gây nhiễm tiêu diệt đối tượng dịch hại nguy hiểm nào?", a: "Các loài vi khuẩn gây thối nhũn củ và thân cây lương thực họ Hòa thảo ở điều kiện ngập nước úng", b: "Ấu trùng sâu đục quả táo (Cydia pomonella) hại cây ăn quả", c: "Các vi khuẩn phản nitrat hóa yếm khí làm nghèo dinh dưỡng đạm vô cơ của các tầng đất canh tác mặt luống", d: "Sự xâm nhiễm và phân chia tế bào khuẩn lạc của các loài nấm đối kháng Trichoderma harzianum bản địa đất", ans: "b" },
        { id: 57, q: "Hợp chất \"Gibberellin\" (GA3) do nấm kích thích sinh trưởng Gibberella fujikuroi sản sinh trong công nghệ chế phẩm sinh học mang lại tác động sinh học nào cho thân cây?", a: "Làm co ngắn kích thước các lóng thân khiến cây lùn chặt chống chịu tốt with sức gió bão bùng phát mùa mưa", b: "Kích thích sự kéo dài lóng thân mạnh mẽ, thúc đẩy sự nảy mầm của hạt và kích thích ra hoa kết trái sớm", c: "Phá hủy hoàn toàn cấu trúc mô học vách tế bào biểu bì lông hút hệ rễ thực vật họ Đậu cố định đạm", d: "Bao bọc các cơ quan sinh sản hoa quả thành dạng cấu trúc tinh thể rắn trơ cô lập hoàn toàn khỏi nguồn dinh dưỡng", ans: "b" },
        { id: 58, q: "Điền vào chỗ trống: \"Các chất kích thích sinh trưởng vi sinh (PGPs) có thể sản sinh các acid hữu cơ và dung môi sinh học giúp ______ các nguồn khoáng photphat và kali khó tan trong đất thành dạng dễ tiêu.\"", a: "Kết tủa cô lập vĩnh viễn", b: "Hòa tan và huy động", c: "Bay hơi ra ngoài khí quyển", d: "Trung hòa hoàn toàn độc tính", ans: "b" },
        { id: 59, q: "Chế phẩm vi sinh hữu hiệu bón vào phân chuồng tươi thực hiện quá trình công nghệ nào để biến phân chuồng thành phân bón hữu cơ sinh học chất lượng cao?", a: "Quá trình phong hóa cơ học địa chất lâu dài dưới tác động bào mòn của dòng nước mưa tự nhiên đồng ruộng diện", b: "Quá trình lên men, phân hủy nhanh các hợp chất hữu cơ thô phức tạp nhờ phức hệ enzyme cellulase, protease sinh học", c: "Sự can thiệp hóa học thô bạo bằng việc phun các dung dịch acid vô cơ mạnh tổng hợp nhân tạo nhà máy đóng gói", d: "Kỹ thuật chiếu xạ ion hóa cường độ cao phá hủy cấu trúc tế bào thô loại bỏ hoàn toàn nguyên tố vi lượng đất", ans: "b" },
        { id: 60, q: "Sự biểu hiện của gen nif chịu trách nhiệm tổng hợp phức hệ enzyme nitrogenase ở vi khuẩn Azospirillum spp. bị đóng băng hoàn toàn khi ruộng xảy ra hiện tượng nào?", a: "Môi trường bóng tối tuyệt đối không có sự tiếp xúc trực tiếp của ánh sáng mặt trời ban ngày lên tán lá cây", b: "Nông dân lạm dụng bón quá nhiều phân đạm hóa học (như urê, amoni nitrat) vào dung dịch đất canh tác thâm canh", c: "Tốc độ phân hủy các mảnh hợp chất hữu cơ cellulose gỗ cứng của hệ nấm hoại sinh bản địa tầng canh tác mặt luống", d: "Tổng khối lượng các hạt cát thô vô cơ phân bố xung quanh vùng hệ thống mạch dẫn trung trụ mạch gỗ thân cây con", ans: "b" },
        { id: 61, q: "Việc phối trộn chủng vi khuẩn Bacillus subtilis và nấm Trichoderma harzianum trong một chế phẩm sinh học hỗn hợp mang bản chất công nghệ gì?", a: "Mối quan hệ đối kháng khốc liệt triệt tiêu hoàn toàn khả năng sinh trưởng khuẩn lạc của nhau do khống sinh học", b: "Tạo ra chế phẩm đa chức năng hiệp đồng (Consortium), nâng cao năng lực bảo vệ rễ và kích thích sinh trưởng cây", c: "Quá trình đột biến gen nhân tạo làm thay đổi hoàn toàn chu kỳ ra hoa kết trái quả của các giống cây trồng", d: "Hiện tượng đông cứng dung dịch keo đất khiến hệ thống lông hút thực vật hoàn toàn không hấp thu được nguồn nước", ans: "b" },
        { id: 62, q: "Đặc tính \"Chất mang\" (Carrier material) lý tưởng trong công nghệ bào chế phân bón sinh học dạng bột (như than bùn, bột xơ dừa) cần đáp ứng tiêu chuẩn kỹ thuật nào?", a: "Khó hàm lượng chất độc hóa học cao để khử trùng toàn bộ thảm quần xã vi sinh vật bản địa xung quanh vùng bón", b: "Có độ xốp cao, dung tích giữ ẩm tốt, không độc hại và duy trì mật độ tế bào vi sinh vật sống cao trong thời gian bảo quản", c: "Có cấu trúc hạt chặt khít vững chắc biến đất thành dạng khối tinh thể rắn trơ chống thấm hoàn toàn dung dịch nước", d: "Có khả năng tự phân hủy hoàn toàn giải phóng ra các nguyên tố kim loại nặng độc hại cấp tính cho rễ thực vật chủ", ans: "b" },
        { id: 63, q: "Chất kích thích sinh trưởng vi sinh chứa \"ACC deaminase\" bảo vệ cây trồng trước stress ngập úng ngạt rễ bằng cơ chế phân tử chính xác nào?", a: "Phá hủy hệ thống các mạch dẫn mạch gỗ thân cây để ngăn cản sự tích lũy của các ion khoáng đa lượng bão hòa dung dịch", b: "Phân hủy tiền chất ACC (axit 1-aminocyclopropane-1-carboxylic), kìm hãm sự tổng hợp hormone ethylene gây stress héo rũ cây", c: "Thao túng hệ thống miễn dịch PTI của cây trồng để kích thích hiện tượng rụng toàn bộ tán lá trên cao vào mùa mưa", d: "Kết dính các bào tử mầm bệnh thành cấu trúc khối kết tập hạt đất mặt luống để rễ cây tự do hút nước thông thoáng khí", ans: "b" },
        { id: 64, q: "Quy trình kiểm định chất lượng phân bón sinh học nghiêm ngặt quy định mật độ tế bào vi sinh vật sống (vi khuẩn/nấm) tối thiểu phải đạt ngưỡng nào trên một gam sản phẩm thương mại?", a: "Phải đạt tối thiểu 10^3 tế bào sống/gam (CFU/g) đối với các chủng vi sinh vật hoại sinh phân hủy xenlulozo đất thô", b: "Phải đạt mật độ tế bào sống rất cao (thường từ 10^7 đến 10^8 CFU/g trở lên) để đảm bảo hiệu quả khi bón ruộng", c: "Chỉ cần chứa các mảnh vỏ protein hoặc bộ gen di truyền DNA của vi sinh vật đã chết hoai mục hoàn toàn nhà máy đóng gói", d: "Bắt buộc phải pha loãng mật độ xuống mức cực thấp dưới 10^2 tế bào/gam để tránh hiện tượng sốc dinh dưỡng sinh học cây", ans: "b" },
        { id: 65, q: "Thuốc trừ sâu sinh học dựa trên vi khuẩn Bacillus thuringiensis var. kurstaki (Btk) chuyên biệt ứng dụng để tiêu diệt đối tượng dịch hại nguy hiểm nào trên tán lá?", a: "Các loài vi khuẩn gây thối nhũn củ và héo xanh mạch dẫn thân thực vật ở điều kiện đất ngập nước úng bão hòa dung dịch", b: "Ấu trùng các loài sâu hại thuộc bộ Cánh vẩy (Lepidoptera) như sâu cuốn lá, sâu xanh, sâu tơ hại rau quả canh tác", c: "Các vi khuẩn phản nitrat hóa yếm khí làm nghèo hàm lượng dinh dưỡng đạm vô cơ của các tầng đất canh tác mặt luống đồng", d: "Sự xâm nhiễm và phân chia tế bào khuẩn lạc của các loài nấm đối kháng Trichoderma harzianum bản địa đất nông nghiệp bền", ans: "b" },
        { id: 66, q: "Sự biểu hiện tính kháng thuốc trừ sâu sinh học Bt ở một số quần thể sâu hại đồng ruộng đặt ra yêu cầu kỹ thuật nào cho chiến lược IPM?", a: "Ngừng hoàn toàn việc ứng dụng công nghệ sinh học và quay lại sử dụng các thuốc hóa học clo hữu cơ độc tính cao vĩnh viễn", b: "Thực hành chiến lược quản lý tính kháng (Resistance management) như trồng vùng cây tị nạn (Refugia) phối hợp luân phiên tác nhân sinh học", c: "Tăng hàm lượng độc tố tinh thể delta tinh khiết trong chế phẩm thương mại lên gấp hàng triệu lần liều lượng khuyến cáo bón", d: "Biến đổi gen thực vật cây trồng thành dòng sinh vật có khả năng tự tiết ra chất độc diệt trừ toàn bộ thảm thiên địch có ích", ans: "b" },
        { id: 67, q: "Nhóm chế phẩm \"Chất kích thích sinh học vi sinh\" (Microbial Biostimulants) phân biệt with phân bón hóa học truyền thống ở điểm cốt lõi nào?", a: "Chúng cung cấp trực tiếp các nguyên tố dinh dưỡng đạm, lân, kali with nồng độ bão hòa cao phá hủy các liên kết hạt keo sét", b: "Không cung cấp dinh dưỡng trực tiếp mà kích thích các quá trình sinh lý tự thân của cây, tối ưu hóa hấp thu khoáng và chịu stress", c: "Có thời gian tồn dư chất độc hóa học bảo quản kéo dài hàng thế kỷ dưới lòng sâu các tầng địa chất đất nông nghiệp trồng trồng", d: "Chỉ phát huy tác dụng kích thích sinh khối thực vật phát triển tốt khi toàn bộ quần xã vi sinh vật bản địa bị tiêu diệt hoàn toàn", ans: "b" },
        { id: 68, q: "Khi bào tử nấm đối kháng Trichoderma harzianum định cư sớm trong rhizosphere hạt giống xử lý trước khi gieo trồng, nấm bảo vệ cây con theo cơ chế sinh học nào?", a: "Chất Trichoderma hút hết hàm lượng đạm amoni dung dịch đất khiến rễ cây con co ngắn chiều dài phát triển để tiết kiệm hữu cơ", b: "Định cư dày đặc vùng rễ, tiết enzyme phân hủy vách tế bào nấm hại và kích hoạt cơ chế ISR tạo hàng rào miễn dịch cho cây con", c: "Biến đổi cấu trúc di truyền bộ gen DNA thực vật biến cây con thành dòng sinh vật hoàn toàn nhân tạo vô sinh ngủ hoài vĩnh viễn", d: "Gắn kết các bào tử của mầm bệnh Pythium thành khối cấu trúc hạt cát thô kích thước lớn để dễ bị rửa trôi sâu xuống tầng nước ngầm", ans: "b" },
        { id: 69, q: "Thành phần \"Axit humic\" và \"Axit fulvic\" phối trộn trong các công thức chế phẩm kích thích sinh học vi sinh mang lại lợi ích kép nào?", a: "Làm tăng độ chua (giảm pH đất) xuống mức cực đoan để tiêu diệt toàn bộ quần xã vi khuẩn cố định đạm sống tự do bản địa đất", b: "Vừa cải thiện dung tích hấp thu trao đổi ion của keo đất, vừa kích thích sự phát triển hệ sợi nấm mycorrhiza và bộ rễ thực vật", c: "Làm đông cứng kết cấu vật lý cơ giới của hạt cát thô biến đất thành khối tinh thể rắn trơ chống thấm dung dịch nước tưới ẩm", d: "Thao túng bộ gen di truyền của tác nhân sinh học biến vi khuẩn PGPR thành nhóm sinh vật phản nitrat hóa yếm khí làm nghèo đất", ans: "b" },
        { id: 70, q: "Sự lan truyền nhanh đặc tính sinh học ưu việt giữa các chủng vi khuẩn PGPR bón bổ sung đồng ruộng dựa trên hoạt động chuyển giao phân tử di truyền nào?", a: "Sự giao phối hữu tính hình thành biến dị tổ hợp phổ rộng diện rộng ở các mô tế bào rễ thực vật họ Đậu lấy hạt lấy dầu", b: "Quá trình tiếp hợp (Conjugation) chuyển giao các plasmid mang gen chức năng (gen cố định đạm, gen tổng hợp siderophore) giữa các vi khuẩn", c: "Sự can thiệp thô bạo bằng công nghệ chỉnh sửa gen nhân tạo CRISPR-Cas9 trực tiếp trên đồng ruộng không qua kiểm soát an toàn sinh học", d: "Quy trình sấy thăng hoa phân tử nhỏ phối hợp kỹ thuật phân tích hóa học thể tích thô sơ của mô hình nông nghiệp gia đình truyền thống", ans: "b" },
        { id: 71, q: "Để đảm bảo hoạt tính sinh học của các chủng vi khuẩn cố định đạm sống tự do Azotobacter khi đóng gói thương mại dạng lỏng, người ta bón thêm chất phụ gia nào?", a: "Các hợp chất hóa học độc hại tồn dư lâu năm từ phân bón vô cơ đa lượng phối trộn để kìm hãm sự phân chia tế bào khuẩn lạc vi khuẩn", b: "Các chất bảo vệ tế bào (Osmoprotectants/Cell protectants) như glycerol hoặc trehalose giúp tăng độ bền vách tế bào trước stress thẩm thấu", c: "Dung dịch hóa chất acid vô cơ mạnh tổng hợp nhân tạo nhà máy nhằm biến đổi vi khuẩn thành dạng virus thực vật hoại sinh ngủ hoài", d: "Lớp màng nhựa polymer bọc kín bề mặt dung dịch chế phẩm lỏng để ngăn chặn hoàn toàn sự xâm nhập lưu thông của phân tử khí oxygen", ans: "b" },
        { id: 72, q: "Chế phẩm thuốc bảo vệ thực vật sinh học dựa trên vi rút côn trùng (Granulovirus - GV) thể hiện ưu thế vượt trội nào về mặt sinh thái chuỗi thức ăn?", a: "Có khả năng tiêu diệt toàn bộ quần xã thiên địch có ích và các loài sâu hại trên đồng ruộng không phân biệt đối tượng mục tiêu mục tiêu", b: "Có tính đặc hiệu cực kỳ nghiêm ngặt, chỉ gây bệnh tiêu diệt sâu hại mục tiêu, hoàn toàn vô hại với con người, thiên địch và chuỗi thức ăn", c: "Có thời gian tồn dư các hợp chất độc chất kéo dài hàng trăm năm dưới dạng liên kết keo sét chặt cứng khó phân hủy sinh học tự nhiên", d: "Có thể tự thực hiện phản ứng quang hợp tự nhiên ban ngày để tổng hợp chất hữu cơ carbon tự nuôi sinh khối tế bào hạt virus khô", ans: "b" },
        { id: 73, q: "Khái niệm \"Nông nghiệp hữu cơ tuần hoàn\" (Organic Circular Agriculture) coi việc ứng dụng các chế phẩm vi sinh hữu hiệu là giải pháp kỹ thuật nhằm thực hiện mục tiêu nào?", a: "Tối đa hóa việc dùng phân bón hóa học đa lượng phối trộn nồng độ bão hòa cao nhằm kích thích sinh khối thực vật phát triển ngắn hạn thâm", b: "Tối ưu hóa chu trình tái chế phế phụ phẩm hữu cơ nông nghiệp thành phân bón sinh học chất lượng cao nhờ vi sinh vật, bảo vệ sức khỏe hệ sinh thái", c: "Chuyển đổi toàn bộ diện tích đất canh tác tự nhiên trang trại sang mô hình thủy canh khép kín loại bỏ hoàn toàn vai trò của đất tự nhiên", d: "Thiết lập hệ thống đóng gói nông sản thương mại trong môi trường áp suất cao bão hòa khí clo độc hại nhằm tiêu diệt mầm bệnh sau thu hoạch", ans: "b" },
        { id: 74, q: "Sự biểu hiện của phức hệ enzyme nitrogenase ở vi khuẩn cố định đạm Rhizobium đòi hỏi môi trường vùng nốt sần phải đáp ứng tiêu chuẩn nồng độ oxy như thế nào?", a: "Phải đáp ứng nồng độ oxy cực cao (bão hòa khí oxy) để cung cấp năng lượng cho phản ứng oxy hóa các hợp chất vô cơ thô đá mẹ", b: "Phải duy trì nồng độ oxy tự do cực thấp (yếm khí cục bộ) nhờ protein leghemoglobin bọc giữ oxy, bảo vệ nitrogenase khỏi bị bất hoạt", c: "Phải bão hòa khí hydro sulfide mùi trứng thối đặc trưng để vi khuẩn tự động chuyển sang chế độ sinh trưởng quang hợp tự dưỡng ban đêm", d: "Phải tích tụ nồng độ các phức chất hữu cơ chứa nguyên tố kim loại nặng độc hại khó đào thải ra khỏi vách tế bào khuẩn lạc vi khuẩn", ans: "b" },
        { id: 75, q: "Việc bón phối hợp phân bón sinh học chứa vi khuẩn hòa tan lân Bacillus subtilis và thuốc trừ sâu sinh học từ vi khuẩn Bt trên cùng một luống cây mang lại lợi ích thực tiễn kép nào?", a: "Hiệu ứng đối kháng khốc liệt triệt tiêu hoàn toàn hoạt động chức năng sinh học của nhau do hiện tượng khống sinh học phòng thí nghiệm", b: "Vừa tối ưu hóa hiệu quả hấp thu dinh dưỡng photpho dễ tiêu của rễ, vừa tạo hàng rào sinh học chủ động tiêu diệt sâu hại ăn lá cây", c: "Gây ra sự đột biến gen di truyền làm thay đổi màu sắc cảm quan của bộ tán lá thực vật canh tác thâm canh cao độ cơ giới hóa lớn", d: "Làm đông cứng toàn bộ cấu trúc vật lý cơ giới của các tập hợp hạt đất hạt cát khiến lông hút hệ rễ hoàn toàn héo rũ ngạt khí chết", ans: "b" },
        { id: 76, q: "Tiêu chuẩn chất lượng quốc gia về chế phẩm vi sinh nghiêm ngặt cấm sự hiện diện của nhóm sinh vật nguy hiểm nào vượt quá ngưỡng quy định trong sản phẩm thương mại?", a: "Nghiêm cấm các chủng vi khuẩn cố định đạm Rhizobium spp. và vi khuẩn vùng rễ kích thích sinh trưởng cây PGPR hoạt động mạnh mẽ ruộng", b: "Các vi sinh vật nhiễm bẩn, mầm bệnh ngoại lai nguy hiểm (như Salmonella, Coliforms) gây hại cho sức khỏe con người và an toàn sinh học", c: "Hệ sợi nấm của các loài nấm rễ cộng sinh nội mycorrhiza có năng lực mở rộng phạm vi hấp thu chất dinh dưỡng photpho và nitơ rễ", d: "Các hạt cát thô khoáng thạch anh vô cơ hình thành cấu trúc kết cấu hạt đất có kích thước nhỏ dưới dải keo sét tầng mặt luống cây", ans: "b" },
        { id: 77, q: "Chế phẩm thuốc trừ sâu sinh học từ nấm hoại sinh Beauveria bassiana (nấm trắng) phát huy hiệu quả quản lý dịch hại tốt nhất đối với nhóm đối tượng sâu bệnh hại nào?", a: "Các loài nấm sợi gây bệnh phấn trắng, rỉ sắt và héo rũ cổ rễ thực vật họ Đậu lấy hạt lấy dầu giai đoạn đầu sinh trưởng phát triển", b: "Các loài côn trùng chích hút, sâu hại thân mềm (như rầy nâu, bọ trĩ, nhện đỏ, sâu tơ) nhờ cơ chế ký sinh trực tiếp vỏ cutin côn trùng", c: "Các vi khuẩn phản nitrat hóa yếm khí làm nghèo hàm lượng dinh dưỡng đạm vô cơ amoni và nitrat của tầng mặt đất ruộng canh tác thâm", d: "Quần thể các loài cỏ dại hoại sinh phân bố ở những vùng đất cát thô sa mạc hoang mạc thiếu hoàn toàn hệ thống thủy lợi tưới tiêu nước", ans: "b" },
        { id: 78, q: "Sự cảm ứng tính kháng hệ thống (ISR) ở thực vật do chế phẩm chất kích thích sinh trưởng vi sinh PGPR kích hoạt bắt đầu bằng chuỗi sự kiện phân tử nào tại vùng rễ?", a: "Vi khuẩn PGPR phá hủy toàn bộ lớp vách tế bào cellulose lông hút để hút cạn kiệt lượng carbohydrate quang hợp tích lũy thân cành cây", b: "Nhận diện các phân tử mAMPs/chất cảm ứng của PGPR qua thụ thể PRRs bề mặt rễ, lan truyền dòng tín hiệu phytohormone (jasmonate/ethylene) lên thân lá", c: "Thao túng bộ gen di truyền DNA thực vật biến cây trồng thành dòng thực vật biến đổi gen có khả năng tự phát quang xua đuổi côn trùng sâu", d: "Kết dính các bào tử mầm bệnh thành cấu trúc khối kết tập hạt đất mặt luống để rễ cây tự do hút nước thông thoáng khí oxy tầng mặt ruộng", ans: "b" },
        { id: 79, q: "Việc bón bổ sung chế phẩm vi sinh cải tạo đất chứa vi khuẩn chi Rhodococcus spp. giúp phân hủy chất độc hóa học nào tồn dư phổ biến từ thuốc trừ sâu cũ?", a: "Các hạt quặng photphat vô cơ khó tan dạng tinh thể rắn trơ phân bố sâu dưới lòng đất lòng tầng địa chất đá mẹ thiếu không khí oxy", b: "Các hợp chất hữu cơ vòng thơm khó phân hủy, thuốc trừ sâu hóa học nhóm lân hữu cơ hoặc các hydrocacbon ô nhiễm đất nước ruộng", c: "Toàn bộ các nguyên tố vi lượng hữu ích sắt, kẽm và mangan dạng hòa tan lỏng khiến cây trồng bị còi cọc suy giảm năng suất chất lượng", d: "Các mảnh nilon bọc luống làm từ nhựa polymer cứng khó phân hủy cơ học dưới tác động của các loài vi sinh vật hoại sinh bản địa đất", ans: "b" },
        { id: 80, q: "Khái niệm \"Nông nghiệp thông minh thích ứng với biến đổi khí hậu\" ứng dụng công nghệ chế phẩm vi sinh nhằm thực hiện mục tiêu vĩ mô nào cho hệ sinh thái?", a: "Tăng tối đa lượng phân bón hóa học bón bón bổ sung vào mùa bão mưa lớn để pha loãng hàm lượng độc chất tích tụ dung dịch đất ruộng", b: "Khai thác vi sinh vật nâng cao sức chống chịu của cây trước stress cực đoan (hạn, mặn, nhiệt), giảm phát thải khí nhà kính nông nghiệp", c: "Chuyển đổi toàn bộ cơ cấu cây trồng sang mô hình canh tác thủy canh giá thể nhựa nhân tạo hoàn toàn trong các phòng thí nghiệm khép", d: "Tự động hóa hoàn toàn quy trình đóng gói nông sản thương mại xuất khẩu loại bỏ sức lao động của đội ngũ kỹ sư khuyến nông thôn", ans: "b" },
        { id: 81, q: "Công nghệ Metabolomics phát hiện sự hiện diện của hợp chất \"Auxin (indole-3-acetic acid)\" trong dịch chiết của chế phẩm vi sinh kích thích sinh trưởng, hợp chất này được tổng hợp từ tiền chất axit amin nào của vi khuẩn?", a: "Axit amin L-alanine cấu tạo nên chuỗi protein thô vô cơ bề mặt hạt kết tập keo sét đất tầng mặt luống cây trồng thâm canh cao độ", b: "Axit amin L-tryptophan có trong dịch tiết rễ cây hoặc cơ chất môi trường nuôi cấy vi sinh vật phòng thí nghiệm hiện đại", c: "Hợp chất đạm hữu cơ phức tạp vòng thơm khó phân hủy sinh học tự nhiên phát sinh từ sự hoại sinh phân hủy xác động vật chết sâu", d: "Phân tử khí methane tinh khiết bốc bùng phát ra ngoài môi trường không khí sát bề mặt ruộng nước bão hòa dung dịch axit hữu cơ mạnh", ans: "b" },
        { id: 82, q: "Sự phối hợp giữa nấm đối kháng Trichoderma harzianum và vi khuẩn hòa lân Bacillus megaterium trong cùng một công thức chế phẩm sinh học dạng hạt mang bản chất sinh học gì?", a: "Mối quan hệ đối kháng khốc liệt triệt tiêu hoàn toàn khả năng sinh trưởng phát triển khuẩn lạc của nhau do hiện tượng khống sinh học", b: "Hiệu ứng hiệp đồng đa chức năng: vừa tạo hàng rào sinh học tiêu diệt nấm bệnh hại rễ, vừa giải phóng lân dễ tiêu nuôi dưỡng bộ rễ", c: "Sự đột biến gen di truyền nhân tạo làm thay đổi hoàn toàn chu kỳ ra hoa kết trái quả của các giống cây trồng biến đổi gen kháng sâu", d: "Hiện tượng đông cứng dung dịch keo đất khiến hệ thống lông hút thực vật hoàn toàn không hấp thu được nguồn nước tưới tiêu nội đồng diện", ans: "b" },
        { id: 83, q: "Trong quy trình sản xuất phân bón sinh học vi sinh, bước \"Kiểm tra độ ổn định và hạn sử dụng\" (Shelf-life testing) tập trung đánh giá chỉ số nào của sản phẩm thương mại?", a: "Tổng chi phí tài chính bồi thường thiệt hại cho công nhân vận hành hệ thống máy đóng gói bao bì nhãn mác vật tư nông nghiệp trang", b: "Mật độ tế bào vi sinh vật sống sót và duy trì hoạt tính chức năng ổn định theo thời gian trong điều kiện bảo quản thực tế", c: "Tốc độ bay hơi tự nhiên của các hợp chất đạm khí quyển vùng rễ thực vật họ Đậu cố định đạm nốt sần rễ cây lâu năm canh tác", d: "Sơ đồ thiết kế mạch điện tự động hóa bên trong của các loại máy gặt đập liên hợp công suất thiết kế cơ khí lớn nông thôn truyền", ans: "b" },
        { id: 84, q: "Sự biểu hiện của gen acdS (acdS gene) ở vi khuẩn PGPR bón bổ sung vùng rễ chịu trách nhiệm tổng hợp nên enzyme điều chi phối tính trạng nào?", a: "Enzyme phosphatase hòa tan các phức chất photphat vô cơ khó tan trong quặng apatit đá mẹ địa chất sâu dưới lòng đất ruộng ruộng", b: "Enzyme ACC deaminase giúp phân hủy tiền chất ethylene, giảm thiểu tác hại của hiện tượng stress hạn mặn ngập úng ngạt rễ cây", c: "Enzyme chitinase phân hủy cấu trúc polyme vách tế bào vách cơ học của các nấm gây bệnh hại rễ thực vật họ Đậu lấy hạt lấy dầu", d: "Enzyme cellulase thủy phân cấu trúc xơ gỗ cứng rơm rạ phế phụ phẩm thực vật sau thu hoạch giải phóng hữu cơ cacbon ổn định mùn", ans: "b" },
        { id: 85, q: "Công cụ bào chế \"Huyền phù đậm đặc\" (Liquid concentrate) của chế phẩm thuốc sinh học vi sinh sở hữu ưu thế thực tiễn nào so với dạng bột thô mang chất nền than bùn?", a: "Có hàm lượng chất độc hóa học cao giúp khử trùng toàn bộ thảm quần xã vi sinh vật bản địa xung quanh vùng bón đồng ruộng diện rộng", b: "Dễ dàng phối trộn hòa tan hoàn toàn trong nước, không gây tắc nghẽn hệ thống béc phun tưới nhỏ giọt và bám dính tốt trên bề mặt thân lá", c: "Có khả năng tự nén chặt cơ học biến đất thành dạng khối tinh thể rắn trơ chống thấm hoàn toàn dung dịch nước mưa tự nhiên đồng", d: "Tự động tổng hợp được các lớp hạt diệp lục để tự thực hiện phản ứng quang hợp tạo sinh khối protein thô không cần cơ chất hữu cơ", ans: "b" },
        { id: 86, q: "Việc ứng dụng vi khuẩn Bacillus thuringiensis var. kurstaki (Btk) phối hợp với bẫy dính màu vàng trong mô hình IPM hướng tới mục tiêu quản lý bệnh cây như thế nào?", a: "Tạo ra chủng siêu độc lực biến đổi gen để tiêu diệt các thảm thực vật cỏ hoang dã mọc xung quanh rãnh luống canh tác trang trại", b: "Tối ưu hóa hiệu quả giám sát mật độ trưởng thành và tiêu diệt triệt để ấu trùng sâu hại bộ Cánh vẩy bảo vệ năng suất chất lượng", c: "Biến đổi vi khuẩn gây bệnh héo xanh mạch dẫn thành nhóm sinh vật cố định đạm cộng sinh rễ thực vật họ Đậu lấy hạt lấy dầu lấy", d: "Làm thay đổi hoàn toàn đặc tính lý hóa cơ giới của hạt cát thô thành hạt keo sét mịn không thông thoáng khí đất mặt canh tác thâm", ans: "b" },
        { id: 87, q: "Chế phẩm sinh học chứa vi khuẩn chi Streptomyces spp. (Xạ khuẩn) ứng dụng trong công nghệ bảo vệ thực vật bền vững nổi tiếng nhờ hoạt động sinh học nào?", a: "Quang hợp tích lũy carbon hữu cơ lỏng giải phóng lượng khí oxy làm thông thoáng cấu trúc hệ thống khe hở hạt đất canh tác mặt luống", b: "Sản xuất ra lượng chất kháng sinh tự nhiên phong phú (như streptomycin, khánh nấm) và tiết enzyme phân giải mạnh tế bào nấm bệnh hại", c: "Khử hoàn toàn hợp chất sulfate vô cơ thành khí hydro sulfide mùi trứng thối đặc trưng gây độc độc tính cấp cho lông hút hệ rễ cây", d: "Thao túng hệ thống miễn dịch ETI thực vật biến cây trồng thành dòng sinh vật nhân tạo hoàn toàn vô sinh ngủ ngủ hoài vĩnh viễn vĩnh", ans: "b" },
        { id: 88, q: "Sự tích lũy chất nhầy sinh học polysaccharide (Exopolysaccharides - EPS) của vi khuẩn PGPR bón bổ sung vùng rễ cải thiện đặc tính vật lý nào của hạt đất khi gặp hạn?", a: "Làm giảm dung tích giữ nước và tăng độ rửa trôi các khoáng chất vô cơ đa lượng xuống tầng nước ngầm sâu dưới lòng đất ruộng ruộng", b: "Gắn kết các hạt cát thô keo sét đơn lẻ thành tập hợp đất ổn định, tạo màng giữ ẩm bọc quanh rễ chống chịu stress khô hạn cực đoan", c: "Đẩy toàn bộ lượng không khí oxy ra khỏi các khe hở hạt đất khiến kết cấu hạt chặt khít vững cứng như khối tinh thể đá khoáng", d: "Tăng độ chua (giảm mạnh pH) của dung dịch keo đất mặt xuống mức cực đoan kiềm gây độc tính cấp tính cho hệ thống lông hút thực vật", ans: "b" },
        { id: 89, q: "Điền vào chỗ trống: \"Chất kích thích sinh trưởng cây trồng (PGPs) bao gồm nhiều dạng chế phẩm vi sinh giúp tăng cường sinh trưởng cây, ______ và nâng cao khả năng chịu stress.\"", a: "Thay thế hoàn toàn phân bón vô cơ", b: "Hấp thu dinh dưỡng", c: "Tăng lượng bón hóa chất bảo vệ", d: "Ngăn cản sự lưu thông của nguồn nước", ans: "b" },
        { id: 90, q: "Tiến bộ của công nghệ giải trình tự bộ gen đơn bào vi sinh vật vùng rễ cho phép nhà khoa học công nghệ sinh học nông nghiệp phát hiện ra điều gì?", a: "Bản đồ địa hình không gian chi tiết về hướng rãnh thoát nước và độ dốc cơ học vật lý của hệ thống luống đất đồng ruộng diện rộng", b: "Phát hiện các con đường sinh học mới, chức năng tiềm ẩn và gen quý của các chủng vi sinh vật chưa thể nuôi cấy thuần khiết phòng thí nghiệm", c: "Phương thức cắt giảm hoàn toàn quy trình khảo nghiệm an toàn sinh học đa giai đoạn của các cơ quan quản lý nhà nước ban hành quy", d: "Tính toán chính xác lượng nước tưới tiêu biến thiên tự động điều khiển bằng sóng vô tuyến điện loại bỏ sức lao động con người nông", ans: "b" },
        { id: 91, q: "Chế phẩm sinh học ứng dụng theo phương pháp \"Nhúng rễ cây con trước khi trồng\" chứa vi khuẩn Pseudomonas fluorescens mang lại lợi ích bảo vệ nào cho cây?", a: "Tiêu diệt toàn bộ quần xã nấm hoại sinh phân hủy mùn hữu cơ bám dính bề mặt biểu bì rễ thực vật do cạnh tranh sinh thái khốc liệt", b: "Giúp vi khuẩn định cư ngay lập tức tại các vết thương nhỏ vùng rễ khi bứng nhổ, tạo hàng rào sinh học ngăn chặn nấm bệnh xâm nhiễm hại", c: "Làm đông cứng cấu trúc mô học rễ biến bộ rễ thành dạng khối tinh thể rắn trơ chống chịu mọi tác động cơ học vật lý của máy cày", d: "Thay thế hoàn toàn nhu cầu hấp thu các dưỡng chất vô cơ lượng lớn đạm, lân, kali từ dung dịch keo đất suốt toàn bộ chu kỳ mùa vụ", ans: "b" },
        { id: 92, q: "Cơ chế \"Hòa tan kali sinh học\" của vi khuẩn Bacillus mucilaginous phối trộn trong chế phẩm phân bón sinh học diễn ra theo cơ chế hóa học nào?", a: "Tiết các ion khoáng đa lượng đạm và lân lỏng bão hòa nồng độ cao để đẩy phân tử kali ra khỏi liên kết hạt keo sét đất tầng mặt", b: "Tiết ra các axit hữu cơ và chelat giúp giải phóng ion kali hòa tan (K+) từ các cấu trúc quặng khoáng silicat khó tan ( mica, fenspat)", c: "Biến đổi cấu trúc bộ gen di truyền DNA của cây trồng thành dòng thực vật biến đổi gen tự tổng hợp kali từ năng lượng mặt trời", d: "Gắn kết các hạt cát thô xung quanh vùng rhizosphere thành khối đá chặt cứng để ngăn chặn sự rửa trôi kali xuống tầng nước ngầm", ans: "b" },
        { id: 93, q: "Công nghệ phân tích hồ sơ chất chuyển hóa (Metabolomics) vùng rễ phát hiện sự gia tăng mạnh nồng độ axit jasmonic ở thực vật, điều này chứng minh hiệu quả chức năng nào của PGPR bón bổ sung?", a: "Đất đang bước vào giai đoạn thoái hóa độ phì nhiêu và kiềm hóa cực đoan nghiêm trọng hại lông hút rễ thực vật họ Đậu lấy hạt lấy", b: "PGPR đã kích hoạt thành công con đường tín hiệu miễn dịch tự thân Kháng cảm ứng toàn thân (ISR) ở cây trồng trước áp lực bệnh hại", c: "Hệ thống mạch dẫn mạch gỗ của thân thực vật đang bị hủy hoại hoàn toàn do độc tính cấp tính từ các phân tử chất kháng sinh vi sinh", d: "Quần thể virus thực vật mới nổi truyền qua vector côn trùng đang tự động nhân đôi sinh khối số lượng bùng phát diện rộng tán lá cao", ans: "b" },
        { id: 94, q: "Chế phẩm sinh học \"Thuốc trừ bệnh sinh học từ nấm đối kháng\" chứa bào tử nấm Trichoderma virens tiết kháng sinh gliotoxin thực hiện hoạt động bảo vệ rễ theo cơ chế nào?", a: "Ức chế sự nảy mầm của bào tử nấm bệnh, phá hủy cấu trúc sợi nấm của các loài nấm gây bệnh hại rễ (như Rhizoctonia, Fusarium)", b: "Thủy phân tinh bột thô trong dung dịch keo đất thành đường đơn glucose tự nuôi sinh khối khuân lạc nấm hoại sinh phòng thí nghiệm thô", c: "Khử đạm đạm nitrat hữu cơ thành dạng khí tự do giải phóng ra ngoài môi trường không khí sát bề mặt ruộng nước bão hòa dung dịch axit", d: "Bao bọc các hạt quặng lân khó tan apatit vô cơ thành cấu trúc khối chặt vững cứng chắc chống chịu mọi tác động cơ học vật lý máy máy", ans: "a" },
        { id: 95, q: "Khi chất lượng \"Chất nền mang\" (Carrier-based) của chế phẩm phân bón sinh học bị nhiễm nấm mốc hoang dại do quy trình tiệt trùng nhà máy không đạt chuẩn, hệ quả trực tiếp là gì?", a: "Tốc độ cố định đạm sinh học của các nốt sần cây họ Đậu tăng trưởng sinh khối bùng phát số lượng diện rộng ngoài đồng ruộng thực tế", b: "Nấm mốc hoang dại cạnh tranh dinh dưỡng, không gian sống làm suy giảm mạnh mật độ và tuổi thọ của vi sinh vật có lợi đóng gói", c: "Toàn bộ các hợp chất vô cơ trong lòng đất tự động biến đổi thành cấu trúc hữu cơ phức tạp vòng thơm cứng chống xói mòn do nước mưa", d: "Vi khuẩn PGPR tự động tăng tốc độ phân chia tế bào và biểu hiện gen chịu trách nhiệm tổng hợp enzyme ACC deaminase gấp hàng trăm lần", ans: "b" },
